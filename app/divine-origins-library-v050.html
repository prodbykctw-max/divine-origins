// ── CANVAS INIT ────────────────────────────────────────────────
function _smInitCanvas() {
  canvas = document.getElementById('sm-canvas');
  if (!canvas) return;
  DPR = window.devicePixelRatio || 1;
  resize();
  ctx = canvas.getContext('2d');
  window.addEventListener('resize', () => { resize(); buildGraph(); }, { passive:true });
}

function resize() {
  const wrap = document.getElementById('sm-canvas-wrap');
  if (!wrap || !canvas) return;
  W = wrap.clientWidth;
  H = Math.max(wrap.clientHeight, 560);
  canvas.width  = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  if (ctx) ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}

// ── GRAPH BUILD ────────────────────────────────────────────────
function buildGraph() {
  if (!W || !H) return;

  const fns = {
    network:       layoutNetwork,
    structural:    layoutStructural,
    constellation: layoutConstellation,
    timeline:      layoutTimeline,
    wheel:         layoutWheel,
  };
  (fns[activeView] || layoutNetwork)();
  buildEdges();
  buildParticles();
}

function visibleNodes() {
  return SOURCE_MAP_NODES.filter(n =>
    !hiddenTrads.has(n.tradition) &&
    (filterTier === null || n.tier === filterTier)
  );
}

function layoutNetwork() {
  if (!W || !H) return;  // Don't seed nodes until canvas is measured
  // FLOATING BRAIN — organic cloud, no tier bands.
  // Nodes distributed in a roughly elliptical region, drifting freely.
  // Physics handles the actual positioning via repulsion + spring forces.
  const vis = visibleNodes();
  const cx = W/2, cy = H/2;
  const rxBase = W * 0.38;
  const ryBase = H * 0.38;

  nodes = vis.map((n, i) => {
    const prev = nodes.find(x => x.id === n.id);
    if (prev) {
      // Preserve existing position so view doesn't snap on filter changes
      return { ...prev, data: n, pinned: false };
    }
    // Seed positions in a noisy disk — physics sorts it out
    const angle = (i / vis.length) * Math.PI * 2 + Math.random() * 0.5;
    const radius = Math.sqrt(Math.random()) * 0.9;
    // Mild vertical tier bias just for visual sense — gravity is much weaker than the structural view
    const tierBias = ({1:-0.18, 2:-0.09, 0:0, 3:0.09, 4:0.18}[n.tier]) || 0;
    return {
      id: n.id, data: n,
      x: cx + Math.cos(angle) * rxBase * radius,
      y: cy + Math.sin(angle) * ryBase * radius + tierBias * H * 0.25,
      vx: (Math.random()-0.5) * 0.5,
      vy: (Math.random()-0.5) * 0.5,
      r: 18,
      color:     TRADITION_COLORS[n.tradition] || '#c9a84c',
      tierColor: TIER_META[n.tier]?.color || '#c9a84c',
      tier: n.tier, pinned: false,
      driftPhase: Math.random() * Math.PI * 2,
      driftSpeed: 0.3 + Math.random() * 0.4,
    };
  });
}

function layoutStructural() {
  const order = [1,2,0,3,4];
  const bH = H / (order.length + 0.5);
  nodes = visibleNodes().map(n => {
    const bi = order.indexOf(n.tier);
    const peers = visibleNodes().filter(x => x.tier === n.tier);
    const pi = peers.indexOf(n);
    const xSp = W / (peers.length + 1);
    return { id:n.id, data:n, x:xSp*(pi+1), y:bH*(bi+1), vx:0, vy:0, r:18,
             color:TRADITION_COLORS[n.tradition]||'#c9a84c',
             tierColor:TIER_META[n.tier]?.color||'#c9a84c', tier:n.tier, pinned:true };
  });
}

function layoutConstellation() {
  const cx = W/2, cy = H/2;
  const rMap = {1:55, 2:150, 0:245, 3:335, 4:415};
  const sc = Math.min(W,H)/1000;
  nodes = visibleNodes().map(n => {
    const r = (rMap[n.tier]||300)*sc;
    const pts = visibleNodes().filter(x => x.tier===n.tier);
    const ang = (pts.indexOf(n)/Math.max(pts.length,1))*Math.PI*2 - Math.PI/2;
    return { id:n.id, data:n, x:cx+r*Math.cos(ang), y:cy+r*Math.sin(ang),
             vx:0, vy:0, r:18, color:TRADITION_COLORS[n.tradition]||'#c9a84c',
             tierColor:TIER_META[n.tier]?.color||'#c9a84c', tier:n.tier, pinned:true };
  });
}

function layoutTimeline() {
  const sorted = [...visibleNodes()].sort((a,b) => {
    const yr = d => { const m=(d.primary_sources[0]||'').match(/(\d{3,4})\s*BCE/); return m?-parseInt(m[1]):999; };
    return yr(a)-yr(b);
  });
  const cols = Math.ceil(Math.sqrt(sorted.length*1.7));
  const rows = Math.ceil(sorted.length/cols);
  nodes = sorted.map((n,i) => ({
    id:n.id, data:n,
    x:W*0.05+(i%cols)*(W*0.9/cols)+18,
    y:H*0.07+Math.floor(i/cols)*(H*0.86/rows),
    vx:0, vy:0, r:18,
    color:TRADITION_COLORS[n.tradition]||'#c9a84c',
    tierColor:TIER_META[n.tier]?.color||'#c9a84c',
    tier:n.tier, pinned:true,
  }));
}

function layoutWheel() {
  // Reorganize by function tag — all nodes with the active tag cluster at center,
  // others arranged around the periphery
  const tag    = wheelTag;
  const cx     = W/2, cy = H/2;
  const vis    = visibleNodes();
  const tagged = vis.filter(n => n.function_tags?.includes(tag));
  const rest   = vis.filter(n => !n.function_tags?.includes(tag));

  const tagR  = Math.min(W,H)*0.18;
  const restR = Math.min(W,H)*0.42;

  const makeNodes = (arr, r, colorFn) =>
    arr.map((n,i) => ({
      id:n.id, data:n,
      x: cx + r*Math.cos((i/Math.max(arr.length,1))*Math.PI*2 - Math.PI/2),
      y: cy + r*Math.sin((i/Math.max(arr.length,1))*Math.PI*2 - Math.PI/2),
      vx:0, vy:0, r:18,
      color: colorFn(n),
      tierColor: TIER_META[n.tier]?.color||'#c9a84c',
      tier:n.tier, pinned:true,
    }));

  const tagColor   = n => '#a0c060';
  const tradeColor = n => TRADITION_COLORS[n.tradition]||'#c9a84c';

  nodes = [
    ...makeNodes(tagged, tagR,  tagColor),
    ...makeNodes(rest,   restR, tradeColor),
  ];
}

function buildEdges() {
  edges = [];
  const nm = new Map(nodes.map(n=>[n.id,n]));
  nodes.forEach(n => {
    n.data.parallel_node_ids?.forEach(pid => {
      if (!nm.has(pid)) return;
      if (edges.some(e=>(e.a.id===n.id&&e.b.id===pid)||(e.a.id===pid&&e.b.id===n.id))) return;
      edges.push({ a:n, b:nm.get(pid), color:n.tierColor, alpha:0.15, canonical:true });
    });
  });
  // V2 canonical parallels — add extra glow to documented ones
  CANONICAL_PARALLELS.forEach(cp => {
    const a = nm.get(cp.facet_a?.split('-')[0]);
    const b = nm.get(cp.facet_b?.split('-')[0]);
    if (a && b && !edges.some(e=>(e.a===a&&e.b===b)||(e.a===b&&e.b===a))) {
      edges.push({ a, b, color:'#c9a84c', alpha:0.28, canonical:true, v2canonical:true });
    }
  });
  // User connections
  const ucList = getUserConns();
  ucList.forEach(c => {
    const a=nm.get(c.from), b=nm.get(c.to);
    if (a&&b) edges.push({ a, b, color:'#c9a84c', alpha:0.65, canonical:false, note:c.note });
  });
}

function buildParticles() {
  particles = [];
  edges.filter(e => e.canonical).forEach(e => {
    // More particles per edge = denser synaptic activity (more brain-like)
    const count = e.v2canonical ? 5 : 3;
    for (let i = 0; i < count; i++) {
      particles.push({
        edge: e,
        t: Math.random(),
        speed: 0.0008 + Math.random() * 0.0018,
        size: 1.4 + Math.random() * 2.2,
        alpha: 0.5 + Math.random() * 0.5,
        // Per-particle pulse phase for shimmer
        pulsePhase: Math.random() * Math.PI * 2,
      });
    }
  });
}

// ── ANIMATION LOOP ─────────────────────────────────────────────
function loop(ts) {
  tick = ts * 0.001;
  raf  = requestAnimationFrame(loop);
  if (!ctx) return;

  // If canvas has no size yet (section just became visible), re-measure
  if (!W || !H) { resize(); if (!W || !H) return; }

  if (activeView==='network') physics();

  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(panOffset.x, panOffset.y);
  ctx.scale(zoom, zoom);

  // Bg vignette
  const vg = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
  vg.addColorStop(0,'rgba(10,8,24,0)'); vg.addColorStop(1,'rgba(5,4,8,0.7)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

  // Neural mist — soft brain-shaped glow in network mode (enhances floating-brain feel)
  if (activeView === 'network') {
    const breathR = 1 + 0.04 * Math.sin(tick * 0.7);
    const mist = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.min(W,H) * 0.45 * breathR);
    mist.addColorStop(0,    'rgba(201,168,76,0.045)');
    mist.addColorStop(0.5,  'rgba(64,168,160,0.025)');
    mist.addColorStop(1,    'rgba(5,4,8,0)');
    ctx.fillStyle = mist;
    ctx.fillRect(0, 0, W, H);
  }

  if (activeView==='constellation') drawRings();
  if (activeView==='structural')    drawBands();
  if (activeView==='wheel')         drawWheelCenter();
  drawEdges();
  drawParticles();
  if (dragLine) drawDragLine();
  drawNodes();
  ctx.restore();
}

// ── PHYSICS ────────────────────────────────────────────────────
function physics() {
  // FLOATING BRAIN PHYSICS — organic cloud motion
  // No tier-band gravity (that was making it look stratified instead of brain-like)
  // Just: gentle center attraction + node repulsion + spring connections + per-node drift
  const REPEL = 2800;       // node-node repulsion strength
  const SPRING = 0.012;     // edge spring stiffness (gentler — lets brain breathe)
  const DAMP = 0.92;        // velocity damping (higher = smoother, slower drift)
  const LEN = 180;          // ideal edge length
  const CENTER_PULL = 0.0006; // very gentle center attraction (keeps cloud cohesive)

  const cx = W/2, cy = H/2;

  nodes.forEach(n => {
    if (n.pinned || n === dragging) return;

    // Gentle pull toward center (keeps the brain cohesive without flattening it)
    n.vx += (cx - n.x) * CENTER_PULL;
    n.vy += (cy - n.y) * CENTER_PULL;

    // Organic per-node drift — makes each node sway like floating in liquid
    n.driftPhase += 0.012 * n.driftSpeed;
    n.vx += Math.cos(n.driftPhase) * 0.04;
    n.vy += Math.sin(n.driftPhase * 1.3) * 0.04;

    // Node-node repulsion (every node pushes every other away with inverse-square)
    nodes.forEach(m => {
      if (m === n) return;
      const dx = n.x - m.x, dy = n.y - m.y;
      const d2 = dx*dx + dy*dy + 0.1;
      const f = REPEL / d2;
      n.vx += dx * f;
      n.vy += dy * f;
    });

    // Spring forces along edges (connected nodes pull toward ideal distance)
    edges.filter(e => e.a === n || e.b === n).forEach(e => {
      const o = e.a === n ? e.b : e.a;
      const dx = o.x - n.x, dy = o.y - n.y;
      const d = Math.sqrt(dx*dx + dy*dy) || 1;
      const f = (d - LEN) * SPRING;
      n.vx += dx/d * f;
      n.vy += dy/d * f;
    });

    n.vx *= DAMP;
    n.vy *= DAMP;
    n.x = Math.max(30, Math.min(W - 30, n.x + n.vx));
    n.y = Math.max(30, Math.min(H - 30, n.y + n.vy));
  });
}

// ── DRAW ────────────────────────────────────────────────────────
function drawRings() {
  const cx=W/2, cy=H/2, sc=Math.min(W,H)/1000;
  Object.entries({1:55,2:150,0:245,3:335,4:415}).forEach(([t,r]) => {
    const m=TIER_META[parseInt(t)], sr=r*sc;
    ctx.beginPath(); ctx.arc(cx,cy,sr,0,Math.PI*2);
    ctx.strokeStyle=m.color; ctx.lineWidth=1;
    ctx.globalAlpha=0.07; ctx.setLineDash([4,9]); ctx.stroke();
    ctx.setLineDash([]); ctx.globalAlpha=0.2;
    ctx.font=`${Math.round(8/zoom)}px 'Space Mono',monospace`;
    ctx.fillStyle=m.color; ctx.textAlign='left';
    ctx.fillText('TIER '+(parseInt(t)===0?'⟷':t), cx+sr+6, cy-4);
    ctx.globalAlpha=1;
  });
}

function drawBands() {
  [1,2,0,3,4].forEach((tier,i) => {
    const m=TIER_META[tier], bH=H/5.5, y=bH*(i+0.75);
    const g=ctx.createLinearGradient(0,y-bH*0.4,0,y+bH*0.4);
    g.addColorStop(0,m.color+'00'); g.addColorStop(0.5,m.color+'08'); g.addColorStop(1,m.color+'00');
    ctx.fillStyle=g; ctx.fillRect(0,y-bH*0.4,W,bH*0.8);
    ctx.save(); ctx.globalAlpha=0.14;
    ctx.font=`600 ${Math.round(11/zoom)}px 'Cinzel',serif`;
    ctx.fillStyle=m.color; ctx.textAlign='left';
    ctx.fillText('TIER '+(tier===0?'⟷':tier)+'  '+m.label.toUpperCase(),14,bH*(i+0.55));
    ctx.restore();
  });
}

function drawWheelCenter() {
  if (!wheelTag) return;
  const cx=W/2, cy=H/2, r=Math.min(W,H)*0.22;
  // Glow ring around center cluster
  const g = ctx.createRadialGradient(cx,cy,r*0.3,cx,cy,r*1.1);
  g.addColorStop(0,'rgba(160,192,96,0.08)'); g.addColorStop(1,'rgba(160,192,96,0)');
  ctx.beginPath(); ctx.arc(cx,cy,r*1.1,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();
  // Tag label at center
  ctx.save(); ctx.globalAlpha=0.35;
  ctx.font=`600 ${Math.round(14/zoom)}px 'Cinzel',serif`;
  ctx.fillStyle='#a0c060'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(wheelTag.toUpperCase(), cx, cy);
  ctx.restore();
}

function drawEdges() {
  const selNode = selected ? nodes.find(n=>n.id===selected) : null;
  const hovNode = hovered  ? nodes.find(n=>n.id===hovered)  : null;
  const focus   = selNode || hovNode;
  const fPars   = focus ? new Set([focus.id,...(focus.data.parallel_node_ids||[])]) : null;

  // Subtle global breathing — entire neural network pulses like a living brain
  const breath = 1 + 0.08 * Math.sin(tick * 0.7);

  edges.forEach((e, ei) => {
    const lit = !fPars || fPars.has(e.a.id) || fPars.has(e.b.id);
    const baseAlpha = lit ? (e.canonical ? 0.32 : 0.78) : 0.03;
    const alpha = baseAlpha * breath;
    const v2c = e.v2canonical;

    // Each edge has its own slight pulse phase so they don't all glow in unison
    const edgePulse = 0.85 + 0.15 * Math.sin(tick * 1.5 + ei * 0.7);

    // Multi-pass glow rendering — outer halo first, sharp core last
    // This is what makes the lines look like luminous nerve fibers
    for (let pass = 5; pass >= 0; pass--) {
      const mx = (e.a.x + e.b.x)/2 + (e.b.y - e.a.y) * 0.08;
      const my = (e.a.y + e.b.y)/2 - (e.b.x - e.a.x) * 0.08;
      ctx.beginPath();
      ctx.moveTo(e.a.x, e.a.y);
      ctx.quadraticCurveTo(mx, my, e.b.x, e.b.y);

      ctx.strokeStyle = e.canonical ? (v2c ? '#c9a84c' : e.color) : '#c9a84c';

      if (pass === 0) {
        // Sharp inner stroke — the actual fiber
        ctx.lineWidth = e.canonical ? (v2c ? 2 : 1.3) : 2.5;
        ctx.globalAlpha = alpha * edgePulse;
      } else {
        // Glow halo passes — exponentially wider and fainter
        ctx.lineWidth = pass * 5;
        ctx.globalAlpha = alpha * 0.13 / pass;
      }

      if (!e.canonical) ctx.setLineDash([5,5]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.globalAlpha = 1;
  });
}

function drawParticles() {
  const selNode = selected ? nodes.find(n=>n.id===selected) : null;
  const focus   = selNode || (hovered ? nodes.find(n=>n.id===hovered) : null);
  const fPars   = focus ? new Set([focus.id,...(focus.data.parallel_node_ids||[])]) : null;

  particles.forEach(p => {
    p.t = (p.t+p.speed)%1;
    const {a,b} = p.edge;
    const lit = !fPars || fPars.has(a.id) || fPars.has(b.id);
    if (!lit) return;
    const tt=p.t, mx=(a.x+b.x)/2+(b.y-a.y)*0.07, my=(a.y+b.y)/2-(b.x-a.x)*0.07;
    const px=(1-tt)*(1-tt)*a.x+2*(1-tt)*tt*mx+tt*tt*b.x;
    const py=(1-tt)*(1-tt)*a.y+2*(1-tt)*tt*my+tt*tt*b.y;
    const gr=ctx.createRadialGradient(px,py,0,px,py,p.size*4);
    gr.addColorStop(0,p.edge.color+'ff'); gr.addColorStop(1,p.edge.color+'00');
    ctx.beginPath(); ctx.arc(px,py,p.size*4,0,Math.PI*2);
    ctx.fillStyle=gr; ctx.globalAlpha=p.alpha*0.4; ctx.fill();
    ctx.beginPath(); ctx.arc(px,py,p.size*0.7,0,Math.PI*2);
    ctx.fillStyle='#ffffff'; ctx.globalAlpha=p.alpha*0.85; ctx.fill();
    ctx.globalAlpha=1;
  });
}

function drawDragLine() {
  const {from,x,y}=dragLine;
  ctx.beginPath(); ctx.moveTo(from.x,from.y); ctx.lineTo(x,y);
  ctx.strokeStyle='#c9a84c'; ctx.lineWidth=2;
  ctx.globalAlpha=0.7; ctx.setLineDash([6,4]); ctx.stroke();
  ctx.setLineDash([]); ctx.globalAlpha=1;
}

function drawNodes() {
  const selNode = selected ? nodes.find(n=>n.id===selected) : null;
  const fPars   = selNode ? new Set([selNode.id,...(selNode.data.parallel_node_ids||[])]) : null;

  nodes.forEach(n => {
    // Guard: skip nodes with invalid coordinates (can happen on first frame before layout)
    if (!isFinite(n.x) || !isFinite(n.y) || !isFinite(n.r)) return;

    const isSel  = n.id===selected;
    const isHov  = n.id===hovered;
    const isPar  = fPars?.has(n.id) && !isSel;
    const isWTag = wheelTag && n.data.function_tags?.includes(wheelTag);
    const dimmed = (selected||hovered) && !isSel && !isHov && !isPar;
    const alpha  = dimmed ? 0.14 : 1;
    const pulse  = isSel ? 1+0.1*Math.sin(tick*2.8) : 1;
    const r      = n.r * pulse * (isWTag ? 1.25 : 1);
    const gc     = isSel?'#ffffff': isPar?n.tierColor: isWTag?'#a0c060': n.color;

    ctx.globalAlpha = alpha;

    // Outer glow
    [5,4,3,2,1].forEach(pass => {
      const g2=ctx.createRadialGradient(n.x,n.y,r*0.3,n.x,n.y,r+pass*9);
      g2.addColorStop(0,rgba(gc,0.28/pass)); g2.addColorStop(1,rgba(gc,0));
      ctx.beginPath(); ctx.arc(n.x,n.y,r+pass*9,0,Math.PI*2);
      ctx.fillStyle=g2; ctx.fill();
    });

    // Body
    const body=ctx.createRadialGradient(n.x-r*0.3,n.y-r*0.35,0,n.x,n.y,r);
    body.addColorStop(0,rgba(n.color,0.65)); body.addColorStop(0.55,rgba(n.color,0.22));
    body.addColorStop(1,rgba(n.color,0.06));
    ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2); ctx.fillStyle=body; ctx.fill();

    // Gloss
    const gl=ctx.createLinearGradient(n.x-r,n.y-r,n.x,n.y);
    gl.addColorStop(0,'rgba(255,255,255,0.22)'); gl.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2); ctx.fillStyle=gl; ctx.fill();

    // V2 indicator ring (if deity has V2 facets)
    if (V2_INDEX[n.id]) {
      ctx.beginPath(); ctx.arc(n.x,n.y,r+2,0,Math.PI*2);
      ctx.strokeStyle='rgba(201,168,76,0.35)'; ctx.lineWidth=1.5;
      ctx.globalAlpha=alpha*0.6; ctx.setLineDash([3,4]); ctx.stroke();
      ctx.setLineDash([]);
    }

    // Border
    ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2);
    ctx.strokeStyle=isSel?'#fff': isHov?n.color: isPar?n.tierColor: isWTag?'#a0c060': n.color;
    ctx.lineWidth=isSel?2.5:1.5; ctx.globalAlpha=alpha*(isSel?1:0.75); ctx.stroke();

    // Tier label
    ctx.font=`bold ${Math.round(7.5/zoom)}px 'Space Mono',monospace`;
    ctx.fillStyle=n.tierColor; ctx.globalAlpha=alpha*0.85;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(n.tier===0?'⟷':String(n.tier),n.x,n.y);

    // Name label
    const fz=Math.max(8,Math.round(10/zoom));
    ctx.font=`500 ${fz}px 'Cinzel',serif`;
    ctx.fillStyle=isSel?'#fff': isHov||isPar?n.color: rgba(n.color,0.85);
    ctx.globalAlpha=alpha*(isSel||isHov||isPar||isWTag?1:0.65);
    ctx.textBaseline='top';
    ctx.fillText(n.data.primary_name.split(' ').slice(0,2).join(' '),n.x,n.y+r+4);

    ctx.globalAlpha=1; ctx.textBaseline='alphabetic';
  });
}

// ── INPUTS ─────────────────────────────────────────────────────
function bindInputs() {
  if (!canvas) return;

  canvas.addEventListener('mousemove', e => {
    const r=canvas.getBoundingClientRect(), cx=e.clientX-r.left, cy=e.clientY-r.top;
    if (isPanning) { panOffset.x=panStart.px+(cx-panStart.x); panOffset.y=panStart.py+(cy-panStart.y); return; }
    if (dragging) {
      const w=toWorld(cx,cy); dragging.x=w.x; dragging.y=w.y;
      const tgt=nodes.find(n=>n!==dragging&&Math.hypot(n.x-w.x,n.y-w.y)<n.r+12);
      dragLine={from:dragging,x:w.x,y:w.y,target:tgt};
      canvas.style.cursor=tgt?'cell':'grabbing'; return;
    }
    const hit=hitTest(cx,cy); hovered=hit?hit.id:null;
    canvas.style.cursor=hit?'pointer':'crosshair';
  });

  canvas.addEventListener('mousedown', e => {
    const r=canvas.getBoundingClientRect(), cx=e.clientX-r.left, cy=e.clientY-r.top;
    const hit=hitTest(cx,cy);
    if (hit) { dragging=hit; dragLine={from:hit,...toWorld(cx,cy),target:null}; return; }
    isPanning=true; panStart={x:cx,y:cy,px:panOffset.x,py:panOffset.y};
    canvas.style.cursor='grabbing';
  });

  canvas.addEventListener('mouseup', e => {
    canvas.style.cursor=hovered?'pointer':'crosshair';
    if (dragLine?.target && dragging) { promptConnect(dragging.id, dragLine.target.id); }
    else if (dragging) {
      const r=canvas.getBoundingClientRect();
      const hit=hitTest(e.clientX-r.left,e.clientY-r.top);
      if (hit) selectNode(hit.id);
    }
    dragging=null; dragLine=null; isPanning=false;
  });

  canvas.addEventListener('dblclick', e => {
    const r=canvas.getBoundingClientRect();
    const hit=hitTest(e.clientX-r.left,e.clientY-r.top);
    if (hit) openFullModal(hit.data);
    else { selected=null; updatePanel(null); }
  });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const r=canvas.getBoundingClientRect(), cx=e.clientX-r.left, cy=e.clientY-r.top;
    const f=e.deltaY<0?1.12:0.89, nz=Math.max(0.2,Math.min(5,zoom*f));
    panOffset.x=cx-(cx-panOffset.x)*(nz/zoom); panOffset.y=cy-(cy-panOffset.y)*(nz/zoom);
    zoom=nz;
  },{passive:false});

  canvas.addEventListener('mouseleave',()=>{ hovered=null; canvas.style.cursor='crosshair'; });

  // View buttons
  document.querySelectorAll('.sm-view-btn').forEach(btn=>btn.addEventListener('click',()=>{
    activeView=btn.dataset.view;
    document.querySelectorAll('.sm-view-btn').forEach(b=>{
      const a=b.dataset.view===activeView;
      b.style.borderColor=a?'var(--gold)':'var(--border)';
      b.style.color=a?'var(--gold)':'var(--text-dim)';
      b.style.background=a?'rgba(201,168,76,0.08)':'transparent';
    });
    // Show/hide wheel tags
    const wt=document.getElementById('sm-wheel-tags');
    if (wt) wt.style.display=activeView==='wheel'?'flex':'none';
    selected=null; hovered=null; buildGraph(); resetView();
  }));

  // Scholar mode
  document.getElementById('sm-scholar-btn')?.addEventListener('click',()=>{
    scholarMode=!scholarMode;
    const btn=document.getElementById('sm-scholar-btn');
    if (btn) {
      btn.style.borderColor = scholarMode?'var(--teal)':'rgba(64,168,160,0.4)';
      btn.style.color       = scholarMode?'var(--teal)':'var(--text-dim)';
      btn.style.background  = scholarMode?'rgba(64,168,160,0.08)':'transparent';
    }
    // Refresh panel if open
    const n = selected ? nodes.find(x=>x.id===selected) : null;
    if (n) updatePanel(n.data);
  });

  // Cosmological Frameworks Picker
  document.getElementById('sm-framework-btn')?.addEventListener('click',()=>{
    openFrameworkPicker();
  });

  // Tier filter
  document.querySelectorAll('.sm-tier-btn').forEach(btn=>btn.addEventListener('click',()=>{
    filterTier=btn.dataset.tier==='all'?null:parseInt(btn.dataset.tier);
    selected=null; buildGraph();
  }));

  // Tradition toggles
  document.querySelectorAll('.sm-trad-btn').forEach(btn=>btn.addEventListener('click',()=>{
    const tr=btn.dataset.trad;
    if(hiddenTrads.has(tr)) hiddenTrads.delete(tr); else hiddenTrads.add(tr);
    const hidden=hiddenTrads.has(tr), c=TRADITION_COLORS[tr]||'#c9a84c';
    btn.style.borderColor=hidden?'rgba(255,255,255,0.1)':c+'55';
    btn.style.color=hidden?'var(--text-dim)':c;
    btn.style.background=hidden?'transparent':c+'11';
    btn.style.opacity=hidden?'0.28':'1';
    selected=null; buildGraph();
  }));

  // Function Wheel tag buttons
  document.querySelectorAll('.sm-tag-btn').forEach(btn=>btn.addEventListener('click',()=>{
    wheelTag=btn.dataset.tag===wheelTag?null:btn.dataset.tag;
    document.querySelectorAll('.sm-tag-btn').forEach(b=>{
      const a=b.dataset.tag===wheelTag;
      b.style.borderColor=a?'#a0c060':'rgba(160,192,96,0.4)';
      b.style.background =a?'rgba(160,192,96,0.15)':'rgba(160,192,96,0.08)';
    });
    buildGraph();
  }));

  // Clear connections
  document.getElementById('sm-clear-btn')?.addEventListener('click',()=>{
    if(!confirm('Clear all your connections?')) return;
    localStorage.removeItem('sm-connections');
    userConns=[];
    document.getElementById('sm-conn-list').innerHTML=connList();
    buildEdges(); buildParticles();
  });
}

function toWorld(cx,cy) { return {x:(cx-panOffset.x)/zoom, y:(cy-panOffset.y)/zoom}; }
function hitTest(cx,cy) {
  const {x,y}=toWorld(cx,cy);
  return nodes.find(n=>Math.hypot(n.x-x,n.y-y)<n.r+10)||null;
}

// ── SELECT / PANEL ─────────────────────────────────────────────
function selectNode(id) {
  selected=selected===id?null:id;
  const n=id?nodes.find(x=>x.id===id):null;
  updatePanel(n?n.data:null);
}

function updatePanel(data) {
  const p=document.getElementById('sm-panel');
  if (p) p.innerHTML=data?nodePanel(data):emptyPanel();
}

function emptyPanel() {
  return `<div style="padding:2rem;height:100%;display:flex;flex-direction:column;
                      align-items:center;justify-content:center;text-align:center;opacity:0.32">
    <div style="font-size:3rem;margin-bottom:1rem;color:var(--gold)">✦</div>
    <div class="t-label" style="color:var(--gold);margin-bottom:0.4rem">SELECT A NODE</div>
    <div class="t-caption" style="line-height:1.7">

    </div>
  </div>`;
}

  const v2 = V2_INDEX[data.id];

  const enginePars = facets.length
    ? computeParallels(facets[0]?.id, {maxResults:5}).filter(p=>p.score>0.3)
    : [];

  // Scholar caveat
  const scholarCaveat = data.tier===3 && data.tradition==='gnostic'

                   border-left:2px solid var(--teal)">
         <div class="t-label" style="color:var(--teal);margin-bottom:0.3rem">𝙎 SCHOLARLY CONTEXT</div>
         <p style="font-size:0.72rem;color:var(--text-secondary);line-height:1.55">
           This identification is a Gnostic interpretive move — not mainstream Jewish or Christian
           theology. Primary texts: Apocryphon of John II,1; Hypostasis of the Archons II,4.
           Scholars: Karen King (2003), Birger Pearson (2007).
         </p>
       </div>`
    : data.tradition?.includes('gnostic') && scholarMode
      ? `<div style="margin-top:0.7rem;padding:0.6rem;background:rgba(64,168,160,0.07);border-left:2px solid var(--teal)">
           <div class="t-label" style="color:var(--teal);margin-bottom:0.25rem">𝙎 SCHOLAR MODE</div>
           <p style="font-size:0.7rem;color:var(--text-secondary);line-height:1.55">
             This entry presents the Gnostic tradition's own account (proponent voice).
             For academic context, see doc 03 of the Source Map Spec.
           </p>
         </div>` : '';

  return `
    <div style="height:3px;background:linear-gradient(90deg,${meta.color},transparent)"></div>
    <div style="padding:1.5rem">
      <div class="t-caption" style="color:${meta.color};margin-bottom:0.25rem">
        TIER ${data.tier===0?'⟷':data.tier} · ${meta.label}
        ${v2?'<span style="color:var(--gold-dim);margin-left:0.4rem">V2 ✦</span>':''}
      </div>
      <h3 style="font-family:var(--font-display);font-size:1.1rem;color:var(--text-primary);
                 margin-bottom:0.15rem;line-height:1.2">${data.primary_name}</h3>
      <div style="font-style:italic;font-size:0.7rem;color:var(--text-dim);margin-bottom:0.6rem">

      </div>
      <div class="t-caption" style="color:${color};margin-bottom:0.65rem">
        ${data.tradition.replace(/_/g,' ').toUpperCase()}
      </div>

      <!-- Essence -->
      <div style="padding:0.7rem;background:${color}08;border-left:2px solid ${color}55;margin-bottom:0.65rem">
        <div class="t-label" style="color:${color};margin-bottom:0.28rem">◈ ESSENCE</div>
        <p style="font-size:0.75rem;color:var(--text-secondary);line-height:1.58">${data.essence}</p>
      </div>

      <!-- Function tags -->
      <div style="display:flex;flex-wrap:wrap;gap:0.18rem;margin-bottom:0.65rem">
        ${(data.function_tags||[]).slice(0,6).map(t=>`<span class="tag" style="font-size:0.34rem">${t}</span>`).join('')}
      </div>

      <!-- V2 Facets -->
      ${facets.length ? `
      <div style="margin-bottom:0.65rem">
        <div class="t-label" style="color:var(--gold);margin-bottom:0.3rem">⊕ FACETS (V2)</div>
        ${facets.map(f => {
          const tm = TIER_META[f.tier_assignment] || TIER_META[0];
          return `<div style="padding:0.28rem 0.45rem;margin-bottom:0.18rem;
                               border-left:2px solid ${tm.color}66;
                               background:${tm.color}08;border-radius:0 2px 2px 0">
            <div style="display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap">

              <span class="tag" style="font-size:0.32rem;color:${tm.color};border-color:${tm.color}44">
                T${f.tier_assignment===0?'⟷':f.tier_assignment}

      ${enginePars.length ? `

          const pc = TRADITION_COLORS[p.facet.parent_deity_id?.split('-')[0]] || '#a0c060';

      </div>` : ''}

      <!-- Canvas parallels -->
      ${pars.length ? `
      <div style="margin-bottom:0.65rem">
        <div class="t-label" style="color:${meta.color};margin-bottom:0.3rem">⟷ IN VIEW</div>
        <div style="display:flex;flex-wrap:wrap;gap:0.2rem">

            const pc=TRADITION_COLORS[p.tradition]||'#c9a84c';

                                   border:1px solid ${pc}44;color:${pc};background:${pc}0a;
                                   cursor:pointer;border-radius:2px">
                      ${p.primary_name.split(' ')[0]}
                    </button>`;
          }).join('')}
        </div>
      </div>` : ''}

      ${scholarMode ? scholarCaveat : ''}

      <!-- Key claims -->
      ${data.key_claims?.length ? `
      <div style="margin-bottom:0.65rem">
        <div class="t-label" style="color:var(--teal);margin-bottom:0.25rem">KEY CLAIMS</div>
        ${data.key_claims.slice(0,2).map(c=>`
          <div style="font-size:0.72rem;color:var(--text-secondary);padding:0.25rem 0.42rem;
                      border-left:1px solid rgba(64,168,160,0.35);margin-bottom:0.18rem">${c}</div>`).join('')}
      </div>` : ''}

      <!-- Actions -->
      <div style="display:grid;gap:0.35rem;margin-top:0.6rem">
        <button onclick="window.smOpenFull('${data.id}')"
                style="font-family:var(--font-mono);font-size:0.44rem;letter-spacing:0.18em;

                       color:${color};background:${color}0a;cursor:pointer;border-radius:2px;
                       width:100%;transition:all 0.2s">
          FULL ENTRY + PRIMARY SOURCES →
        </button>
        <button onclick="window.smPromptConnFrom('${data.id}')"
                style="font-family:var(--font-mono);font-size:0.44rem;letter-spacing:0.18em;
                       text-transform:uppercase;padding:0.38rem;border:1px solid var(--border);
                       color:var(--text-dim);background:transparent;cursor:pointer;
                       border-radius:2px;width:100%;transition:all 0.2s">
          + DRAW CONNECTION FROM THIS NODE
        </button>
      </div>
    </div>`;
}

// ── FULL MODAL ──────────────────────────────────────────────────
function openFullModal(data) {
  const meta  = TIER_META[data.tier];
  const color = TRADITION_COLORS[data.tradition] || '#c9a84c';
  const pars  = getParallelNodes(data.id);
  const v2    = V2_INDEX[data.id];
  const srcs  = data.primary_sources?.map(s=>
    `<li style="font-family:var(--font-mono);font-size:0.5rem;letter-spacing:0.12em;

  const v2Section = v2?.facets.length ? `

        const fp = computeParallels(f.id,{maxResults:4,threshold:0.25});
        return `<div style="padding:0.7rem;border:1px solid ${tm.color}33;background:${tm.color}06;
                             border-radius:2px;margin-bottom:0.5rem">

            <span class="tag" style="font-size:0.4rem;color:${tm.color};border-color:${tm.color}44">
              TIER ${f.tier_assignment===0?'⟷':f.tier_assignment}
            </span>
            <span style="font-family:var(--font-display);font-size:0.88rem;color:${tm.color}">${f.facet_name}</span>
          </div>
          <p style="font-size:0.76rem;color:var(--text-secondary);line-height:1.55;margin-bottom:0.4rem">${f.core_claim}</p>
          ${fp.length ? `<div style="display:flex;flex-wrap:wrap;gap:0.2rem">
            ${fp.map(p=>`<span style="font-family:var(--font-mono);font-size:0.38rem;letter-spacing:0.1em;
                                      padding:0.12rem 0.32rem;border:1px solid rgba(160,192,96,0.35);
                                      color:#a0c060;border-radius:2px">
                           ${p.facet.facet_name.split(' ')[0]} ${Math.round(p.score*100)}%${p.canonical?' ✓':''}
                         </span>`).join('')}
          </div>` : ''}
        </div>`;
      }).join('')}
    </div>` : '';

  const scholarSection = scholarMode ? `
    <div class="info-block info-block--scholarly" style="margin-top:1rem">
      <span class="info-block__label">𝙎 SCHOLARLY CONTEXT (Scholar Mode ON)</span>
      <p>The four-tier framework uses Gnostic cosmology as an interpretive lens — one valid framework among many. Every tradition presented here speaks in its own proponent voice. For academic caveats including source-critical, interpretive-move, and methodological-lineage notes, refer to the Source Map Specification (docs/03-scholarly-mode.md).</p>
      <p style="margin-top:0.5rem">Relevant scholars: ${[
        'Wouter Hanegraaff','Karen King','Michael Williams','Elaine Pagels',
        'Mark S. Smith','Frank Moore Cross','Stephanie Dalley'
      ].join(' · ')}</p>
    </div>` : '';

  openModal({ accentColor: color, html: `
    <div style="padding:2rem">
      <div class="t-caption" style="color:${meta.color};margin-bottom:0.4rem">
        TIER ${data.tier===0?'⟷':data.tier} · ${meta.label} · ${data.tradition.replace(/_/g,' ').toUpperCase()}
      </div>
      <h2 style="font-family:var(--font-display);font-size:1.7rem;color:var(--text-primary);margin-bottom:0.2rem">${data.primary_name}</h2>
      <p style="font-style:italic;color:var(--text-dim);margin-bottom:0.35rem">${data.alternate_names?.join(' · ')}</p>
      <p class="t-caption" style="color:var(--gold-dim);margin-bottom:1.4rem">Etymology: ${data.etymology}</p>

      <div class="info-block info-block--tradition">
        <span class="info-block__label">◈ Essence (Proponent Voice)</span>
        <p>${data.essence}</p>
      </div>

      <div class="info-block info-block--scholarly" style="margin-top:1rem">
        <span class="info-block__label">✓ Key Claims</span>
        <ul style="padding-left:1rem;display:grid;gap:0.3rem">
          ${data.key_claims?.map(c=>`<li style="font-size:0.82rem;color:var(--text-secondary)">${c}</li>`).join('')}
        </ul>
        ${srcs?`<div style="margin-top:0.8rem">
          <div class="t-label" style="color:var(--teal);margin-bottom:0.35rem">PRIMARY SOURCES</div>
          <ul style="list-style:none">${srcs}</ul>
        </div>`:''}
      </div>

      ${v2Section}

      ${pars.length?`<div style="margin-top:1.2rem">
        <div class="t-label" style="color:${meta.color};margin-bottom:0.45rem">⟷ CROSS-TRADITION PARALLELS</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:0.4rem">
          ${pars.map(p=>{const pc=TRADITION_COLORS[p.tradition]||'#c9a84c';
            return `<div style="padding:0.55rem;border:1px solid ${pc}33;background:${pc}08;border-radius:2px">
              <div class="t-caption" style="color:${pc}">${p.tradition.replace(/_/g,' ')}</div>
              <div style="font-family:var(--font-display);font-size:0.8rem;color:var(--text-primary)">${p.primary_name}</div>
              <div class="t-caption" style="color:${TIER_META[p.tier]?.color}">Tier ${p.tier===0?'⟷':p.tier}</div>
            </div>`;}).join('')}
        </div>
      </div>`:''}

      ${scholarSection}
    </div>`
  });
}

// ── FRAMEWORK PICKER (Index of all cosmological frameworks) ────
function openFrameworkPicker() {
  const byType = {};
  COSMOLOGICAL_FRAMEWORKS.forEach(f => {
    if (!byType[f.type]) byType[f.type] = [];
    byType[f.type].push(f);
  });

  const typesHtml = Object.entries(byType).map(([type, fws]) => {
    const meta = FRAMEWORK_TYPES[type] || { label: type, color: '#c9a84c' };
    return `<div style="margin-bottom:1.4rem">
      <div class="t-label" style="color:${meta.color};margin-bottom:0.5rem;display:flex;align-items:center;gap:0.4rem">
        <span style="width:8px;height:8px;background:${meta.color};border-radius:50%;display:inline-block"></span>
        ${meta.label}
        <span style="color:var(--text-dim);font-weight:normal;font-size:0.42rem">— ${fws.length} ${fws.length===1?'framework':'frameworks'}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:0.4rem">
        ${fws.map(f => `<button onclick="window.smOpenFramework('${f.id}')"
                                style="text-align:left;padding:0.7rem;border:1px solid ${meta.color}33;
                                       background:${meta.color}08;border-radius:2px;cursor:pointer;
                                       color:var(--text-secondary);font-family:inherit;transition:all 0.2s"
                                onmouseover="this.style.borderColor='${meta.color}88';this.style.background='${meta.color}15'"
                                onmouseout="this.style.borderColor='${meta.color}33';this.style.background='${meta.color}08'">
          <div style="font-family:var(--font-display);font-size:0.88rem;color:${meta.color};margin-bottom:0.18rem">
            ${f.name.split('(')[0].trim()}
          </div>
          <div style="font-family:var(--font-mono);font-size:0.4rem;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-dim);margin-bottom:0.3rem">
            ${f.tradition_id.replace(/_/g,' ').replace(/-/g,' ')}
          </div>
          <div style="font-size:0.72rem;color:var(--text-secondary);line-height:1.5;
                      display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden">
            ${f.summary}
          </div>
        </button>`).join('')}
      </div>
    </div>`;
  }).join('');

  openModal({ accentColor: '#c06040', html: `
    <div style="padding:2rem">
      <div class="t-caption" style="color:#c06040;margin-bottom:0.4rem">
        ⌬ COSMOLOGICAL FRAMEWORKS · ${COSMOLOGICAL_FRAMEWORKS.length} ACROSS ${[...new Set(COSMOLOGICAL_FRAMEWORKS.map(f=>f.tradition_id))].length} TRADITIONS
      </div>
      <h2 style="font-family:var(--font-display);font-size:1.7rem;color:var(--text-primary);margin-bottom:0.4rem">
        How Traditions Organize Cosmic Time and Order
      </h2>
      <p style="font-style:italic;color:var(--text-secondary);margin-bottom:1.5rem;line-height:1.65">
        Every major tradition that has thought about "how did we get here" and "where is this going"
        generates one of three shapes — eternal cycle, linear arc, or nested hierarchy. Often all three at once.
        Click any framework for the full stages, cross-tradition parallels, and structural role.
      </p>
      ${typesHtml}
    </div>`
  });
}

// ── FRAMEWORK MODAL (Individual framework detail) ──────────────
function openFrameworkModal(frameworkId) {
  const fw = COSMOLOGICAL_FRAMEWORKS.find(f => f.id === frameworkId);
  if (!fw) return;

  const typeMeta = FRAMEWORK_TYPES[fw.type] || { label: fw.type, color: '#c06040' };
  const tradColor = typeMeta.color;
  const stageColors = ['#c9a84c','#a8a040','#8c7838','#a08060','#604030','#604060','#406090']; // varied palette

  const stagesHtml = fw.stages.map((s, i) => {
    const c = stageColors[i % stageColors.length];
    return `<div style="padding:1rem;border:1px solid ${c}55;background:${c}0a;border-radius:2px;margin-bottom:0.7rem">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:0.4rem;flex-wrap:wrap;gap:0.4rem">
        <h4 style="font-family:var(--font-display);font-size:1rem;color:${c};margin:0;line-height:1.25">${s.name}</h4>
        ${s.dharma_percent !== undefined ? `<div style="font-family:var(--font-mono);font-size:0.5rem;letter-spacing:0.13em;color:${c}">DHARMA ${s.dharma_percent}%</div>` : ''}
      </div>
      ${s.duration_years_traditional ? `<div style="font-family:var(--font-mono);font-size:0.48rem;letter-spacing:0.12em;color:var(--text-dim);margin-bottom:0.4rem">
        ${s.duration_years_traditional.toLocaleString()} years (traditional)
      </div>` : ''}
      <p style="font-size:0.82rem;color:var(--text-secondary);line-height:1.6;margin-bottom:0.5rem">${s.character || ''}</p>
      ${s.cross_tradition_parallels?.length ? `
      <div style="margin-top:0.5rem">
        <div class="t-label" style="color:${c};margin-bottom:0.3rem;font-size:0.42rem">⟷ CROSS-TRADITION PARALLELS</div>
        <ul style="margin:0;padding-left:1rem;font-size:0.74rem;color:var(--text-secondary);line-height:1.65">
          ${s.cross_tradition_parallels.map(p => `<li>${p}</li>`).join('')}
        </ul>
      </div>` : ''}
    </div>`;
  }).join('');

  const scholarSection = fw.scholarly_note ? `
    <div class="info-block info-block--scholarly" style="margin-top:1rem">
      <span class="info-block__label">𝙎 SCHOLARLY NOTE</span>
      <p>${fw.scholarly_note}</p>
    </div>` : '';

  const structuralSection = fw.structural_role ? `
    <div class="info-block info-block--tradition" style="margin-top:1rem">
      <span class="info-block__label">◈ STRUCTURAL ROLE IN THE SOURCE MAP</span>
      <p>${fw.structural_role}</p>
    </div>` : '';

  openModal({ accentColor: tradColor, html: `
    <div style="padding:2rem">
      <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.4rem;flex-wrap:wrap">
        <button onclick="window.smOpenFrameworkPicker()"
                style="font-family:var(--font-mono);font-size:0.42rem;letter-spacing:0.15em;
                       text-transform:uppercase;padding:0.18rem 0.5rem;border:1px solid var(--border);
                       color:var(--text-dim);background:transparent;cursor:pointer;border-radius:2px">
          ← ALL FRAMEWORKS
        </button>
        <div class="t-caption" style="color:${tradColor}">
          ${typeMeta.label.toUpperCase()} · ${fw.tradition_id.replace(/_/g,' ').replace(/-/g,' ').toUpperCase()}
        </div>
      </div>
      <h2 style="font-family:var(--font-display);font-size:1.7rem;color:var(--text-primary);margin-bottom:0.8rem;line-height:1.2">
        ${fw.name}
      </h2>

      <div class="info-block info-block--tradition" style="margin-bottom:1.2rem">
        <span class="info-block__label">◈ SUMMARY</span>
        <p>${fw.summary}</p>
      </div>

      <div class="t-label" style="color:${tradColor};margin-bottom:0.5rem">⌬ STAGES (${fw.stages.length})</div>
      ${stagesHtml}

      ${structuralSection}
      ${scholarSection}
    </div>`
  });
}

// ── USER CONNECTIONS ────────────────────────────────────────────
function getUserConns() {
  try { return JSON.parse(localStorage.getItem('sm-connections')||'[]'); } catch(e) { return []; }
}

function promptConnect(fromId,toId) {
  const a=SOURCE_MAP_NODES.find(n=>n.id===fromId);
  const b=SOURCE_MAP_NODES.find(n=>n.id===toId);
  if (!a||!b) return;
  const conns = getUserConns();
  if (conns.some(c=>(c.from===fromId&&c.to===toId)||(c.from===toId&&c.to===fromId))) return;
  const note = window.prompt(`Connect:\n"${a.primary_name}" ⟷ "${b.primary_name}"\n\nNote (optional):`);
  if (note===null) return;
  conns.push({from:fromId,to:toId,note:note.trim()});
  localStorage.setItem('sm-connections',JSON.stringify(conns));
  userConns = conns;
  const list=document.getElementById('sm-conn-list'); if(list) list.innerHTML=connList();
  buildEdges(); buildParticles();
}

function connList() {
  const conns = getUserConns();
  if (!conns.length) return `<div class="t-caption" style="color:var(--text-dim)">No connections yet. Drag one node onto another.</div>`;
  return conns.map((c,i) => {
    const a=SOURCE_MAP_NODES.find(n=>n.id===c.from), b=SOURCE_MAP_NODES.find(n=>n.id===c.to);
    if (!a||!b) return '';
    const ac=TRADITION_COLORS[a.tradition]||'#c9a84c', bc=TRADITION_COLORS[b.tradition]||'#c9a84c';
    return `<div style="display:flex;align-items:center;gap:0.4rem;padding:0.28rem 0.5rem;
                        border:1px solid var(--border);border-radius:2px">
      <span style="color:${ac};font-size:0.72rem;white-space:nowrap">${a.primary_name.split(' ')[0]}</span>
      <span style="color:var(--text-dim)">⟷</span>
      <span style="color:${bc};font-size:0.72rem;white-space:nowrap">${b.primary_name.split(' ')[0]}</span>
      ${c.note?`<span style="color:var(--text-dim);font-style:italic;font-size:0.68rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">— ${c.note}</span>`:''}
      <button onclick="window.smDelConn(${i})"
              style="font-family:var(--font-mono);font-size:0.37rem;padding:0.1rem 0.28rem;
                     border:1px solid var(--border);color:var(--text-dim);background:transparent;
                     cursor:pointer;flex-shrink:0;margin-left:auto">✕</button>
    </div>`;
  }).join('');
}

// ── UTILS ────────────────────────────────────────────────────────
function rgba(hex,a) {
  const r=parseInt(hex.slice(1,3)||'c9',16), g=parseInt(hex.slice(3,5)||'a8',16), b=parseInt(hex.slice(5,7)||'4c',16);
  return `rgba(${r},${g},${b},${a})`;
}
function resetView() { panOffset={x:0,y:0}; zoom=1; }

// ── WINDOW SCOPE ─────────────────────────────────────────────────
window.smSelect       = id => selectNode(id);
window.smOpenFull     = id => { const d=SOURCE_MAP_NODES.find(n=>n.id===id); if(d) openFullModal(d); };
window.smPromptConnFrom = fromId => {
  const a=SOURCE_MAP_NODES.find(n=>n.id===fromId);
  const opts=SOURCE_MAP_NODES.filter(n=>n.id!==fromId).map(n=>`${n.id}: ${n.primary_name}`).join('\n');
  const toId=window.prompt(`Connect from: ${a?.primary_name}\n\nType target node ID:\n${opts}`);
  if(toId?.trim()) promptConnect(fromId,toId.trim());
};
window.smZoom       = f => { zoom=Math.max(0.2,Math.min(5,zoom*f)); };
window.smResetView  = resetView;
window.smDelConn    = idx => {
  const conns=getUserConns(); conns.splice(idx,1);
  localStorage.setItem('sm-connections',JSON.stringify(conns));
  userConns=conns;
  const l=document.getElementById('sm-conn-list'); if(l) l.innerHTML=connList();
  buildEdges(); buildParticles();
};
window.smOpenFramework       = id => openFrameworkModal(id);
window.smOpenFrameworkPicker = () => openFrameworkPicker();
  window.renderSourceMap = renderSourceMap;
})();



document.addEventListener('DOMContentLoaded', function() {
  registerRenderer('home',       window.renderHome);
  registerRenderer('traditions', window.renderTraditions);
  registerRenderer('deities',    window.renderDeities);
  registerRenderer('texts',      window.renderTexts);
  registerRenderer('calendars',  window.renderCalendars);
  registerRenderer('patterns',   window.renderPatterns);
  registerRenderer('timeline',   window.renderTimeline);
  registerRenderer('source-map', window.renderSourceMap);
  window.initCanvas();
  window.initBookTilt();
  initModal();
  initRouter();
  setTimeout(window.initScrollReveals, 300);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });
});
window.navigateTo = navigate;
</script>
