<html lang="en">

<title>DIVINE ORIGINS — Comparative Theology Library</title>

<style>/* =============================================================
   BASE.CSS — Design Tokens, Reset, Typography, Glass System
   Divine Origins | Cloudflare Pages Deployment
   ============================================================= */

/* ── TOKENS ── */
:root {
  /* Surface */
  --void:         #050408;
  --deep:         #0a0812;
  --layer:        #110f1e;
  --surface:      #1c1830;
  --raised:       #261f3d;

  /* Borders */
  --border:       rgba(255,255,255,0.07);
  --border-gold:  rgba(201,168,76,0.25);
  --border-glass: rgba(255,255,255,0.10);

  /* Brand palette */
  --gold:         #c9a84c;
  --gold-light:   #f0d080;
  --gold-dim:     #7a6330;
  --teal:         #40a8a0;
  --violet:       #8840c4;
  --crimson:      #c44040;
  --sage:         #608050;
  --silver:       #a8b8c8;

  /* Confidence tier colors */
  --tier-documented: var(--teal);
  --tier-debated:    var(--gold);
  --tier-tradition:  var(--violet);

  /* Text */
  --text-primary:   #e8dfc0;
  --text-secondary: #9a9080;
  --text-dim:       #5a5448;
  --text-inverse:   #050408;

  /* Typography */
  --font-display: 'Cinzel', 'Trajan Pro', serif;
  --font-body:    'Cormorant Garamond', 'Georgia', serif;
  --font-mono:    'Space Mono', 'Courier New', monospace;
  --font-ui:      'Inter', system-ui, sans-serif;

  /* Easing */
  --ease-out-expo:  cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-expo:   cubic-bezier(0.7, 0, 0.84, 0);
  --ease-spring:    cubic-bezier(0.34, 1.56, 0.64, 1);

  /* Spacing scale */
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-12: 3rem;
  --space-16: 4rem;
  --space-24: 6rem;

  /* Z-index layers */
  --z-canvas:  0;
  --z-content: 1;
  --z-sticky:  100;
  --z-overlay: 200;
  --z-modal:   300;
  --z-toast:   400;
}

/* ── RESET ── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  scroll-behavior: smooth;
  -webkit-text-size-adjust: 100%;
}

body {
  background: var(--void);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 1rem;
  line-height: 1.65;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

img, video {
  max-width: 100%;
  display: block;
}

button {
  cursor: pointer;
  border: none;
  background: none;
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

a {
  color: var(--gold);
  text-decoration: none;
}

a:hover { color: var(--gold-light); }

ul, ol { list-style: none; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar        { width: 3px; height: 3px; }
::-webkit-scrollbar-track  { background: var(--void); }
::-webkit-scrollbar-thumb  { background: var(--gold-dim); border-radius: 2px; }

/* ── TYPOGRAPHY ── */
.t-display {
  font-family: var(--font-display);
  font-weight: 900;
  letter-spacing: 0.08em;
  line-height: 0.95;
  color: var(--text-primary);
}

.t-title {
  font-family: var(--font-display);
  font-weight: 600;
  letter-spacing: 0.04em;
  line-height: 1.1;
}

.t-body {
  font-family: var(--font-body);
  font-size: 1rem;
  line-height: 1.7;
  color: var(--text-secondary);
}

.t-caption {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.t-label {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
}

.t-italic {
  font-style: italic;
  color: var(--text-secondary);
}

/* ── GLASS SYSTEM ── */
/* Three tiers of glassmorphism for different contexts */

.glass-subtle {
  background: rgba(255, 255, 255, 0.02);
  backdrop-filter: blur(12px) saturate(1.1);
  -webkit-backdrop-filter: blur(12px) saturate(1.1);
  border: 1px solid var(--border);
}

.glass-mid {
  background: rgba(10, 8, 18, 0.55);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  border: 1px solid var(--border-glass);
}

.glass-strong {
  background: rgba(10, 8, 18, 0.78);
  backdrop-filter: blur(40px) saturate(1.4);
  -webkit-backdrop-filter: blur(40px) saturate(1.4);
  border: 1px solid var(--border-gold);
}

/* Gold-tinted glass for featured elements */
.glass-gold {
  background: rgba(201, 168, 76, 0.06);
  backdrop-filter: blur(24px) saturate(1.3);
  -webkit-backdrop-filter: blur(24px) saturate(1.3);
  border: 1px solid var(--border-gold);
}

/* ── CONFIDENCE TIER BADGES ── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 0.3em;
  font-family: var(--font-mono);
  font-size: 0.5rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  padding: 0.2rem 0.55rem;
  border-radius: 2px;
  white-space: nowrap;
}

.badge--documented {
  background: rgba(64, 168, 160, 0.12);
  color: var(--teal);
  border: 1px solid rgba(64, 168, 160, 0.28);
}

.badge--debated {
  background: rgba(201, 168, 76, 0.12);
  color: var(--gold);
  border: 1px solid rgba(201, 168, 76, 0.28);
}

.badge--tradition {
  background: rgba(136, 64, 196, 0.12);
  color: var(--violet);
  border: 1px solid rgba(136, 64, 196, 0.28);
}

/* ── TAGS ── */
.tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.48rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 0.15rem 0.4rem;
  border: 1px solid var(--border);
  color: var(--text-dim);
  border-radius: 1px;
}

/* ── DIVIDERS ── */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  opacity: 0.25;
  border: none;
}

/* ── GLOW UTILITIES ── */
.glow-gold {
  box-shadow: 0 0 40px rgba(201, 168, 76, 0.12),
              0 0 80px rgba(201, 168, 76, 0.04);
}

.glow-violet {
  box-shadow: 0 0 40px rgba(136, 64, 196, 0.15),
              0 0 80px rgba(136, 64, 196, 0.05);
}

/* ── FOCUS VISIBLE ── */
:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 3px;
}

/* ── SELECTION ── */
::selection {
  background: rgba(201, 168, 76, 0.25);
  color: var(--text-primary);
}

/* =============================================================
   LAYOUT.CSS — Navigation, Sections, Grid, Panels
   Divine Origins | Senior Dev Standards
   ============================================================= */

/* ── PAGE WRAPPER ── */
#canvas-bg {
  position: fixed;
  inset: 0;
  z-index: var(--z-canvas);
  pointer-events: none;
}

.page {
  position: relative;
  z-index: var(--z-content);
  min-height: 100vh;
}

.container {
  max-width: 1440px;
  margin: 0 auto;
  padding: 0 var(--space-8);
}

.container--narrow {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 var(--space-8);
}

.container--wide {
  max-width: 1600px;
  margin: 0 auto;
  padding: 0 var(--space-6);
}

/* ── TOP NAV ── */
.topnav {
  position: sticky;
  top: 0;
  z-index: var(--z-sticky);
  height: 56px;
  background: rgba(5, 4, 8, 0.88);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
}

.topnav__inner {
  max-width: 1440px;
  margin: 0 auto;
  padding: 0 var(--space-8);
  width: 100%;
  display: flex;
  align-items: center;
  gap: var(--space-6);
  overflow-x: auto;
  scrollbar-width: none;
}
.topnav__inner::-webkit-scrollbar { display: none; }

.topnav__logo {
  font-family: var(--font-display);
  font-size: 0.72rem;
  letter-spacing: 0.35em;
  color: var(--gold);
  white-space: nowrap;
  flex-shrink: 0;
  margin-right: var(--space-4);
}

.topnav__link {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-dim);
  white-space: nowrap;
  padding: 0.25rem 0.6rem;
  border: 1px solid transparent;
  border-radius: 2px;
  transition: color 0.2s, border-color 0.2s, background 0.2s;
  flex-shrink: 0;

  /* Reset button defaults */
  background: transparent;
  cursor: pointer;
  font-weight: inherit;
  -webkit-appearance: none;
  appearance: none;
}

.topnav__link:hover {
  color: var(--gold);
  border-color: var(--border-gold);
}

.topnav__link.active {
  color: var(--gold);
  border-color: var(--gold);
  background: rgba(201, 168, 76, 0.08);
}

/* Highlight link */
.topnav__link--cta {
  color: var(--gold);
  border-color: var(--gold);
  background: rgba(201, 168, 76, 0.08);
}
.topnav__link--cta:hover {
  background: rgba(201, 168, 76, 0.16);
}

/* ── SECTION ── */
.section {
  padding: var(--space-24) 0;
}

.section--flush-top { padding-top: 0; }
.section--flush-bottom { padding-bottom: 0; }

.section__header {
  text-align: center;
  margin-bottom: var(--space-16);
}

.section__eyeline {
  display: block;
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.55em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: var(--space-3);
}

.section__title {
  font-family: var(--font-display);
  font-size: clamp(1.4rem, 3.5vw, 2.8rem);
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: var(--space-4);
}

.section__desc {
  font-size: 1.05rem;
  font-style: italic;
  color: var(--text-secondary);
  max-width: 680px;
  margin: 0 auto;
  line-height: 1.7;
}

/* ── HORIZONTAL RAIL ── */
.rail-wrap {
  position: relative;
  overflow: hidden;
}

.rail-wrap::before,
.rail-wrap::after {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  width: 80px;
  z-index: 2;
  pointer-events: none;
}

.rail-wrap::before {
  left: 0;
  background: linear-gradient(to right, var(--void), transparent);
}

.rail-wrap::after {
  right: 0;
  background: linear-gradient(to left, var(--void), transparent);
}

.rail {
  display: flex;
  gap: var(--space-2);
  overflow-x: auto;
  padding: var(--space-4) 100px;
  scrollbar-width: none;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}
.rail::-webkit-scrollbar { display: none; }

.rail__item {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-1);
  padding: var(--space-2) var(--space-4) var(--space-3);
  border-radius: 3px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  background: rgba(255, 255, 255, 0.02);
  cursor: pointer;
  min-width: 96px;
  text-align: center;
  transition: background 0.25s, border-color 0.25s, transform 0.3s var(--ease-out-expo);
  position: relative;
}

.rail__item::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--item-color, var(--gold));
  transform: scaleX(0);
  transform-origin: center;
  transition: transform 0.3s var(--ease-out-expo);
}

.rail__item:hover,
.rail__item[aria-selected="true"] {
  background: rgba(201, 168, 76, 0.06);
  border-color: rgba(201, 168, 76, 0.2);
  transform: translateY(-3px);
}

.rail__item[aria-selected="true"] {
  background: rgba(201, 168, 76, 0.1);
  border-color: rgba(201, 168, 76, 0.3);
}

.rail__item:hover::after,
.rail__item[aria-selected="true"]::after {
  transform: scaleX(1);
}

.rail__tradition {
  font-family: var(--font-mono);
  font-size: 0.42rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--item-color, var(--gold-dim));
  opacity: 0.75;
}

.rail__name {
  font-family: var(--font-display);
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.2;
  white-space: nowrap;
}

.rail__item[aria-selected="true"] .rail__name { color: var(--gold); }

/* ── SPLIT PANEL ── */
/* Left: artifact image | Right: scrollable content */
.split-panel {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 580px;
  overflow: hidden;
}

.split-panel__img {
  position: relative;
  overflow: hidden;
  background: #030202;
}

.split-panel__img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  opacity: 0;
  transition: opacity 0.5s ease, transform 1.2s var(--ease-out-expo);
  filter: saturate(0.8) brightness(0.68) contrast(1.04);
}

.split-panel__img img.loaded {
  opacity: 1;
  transform: scale(1.03);
}

.split-panel__img-overlay {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to right, transparent 45%, rgba(5, 4, 8, 0.88) 100%),
    linear-gradient(to bottom, rgba(5, 4, 8, 0.18) 0%, transparent 30%,
                    transparent 60%, rgba(5, 4, 8, 0.5) 100%);
  pointer-events: none;
}

.split-panel__img-trad {
  position: absolute;
  top: var(--space-4);
  left: var(--space-4);
  font-family: var(--font-mono);
  font-size: 0.46rem;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--item-color, var(--gold));
  padding: 0.22rem 0.55rem;
  background: rgba(0, 0, 0, 0.52);
  backdrop-filter: blur(8px);
  border-left: 2px solid var(--item-color, var(--gold));
}

.split-panel__img-caption {
  position: absolute;
  bottom: var(--space-4);
  left: var(--space-4);
  right: var(--space-6);
  font-family: var(--font-mono);
  font-size: 0.38rem;
  letter-spacing: 0.22em;
  color: rgba(255, 255, 255, 0.38);
  text-transform: uppercase;
  line-height: 1.5;
}

.split-panel__content {
  background: rgba(10, 8, 18, 0.6);
  backdrop-filter: blur(32px) saturate(1.2);
  -webkit-backdrop-filter: blur(32px) saturate(1.2);
  border-left: 1px solid rgba(255, 255, 255, 0.06);
  overflow-y: auto;
  max-height: 580px;
  scrollbar-width: thin;
  scrollbar-color: var(--gold-dim) transparent;
}

.split-panel__content-inner {
  padding: var(--space-8) var(--space-6) var(--space-8) var(--space-8);
}

/* ── INFO STAGE (animated container) ── */
.info-stage {
  position: relative;
  overflow: hidden;
  min-height: 580px;
}

/* ── INFO BLOCKS (inside panel) ── */
.info-block {
  padding: var(--space-4) var(--space-5);
  margin-bottom: var(--space-4);
  background: rgba(0, 0, 0, 0.22);
  border-left: 2px solid;
}

.info-block--scholarly  { border-color: var(--teal); }
.info-block--tradition  { border-color: var(--violet); }
.info-block--parallels  { border-color: rgba(201, 168, 76, 0.45); }
.info-block--russell    { border-color: var(--sage); }
.info-block--texts      { border-color: rgba(201, 168, 76, 0.35); }

.info-block__label {
  font-family: var(--font-mono);
  font-size: 0.48rem;
  letter-spacing: 0.38em;
  text-transform: uppercase;
  display: block;
  margin-bottom: var(--space-3);
}

.info-block--scholarly .info-block__label  { color: var(--teal); }
.info-block--tradition .info-block__label  { color: var(--violet); }
.info-block--parallels .info-block__label  { color: var(--gold-dim); }
.info-block--russell   .info-block__label  { color: var(--sage); }
.info-block--texts     .info-block__label  { color: var(--gold); }

.info-block p {
  font-size: 0.9rem;
  color: var(--text-secondary);
  line-height: 1.72;
}

/* ── PANEL NAV ── */
.panel-nav {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-top: var(--space-6);
  padding-top: var(--space-4);
  border-top: 1px solid var(--border);
}

.panel-nav__btn {
  font-family: var(--font-mono);
  font-size: 0.53rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-dim);
  padding: 0.38rem 0.75rem;
  border: 1px solid var(--border);
  transition: color 0.2s, border-color 0.2s, background 0.2s;
}

.panel-nav__btn:hover {
  color: var(--gold);
  border-color: var(--gold-dim);
  background: rgba(201, 168, 76, 0.05);
}

.panel-nav__counter {
  font-family: var(--font-mono);
  font-size: 0.52rem;
  letter-spacing: 0.18em;
  color: var(--text-dim);
  flex: 1;
  text-align: center;
}

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .split-panel {
    grid-template-columns: 1fr;
  }

  .split-panel__img {
    min-height: 220px;
    max-height: 260px;
  }

  .split-panel__img-overlay {
    background: linear-gradient(
      to bottom,
      transparent 30%,
      rgba(5, 4, 8, 0.92) 100%
    );
  }

  .split-panel__content {
    max-height: none;
    border-left: none;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }

  .container {
    padding: 0 var(--space-4);
  }
}

@media (max-width: 600px) {
  .topnav__logo { display: none; }
  .section { padding: var(--space-16) 0; }
}

/* =============================================================
   ANIMATIONS.CSS — 3D Book, Vertical Cycle, Reveals
   Reference: neuwebstudio reels (immersive reveal, 3D slider,
   exploding objects) + bestapps.ai 3D interactive visuals
   ============================================================= */

/* ── VERTICAL PANEL CYCLE ── */
/* Panels enter from below, exit upward — like cycling pages */
.panel-enter {
  opacity: 0;
  transform: translateY(60px);
  transition:
    opacity 0.45s var(--ease-out-expo),
    transform 0.45s var(--ease-out-expo);
}

.panel-enter-active {
  opacity: 1;
  transform: translateY(0);
}

.panel-exit {
  opacity: 1;
  transform: translateY(0);
  transition:
    opacity 0.28s var(--ease-in-expo),
    transform 0.28s var(--ease-in-expo);
}

.panel-exit-active {
  opacity: 0;
  transform: translateY(-45px);
}

/* ── EXPLODING REVEAL — for tradition cards ── */
/* Elements burst from center outward on scroll into view */
.reveal-card {
  opacity: 0;
  transform: scale(0.6) translateY(24px) rotateX(6deg);
  transition:
    opacity 0.5s var(--ease-out-expo),
    transform 0.55s var(--ease-out-expo);
}

.reveal-card.in-view {
  opacity: 1;
  transform: scale(1) translateY(0) rotateX(0deg);
}

/* ── IMMERSIVE SPLIT REVEAL — sections split open ── */
.reveal-split {
  clip-path: inset(0 100% 0 0);
  transition: clip-path 0.85s var(--ease-out-expo);
}

.reveal-split.in-view {
  clip-path: inset(0 0% 0 0);
}

/* ── FADE UP — timeline, truth cards ── */
.reveal-up {
  opacity: 0;
  transform: translateY(28px);
  transition:
    opacity 0.6s var(--ease-out-expo),
    transform 0.6s var(--ease-out-expo);
}

.reveal-up.in-view {
  opacity: 1;
  transform: translateY(0);
}

/* ── 3D BOOK SYSTEM ── */
/* Reference: ship selection UI (IMG_1722), 3D interactive biology (IMG_1727) */
/* Books float in 3D space, flip open on click */

.book-shelf {
  perspective: 1400px;
  perspective-origin: 50% 40%;
  overflow: visible;
  padding: var(--space-8) 0 var(--space-12);
}

.book-track {
  display: flex;
  gap: 2.5rem;
  overflow-x: auto;
  padding: 3rem 6rem 4rem;
  scrollbar-width: none;
  scroll-behavior: smooth;
  align-items: flex-end;
}
.book-track::-webkit-scrollbar { display: none; }

/* Individual book */
.book {
  flex-shrink: 0;
  width: 140px;
  position: relative;
  cursor: pointer;
  transform-style: preserve-3d;

  /* Resting tilt — books lean slightly */
  transform: rotateY(-12deg) rotateX(4deg) translateZ(0);
  transition:
    transform 0.55s var(--ease-out-expo),
    filter 0.4s ease;

  filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.7))
          drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
}

.book:hover {
  transform: rotateY(-4deg) rotateX(1deg) translateZ(30px) translateY(-16px);
  filter: drop-shadow(0 40px 60px rgba(0, 0, 0, 0.8))
          drop-shadow(0 0 30px rgba(201, 168, 76, 0.15));
  z-index: 10;
}

.book.selected {
  transform: rotateY(0deg) rotateX(0deg) translateZ(60px) translateY(-24px);
  filter: drop-shadow(0 50px 80px rgba(0, 0, 0, 0.9))
          drop-shadow(0 0 40px rgba(201, 168, 76, 0.25));
  z-index: 20;
}

/* Book cover face */
.book__cover {
  width: 140px;
  height: 200px;
  border-radius: 3px 8px 8px 3px;
  overflow: hidden;
  position: relative;
  backface-visibility: hidden;
}

/* Cover gradient — tradition-colored */
.book__cover-face {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: var(--space-3);
  background:
    linear-gradient(160deg,
      rgba(255, 255, 255, 0.06) 0%,
      transparent 40%,
      rgba(0, 0, 0, 0.55) 100%),
    var(--book-color, var(--deep));
  position: relative;
}

/* Gloss highlight on cover */
.book__cover-face::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    135deg,
    rgba(255, 255, 255, 0.18) 0%,
    rgba(255, 255, 255, 0.04) 35%,
    transparent 60%
  );
  pointer-events: none;
  border-radius: 3px 8px 8px 3px;
}

/* Cover image (Met Museum artifact) */
.book__cover-img {
  position: absolute;
  inset: 0;
  object-fit: cover;
  opacity: 0.45;
  mix-blend-mode: luminosity;
  transition: opacity 0.4s;
}

.book:hover .book__cover-img { opacity: 0.65; }

/* Book spine */
.book__spine {
  position: absolute;
  left: 0;
  top: 2px;
  bottom: 2px;
  width: 14px;
  border-radius: 3px 0 0 3px;
  background: var(--book-spine, var(--void));
  transform: rotateY(-90deg) translateX(-7px) translateZ(7px);
  transform-origin: left;
  display: flex;
  align-items: center;
  justify-content: center;
}

.book__spine-text {
  font-family: var(--font-mono);
  font-size: 0.38rem;
  letter-spacing: 0.2em;
  color: rgba(255, 255, 255, 0.5);
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  white-space: nowrap;
  overflow: hidden;
  max-height: 120px;
  text-overflow: ellipsis;
}

/* Book page edges */
.book__pages {
  position: absolute;
  right: 0;
  top: 4px;
  bottom: 4px;
  width: 10px;
  background: repeating-linear-gradient(
    to bottom,
    #e8d8b0 0px, #e8d8b0 1px,
    #d4c49c 1px, #d4c49c 2px
  );
  border-radius: 0 2px 2px 0;
  transform: rotateY(90deg) translateZ(5px);
  transform-origin: right;
  opacity: 0.7;
}

/* Book title overlay */
.book__meta {
  position: relative;
  z-index: 1;
}

.book__type {
  font-family: var(--font-mono);
  font-size: 0.36rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--book-accent, var(--gold));
  opacity: 0.85;
  margin-bottom: 0.2rem;
  display: block;
}

.book__title {
  font-family: var(--font-display);
  font-size: 0.7rem;
  font-weight: 600;
  color: #fff;
  line-height: 1.2;
  text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
}

.book__date {
  font-family: var(--font-mono);
  font-size: 0.35rem;
  color: rgba(255, 255, 255, 0.5);
  margin-top: 0.2rem;
  display: block;
}

/* ── BOOK DETAIL PANEL ── */
/* Slides up from below when a book is selected */
.book-detail {
  background: rgba(10, 8, 18, 0.72);
  backdrop-filter: blur(40px) saturate(1.4);
  -webkit-backdrop-filter: blur(40px) saturate(1.4);
  border: 1px solid var(--border-gold);
  border-radius: 4px;
  overflow: hidden;
  margin-top: var(--space-6);

  opacity: 0;
  transform: translateY(20px);
  pointer-events: none;
  transition:
    opacity 0.4s var(--ease-out-expo),
    transform 0.4s var(--ease-out-expo);
}

.book-detail.open {
  opacity: 1;
  transform: translateY(0);
  pointer-events: all;
}

.book-detail__accent {
  height: 3px;
}

.book-detail__inner {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: 480px;
}

/* Left: large book cover */
.book-detail__preview {
  padding: var(--space-8);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-4);
  border-right: 1px solid var(--border);
  background: rgba(0, 0, 0, 0.2);
}

.book-detail__cover-large {
  width: 160px;
  height: 230px;
  border-radius: 4px 10px 10px 4px;
  overflow: hidden;
  position: relative;
  filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.8));
}

.book-detail__cover-large img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: saturate(0.75) brightness(0.72);
}

.book-detail__cover-large::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
  pointer-events: none;
}

/* Right: scrollable content */
.book-detail__content {
  overflow-y: auto;
  max-height: 480px;
  padding: var(--space-8) var(--space-6) var(--space-8) var(--space-8);
  scrollbar-width: thin;
  scrollbar-color: var(--gold-dim) transparent;
}

/* Canon entry row */
.canon-row {
  padding: var(--space-3) 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.04);
}

.canon-row__header {
  display: flex;
  align-items: baseline;
  gap: var(--space-3);
  flex-wrap: wrap;
  margin-bottom: var(--space-1);
}

.canon-row__title {
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-primary);
}

.canon-row__date {
  font-family: var(--font-mono);
  font-size: 0.44rem;
  letter-spacing: 0.2em;
  color: var(--gold-dim);
  text-transform: uppercase;
  white-space: nowrap;
}

.canon-row__type {
  font-family: var(--font-mono);
  font-size: 0.4rem;
  letter-spacing: 0.18em;
  color: var(--violet);
  text-transform: uppercase;
  white-space: nowrap;
}

.canon-row__note {
  font-size: 0.82rem;
  color: var(--text-secondary);
  line-height: 1.58;
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: var(--z-modal);
  background: rgba(0, 0, 0, 0.76);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-8);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: rgba(15, 12, 28, 0.75);
  backdrop-filter: blur(40px) saturate(1.4);
  -webkit-backdrop-filter: blur(40px) saturate(1.4);
  border: 1px solid var(--border-gold);
  max-width: 820px;
  width: 100%;
  max-height: 88vh;
  overflow-y: auto;
  position: relative;
  transform: scale(0.9) translateY(18px);
  transition: transform 0.4s var(--ease-out-expo);
  border-radius: 4px;
}

.modal-overlay.open .modal {
  transform: scale(1) translateY(0);
}

.modal__close {
  position: absolute;
  top: var(--space-4);
  right: var(--space-4);
  font-family: var(--font-mono);
  font-size: 0.68rem;
  letter-spacing: 0.25em;
  color: var(--text-dim);
  z-index: 1;
  transition: color 0.2s;
}

.modal__close:hover { color: var(--gold); }

/* ── CANVAS STARS ── */
#canvas-bg {
  background: radial-gradient(ellipse 80% 60% at 50% 30%,
    rgba(10, 8, 18, 0.3) 0%,
    var(--void) 100%);
}

/* ── HERO SYMBOL ── */
@keyframes symbol-breathe {
  0%, 100% {
    filter: drop-shadow(0 0 20px rgba(201, 168, 76, 0.35));
    transform: scale(1) rotate(0deg);
  }
  40% {
    filter: drop-shadow(0 0 55px rgba(201, 168, 76, 0.7));
    transform: scale(1.04) rotate(0.8deg);
  }
  75% {
    filter: drop-shadow(0 0 35px rgba(201, 168, 76, 0.5));
    transform: scale(0.98) rotate(-0.5deg);
  }
}

.hero-symbol {
  animation: symbol-breathe 7s ease-in-out infinite;
}

@keyframes scroll-indicator {
  0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.5; }
  55%       { transform: translateX(-50%) translateY(10px); opacity: 1; }
}

.scroll-indicator {
  animation: scroll-indicator 2.8s ease-in-out infinite;
}

/* ── GLOW DIVIDER ── */
.glow-divider {
  height: 1px;
  border: none;
  background: linear-gradient(90deg,
    transparent 0%,
    var(--gold-dim) 30%,
    var(--gold-dim) 70%,
    transparent 100%);
  opacity: 0.2;
  margin: 0;
}

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  .book-detail__inner {
    grid-template-columns: 1fr;
  }

  .book-detail__preview {
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: var(--space-6);
  }

  .book-detail__content {
    max-height: none;
  }
}

<script>// == STATE ==
/* =============================================================
   state.js — Application State
   Single source of truth. No globals leaked to window.
   ============================================================= */

const state = {
  // Currently displayed deity index
  currentDeityIdx: 0,

  // Currently filtered deity list
  filteredDeities: [],

  // Active tradition filter
  activeTradition: 'all',

  // Active section (for routing)
  activeSection: 'home',

  // Currently selected sacred text
  selectedTextId: null,

  // Currently selected tradition group (traditions section)
  selectedTraditionId: null,

  // Panel transition lock (prevent race conditions)
  transitioning: false,

  // Canvas animation frame ID
  animFrameId: null,
};

/** Update state and optionally run a callback */
function setState(patch, callback) {
  Object.assign(state, patch);
  if (typeof callback === 'function') callback(state);
}

/** Reset filters to default */
function resetFilters() {
  setState({
    activeTradition: 'all',
    currentDeityIdx: 0,
  });
}

// == ROUTER ==
/* =============================================================
   router.js — Section Router

   FIXED: Does NOT rely on URL hash changes. The Claude app
   intercepts hash links as "external links," so we navigate by
   calling activate(section) directly. Hash is still updated
   for browser back-button support, but no `<a href>` clicks
   are required.
   ============================================================= */


const SECTIONS = [
  'home',
  'traditions',
  'deities',
  'texts',
  'calendars',
  'patterns',
  'timeline',
  'source-map',
];

const DEFAULT_SECTION = 'home';

/** Map section id → render function. Set by main.js */
const renderers = {};

function registerRenderer(sectionId, fn) {
  renderers[sectionId] = fn;
}

/** Activate a section — show it, hide others, run its renderer */
function activate(sectionId) {
  const section = SECTIONS.includes(sectionId) ? sectionId : DEFAULT_SECTION;

  setState({ activeSection: section });

  // Update nav buttons — highlight active one
  document.querySelectorAll('[data-section]').forEach((btn) => {
    const active = btn.dataset.section === section;
    btn.classList.toggle('active', active);
    btn.setAttribute('aria-current', active ? 'page' : 'false');
  });

  // Show only the active section
  SECTIONS.forEach((id) => {
    const el = document.getElementById(`section-${id}`);
    if (!el) return;
    const isActive = id === section;
    el.hidden = !isActive;
    el.setAttribute('aria-hidden', String(!isActive));
  });

  // Run renderer
  if (typeof renderers[section] === 'function') {
    renderers[section]();
  }

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'instant' });

  // Update hash for back-button — best-effort, never depended on
  try {
    if (window.location.hash !== `#${section}`) {
      history.replaceState(null, '', `#${section}`);
    }
  } catch (e) {}
}

/** Public navigate — wired to nav buttons via onclick */
function navigate(sectionId) {
  activate(sectionId);
}

/** Bootstrap router */
function initRouter() {
  // Read initial section from hash (so refreshing #source-map still works)
  const initial = window.location.hash.replace('#', '') || DEFAULT_SECTION;
  activate(initial);

  // Back/forward button support
  window.addEventListener('hashchange', () => {
    const fromHash = window.location.hash.replace('#', '') || DEFAULT_SECTION;
    if (fromHash !== state.activeSection) activate(fromHash);
  });

  window.addEventListener('popstate', () => {
    const fromHash = window.location.hash.replace('#', '') || DEFAULT_SECTION;
    activate(fromHash);
  });
}

// == MODAL ==
/* =============================================================
   ui/modal.js — Reusable Modal System
   ============================================================= */

let isOpen = false;

function initModal() {
  const overlay = document.getElementById('modal-overlay');
  const closeBtn = document.getElementById('modal-close');

  if (!overlay) return;

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeModal();
  });

  if (closeBtn) closeBtn.addEventListener('click', closeModal);
}

function openModal({ accentColor = '#c9a84c', html = '' } = {}) {
  const overlay = document.getElementById('modal-overlay');
  const accent  = document.getElementById('modal-accent');
  const content = document.getElementById('modal-content');

  if (!overlay || !content) return;

  if (accent) accent.style.cssText = `height:3px;background:linear-gradient(90deg,${accentColor},transparent)`;
  content.innerHTML = html;

  overlay.classList.add('open');
  overlay.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
  isOpen = true;

  // Focus first focusable element
  requestAnimationFrame(() => {
    const focusable = content.querySelector('button, [href], input, [tabindex]:not([tabindex="-1"])');
    focusable?.focus();
  });
}

function closeModal() {
  const overlay = document.getElementById('modal-overlay');
  if (!overlay) return;
  overlay.classList.remove('open');
  overlay.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
  isOpen = false;
}

}

    tags:['DEMIURGE','BLIND GOD','CREATOR','MATERIAL WORLD','FALSE CLAIM','LION-SERPENT'],
    shortDesc:'The blind creator god of Gnostic cosmology. Born from Sophia\'s error. Creates the material world and humanity\'s physical body. Declares himself the only God — not knowing the True God exists above him.',
    scholarly:'Yaldabaoth is documented in the Apocryphon of John (Nag Hammadi II,1; III,1; IV,1; also Berlin Codex). His name is likely Aramaic. He is depicted as lion-faced with a serpent body — related to the Gnostic deity Abraxas and Egyptian solar imagery. The Gnostic texts were suppressed by orthodox Christianity after the 4th century; their rediscovery in 1945 was one of the most significant religious discoveries of the modern era.',
    traditionClaim:'Sophia — the lowest and youngest Aeon — was seized by an impossible longing: to know the Father directly, without her divine consort. From this unbridled desire, she gave birth to something she had not intended: a being of fire and darkness, brilliant but blind, powerful but ignorant. She cast it out of the Pleroma into the darkness below, surrounded it with a luminous cloud so it could not see the light above it. This being — Yaldabaoth — looked around and believed himself alone. He said: "I am God, and there is no other God beside me." He then created Archons — twelve rulers of fate, seven rulers of the planetary spheres — and together they constructed the material world. They formed a human body from earth, modeled after the divine image they had briefly glimpsed. But the body could not move until Sophia tricked Yaldabaoth into breathing divine light into it. The moment he did, Sophia\'s light was trapped inside human bodies. That trapped light is you.',
    uncertainty:'The identification of Yaldabaoth with the Hebrew Yahweh is a Gnostic theological claim — not established historical fact. The Gnostic framework represents one response to the problem of evil within Second Temple Judaism; it is not the only response.',

    shortDesc:'The ultimate principle in Neoplatonic philosophy. Beyond being, beyond description, beyond even thought. All existence emanates from it like light from the sun — without diminishing it.',
    scholarly:'Plotinus (205-270 CE) developed the most systematic Neoplatonic philosophy in his Enneads, compiled by Porphyry. His hierarchy: The One → Nous → Soul → Matter. The One is beyond all predication — even saying it "is" is technically wrong, because existence is a category too small for it. His work bridges Plato and the three great Abrahamic mystical traditions.',

    scholarly:'Brahman is the central concept of the Upanishads (c.800-200 BCE). The Chandogya Upanishad, Brihadaranyaka Upanishad, and others develop the concept systematically. "Tat tvam asi" (That thou art) from the Chandogya Upanishad (6.8.7) is one of the Mahavakyas asserting the identity of Atman and Brahman. Adi Shankaracharya (c.788-820 CE) developed Advaita Vedanta — the most complete philosophical articulation of non-dual Brahman.',

/** Get deity by id */
function getDeityById(id) {
  return DEITIES.find(d => d.id === id) ?? null;
}

/** Get deities by tradition */
function getDeitiesByTradition(traditionId) {
  return DEITIES.filter(d => d.tradition === traditionId);
}

/** Get a single text by id */
function getTextById(id) {
  return SACRED_TEXTS.find(t => t.id === id) ?? null;
}

/** Get all texts sorted by date */
function getTextsByDate() {
  return [...SACRED_TEXTS].sort((a, b) => a.dateSortKey - b.dateSortKey);

    essence:'The Poimandres describes the soul\'s descent: passing through the seven planetary spheres, it puts on a cloak of each sphere\'s nature. By the time it reaches earth, it is clothed in material qualities that are not its own. The Hermetic initiate\'s task is to ascend back through these spheres, shedding each cloak at the appropriate gate, until the soul stands naked before the Ogdoad and can proceed to the Father.',

    essence:'The Sarim are the hidden government of history. Behind every earthly empire — Persia, Greece, Babylon, Rome — stands an angelic prince who fights for its interests in the heavenly realm. Daniel\'s angel had to fight the prince of Persia for 21 days before reaching Daniel. This is the Tier 4 theology of history: what happens on earth is the echo of what the Sarim decree above.',

  {

    essence:'The avatar is the ultimate expression of the Cross-Tier principle: "I descend." Whenever the cosmic balance tilts, Vishnu descends as an avatar. Krishna on the battlefield of Kurukshetra doesn\'t fight — he teaches. He reveals to Arjuna the full cosmic picture: the nature of the Self, the nature of action, and the nature of devotion. This is gnosis delivered in the middle of a war.',

  {

    key_claims:['OPHITE/GNOSTIC READING: The serpent in Eden is an agent of the True God, not the enemy','Yaldabaoth forbade the knowledge because he knew it would reveal his limitation','"On the day you eat of it, you shall be as gods" — the serpent told the truth; Yaldabaoth lied','The expulsion was containment, not punishment — "lest they take also from the Tree of Life"','The Apocryphon of John: the Epinoia (divine spirit within) spoke through the serpent to wake humanity'],

function getNodeById(id) {
  return SOURCE_MAP_NODES.find(n => n.id === id) ?? null;
}

function getNodesByTier(tier) {
  return SOURCE_MAP_NODES.filter(n => n.tier === tier);
}

function getNodesByTradition(tradition) {
  return SOURCE_MAP_NODES.filter(n => n.tradition === tradition);
}

function getParallelNodes(nodeId) {
  const node = getNodeById(nodeId);
  if (!node) return [];
  return node.parallel_node_ids.map(id => getNodeById(id)).filter(Boolean);
}

        character: 'Ra (or Atum-Ra, or Amun-Ra) travels across the sky in his solar barque by day, then through the underworld (the Duat) by night. Each night Apophis (chaos serpent) attempts to devour the sun; Set fights him off. Each dawn is a cosmic victory. This cycle EVERY day re-actualizes the original creation.',
        cross_tradition_parallels: ['Hindu daily sandhya (rituals at dawn/noon/dusk re-enact cosmic order)', 'Vedic Agni daily renewal', 'Aztec daily blood sacrifice to maintain the sun', 'Christian daily Eucharist as renewal'],
      },
      {
        name: 'The Eternal Recurrence (Neheh and Djet)',
        character: 'Egyptian time has two dimensions: NEHEH (cyclical, recurring time — the sun rising, the Nile flooding, the seasons) and DJET (eternal, unchanging time — the state of completed perfection, the realm of the dead, the divine order itself). The cosmos is upheld by maintaining both: ritual recurrence (neheh) and changeless truth (djet, related to Ma\'at).',
        cross_tradition_parallels: ['Hindu kala-cakra and akala (time and timelessness)', 'Greek chronos and aion (time and eternity)', 'Christian time and eternity', 'Plato\'s "moving image of eternity"'],
      },
    ],
    scholarly_note: 'Primary sources: Pyramid Texts (c. 2400 BCE, oldest religious writing), Coffin Texts, Book of the Dead, Memphite Theology (Shabaka Stone), Theban Hymns. Erik Hornung\'s Conceptions of God in Ancient Egypt (1982), Jan Assmann\'s The Search for God in Ancient Egypt (2001), and Erik Hornung\'s Idea into Image (1992) are essential. The two-time-dimension theory (neheh/djet) is most fully developed by Jan Assmann.',
    structural_role: 'Egyptian cosmology is the foundational source for many later traditions\' creation narratives — directly transmitted to Greek Hermeticism, indirectly to Hebrew and Christian theology. The "primordial waters with emerging principle" pattern (Nun → Atum) is one of the most widely attested cosmogonic structures globally. The neheh/djet distinction is the most precise ancient articulation of the difference between cyclic time and eternal being — a distinction Christian theology would later inherit.',
  },

  // ── CHINESE WU XING ─────────────────────────────────────────────
  {
    id: 'chinese-wuxing-yin-yang',
    name: 'Wu Xing, Yin-Yang, and the Dao\'s Cycles',
    tradition_id: 'east_asian',

    summary: 'Chinese cosmology centers on the Dao (Way) — the underlying principle of all things — manifesting through yin-yang (the complementary opposites) which generate the wu xing (the five phases: wood, fire, earth, metal, water). The five phases interact in two main cycles: the generating cycle (wood feeds fire feeds earth feeds metal feeds water feeds wood) and the controlling/overcoming cycle (wood breaks earth, earth dams water, water quenches fire, fire melts metal, metal cuts wood). Combined with the trigrams of the I Ching, this becomes the most articulated process-cosmology in any tradition.',
    stages: [
      {
        name: 'The Dao (Way) — Wu Ji (Without Limit)',

        cross_tradition_parallels: ['Hindu Brahman-Nirguna', 'Gnostic Monad', 'Kabbalistic Ein Sof', 'Buddhist Sunyata'],
      },
      {
        name: 'Tai Ji (The Great Pole) and the First Polarity',
        character: 'From Wu Ji emerges Tai Ji (the Supreme Ultimate) — the first principle of differentiation. From Tai Ji emerges yin and yang — the dark and the bright, the receptive and the creative, the moon-aspect and the sun-aspect. They are not opposites in conflict but complements in alternation.',
        cross_tradition_parallels: ['Gnostic Pleroma\'s polarized Aeon-pairs (each Aeon has its consort)', 'Hindu Shiva-Shakti', 'Kabbalistic right and left pillars (Chesed/Gevurah)', 'Aztec ometeotl (two-spirit) duality'],
      },
      {
        name: 'The Wu Xing (Five Phases)',
        character: 'From yin-yang emerge the five phases: Wood (growth, spring, east), Fire (expansion, summer, south), Earth (centering, late summer, center), Metal (contraction, autumn, west), Water (storage, winter, north). These are NOT material elements — they are dynamic process-stages of any cycle.',
        cross_tradition_parallels: ['Greek four elements (but with five and dynamic interaction)', 'Hindu pancha mahabhuta (five great elements)', 'Aztec four sun-elements + center movement', 'Tibetan five elements'],
      },
      {
        name: 'The Generating Cycle (Sheng)',
        character: 'Wood → Fire → Earth → Metal → Water → Wood. Each phase nourishes the next. Wood feeds fire; fire\'s ash creates earth; earth bears metal; metal\'s condensation produces water; water nourishes wood. The cycle of building up.',
        cross_tradition_parallels: ['Hindu srishti (creation phase)', 'Christian Trinity\'s eternal generation', 'Hermetic alchemical operations'],
      },
      {
        name: 'The Controlling Cycle (Ke)',
        character: 'Wood controls Earth (roots break soil) → Earth controls Water (banks dam rivers) → Water controls Fire (extinguishes) → Fire controls Metal (melts) → Metal controls Wood (axe cuts). The cycle of constraint, restoration of balance.',
        cross_tradition_parallels: ['Hindu samhara (destruction)', 'Stoic logos\'s necessary constraints', 'Kabbalistic Gevurah\'s judgment-restraint'],
      },
      {
        name: 'The Ten Thousand Things and Their Return',
        character: 'From the five phases\' interactions, the wan wu (ten thousand things) — all phenomena. Each individual being follows the Dao\'s pattern: arises, flourishes, declines, returns to the source. "Return is the movement of the Dao" (Daodejing 40).',
        cross_tradition_parallels: ['Hindu cycle of birth and death (samsara)', 'Buddhist dependent origination', 'Heraclitean flux', 'Aztec sun-cycles'],
      },
    ],
    scholarly_note: 'Primary sources: Daodejing (Laozi, c. 6th-4th c. BCE), Zhuangzi (c. 4th c. BCE), Yijing (I Ching, oldest layer c. 1000 BCE), Huainanzi (c. 139 BCE — definitive correlative cosmology). The wu xing system was systematized by Zou Yan (c. 305-240 BCE). Joseph Needham\'s Science and Civilisation in China, Vol. 2 (1956) remains foundational for understanding Chinese correlative cosmology. Manfred Porkert\'s Theoretical Foundations of Chinese Medicine (1974) is essential for the medical-cosmological synthesis.',
    structural_role: 'Chinese cosmology is the most articulated PROCESS cosmology — instead of dividing cosmic history into ages (Hindu, Aztec, Hesiod) or describing a linear arc (Christian, Zoroastrian), it describes the structural pattern that any process follows. This makes it both a cosmology AND a methodology: applicable to history, medicine, governance, agriculture, individual psychology. Where other traditions tell the cosmic story, Chinese cosmology describes the cosmic grammar.',
  },

  // ── SUFI COSMIC EMANATION ────────────────────────────────────────
  {
    id: 'sufi-tajalliyat',
    name: 'The Sufi Cosmic Emanation (Tajalliyat)',
    tradition_id: 'islamic_sufi',
    type: 'tiered-emanation-circular-return',
    summary: 'Sufi cosmology, developed especially by Ibn Arabi (1165-1240), describes reality as the self-manifestation (tajalli) of the One Divine Reality (Al-Haqq). Creation is the unfolding of Allah\'s names (al-asma al-husna, the 99 beautiful names) into hierarchically arranged levels of being — the divine, the spiritual, the imaginal, the material. Every individual soul comes from God and returns to God; the cosmic motion is from unity through multiplicity back to unity.',
    stages: [
      {
        name: 'Dhat — The Unknowable Essence',
        character: 'Al-Haqq (the Real) in its essence. Beyond all attributes, beyond knowability. The "hidden treasure" of the hadith qudsi: "I was a hidden treasure and I loved to be known, so I created the creation that I might be known." But the essence itself remains beyond all knowing.',
        cross_tradition_parallels: ['Gnostic Monad', 'Hindu Brahman-Nirguna', 'Kabbalistic Ein Sof', 'Buddhist Dharmakaya'],
      },
      {
        name: 'The Names and Attributes',
        character: 'From the essence emerge the divine Names (asma) and Attributes (sifat) — the 99 names of Allah. These are not separate from God but God\'s self-disclosure. Each Name describes a way the divine reality is known. The cosmos is the theatre in which each Name finds its expression.',
        cross_tradition_parallels: ['Kabbalistic Sefirot', 'Gnostic Aeons in the Pleroma', 'Hindu Saguna Brahman with infinite attributes', 'Christian "perfections of God" in classical theology'],
      },
      {
        name: 'Al-Aqlul Awwal — The First Intellect / Muhammadan Reality',
        character: 'The first determination of being. In Ibn Arabi: the Reality of Muhammad (al-Haqiqat al-Muhammadiyya) — the prototype of all creation, the first thing God created from his own light. In Sufi metaphysics, this is the cosmic Christ-equivalent: the first emanation through which all subsequent emanations occur.',
        cross_tradition_parallels: ['Gnostic Logos / Christ-Aeon', 'Kabbalistic Adam Kadmon', 'Hindu Hiranyagarbha (golden womb)', 'Buddhist Sambhogakaya'],
      },
      {
        name: 'Alam al-Jabarut — The World of Power / Archangels',
        character: 'The realm of the great spirits, the archangels, the divine powers. Pure spiritual existence without any limiting form.',
        cross_tradition_parallels: ['Christian angelic hierarchy (Pseudo-Dionysius)', 'Gnostic Aeon-pairs', 'Kabbalistic Beriah (world of creation)', 'Buddhist deva realms'],
      },
      {
        name: 'Alam al-Malakut — The World of Sovereignty / Angels',
        character: 'The angelic realm proper. Spirits with specific roles. The realm just above the manifest cosmos. The world the prophets ascend into in their visions.',
        cross_tradition_parallels: ['Kabbalistic Yetzirah (formative world)', 'Buddhist celestial bodhisattva realms', 'Hindu Svarga (heaven)'],
      },
      {
        name: 'Alam al-Mithal — The Imaginal World',
        character: 'A genuinely-real intermediate realm between pure spirit and pure matter. The realm of visions, dreams, true imagination (NOT mere fantasy), and the bodies of the resurrection. Henry Corbin\'s major contribution to Western philosophy was bringing attention to this category.',
        cross_tradition_parallels: ['Plato\'s realm of the soul before incarnation', 'Tibetan bardo / sambhogakaya', 'Aboriginal Dreaming as imaginal substrate', 'Celtic Otherworld'],
      },
      {
        name: 'Alam al-Mulk — The Material World',
        character: 'The realm of matter, time, space, and bodies. The "lowest" world in the chain — but also the place where the divine names find their fullest particularization. The mystic\'s task is to recognize the divine reality in the material world, not to escape from it.',
        cross_tradition_parallels: ['Kabbalistic Asiyah (world of action)', 'Hindu prakriti / vyakta (manifest)', 'Christian created order', 'Gnostic material cosmos (but with VERY different valuation — Sufism affirms it, Gnosticism rejects it)'],
      },
      {
        name: 'The Return (Ma\'ad)',
        character: 'Every soul travels through these levels descending into manifestation, and the journey of life is the ascent back. Through dhikr (remembrance), fana (annihilation in God), and baqa (subsistence in God), the Sufi recapitulates the cosmic motion. The final return is to the Reality from which all came.',
        cross_tradition_parallels: ['Plotinian return of the soul to the One', 'Hindu moksha back to Brahman', 'Christian theosis', 'Buddhist Nirvana', 'Gnostic recovery of the divine spark'],
      },
    ],
    scholarly_note: 'Primary sources: Ibn Arabi\'s Fusus al-Hikam (Bezels of Wisdom) and al-Futuhat al-Makkiyya (Meccan Revelations), Jalaluddin Rumi\'s Masnavi, Sadr al-Din Qunawi\'s commentaries, the Mulla Sadra synthesis. William Chittick\'s many books (especially The Sufi Path of Knowledge, 1989) are the most accessible scholarly entries. Henry Corbin\'s Creative Imagination in the Sufism of Ibn Arabi (1958/1969) introduced Western philosophy to the imaginal realm. Toshihiko Izutsu\'s Sufism and Taoism (1984) is the major comparative treatment.',
    structural_role: 'Sufi metaphysics is structurally distinctive in that it (1) affirms cosmic emanation through tiered levels like Neoplatonism and Kabbalah, but (2) integrates this with a strictly monotheistic framework (everything is God\'s self-disclosure), AND (3) develops the imaginal realm as a genuinely-real intermediate category that most Western philosophy has lacked. The Sufi synthesis is one of the most metaphysically sophisticated theological systems ever articulated.',
  },

  // ── BUDDHIST THREE WORLDS & SIX REALMS ─────────────────────────
  {
    id: 'buddhist-three-worlds',
    name: 'The Three Worlds (Trailokya) and Six Realms (Buddhist Cosmology)',
    tradition_id: 'buddhist',
    type: 'tiered-cosmological-structure',
    summary: 'Buddhist cosmology describes existence as occurring in three "worlds" (trailokya), each subdivided. The Realm of Desire (kamadhatu) contains the six realms in which beings are reborn according to karma: hells, hungry ghosts, animals, humans, asuras, and devas. Above the desire realm are the Realm of Form (rupadhatu) with seventeen heavens accessible through deep meditation, and the Realm of Formlessness (arupadhatu) with four heavens of pure absorption. All three worlds are within samsara; liberation (Nirvana) is beyond them.',
    stages: [
      {
        name: 'Kamadhatu — The Realm of Desire (6 sub-realms)',
        character: 'Beings here are driven by sensory desires. Contains the six realms of rebirth: (1) Naraka (hells), (2) Preta (hungry ghosts), (3) Tiryagyoni (animals), (4) Manusya (humans), (5) Asura (jealous gods), (6) Deva (gods, including six heavens within this realm). Rebirth between these is karma-driven.',
        cross_tradition_parallels: ['Hindu sapta-loka system (similar tiered cosmology)', 'Christian heaven/purgatory/hell (simplified version)', 'Egyptian Duat with multiple sub-realms', 'Gnostic seven planetary archon-realms'],
      },
      {
        name: 'Rupadhatu — The Realm of Form (17 heavens)',
        character: 'Beings have form but are beyond desire — accessible only through deep meditative absorption (jhana). Subdivided into 17 heavens corresponding to the four jhanas. Beings here can live for vast ages but eventually fall back to lower realms when their meditative merit is exhausted.',
        cross_tradition_parallels: ['Christian "seventh heaven" tradition', 'Sufi alam al-malakut (angelic realm)', 'Neoplatonic intelligible realm', 'Kabbalistic Yetzirah'],
      },
      {
        name: 'Arupadhatu — The Realm of Formlessness (4 heavens)',
        character: 'Beings here have no form — only consciousness. Accessible through the four formless absorptions: infinity of space, infinity of consciousness, nothingness, neither-perception-nor-non-perception. Life spans are immense (up to 84,000 mahakalpas). But still within samsara; eventually beings fall.',
        cross_tradition_parallels: ['Sufi alam al-jabarut (world of power, beyond form)', 'Kabbalistic Atziluth (world of emanation)', 'Neoplatonic Nous', 'Hindu Brahmaloka in its higher subdivisions'],
      },
      {
        name: 'Mount Meru and the Four Continents',
        character: 'Within the human realm: a flat-earth-style cosmography with Mount Meru at the center, surrounded by four continents in the four directions. Our world is Jambudvipa (Rose-Apple Continent) in the south. This is the realm where Buddhas can appear and dharma can be taught — humans are uniquely positioned for liberation because of the balance of suffering and capacity here.',
        cross_tradition_parallels: ['Hindu Meru / Sumeru (same source)', 'Norse Yggdrasil structural function', 'Christian medieval cosmography with Jerusalem at center'],
      },
      {
        name: 'Nirvana — Beyond the Three Worlds',
        character: 'The liberation that transcends the three worlds entirely. Not annihilation, not continued existence in some subtle form — but the cessation of the entire mechanism of rebirth. Described negatively in Theravada (the unconditioned, the deathless, the unborn). Described positively in Mahayana (the dharmakaya, the Buddha-nature, the suchness of all things).',
        cross_tradition_parallels: ['Hindu moksha (similar function but different metaphysics)', 'Sufi fana al-fana (annihilation of annihilation)', 'Christian beatific vision (categorical difference: Christian liberation is into relationship with God, Buddhist is into recognition that no separate self ever existed)'],
      },
    ],
    scholarly_note: 'Primary sources: Abhidharmakosha by Vasubandhu (4th c. CE) is the definitive scholastic treatment of Buddhist cosmology. The Mahayana sutras (especially the Avatamsaka Sutra / Flower Ornament Sutra) develop these in extraordinary detail — the Avatamsaka describes worlds within worlds within worlds, infinitely nested. Akira Sadakata\'s Buddhist Cosmology (1997) is a clear modern summary. Rupert Gethin\'s The Foundations of Buddhism (1998) covers the basics. Note: the Buddhist cosmographic detail (Mount Meru, etc.) is shared with Hindu cosmology — they have a common Indian source, with Buddhist material often preserving older layers.',
    structural_role: 'The Buddhist three-worlds system is the most articulated MAP of cosmic realms in any tradition. Where the Hindu six-loka system is similar but less elaborated, and the Christian heaven/hell binary is much simpler, the Buddhist 17-rupadhatu-heavens + 4-arupadhatu-heavens + 6-kamadhatu-realms gives a complete topography of all possible states of being. This makes it the most useful framework for thinking about levels of consciousness, types of suffering, and modes of liberation across traditions — every cosmology fits somewhere within or maps onto its categories.',
  },

  // ── HERMETIC SEVEN SPHERES ────────────────────────────────────
  {

    tradition_id: 'hermetic',
    type: 'planetary-ascent-cosmology',

        cross_tradition_parallels: ['Hindu Budha (Mercury planet, NOT Buddha the teacher)', 'Babylonian Nabu', 'Egyptian Thoth', 'Norse Odin\'s wisdom-aspect', 'Kabbalistic Hod'],

      {
        name: 'Moon — The Sphere of Form / Generation',

      {
        name: 'Earth — The Realm of Bodies and Multiplicity',

    scholarly_note: 'Primary sources: Corpus Hermeticum (Greek texts compiled c. 100-300 CE, traditionally attributed to Hermes Trismegistus), the Asclepius (Latin Hermetic dialogue), the Nag Hammadi Hermetic texts (Discourse on the Eighth and Ninth, NHC VI,6). Brian Copenhaver\'s Hermetica (1992) is the standard scholarly edition. Garth Fowden\'s The Egyptian Hermes (1986) traces the texts\' Egyptian origins. The seven-sphere cosmology was inherited from Babylonian astrology, integrated with Greek philosophy, and given a soteriological dimension by the Hermetic synthesis. It became the dominant cosmological framework in Western esotericism from the Renaissance through the 19th century.',
    structural_role: 'The Hermetic seven-sphere ascent is the architectural framework for nearly all subsequent Western esoteric initiation systems — Mithraism, late Neoplatonism, Christian mysticism (Augustine, Dante\'s Paradiso), Renaissance Hermeticism (Ficino, Pico, Agrippa), Rosicrucianism, Theosophy, Golden Dawn, and modern Western occultism all use variations of this structure. The pattern of "descent through tiers picking up obscurations, ascent through tiers releasing them" is one of the most generative cosmological models in Western religious thought.',

    scholarly_note: "Calvert Watkins, How to Kill a Dragon: Aspects of Indo-European Poetics (Oxford, 1995) is the foundational treatment. The formula is linguistic as well as mythological \u2014 the verbal phrase for slaying the serpent is directly reconstructible in PIE. West's Indo-European Poetry and Myth (Oxford, 2007) extends the analysis. The formula applies strictly to IE traditions; analogous dragon-slayer myths in non-IE traditions (Mesopotamian, Japanese) are parallel structures with different historical origins.",

/* =============================================================
   data/source-map/parallels.js
   
   PARALLEL DETECTION ENGINE
   
   Algorithm from COMPARATIVE COSMOLOGY FULL DEITY ARCHITECTURE:
   
   For each pair of facets (A, B) across different traditions:
   1. Compute tag overlap: |tags(A) ∩ tags(B)| / |tags(A) ∪ tags(B)|  (Jaccard)
   2. Weight by tag rarity (rare tags count more)
   3. Weight by tier alignment (same-tier matches score higher)
   4. Weight by archetypal-role match
   5. Surface results above threshold (>0.3) as candidate parallels
   6. Mark canonical if a primary source explicitly identifies them
   ============================================================= */


// ── TAG RARITY WEIGHTS ────────────────────────────────────────
// Common tags count less; rare/specific tags count more.
// The more specific the tag, the stronger the structural match.
const TAG_WEIGHTS = {
  // High weight — very specific structural roles
  'unmanifest-source':          3.0,
  'ignorant-of-source':         3.0,
  'false-most-high':            3.0,
  'sacrificed-god':             2.8,
  'dying-rising-god':           2.8,

  'returning-god':              2.3,
  'silent-transmission':        2.3,
  'usurper':                    2.0,
  'trickster':                  2.0,
  'shape-shifter':              2.0,
  'culture-hero':               1.8,
  'light-bringer':              1.8,
  'psychopomp':                 1.8,
  'mediator':                   1.8,
  'wisdom-bringer':             1.6,
  'descended-god':              1.6,
  'cross-tier':                 1.5,
  'fratricide':                 1.5,
  'betrayer':                   1.5,

  // Medium weight — functional roles
  'destroyer':       1.3,
  'transformer':     1.3,
  'fate-governor':   1.2,
  'divine-council-head': 1.2,
  'first-emanation': 1.2,
  'craftsman-creator': 1.2,
  'cosmic-order':    1.1,
  'redeemer':        1.1,
  'ascetic':         1.1,
  'erotic':          1.0,

  // Lower weight — common attributes
  'sky':      0.6,
  'storm':    0.7,
  'war':      0.7,
  'father':   0.6,
  'mother':   0.6,
  'death':    0.7,
  'fire':     0.8,
  'wisdom':   0.8,
  'law':      0.7,
};

const DEFAULT_TAG_WEIGHT = 1.0;

function tagWeight(tag) {
  return TAG_WEIGHTS[tag] ?? DEFAULT_TAG_WEIGHT;
}

// ── WEIGHTED JACCARD SIMILARITY ──────────────────────────────
function weightedJaccard(tagsA, tagsB) {
  if (!tagsA?.length || !tagsB?.length) return 0;

  const setA = new Set(tagsA);
  const setB = new Set(tagsB);

  const allTags = new Set([...tagsA, ...tagsB]);
  let intersection = 0;
  let union = 0;

  for (const tag of allTags) {
    const w = tagWeight(tag);
    if (setA.has(tag) && setB.has(tag)) {
      intersection += w;
    }
    union += w;
  }

  return union === 0 ? 0 : intersection / union;
}

// ── TIER ALIGNMENT BONUS ──────────────────────────────────────
function tierBonus(tierA, tierB) {
  if (tierA === tierB) return 0.15;
  // Adjacent tiers get a smaller bonus
  const diff = Math.abs(
    (tierA === 'cross-tier' ? 0 : tierA) -
    (tierB === 'cross-tier' ? 0 : tierB)
  );
  if (diff === 1) return 0.05;
  return 0;
}

// ── CROSS-TRADITION CHECK ─────────────────────────────────────
// We only surface cross-tradition parallels (same tradition = less interesting)
function differentTraditions(facetA, facetB) {
  const deityA = FACETS_V2.find(f => f.id === facetA.id);
  const deityB = FACETS_V2.find(f => f.id === facetB.id);
  // For now, check if parent_deity_ids are different
  return facetA.parent_deity_id !== facetB.parent_deity_id;
}

// ── CANONICAL PARALLEL LOOKUP ─────────────────────────────────
const canonicalSet = new Set(
  CANONICAL_PARALLELS.flatMap(p => [
    `${p.facet_a}|${p.facet_b}`,
    `${p.facet_b}|${p.facet_a}`,
  ])
);

function isCanonicalParallel(facetIdA, facetIdB) {
  return canonicalSet.has(`${facetIdA}|${facetIdB}`);
}

function getCanonicalParallel(facetIdA, facetIdB) {
  return CANONICAL_PARALLELS.find(p =>
    (p.facet_a === facetIdA && p.facet_b === facetIdB) ||
    (p.facet_a === facetIdB && p.facet_b === facetIdA)
  ) ?? null;
}

// ── MAIN: COMPUTE PARALLELS FOR A FACET ──────────────────────
function computeParallels(facetId, options = {}) {
  const {
    threshold = 0.28,
    maxResults = 12,
    includeSameTradition = false,
  } = options;

  const facet = FACETS_V2.find(f => f.id === facetId);
  if (!facet) return [];

  const results = [];

  for (const other of FACETS_V2) {
    if (other.id === facetId) continue;
    if (!includeSameTradition && other.parent_deity_id === facet.parent_deity_id) continue;

    let score = weightedJaccard(facet.function_tags, other.function_tags);
    score += tierBonus(facet.tier_assignment, other.tier_assignment);

    const canonical = isCanonicalParallel(facetId, other.id);
    if (canonical) score = Math.max(score, 0.65); // canonical parallels always surface

    if (score >= threshold) {
      results.push({
        facet: other,
        score: Math.round(score * 100) / 100,
        canonical,
        canonicalData: canonical ? getCanonicalParallel(facetId, other.id) : null,
      });
    }
  }

  return results
    .sort((a, b) => b.score - a.score)
    .slice(0, maxResults);
}

// ── CLUSTER: GROUP FACETS BY STRUCTURAL FUNCTION ──────────────
// Surface all facets that belong to the same "cluster" of function tags.
// e.g., clicking "trickster" shows all trickster-facets across all traditions.
function getFacetsByTag(tag) {
  return FACETS_V2.filter(f => f.function_tags?.includes(tag));
}

function getTopParallelClusters(topN = 20) {
  // Find the tags that appear most often and have high weight
  const tagCounts = {};
  for (const facet of FACETS_V2) {
    for (const tag of (facet.function_tags || [])) {
      tagCounts[tag] = (tagCounts[tag] || 0) + 1;
    }
  }

  return Object.entries(tagCounts)
    .filter(([tag, count]) => count >= 3)
    .sort((a, b) => {
      // Sort by weighted occurrence (count × weight)
      const wa = a[1] * (TAG_WEIGHTS[a[0]] ?? 1);
      const wb = b[1] * (TAG_WEIGHTS[b[0]] ?? 1);
      return wb - wa;
    })
    .slice(0, topN)
    .map(([tag, count]) => ({
      tag,
      count,
      weight: TAG_WEIGHTS[tag] ?? 1.0,
      facets: getFacetsByTag(tag),
    }));
}

// ── COMPARISON: DIFF TWO FACETS ───────────────────────────────
function compareFacets(facetIdA, facetIdB) {
  const a = FACETS_V2.find(f => f.id === facetIdA);
  const b = FACETS_V2.find(f => f.id === facetIdB);
  if (!a || !b) return null;

  const setA = new Set(a.function_tags || []);
  const setB = new Set(b.function_tags || []);

  const shared    = [...setA].filter(t => setB.has(t));
  const onlyInA   = [...setA].filter(t => !setB.has(t));
  const onlyInB   = [...setB].filter(t => !setA.has(t));

  const score = weightedJaccard(a.function_tags, b.function_tags);
  const canonical = isCanonicalParallel(facetIdA, facetIdB);

  return {
    facetA: a,
    facetB: b,
    sharedTags: shared,
    uniqueToA: onlyInA,
    uniqueToB: onlyInB,
    similarityScore: Math.round(score * 100) / 100,
    tierMatch: a.tier_assignment === b.tier_assignment,
    canonical,
    canonicalData: canonical ? getCanonicalParallel(facetIdA, facetIdB) : null,
    interpretationNotes: canonical ? getCanonicalParallel(facetIdA, facetIdB)?.scholarly_note : null,
  };
}

/* ── CANVAS STARFIELD ── */
function initCanvas() {
  const canvas = document.getElementById('canvas-bg');

    y:     Math.random(),
    r:     Math.random() * 1.1 + 0.2,
    o:     Math.random() * 0.55 + 0.08,
    speed: (Math.random() - 0.5) * 0.0035,
    hue:   Math.random() > 0.85 ? 200 : 42, // mostly gold, some blue

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = document.documentElement.scrollHeight;
  }

  function tick() {
    resize();
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (const s of stars) {
      ctx.beginPath();
      ctx.arc(
        s.x * canvas.width,
        s.y * canvas.height,
        s.r, 0, Math.PI * 2

      ctx.fillStyle = `hsla(${s.hue}, 60%, 70%, ${s.o})`;
      ctx.fill();

      // Breathe
      s.o = Math.max(0.04, Math.min(0.72, s.o + s.speed));
      if (Math.random() < 0.0015) s.speed *= -1;

  }

  window.addEventListener('resize', resize, { passive: true });
}

    },
    { threshold: 0.1, rootMargin: '0px 0px -60px 0px' }
  );

  // Observe all reveal targets
  const targets = document.querySelectorAll(

  if (!stage || state.transitioning) return Promise.resolve();

  setState({ transitioning: true });

  return new Promise((resolve) => {
    const prevPanel = stage.querySelector('.panel-active');

    // Build new panel — starts off-screen below (or above)
    const newPanel = document.createElement('div');
    newPanel.innerHTML = newHTML;
    newPanel.style.cssText = `
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: translateY(${direction > 0 ? '60px' : '-60px'});
      transition: opacity 0.45s cubic-bezier(0.16,1,0.3,1),
                  transform 0.45s cubic-bezier(0.16,1,0.3,1);

      prevPanel.style.opacity   = '0';

      const cx   = rect.left + rect.width / 2;
      const cy   = rect.top  + rect.height / 2;
      const dx   = (e.clientX - cx) / window.innerWidth;
      const dy   = (e.clientY - cy) / window.innerHeight;

      // Subtle ambient tilt based on cursor position in viewport
