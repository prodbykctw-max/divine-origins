ificed at Creation","tier_assignment":1,"function_tags":["sacrificed-cosmic-being","cosmos-from-body","varna-origin"],"valence":"transcendent","core_claim":"RV 10.90: the gods sacrifice Puruṣa, and from his body arise the worlds and the four varnas. The Rigvedic version of the PIE Manu/Yemo cosmogony — and the most explicit, datable instance of the cosmos-from-sacrificed-being pattern.","parallel_facets":["yemo-sacrificed-twin","christ-resurrection","baal-dies-and-rises","tiamat-cosmos-from-body"]},{"id":"purusha-as-consciousness","parent_deity_id":"purusha","facet_name":"Puruṣa as Pure Consciousness (Sāṃkhya)","tier_assignment":1,"function_tags":["pure-consciousness","metaphysical-principle","non-active-witness"],"valence":"transcendent","core_claim":"In later Sāṃkhya, Puruṣa is the pure consciousness that contemplates Prakṛti (nature/matter). The cosmogonic figure becomes a metaphysical principle.","parallel_facets":["monad-unmanifest","brahman-saguna"]},{"id":"rta-cosmic-order","parent_deity_id":"rta","facet_name":"The Cosmic Order Itself","tier_assignment":1,"function_tags":["impersonal-cosmic-order","truth-as-fittingness","above-the-gods"],"valence":"transcendent","core_claim":"Ṛta is not a deity but the order against which deities are measured. From PIE *h₂er- 'to fit / join properly,' it is cognate with Avestan aša (cosmic order) and conceptually parallel to Egyptian ma'at — three independent attestations of impersonal cosmic order as the highest principle.","parallel_facets":["monad-unmanifest"]},{"id":"idjair-milky-way-father","parent_deity_id":"idjair-milky-way","facet_name":"Father in the Milky Way","tier_assignment":1,"function_tags":["sky-father","withdrawn-source","stellar"],"valence":"transcendent","core_claim":"Idjair dwells in the Milky Way and is the father of all Wandjinas, withdrawn from direct world-making and acting through his son Wallungunder.","parallel_facets":["monad-unmanifest","el-divine-council-head","el-elyon-council-head","dyeus-sky-father-root"]},{"id":"wallungunder-creator","parent_deity_id":"wallungunder-first-wandjina","facet_name":"Creator of Earth and First Humans (the Gyorn Gyorn)","tier_assignment":2,"function_tags":["active-creator","first-cause-of-earth","creator-of-first-humans"],"valence":"positive","core_claim":"Wallungunder, son of Idjair, created the earth and all life on it, and created the first humans — the Gyorn Gyorn (Gwion Gwion) people.","parallel_facets":["el-creator-of-creatures","yahweh-creator","purusha-sacrificed-cosmic-person"]},{"id":"wallungunder-law-bringer","parent_deity_id":"wallungunder-first-wandjina","facet_name":"Law-Bringer to the First People","tier_assignment":2,"function_tags":["law-giver","covenant-establisher","mediator-between-tiers"],"valence":"positive","core_claim":"Wallungunder returned to Idjair and brought back more Wandjinas to give the Gyorn Gyorn people the Law to live by.","parallel_facets":["el-grantor-of-kingship","yahweh-covenantal","krishna-teacher"]},{"id":"namarali-rain-fertility","parent_deity_id":"namarali","facet_name":"Rain-Maker and Fertility-Giver of the Worrorra","tier_assignment":"cross-tier","function_tags":["rain-maker","fertility-bringer","cyclonic-storm","lightning"],"valence":"positive","core_claim":"Namarali brings the wet-season rains, the lightning, and the cyclones that renew the land. The body covered in dots represents falling rain.","parallel_facets":["baal-hadad-storm","indra-vajra","perkwunos-thunderer","thor-storm"]},{"id":"namarali-law-and-power","parent_deity_id":"namarali","facet_name":"Mouthless Power — Law-Enforcer","tier_assignment":"cross-tier","function_tags":["law-enforcer","mouthless-power","direct-act-of-will"],"valence":"ambivalent","core_claim":"The Wandjina has no mouth because verbal speech is unnecessary for a being whose power acts directly by will. Those who break the Law may be punished by flood, lightning, or cyclone.","parallel_facets":["yahweh-jealous-god"]},{"id":"wodjin-ngarinyin-primary","parent_deity_id":"wodjin-ngarinyin","facet_name":"Primary Wandjina of the Ngarinyin","tier_assignment":"cross-tier","function_tags":["rain-maker","law-bringer"],"valence":"positive","core_claim":"Primary Wandjina figure of the Ngarinyin people.","parallel_facets":["namarali-rain-fertility"]},{"id":"rimijmarra-wunambal-primary","parent_deity_id":"rimijmarra","facet_name":"Primary Wandjina of the Wunambal","tier_assignment":"cross-tier","function_tags":["rain-maker","law-bringer"],"valence":"positive","core_claim":"Primary Wandjina figure of the Wunambal people; the Wunambal name for Wandjina generally is Gulingi.","parallel_facets":["namarali-rain-fertility"]},{"id":"wunggurr-creator-serpent","parent_deity_id":"wunggurr-rainbow-serpent","facet_name":"Rainbow-Serpent Creator-Being","tier_assignment":2,"function_tags":["creator-serpent","primordial-power","rainbow"],"valence":"positive","core_claim":"Wunggurr is the Kimberley reflex of the broader pan-Aboriginal Rainbow Serpent creator-being.","parallel_facets":["vritra-cosmic-serpent","yam-sea-chaos","danu-vedic-primordial-waters"],"interpretation_notes":"The Rainbow Serpent parallel to the cosmic-serpent figures of Vedic / Canaanite / Mesopotamian myth is real, but distinct: the Rainbow Serpent is creative-generative rather than a chaos-being to be slain. The structural slot is different."},{"id":"wunggurr-waters","parent_deity_id":"wunggurr-rainbow-serpent","facet_name":"Lord of the Deep Waters","tier_assignment":2,"function_tags":["waters","deep-pools","fertility"],"valence":"positive","core_claim":"Wunggurr-places are deep water-holes; the Rainbow Serpent dwells in waters.","parallel_facets":["danu-vedic-primordial-waters","danu-river-goddess"]},{"id":"paiute-great-spirit-creator","parent_deity_id":"paiute-great-spirit","facet_name":"Creator and Punisher of the Beautiful Giants","tier_assignment":2,"function_tags":["creator","punisher-of-earlier-race","law-of-treatment"],"valence":"positive","core_claim":"The Great Spirit created an earlier race of 'beautiful giants' between the Sierra Nevada and the Rockies. When they mistreated a disfigured child the Great Spirit made the land hot and desolate and allowed enemies to conquer them. Two survived: Paiute and his wife, ancestors of the people.","parallel_facets":["quinametzin-destroyed-for-sins","nephilim-flood-cause","titans-imprisoned-in-tartarus","fomorians-as-pre-divine-chaos"]},{"id":"si-te-cah-giants","parent_deity_id":"si-te-cah","facet_name":"Red-Haired Giant Cannibals (Later Tradition)","tier_assignment":4,"function_tags":["giants","red-haired","cannibals","tule-eaters","Lovelock-Cave"],"valence":"negative","core_claim":"In later versions of the Paiute oral tradition, the Si-Te-Cah are described as red-haired giant cannibals who preyed on the Paiute and were ultimately exterminated at Lovelock Cave.","parallel_facets":["anakim-giant-warriors","rephaim-biblical-giants","nephilim-giants","quinametzin-giants-of-previous-sun"]},{"id":"si-te-cah-conflict-and-destruction","parent_deity_id":"si-te-cah","facet_name":"Destruction at Lovelock Cave","tier_assignment":4,"function_tags":["destruction-of-prior-race","trapped-and-burned","war-of-extermination"],"valence":"negative","core_claim":"Allied tribes trapped the last Si-Te-Cah in Lovelock Cave, filled the entrance with brush, and set it alight, killing the survivors. The pattern of trapping-and-destroying-the-elder-race appears across many giant-traditions.","parallel_facets":["quinametzin-destroyed-for-sins","nephilim-flood-cause"]},{"id":"semyaza-watcher-chief","parent_deity_id":"semyaza","facet_name":"Chief of the 200 Watchers","tier_assignment":4,"function_tags":["watcher-chief","instigator-of-descent","oath-binder"],"valence":"negative","core_claim":"Semyaza is the leader who proposes the descent and binds the 200 Watchers by a mutual oath on Mount Hermon (1 Enoch 6:3-6). The mountain itself is named Hermon ('curse / oath') because of this binding.","parallel_facets":["watchers-fallen","azazel-watcher-teacher-of-arts"]},{"id":"semyaza-taught-enchantments","parent_deity_id":"semyaza","facet_name":"Teacher of Enchantments and Root-Cuttings","tier_assignment":4,"function_tags":["taught-forbidden-arts","enchantments","herbal-magic"],"valence":"negative","core_claim":"1 Enoch 8:3: 'Semyaza taught enchantments, and root-cuttings.'","parallel_facets":["azazel-watcher-teacher-of-arts","watchers-teachers-of-forbidden-arts"]},{"id":"semyaza-father-of-giants","parent_deity_id":"semyaza","facet_name":"Father of Ohyah and Hahyah","tier_assignment":4,"function_tags":["father-of-giants","specific-named-offspring"],"valence":"negative","core_claim":"Per Book of Giants 4Q530, Semyaza (Shemhazai) is father of the giant twins Ohyah and Hahyah. Talmud Niddah 61a extends the line: Shemhazai → Ahijah → Og of Bashan.","parallel_facets":["ohyah-son-of-semyaza","hahyah-son-of-semyaza","og-last-of-rephaim"]},{"id":"azazel-watcher-teacher-of-arts","parent_deity_id":"azazel-watcher","facet_name":"Teacher of Metallurgy, Weapons, and Cosmetics","tier_assignment":4,"function_tags":["taught-forbidden-arts","metallurgy","weapons-making","cosmetics","corruption-by-technology"],"valence":"negative","core_claim":"1 Enoch 8:1: 'And Azazel taught men to make swords, and knives, and shields, and breastplates, and made known to them the metals of the earth and the art of working them, and bracelets, and ornaments, and the use of antimony, and the beautifying of the eyelids.' The corruption of humanity by giving them technology and adornment.","parallel_facets":["prometheus-fire-bringer","azazel-bound","watchers-teachers-of-forbidden-arts"]},{"id":"azazel-watcher-bound-in-desert","parent_deity_id":"azazel-watcher","facet_name":"Bound by Raphael in Dudael","tier_assignment":4,"function_tags":["cosmic-rebel-bound","imprisoned-in-pit","judgement-deferred"],"valence":"negative","core_claim":"1 Enoch 10:4-8: God commands Raphael to bind Azazel hand and foot and cast him into the darkness of Dudael, where he is to remain until the day of the great judgment.","parallel_facets":["azazel-bound","loki-bound","prometheus-fire-bringer","fenrir-bound"]},{"id":"azazel-watcher-prometheus-parallel","parent_deity_id":"azazel-watcher","facet_name":"Teacher-of-Arts Bound by the Gods (Prometheus Parallel)","tier_assignment":4,"function_tags":["teacher-of-arts-punished","gift-to-humanity","structural-inversion"],"valence":"ambivalent","core_claim":"Azazel and Prometheus occupy the same structural slot: both give humanity transformative arts/technology, both are punished by binding. The valence is inverted: Prometheus is celebrated by Greek tradition as benefactor of humanity, Azazel is condemned by Enochic tradition as corrupter. The same act receives opposite moral judgments — one of the most interesting cases in comparative mythology.","parallel_facets":["prometheus-fire-bringer"]},{"id":"araqiel-taught-signs-of-earth","parent_deity_id":"araqiel","facet_name":"Teacher of Earth-Signs","tier_assignment":4,"function_tags":["taught-forbidden-arts","geomancy","earth-signs"],"valence":"negative","core_claim":"1 Enoch 8:3: 'Araqiel the signs of the earth.'","parallel_facets":["watchers-teachers-of-forbidden-arts"]},{"id":"kokabiel-taught-astrology","parent_deity_id":"kokabiel","facet_name":"Teacher of Astrology / Signs of the Stars","tier_assignment":4,"function_tags":["taught-forbidden-arts","astrology","stellar-divination"],"valence":"negative","core_claim":"1 Enoch 8:3: 'Kokabiel the constellations.' The prototype of forbidden astrological knowledge.","parallel_facets":["watchers-teachers-of-forbidden-arts"]},{"id":"baraqiel-taught-astrology","parent_deity_id":"baraqiel","facet_name":"Teacher of Astrology / Lightning-Signs","tier_assignment":4,"function_tags":["taught-forbidden-arts","lightning-divination"],"valence":"negative","core_claim":"1 Enoch 8:3: 'Baraqiel astrology / the signs of the lightnings.'","parallel_facets":["watchers-teachers-of-forbidden-arts"]},{"id":"baraqiel-father-of-mahaway","parent_deity_id":"baraqiel","facet_name":"Father of Mahaway","tier_assignment":4,"function_tags":["father-of-giant","specific-named-offspring"],"valence":"negative","core_claim":"Per Book of Giants 4Q530 frag 7, Baraqel is father of the giant Mahaway. 4Q203 frag 8: 'Baraqel, my father, was with me.'","parallel_facets":["mahaway-son-of-baraqiel"]},{"id":"armaros-taught-counter-enchantments","parent_deity_id":"armaros","facet_name":"Teacher of Counter-Enchantments","tier_assignment":4,"function_tags":["taught-forbidden-arts","spell-undoing"],"valence":"negative","core_claim":"1 Enoch 8:3: 'Armaros the resolving of enchantments.'","parallel_facets":["watchers-teachers-of-forbidden-arts"]},{"id":"sariel-taught-courses-of-moon","parent_deity_id":"sariel","facet_name":"Teacher of the Courses of the Moon","tier_assignment":4,"function_tags":["taught-forbidden-arts","lunar-astrology"],"valence":"negative","core_claim":"1 Enoch 8:3: 'Sariel the courses of the moon.'","parallel_facets":["watchers-teachers-of-forbidden-arts"]},{"id":"samsiel-taught-signs-of-sun","parent_deity_id":"samsiel","facet_name":"Teacher of the Signs of the Sun","tier_assignment":4,"function_tags":["taught-forbidden-arts","solar-astrology"],"valence":"negative","core_claim":"1 Enoch 8:3: 'Samsiel the signs of the sun.'","parallel_facets":["watchers-teachers-of-forbidden-arts"]},{"id":"watcher-chiefs-other-collective","parent_deity_id":"watcher-chiefs-other","facet_name":"The Remaining Chiefs of Tens","tier_assignment":4,"function_tags":["watcher-chief","chief-of-tens"],"valence":"negative","core_claim":"Each commanded a unit of ten subordinate Watchers; together with the leading chiefs they account for all 200 descenders.","parallel_facets":["watchers-fallen"]},{"id":"ohyah-dreams-of-judgment","parent_deity_id":"ohyah","facet_name":"Throne-Room Dream of Judgment","tier_assignment":4,"function_tags":["prophetic-dream","throne-vision","self-aware-doomed"],"valence":"ambivalent","core_claim":"Book of Giants 4Q530 col ii lines 15-20: Ohyah sees the Great Holy One descend, take his seat on the throne, and open the books of judgment — a vision strikingly parallel to Daniel 7:9-10.","parallel_facets":[]},{"id":"ohyah-son-of-semyaza","parent_deity_id":"ohyah","facet_name":"Son of Shemhazai (the Watcher Chief)","tier_assignment":4,"function_tags":["son-of-watcher","named-giant"],"valence":"negative","core_claim":"Ohyah is a son of Shemhazai (Semyaza), the chief Watcher. Talmud Niddah 61a continues the line to Og of Bashan.","parallel_facets":["semyaza-father-of-giants"]},{"id":"hahyah-dreams-of-garden","parent_deity_id":"hahyah","facet_name":"Garden-Destroyed Dream","tier_assignment":4,"function_tags":["prophetic-dream","garden-allegory","noah-foretold"],"valence":"ambivalent","core_claim":"Book of Giants 4Q530 col ii lines 6-12: Hahyah sees a great garden with many trees and roots; fire and water destroy them all except one tree of three branches — interpreted as the preservation of Noah and his three sons.","parallel_facets":[]},{"id":"hahyah-son-of-semyaza","parent_deity_id":"hahyah","facet_name":"Son of Shemhazai","tier_assignment":4,"function_tags":["son-of-watcher","named-giant"],"valence":"negative","core_claim":"Hahyah is the twin of Ohyah, also son of Shemhazai.","parallel_facets":["semyaza-father-of-giants"]},{"id":"mahaway-messenger-to-enoch","parent_deity_id":"mahaway","facet_name":"Winged Envoy to Enoch","tier_assignment":4,"function_tags":["messenger","winged","intermediary-to-the-ascended"],"valence":"ambivalent","core_claim":"When the giants cannot interpret Ohyah and Hahyah's dreams, they send Mahaway to the translated Enoch. Mahaway flies on wings (Manichaean version explicit). Enoch gives him two tablets — one denouncing the giants, the second pronouncing judgment. Mahaway is the only giant who travels between earth and heaven.","parallel_facets":["enoch-ascended"]},{"id":"mahaway-son-of-baraqiel","parent_deity_id":"mahaway","facet_name":"Son of Baraq'el (Baraqiel)","tier_assignment":4,"function_tags":["son-of-watcher","named-giant"],"valence":"negative","core_claim":"Per Book of Giants 4Q203 frag 8: 'Baraqel, my father, was with me' — Mahaway naming his Watcher-father.","parallel_facets":["baraqiel-father-of-mahaway"]},{"id":"gilgamesh-as-giant-of-book-of-giants","parent_deity_id":"gilgamesh-as-giant","facet_name":"Gilgamesh among the Antediluvian Giants","tier_assignment":4,"function_tags":["giant","Mesopotamian-borrowing","cross-tradition-transmission"],"valence":"ambivalent","core_claim":"Book of Giants 4Q530 col ii line 2 and 4Q531 frag 22 name Gilgamesh as one of the giants — the only known mention of Gilgamesh in pre-modern non-cuneiform literature. Direct evidence that the Mesopotamian heroic tradition was absorbed into Second Temple Jewish apocalyptic.","parallel_facets":[]},{"id":"hobabish-from-humbaba","parent_deity_id":"hobabish","facet_name":"Hobabish — Aramaic Adaptation of Humbaba","tier_assignment":4,"function_tags":["Mesopotamian-borrowing","named-giant"],"valence":"negative","core_claim":"Book of Giants 4Q203 frag 3: Hobabish's name is the Aramaic adaptation of Humbaba, the cedar-forest monster of the Gilgamesh epic.","parallel_facets":[]},{"id":"ahiram-giant","parent_deity_id":"ahiram","facet_name":"Ahiram the Giant","tier_assignment":4,"function_tags":["named-giant"],"valence":"negative","core_claim":"A named giant in the Book of Giants; narratively less prominent than the others.","parallel_facets":[]},{"id":"goliath-philistine-giant","parent_deity_id":"goliath","facet_name":"The Philistine Champion of Gath","tier_assignment":4,"function_tags":["giant-warrior","champion-of-the-enemy","slain-by-the-king"],"valence":"negative","core_claim":"Goliath of Gath challenges Israel for 40 days; David kills him with a sling-stone (1 Sam 17). Height given as four cubits and a span (~6'9\") in 4QSamᵃ and LXX, or six cubits and a span (~9'9\") in the Masoretic Text.","parallel_facets":["philistine-giants-of-gath-descendants-of-rephaim"]},{"id":"goliath-of-the-rephaim-line","parent_deity_id":"goliath","facet_name":"Descended from the Rephaim of Gath","tier_assignment":4,"function_tags":["rephaim-line","post-flood-giant","named-individual"],"valence":"negative","core_claim":"1 Chronicles 20:8 places Goliath and his brothers 'in the lineage of the giants' (Rephaim) of Gath — the Philistine remnant of the giant-line.","parallel_facets":["rephaim-biblical-giants","anakim-giant-warriors","og-last-of-rephaim"]},{"id":"sheshai-ahiman-talmai-hebron-giants","parent_deity_id":"sheshai-ahiman-talmai","facet_name":"The Three Sons of Anak at Hebron","tier_assignment":4,"function_tags":["named-giants","specific-clan","Hurrian-name-affinities"],"valence":"negative","core_claim":"Sheshai, Ahiman, and Talmai are the three named sons of Anak at Hebron (Num 13:22). Caleb drives them out (Josh 15:14). Their names are Hurrian by affinity — a striking ethnographic detail that complicates the question of Anakim ethnicity.","parallel_facets":["anakim-giant-warriors","anakim-iy-anaq-egyptian"]},{"id":"philistine-giants-of-gath-descendants-of-rephaim","parent_deity_id":"philistine-giants-of-gath","facet_name":"The Four Giant-Warriors of Gath","tier_assignment":4,"function_tags":["named-giants","rephaim-descended","philistine-remnant"],"valence":"negative","core_claim":"1 Chr 20:4-8 names four Rephaim-descended Philistine giants slain by David's men: Ishbi-benob (whose spear weighed 300 shekels of bronze), Saph / Sippai, Lahmi the brother of Goliath, and the unnamed six-fingered six-toed giant. The last remnant of the Rephaim line in Iron Age Israel.","parallel_facets":["rephaim-biblical-giants","anakim-giant-warriors","goliath-of-the-rephaim-line"]},{"id":"nimrod-first-mighty-king","parent_deity_id":"nimrod","facet_name":"The First Mighty Man on Earth","tier_assignment":3,"function_tags":["first-king","post-flood-tyrant","mighty-hunter"],"valence":"ambivalent","core_claim":"Genesis 10:8-12: Nimrod was 'the first on earth to be a mighty man,' 'a mighty hunter before the LORD.' Founder of Babel, Erech (Uruk), and Akkad — the Mesopotamian power centers. The first post-flood political power.","parallel_facets":["yahweh-jealous-god"]},{"id":"nimrod-tower-of-babel","parent_deity_id":"nimrod","facet_name":"Builder of the Tower of Babel","tier_assignment":3,"function_tags":["tower-builder","aspirer-to-divine","punished-by-confusion"],"valence":"negative","core_claim":"Rabbinic tradition makes Nimrod the architect of the Tower of Babel (Gen 11) — the post-flood collective attempt to ascend to heaven, punished by the confusion of languages. Direct structural parallel to the Quinametzin who 'aspired to reach the gods' and were destroyed, and to Otus and Ephialtes piling Pelion on Ossa to reach Olympus.","parallel_facets":["quinametzin-destroyed-for-sins"]},{"id":"nimrod-rebel-against-yhwh","parent_deity_id":"nimrod","facet_name":"The Rebel-King against YHWH","tier_assignment":3,"function_tags":["rebel-against-most-high","tyrant-king"],"valence":"negative","core_claim":"Rabbinic tradition develops Nimrod as the king who threw Abraham into the fiery furnace, the prototype of the tyrant-ruler set against the people of God. Possibly named from Hebrew mrd 'rebel.'","parallel_facets":["yaldabaoth-usurper"]},{"id":"quinametzin-giants-of-previous-sun","parent_deity_id":"quinametzin","facet_name":"Giants of the Previous Sun-Era","tier_assignment":4,"function_tags":["giants","previous-cosmic-age","elder-race"],"valence":"ambivalent","core_claim":"The Quinametzin lived during a previous Sun-era (sources differ: Sun of Earth, Sun of Rain, Sun of Water). They were the dominant beings of the prior cosmic age.","parallel_facets":["anakim-giant-warriors","nephilim-giants","rephaim-biblical-giants","titans-elder-defeated-race","jotnar-elder-defeated-race","daityas-as-defeated-older-race","danavas-as-defeated-older-race","fomorians-as-pre-divine-chaos","si-te-cah-giants"]},{"id":"quinametzin-builders-of-pyramids","parent_deity_id":"quinametzin","facet_name":"Builders of Teotihuacan and Cholula","tier_assignment":4,"function_tags":["megalithic-builders","civilization-builders"],"valence":"ambivalent","core_claim":"Aztec tradition credits the Quinametzin with building the Pyramid of Cholula (by Xelhua, a 20-foot giant) and the city of Teotihuacan. The 'giants built the megaliths' motif is widespread across giant-traditions globally.","parallel_facets":["watchers-teachers-of-forbidden-arts"]},{"id":"quinametzin-destroyed-for-sins","parent_deity_id":"quinametzin","facet_name":"Destroyed by the Gods for Their Sins","tier_assignment":4,"function_tags":["destroyed-elder-race","flood-or-cataclysm","sin-as-cause"],"valence":"negative","core_claim":"The Quinametzin were destroyed by flood, earthquake, jaguars, or hurricane (sources vary) because of their sins: aspiring to reach the gods, sins of the flesh, drunkenness, failure to venerate the gods. The structural parallel to Genesis 6 is so close that Spanish chroniclers explicitly identified the two traditions.","parallel_facets":["nephilim-flood-cause","nephilim-giants","titans-imprisoned-in-tartarus","watchers-fallen","si-te-cah-conflict-and-destruction"]},{"id":"quinametzin-bones-become-humanity","parent_deity_id":"quinametzin","facet_name":"Their Bones Become Present-Day Humanity","tier_assignment":"cross-tier","function_tags":["bones-of-elder-race","creation-of-humans-from-prior-substance"],"valence":"ambivalent","core_claim":"Ehecatl (god of wind) takes the bones of the giants from Mictlan to create present-day humanity. Today's humans owe their reduced stature to Ehecatl having dropped and broken the giants' bones. A creation-from-the-bones-of-the-prior-race motif unique to Mesoamerica but structurally analogous to the cosmos-from-Ymir / -Tiamat / -Puruṣa pattern.","parallel_facets":["ymir-primordial-cosmic-body","purusha-sacrificed-cosmic-person","yemo-sacrificed-twin"]},{"id":"xelhua-builder-of-cholula","parent_deity_id":"xelhua","facet_name":"Builder of the Great Pyramid of Cholula","tier_assignment":4,"function_tags":["megalithic-builder","founder-of-cities","20-foot-giant"],"valence":"ambivalent","core_claim":"Xelhua, a 20-foot-tall Quinametzin, builds the Pyramid of Cholula (the largest pyramid in the world by volume) and founds seven pre-Columbian cities.","parallel_facets":["nimrod-tower-of-babel","quinametzin-builders-of-pyramids"]},{"id":"tzilacatzin-historical-giant","parent_deity_id":"tzilacatzin","facet_name":"Historical 16th-Century Giant Warrior","tier_assignment":"cross-tier","function_tags":["historical-named-giant","near-contemporary-attestation"],"valence":"ambivalent","core_claim":"Per Sahagún's Florentine Codex Book 12, Tzilacatzin was an Otomi warrior from Tlatelolco who stood over 10 feet tall and held off Pedro de Alvarado's Spanish forces with rocks the size of watermelons during the siege of Tenochtitlan. Rare case of a giant tradition with a named, datable, near-contemporary individual.","parallel_facets":["goliath-philistine-giant"]},{"id":"titans-elder-defeated-race","parent_deity_id":"titans-collective","facet_name":"The Elder Defeated Race","tier_assignment":4,"function_tags":["elder-divine-race","defeated-by-younger-gods","titanomachy"],"valence":"ambivalent","core_claim":"The twelve Titans rule the world before being overthrown by the Olympians (children of Kronos) in the ten-year Titanomachy. Same structural slot as the Vedic asuras, Norse Jötnar, Irish Fomorians, biblical Nephilim/Rephaim, Aztec Quinametzin.","parallel_facets":["daityas-as-defeated-older-race","danavas-as-defeated-older-race","jotnar-elder-defeated-race","fomorians-as-pre-divine-chaos","nephilim-giants","rephaim-as-giants","quinametzin-giants-of-previous-sun"]},{"id":"titans-imprisoned-in-tartarus","parent_deity_id":"titans-collective","facet_name":"Imprisoned in Tartarus","tier_assignment":4,"function_tags":["imprisoned-in-pit","cosmic-prison","judgment-deferred"],"valence":"negative","core_claim":"After their defeat, the Titans are imprisoned in Tartarus, guarded by the Hekatonkheires. The cosmic-rebel-bound-in-pit pattern.","parallel_facets":["azazel-watcher-bound-in-desert","azazel-bound","watchers-fallen","loki-bound"]},{"id":"titans-children-of-sky-and-earth","parent_deity_id":"titans-collective","facet_name":"Children of Uranus and Gaia","tier_assignment":4,"function_tags":["sky-and-earth-parents","primordial-coupling"],"valence":"positive","core_claim":"The Titans are children of Uranus (Sky) and Gaia (Earth) — the IE sky-father / earth-mother primordial coupling.","parallel_facets":["dyeus-sky-father-root"]},{"id":"kronos-castrator-of-uranus","parent_deity_id":"kronos","facet_name":"Castrator of Uranus","tier_assignment":4,"function_tags":["son-castrates-father","succession-by-violence"],"valence":"negative","core_claim":"Kronos uses the adamantine sickle given by Gaia to castrate Uranus; from the blood and severed organ are born the Erinyes, the Giants (Gigantes), and Aphrodite (from sea-foam).","parallel_facets":[]},{"id":"kronos-devourer-of-children","parent_deity_id":"kronos","facet_name":"Devourer of His Own Children","tier_assignment":4,"function_tags":["father-devours-children","fear-of-succession-prophecy"],"valence":"negative","core_claim":"Kronos swallows each of his children at birth to prevent the prophecy of his overthrow. Tricked by Rhea who substitutes a stone for Zeus.","parallel_facets":[]},{"id":"kronos-overthrown-by-zeus","parent_deity_id":"kronos","facet_name":"Overthrown by Zeus","tier_assignment":4,"function_tags":["overthrown-by-grandson","succession-completes"],"valence":"ambivalent","core_claim":"Zeus, raised in secret, returns to free his siblings from Kronos's belly and leads them in the Titanomachy. Kronos is overthrown. The IE three-generation succession-pattern (Uranus → Kronos → Zeus).","parallel_facets":["balor-evil-eye-tyrant"]},{"id":"iapetus-father-of-prometheus","parent_deity_id":"iapetus","facet_name":"Father of the Human-Related Lineage","tier_assignment":4,"function_tags":["progenitor-of-prometheus","japheth-parallel"],"valence":"ambivalent","core_claim":"Iapetus is father of Prometheus (who creates / champions humanity), Epimetheus, Atlas, and Menoetius. The Iapetus-Japheth name parallel is old; debated but structurally suggestive.","parallel_facets":[]},{"id":"atlas-sky-bearer","parent_deity_id":"atlas","facet_name":"Bearer of the Sky","tier_assignment":4,"function_tags":["sky-bearer","punished-by-cosmic-burden"],"valence":"ambivalent","core_claim":"After the Titanomachy, Atlas is condemned to hold up the heavens forever. Structural parallel to the four Quinametzin sky-bearers and the Hindu Lokapalas.","parallel_facets":[]},{"id":"rhea-mother-of-olympians","parent_deity_id":"rhea","facet_name":"Mother of the Olympians","tier_assignment":2,"function_tags":["mother-of-gods","savior-of-Zeus"],"valence":"positive","core_claim":"Rhea bears the elder Olympians and saves Zeus from Kronos by substitution.","parallel_facets":["aditi-mother-of-devas","asherah-mother-of-gods"]},{"id":"jotnar-elder-defeated-race","parent_deity_id":"jotnar-collective","facet_name":"The Elder Race of Giants","tier_assignment":4,"function_tags":["elder-divine-race","predate-the-gods","rival-of-aesir"],"valence":"ambivalent","core_claim":"The Jötnar predate the gods (Ymir is first being); the Æsir descend partly from them; they rival the Æsir continuously and destroy the world at Ragnarök.","parallel_facets":["titans-elder-defeated-race","daityas-as-defeated-older-race","danavas-as-defeated-older-race","fomorians-as-pre-divine-chaos","nephilim-giants","quinametzin-giants-of-previous-sun"]},{"id":"jotnar-frost-giants","parent_deity_id":"jotnar-collective","facet_name":"Frost / Mountain Giants of Jötunheim","tier_assignment":4,"function_tags":["frost-giants","mountain-giants","Jotunheim"],"valence":"ambivalent","core_claim":"The Jötnar dwell in Jötunheim, the realm of giants. They are associated with frost, mountains, and the wild edges of the cultivated cosmos.","parallel_facets":[]},{"id":"jotnar-destroy-world-at-ragnarok","parent_deity_id":"jotnar-collective","facet_name":"Destroyers of the World at Ragnarök","tier_assignment":4,"function_tags":["eschatological-destroyers","fire-and-ice","end-of-cosmos"],"valence":"negative","core_claim":"At Ragnarök the Jötnar, led by Surtr, cross Bifrost and destroy the cosmos with fire. The eschatological inversion of the Titanomachy — instead of being defeated by the gods, the giants finally win at the end.","parallel_facets":["surtr-fire-giant-end-bringer"]},{"id":"ymir-primordial-cosmic-body","parent_deity_id":"ymir","facet_name":"Primordial Body Becomes the Cosmos","tier_assignment":1,"function_tags":["primordial-being","cosmos-from-body","PIE-yemo-reflex"],"valence":"transcendent","core_claim":"Ymir is first being. Killed by Odin, Vili, and Vé; flesh becomes earth, blood becomes sea, skull becomes sky, brain becomes clouds, eyebrows fence off Midgard. The Norse direct reflex of PIE *Yemo.","parallel_facets":["yemo-sacrificed-twin","purusha-sacrificed-cosmic-person","quinametzin-bones-become-humanity"]},{"id":"ymir-pie-yemo-reflex","parent_deity_id":"ymir","facet_name":"The PIE *Yemo Reflex (Linguistic Cognate)","tier_assignment":1,"function_tags":["PIE-cognate","linguistic-descent"],"valence":"transcendent","core_claim":"Old Norse Ymir descends from PIE *Yemo 'twin' — direct cognate with Vedic Yama, Avestan Yima, Latin geminus. The same PIE deity-name preserved across the IE family.","parallel_facets":["yemo-sacrificed-twin","yama-death-judge"]},{"id":"surtr-fire-giant-end-bringer","parent_deity_id":"surtr","facet_name":"Fire-Giant Who Ends the World","tier_assignment":4,"function_tags":["eschatological-figure","fire-bringer-of-end","flaming-sword"],"valence":"negative","core_claim":"Surtr leads the Jötnar across Bifrost at Ragnarök and burns the cosmos with his flaming sword. The cosmic-fire-ender. Parallel to Kalki the eschatological rider.","parallel_facets":["kalki-eschatological-rider"]},{"id":"bestla-mother-of-odin","parent_deity_id":"bestla","facet_name":"Jötunn Mother of Odin","tier_assignment":4,"function_tags":["divine-mortal-mixing","mother-of-aesir-chief"],"valence":"positive","core_claim":"Bestla, a jötunn, marries Borr and bears Odin, Vili, and Vé. The Norse Æsir are therefore half-jötunn by maternal descent.","parallel_facets":[]},{"id":"bestla-jotunn-blood-in-aesir","parent_deity_id":"bestla","facet_name":"Jötunn Blood in the Æsir Line","tier_assignment":4,"function_tags":["divine-mortal-mixing","bnei-elohim-pattern"],"valence":"ambivalent","core_claim":"The fact that the chief Norse god has a jötunn mother — and that Loki, who has jötunn parentage, lives among the Æsir — makes the divine-jötunn boundary porous. Structurally similar to the bnei-elohim / daughters-of-men interbreeding of Gen 6, with opposite valence (in Norse it is the norm, not the cataclysm).","parallel_facets":["nephilim-giants","watchers-fallen"]},{"id":"thrym-stealer-of-mjolnir","parent_deity_id":"thrym","facet_name":"Stealer of Thor's Hammer","tier_assignment":4,"function_tags":["theft-of-divine-weapon","demands-goddess-as-bride"],"valence":"negative","core_claim":"Thrym hides Mjölnir eight miles underground and demands Freyja as bride; Thor disguises himself as Freyja and recovers the hammer, killing Thrym.","parallel_facets":[]},{"id":"skadi-jotunn-becomes-aesir","parent_deity_id":"skadi","facet_name":"Jötunn Who Marries into the Æsir","tier_assignment":4,"function_tags":["divine-mortal-mixing","jotunn-becomes-aesir"],"valence":"positive","core_claim":"Skadi, daughter of the jötunn Þjazi, marries Njörðr after her father's death — formalizing alliance between Æsir and jötnar.","parallel_facets":["bestla-jotunn-blood-in-aesir"]},{"id":"kalki-eschatological-rider","parent_deity_id":"kalki","facet_name":"Eschatological Horseman at the End of the Kali Yuga","tier_assignment":"cross-tier","function_tags":["eschatological","end-of-age-warrior","white-horse-rider"],"valence":"positive","core_claim":"Kalki, the tenth avatar of Vishnu, will appear at the end of the Kali Yuga on a white horse, with a flaming sword, to destroy the wicked and inaugurate a new age. Direct parallel to the Christian Parousia (Rev 19's rider on the white horse) and to Surtr in Norse Ragnarök.","parallel_facets":["surtr-fire-giant-end-bringer","christ-second-coming"]},{"id":"adi-buddha-primordial","parent_deity_id":"adi-buddha","facet_name":"Primordial Buddha (Unmanifest Source)","tier_assignment":1,"function_tags":["unmanifest-source","primordial","awakened-nature"],"valence":"transcendent","core_claim":"The Adi-Buddha is the eternal awakened nature before any specific manifestation — Vajrayana Tier-1 equivalent of unmanifest Source.","parallel_facets":["monad-unmanifest","tao-unnamable-source","olodumare-supreme-being","idjair-milky-way-father"]},{"id":"adi-buddha-dharmakaya-identity","parent_deity_id":"adi-buddha","facet_name":"Identity with Dharmakaya","tier_assignment":1,"function_tags":["identity-with-truth-body","shunyata"],"valence":"transcendent","core_claim":"Adi-Buddha and Dharmakaya are two names for the same ultimate awakened reality.","parallel_facets":["dharmakaya-truth-body"]},{"id":"dharmakaya-truth-body","parent_deity_id":"dharmakaya","facet_name":"Truth-Body / Ultimate Reality","tier_assignment":1,"function_tags":["truth-body","ultimate-reality","shunyata","formless"],"valence":"transcendent","core_claim":"The Dharmakaya is Buddhahood as ultimate reality — formless, the suchness of all phenomena.","parallel_facets":["monad-unmanifest","tao-unnamable-source"]},{"id":"sambhogakaya-five-tathagatas","parent_deity_id":"sambhogakaya-buddhas","facet_name":"The Five Tathagatas","tier_assignment":2,"function_tags":["archetypal-buddhas","five-fold","directional"],"valence":"positive","core_claim":"Vairocana (center), Akshobhya (east), Ratnasambhava (south), Amitabha (west), Amoghasiddhi (north). Each presides over a Buddha-field and wisdom-aspect.","parallel_facets":["amesha-spentas-divine-council","el-divine-council-head","orishas-collective-emanations"]},{"id":"avalokiteshvara-compassion","parent_deity_id":"avalokiteshvara","facet_name":"Bodhisattva of Infinite Compassion","tier_assignment":2,"function_tags":["bodhisattva","compassion","savior"],"valence":"positive","core_claim":"Avalokiteshvara hears the cries of all suffering beings and responds with unceasing compassion.","parallel_facets":["christ-cosmic","yemoja-mother-of-orishas"]},{"id":"avalokiteshvara-guanyin-feminine","parent_deity_id":"avalokiteshvara","facet_name":"Guanyin — Feminized Form","tier_assignment":2,"function_tags":["transformation-of-deity-gender"],"valence":"positive","core_claim":"Over centuries in China, Avalokiteshvara was reimagined as feminine — Guanyin. Same compassionate function in feminine form.","parallel_facets":["yemoja-mother-of-orishas","asherah-mother-of-gods","inanna-queen-of-heaven"]},{"id":"maitreya-future-buddha-coming","parent_deity_id":"maitreya-future-buddha","facet_name":"The Future Buddha","tier_assignment":"cross-tier","function_tags":["future-buddha","returning-savior","eschatological"],"valence":"positive","core_claim":"Maitreya waits in Tushita heaven. Will descend when present Dharma is forgotten. Buddhist returning-savior.","parallel_facets":["kalki-returning-savior","kalki-eschatological-rider","christ-second-coming","saoshyant-final-savior","viracocha-prophesied-return","quetzalcoatl-prophet-returning"]},{"id":"mara-tempter","parent_deity_id":"mara","facet_name":"The Tempter Who Opposes Awakening","tier_assignment":3,"function_tags":["tempter","adversary-of-savior"],"valence":"negative","core_claim":"Mara tempted the Buddha under the Bodhi tree. The cosmic principle that opposes liberation.","parallel_facets":["tezcatlipoca-adversary","ahriman-hostile-spirit","yaldabaoth-usurper"]},{"id":"mara-lord-of-desire-realm","parent_deity_id":"mara","facet_name":"Lord of the Desire-Realm","tier_assignment":3,"function_tags":["ruler-of-realm","keeps-beings-bound"],"valence":"negative","core_claim":"Mara rules the highest heaven of the desire-realm. His interest is keeping beings bound to samsara.","parallel_facets":["yaldabaoth-demiurge","yaldabaoth-usurper"]},{"id":"mara-as-archon","parent_deity_id":"mara","facet_name":"Mara as Archonic Figure","tier_assignment":3,"function_tags":["archon","structural-parallel-to-demiurge"],"valence":"negative","core_claim":"Mara structurally occupies the same position as Yaldabaoth: ruler of a realm preventing transcendence.","parallel_facets":["yaldabaoth-demiurge","yaldabaoth-usurper","ahriman-hostile-spirit"]},{"id":"padmasambhava-tantric-master","parent_deity_id":"padmasambhava","facet_name":"Tantric Master of Tibet","tier_assignment":"cross-tier","function_tags":["lotus-born","tantric-master","second-buddha"],"valence":"positive","core_claim":"Padmasambhava brought Vajrayana to Tibet, bound local demons to protect Dharma, concealed terma for future discovery.","parallel_facets":["hermes-trismegistus-wisdom-teacher","laozi-divinized-emanation"]},{"id":"ahura-mazda-wise-lord","parent_deity_id":"ahura-mazda","facet_name":"The Wise Lord","tier_assignment":2,"function_tags":["supreme-good","creator","source-of-asha","uncreated"],"valence":"positive","core_claim":"Ahura Mazda is the supreme good — uncreated, all-wise. First deity explicitly framed as all-good cosmic sovereign.","parallel_facets":["el-elyon-council-head","el-divine-council-head","yahweh-creator","olodumare-supreme-being","vishnu-cosmic-preserver"]},{"id":"ahura-mazda-source-of-asha","parent_deity_id":"ahura-mazda","facet_name":"Source of Asha (Cosmic Truth)","tier_assignment":2,"function_tags":["cosmic-order","truth-principle"],"valence":"positive","core_claim":"Asha is cosmic truth, order, righteousness. Conceptual parallel of rta, ma'at, tao, logos.","parallel_facets":["rta-cosmic-order","varuna-cosmic-order"]},{"id":"ahura-mazda-cosmic-warrior","parent_deity_id":"ahura-mazda","facet_name":"Engaged in 12,000-Year Cosmic War","tier_assignment":2,"function_tags":["cosmic-warrior","dualistic-conflict"],"valence":"positive","core_claim":"Zoroastrian cosmic history is a 12,000-year war between Mazda and Ahriman. First developed cosmic-dualism narrative.","parallel_facets":[]},{"id":"ahriman-hostile-spirit","parent_deity_id":"ahriman","facet_name":"The Hostile Spirit","tier_assignment":3,"function_tags":["adversary","uncreated-evil","cosmic-opponent"],"valence":"negative","core_claim":"Angra Mainyu is the uncreated source of evil and the lie. Clearest direct ancestor of Satan as cosmic adversary in Christian theology.","parallel_facets":["yaldabaoth-usurper","tezcatlipoca-adversary","mara-tempter","set-usurper-murderer"]},{"id":"ahriman-source-of-lie","parent_deity_id":"ahriman","facet_name":"Source of Druj","tier_assignment":3,"function_tags":["source-of-disorder","lie-personified"],"valence":"negative","core_claim":"Druj — the Lie — is opposite of asha. Ahriman is source of every disordering force: disease, decay, deception.","parallel_facets":[]},{"id":"ahriman-eschatological-loser","parent_deity_id":"ahriman","facet_name":"Defeated at the Frashegird","tier_assignment":3,"function_tags":["eschatologically-defeated"],"valence":"negative","core_claim":"Despite power in present age, Ahriman is doomed. Zoroastrianism does not propose two eternal principles.","parallel_facets":["saoshyant-final-savior"]},{"id":"amesha-spentas-divine-council","parent_deity_id":"amesha-spentas","facet_name":"The Six Bountiful Immortals","tier_assignment":2,"function_tags":["divine-council","seven-fold-emanations"],"valence":"positive","core_claim":"Six divine emanations of Ahura Mazda. Probable origin of the seven-fold pattern in late antique angelology.","parallel_facets":["el-divine-council-head","sambhogakaya-five-tathagatas","orishas-collective-emanations"]},{"id":"saoshyant-final-savior","parent_deity_id":"saoshyant","facet_name":"The Final World-Savior","tier_assignment":"cross-tier","function_tags":["world-savior","raises-the-dead","eschatological"],"valence":"positive","core_claim":"Saoshyant performs the Frashegird: raises the dead, defeats Ahriman. Earliest fully-developed eschatological savior — probable source of Jewish messianism and Christian eschatology.","parallel_facets":["christ-second-coming","kalki-returning-savior","kalki-eschatological-rider","maitreya-future-buddha-coming","viracocha-prophesied-return","quetzalcoatl-prophet-returning"]},{"id":"yima-golden-age-king","parent_deity_id":"yima-first-king","facet_name":"First King of the Golden Age","tier_assignment":"cross-tier","function_tags":["first-king","golden-age-ruler","PIE-yemo-iranian-fork"],"valence":"ambivalent-positive","core_claim":"Yima ruled the golden age — 1,000 years without death. Iranian fork of PIE *Yemo: where Vedic Yama becomes death-god, Yima remains golden-age king.","parallel_facets":["ymir-pie-yemo-reflex","yemo-sacrificed-twin","yemo-first-king-of-the-dead","yama-first-mortal"]},{"id":"yima-vara-builder","parent_deity_id":"yima-first-king","facet_name":"Builder of the Vara","tier_assignment":"cross-tier","function_tags":["preserves-seeds-of-life","noah-parallel"],"valence":"positive","core_claim":"Vendidad 2: Ahura Mazda warns Yima of a devastating winter; he builds the vara — enclosed refuge with seeds of every living kind. Iranian parallel of Noah's Ark.","parallel_facets":[]},{"id":"yima-pie-yemo-iranian","parent_deity_id":"yima-first-king","facet_name":"PIE *Yemo Reflex","tier_assignment":1,"function_tags":["PIE-cognate","linguistic-descent"],"valence":"transcendent","core_claim":"Avestan Yima descends from PIE *Yemo 'twin' — direct cognate with Old Norse Ymir, Vedic Yama.","parallel_facets":["ymir-pie-yemo-reflex","yemo-sacrificed-twin","yama-first-mortal"]},{"id":"zurvan-boundless-time","parent_deity_id":"zurvan-time","facet_name":"Boundless Time as Source","tier_assignment":1,"function_tags":["time-as-source","transcends-dualism"],"valence":"transcendent","core_claim":"Zurvan Akarana is prior to both Mazda and Ahriman. Resolves dualist problem by positing one source from which both twins emerge.","parallel_facets":["monad-unmanifest","tao-unnamable-source","kali-time-itself"]},{"id":"zurvan-parent-of-twins","parent_deity_id":"zurvan-time","facet_name":"Parent of the Twin Spirits","tier_assignment":1,"function_tags":["parent-of-good-and-evil","monistic-resolution"],"valence":"transcendent","core_claim":"Zurvan sacrificed 1,000 years for a son; in doubt conceived twins. Ahriman emerged first; Zurvan gave him kingship for 9,000 years.","parallel_facets":[]},{"id":"daevas-zoroastrian-demons","parent_deity_id":"daevas-zoroastrian","facet_name":"Demons Aligned with Ahriman","tier_assignment":4,"function_tags":["demons","counter-emanations"],"valence":"negative","core_claim":"Daevas counter the Amesha Spentas. Indra (the Vedic god!) is named as a daeva in Vendidad 10.","parallel_facets":["watchers-fallen","watchers-teachers-of-forbidden-arts"]},{"id":"daevas-vedic-deva-inversion","parent_deity_id":"daevas-zoroastrian","facet_name":"The Vedic-Iranian Religious Inversion","tier_assignment":4,"function_tags":["linguistic-inversion","religious-polemic","indo-iranian-schism"],"valence":"ambivalent","core_claim":"Vedic devas (gods) and asuras (later demons) appear in Iranian as daevas (demons) and ahuras (gods) — near-perfect inversion. The linguistic fingerprint of the Indo-Iranian schism.","parallel_facets":["indra-storm-king","indra-demoted-archon"]},{"id":"mithra-iranian-mediator","parent_deity_id":"mithra-iranian","facet_name":"Mediator Between Mazda and Humanity","tier_assignment":"cross-tier","function_tags":["mediator","solar","contract-keeper"],"valence":"positive","core_claim":"Mithra has 10,000 eyes and 10,000 ears. Mediat ainst cosmic order"],"canonical":true,"user_drawn":false},{"id":"p008","facet_a_id":"shiva-teacher","facet_b_id":"hermes-trismegistus-wisdom-teacher","strength":"strong-parallel","type":"archetypal-silent-wisdom-teacher","basis":["Both transmit highest wisdom","Both are associated with silence and direct understanding","Both are gurus to aged sages","Both bridge tiers (cross-tier teachers)"],"canonical":true,"user_drawn":false},{"id":"p101","facet_a_id":"dyeus-sky-father-root","facet_b_id":"zeus-sky-father","strength":"derivation","type":"linguistic-and-religious-descent","basis":["Greek Zeus Pater is the direct phonological reflex of PIE *Dyḗus Ph₂tḗr","Sky-father function is preserved unchanged","Both preside over a divine council","Both wield the thunderbolt (function inherited via storm-god overlay)"],"source_tradition":"Comparative Indo-European linguistics","primary_text_evidence":["Hesiod, Theogony (Zeus as sky-father)","Mycenaean Linear B di-we (dative of Zeus, c. 1400 BCE)","Reconstructed PIE form via Vedic Dyaus Pita, Latin Iūpiter, Norse Týr"],"scholarly_caveat":"The linguistic descent is consensus among Indo-Europeanists. Whether the full religious-functional descent is equally secure is debated for individual features.","canonical":true,"user_drawn":false},{"id":"p102","facet_a_id":"dyeus-sky-father-root","facet_b_id":"el-elyon-council-head","strength":"partial-parallel","type":"structural-parallel-non-genetic","basis":["Both are sky-father / council-head of a divine pantheon","Both are addressed as 'Father' of the council","El and *Dyḗus Ph₂tḗr are NOT linguistically cognate — Semitic vs. Indo-European","The functional parallel is structural, not genetic"],"source_tradition":"Comparative religion / cross-family parallel","primary_text_evidence":["Ugaritic Baal Cycle (El as council head)","Reconstructed PIE *Dyḗus Ph₂tḗr (sky-father)"],"scholarly_caveat":"Important not to confuse structural parallel with genetic descent. Semitic El and IE *Dyḗus Ph₂tḗr ing (Day of Judgment / Ragnarök)","Both are associated with crafty/intelligent rebellion against the divine order","Both have a substance dripped on them in some traditions (serpent venom on Loki; mythological elaborations on Azazel)"],"source_tradition":"Comparative myth","canonical":true,"user_drawn":false},{"id":"p120","facet_a_id":"nephilim-giants","facet_b_id":"tezcatlipoca-adversary","strength":"partial-parallel","type":"pre-current-age-corruption","basis":["Both populate or define a previous world-age that ends in catastrophe","In Aztec cosmology, previous suns were destroyed when their populations grew corrupt","In Enochic tradition, the Nephilim's corruption ends the pre-Flood world","The 'previous corrupt age destroyed by reset' motif"],"source_tradition":"Comparative cosmology","scholarly_caveat":"The parallel is at the level of cosmic-cycle structure, not specific narrative.","canonical":true,"user_drawn":false},{"id":"p121","facet_a_id":"enoch-becoming-metatron","facet_b_id":"el-elyon-council-head","strength":"partial-parallel","type":"elevated-intermediary","basis":["Metatron is called 'lesser YHWH' and sits at God's right hand","El Elyon's council includes 'sons of God' (bene elohim)","Metatron represents the limit-case elevation of a created being into the divine council","Parallels with Christology — the human-divine intermediary"],"source_tradition":"Jewish mysticism (Merkavah / Hekhalot)","scholarly_caveat":"Metatron's status was controversial in rabbinic Judaism; the parallel is structural, not endorsed by mainstream tradition.","canonical":true,"user_drawn":false},{"id":"p122","facet_a_id":"nephilim-giants","facet_b_id":"trito-dragon-slayer-hero","strength":"contrast","type":"giant-vs-giant-slayer","basis":["Trito and his daughter-traditions (Heracles, Thor) slay the giant/monster","The Nephilim are the giants who must be slain — or who must be drowned","Across IE and Near Eastern traditions, the pre-current-age giants (Titans, Jotnar, Daityas, c structure of cosmic mothers"],"source_tradition":"Vedic / Puranic","canonical":true,"user_drawn":false},{"id":"p203","facet_a_id":"aditi-mother-of-devas","facet_b_id":"asherah-mother-of-gods","strength":"strong-parallel","type":"mother-of-divine-council","basis":["Both bear the divine council (Ādityas / sons of El)","Both are consorts of the council-head (Kashyapa-as-prajapati / El)","Both are mothers-of-the-bright-gods, with countable son-lists"],"source_tradition":"Comparative IE / West Semitic","canonical":true,"user_drawn":false},{"id":"p204","facet_a_id":"kashyapa-progenitor","facet_b_id":"el-creator-of-creatures","strength":"strong-parallel","type":"withdrawn-progenitor-father","basis":["Both are progenitor-fathers of contending divine lineages","Both are withdrawn from active combat (younger gods do the fighting)","Both grant kingship / dynastic legitimacy"],"source_tradition":"Comparative IE / West Semitic","canonical":true,"user_drawn":false},{"id":"p205","facet_a_id":"vritra-cosmic-serpent","facet_b_id":"yam-sea-chaos","strength":"strong-parallel","type":"cosmic-serpent-chaos","basis":["Both are primordial water-chaos serpent-figures","Both are slain by a storm-god (Indra / Baal) to establish cosmic order","Both are 'the encloser / withholder' against the life-giving rain-god","Calvert Watkins, How to Kill a Dragon (1995), establishes the formula *gʷhen- 'slay' + ogʷhi- 'serpent' across the IE family and into West Semitic borrowings"],"source_tradition":"Comparative IE / West Semitic","canonical":true,"user_drawn":false},{"id":"p206","facet_a_id":"vritra-cosmic-serpent","facet_b_id":"balor-evil-eye-tyrant","strength":"partial-parallel","type":"chaos-tyrant-slain-by-hero","basis":["Both are pre-cultivated-order chaos powers slain by the bright-god hero","Both produce cosmic abundance upon their death (Vṛtra: the waters; Balor: end of Fomorian tyranny)"],"source_tradition":"Comparative IE","canonical":true,"user_drawn":false},{"id":"p207","facet_a_id":"baa :["Egyptian Iy-ʿanaq (Execration Texts, 19th–18th c. BCE) preserves the ʿayin consonant matching Hebrew ʿănāq","Geography matches: both denote enemies in southern Canaan / Hebron region","Three rulers with Semitic names in the Egyptian texts mirror the three sons of Anak (Sheshai, Ahiman, Talmai) at Hebron","W.F. Albright, Journal of the Palestine Oriental Society 8 (1928); G. Mazar (1949)"],"source_tradition":"Albright / Mazar scholarly consensus","scholarly_caveat":"The identification is widely accepted but not universal. Encyclopedia.com notes the three Hebrew sons-of-Anak names (Ahiman, Sheshai, Talmai) are Hurrian rather than Semitic in their affinities, complicating a direct equation.","canonical":true,"user_drawn":false},{"id":"p215","facet_a_id":"og-king-of-bashan","facet_b_id":"rephaim-of-bashan","strength":"identity","type":"single-religious-complex-three-angles","basis":["Ugaritic rpum cult is centered on Bashan / Mt Hermon","Biblical Og is 'king of Bashan' and 'last of the Rephaim'","1 Enoch 6 places the Watchers' descent on Mt Hermon","Three traditions independently locate giant / divine-rebel / ancestral-warrior cult in the same geography"],"source_tradition":"Cross-tradition geographic convergence","canonical":true,"user_drawn":false},{"id":"p216","facet_a_id":"og-last-of-rephaim","facet_b_id":"watchers-fallen","strength":"strong-parallel","type":"talmudic-genealogical-link","basis":["Talmud Niddah 61a explicitly makes Og the grandson of Shemhazai the fallen Watcher","Connects the post-flood Rephaim-line directly to the pre-flood Watcher-line"],"source_tradition":"Rabbinic / Talmudic","canonical":true,"user_drawn":false},{"id":"p217","facet_a_id":"rpum-as-deified-dead","facet_b_id":"rephaim-as-shades-of-sheol","strength":"derivation","type":"shared-linguistic-and-religious-complex","basis":["Same root word rpʾ in both languages","Same dual register: giants AND shades-of-dead","Hebrew inherits the polysemy directly from West Semitic substrate"],"source_tradition":"West Semitic linguistic continuity","canonical":true,"user_drawn":false},{"id":"p218","facet_a_id":"baal-dies-and-rises","facet_b_id":"christ-resurrection","strength":"strong-parallel","type":"dying-and-rising-god","basis":["Both die, descend, and return","Both are associated with seasonal/cosmic renewal","Baal cycle structurally precedes Christ by 1000+ years and was geographically continuous with Iron Age Israel","Frazer, Smith, Mettinger on dying-and-rising gods"],"source_tradition":"Comparative West Semitic / Christian","scholarly_caveat":"Mettinger (2001) defends the dying-and-rising-god category for Baal, Adonis, and Osiris; Tryggve Mettinger argues these are genuine antecedents to the Christian pattern, while other scholars (Smith, Frazer-critics) have argued the category is overdrawn. The geographic and chronological continuity between Baal religion and Israelite religion is uncontested.","canonical":true,"user_drawn":false},{"id":"p219","facet_a_id":"baal-dies-and-rises","facet_b_id":"persephone-descent","strength":"strong-parallel","type":"seasonal-descent-and-return","basis":["Both die/descend in summer drought / winter; both return for the rains/spring","Both have a sister/lover figure (Anat / Demeter) whose grief drives the cosmic search"],"source_tradition":"Comparative Mediterranean","canonical":true,"user_drawn":false},{"id":"p220","facet_a_id":"el-divine-council-head","facet_b_id":"el-elyon-council-head","strength":"identity","type":"linguistic-and-religious-identity","basis":["Same divine name (ʾIlu / El)","Same divine-council role","Same allotting-the-nations function (Ugaritic Baal Cycle parallels Deut 32:8-9)","Mark S. Smith, The Origins of Biblical Monotheism (2001); F.M. Cross, Canaanite Myth and Hebrew Epic"],"source_tradition":"Cross / Smith scholarly consensus","canonical":true,"user_drawn":false},{"id":"p221","facet_a_id":"purusha-sacrificed-cosmic-person","facet_b_id":"yemo-sacrificed-twin","strength":"derivation","type":"PIE
