esha-spentas-divine-council","strength":"strong-parallel","type":"emanations-of-supreme","basis":["Both are emanations through which the supreme reaches the world","Yoruba Orishas and Zoroastrian Amesha Spentas occupy structurally parallel positions","Withdrawn-supreme + active-emanations pattern"],"source_tradition":"Comparative emanationist theology","canonical":true,"user_drawn":false},{"id":"p444","facet_a_id":"orishas-collective-emanations","facet_b_id":"el-divine-council-head","strength":"strong-parallel","type":"divine-council-cross-cultural","basis":["Both are councils of divine beings around a supreme","Both number around 70+ to 400+","Both pattern: supreme + delegated emanations"],"source_tradition":"Comparative religion","canonical":true,"user_drawn":false},{"id":"p445","facet_a_id":"three-pure-ones-triad","facet_b_id":"vishnu-cosmic-preserver","strength":"strong-parallel","type":"divine-triad-cross-cultural","basis":["Both are highest-tier divine triads in their respective traditions","Three Pure Ones in Taoism; Trimurti (Brahma/Vishnu/Shiva) in Hinduism","Convergent triadic theology"],"source_tradition":"Comparative East Asian / South Asian religion","canonical":true,"user_drawn":false},{"id":"p446","facet_a_id":"isis-stella-maris","facet_b_id":"avalokiteshvara-guanyin-feminine","strength":"strong-parallel","type":"feminized-compassion-archetype","basis":["Both are universal compassionate mother-figures","Isis's iconography was absorbed by Marian devotion","Avalokiteshvara was feminized as Guanyin","Convergent feminine-compassion archetype across late antique Mediterranean and East Asian traditions"],"source_tradition":"Comparative mother-goddess studies","canonical":true,"user_drawn":false},{"id":"p447","facet_a_id":"yemoja-mother-of-orishas","facet_b_id":"asherah-mother-of-gods","strength":"strong-parallel","type":"mother-of-gods-cross-cultural","basis":["Both are mothers of the divine emanations","Both are venerated as great mothers","Convergent archetype"],"source_tradition":"Comparative mother-goddess typology","canonical":true,"user_drawn":false},{"id":"p448","facet_a_id":"pachamama-earth-mother","facet_b_id":"mokosh-earth-mother-spinner","strength":"strong-parallel","type":"earth-mother-convergent","basis":["Both are earth-mothers continuously venerated through Christian-era syncretism (Pachamama with Marian devotion; Mokosh with St. Paraskeva)","Both centered on moist earth, fertility, women's work","Convergent archetype"],"source_tradition":"Comparative earth-mother studies","canonical":true,"user_drawn":false},{"id":"p449","facet_a_id":"osiris-lord-of-dead","facet_b_id":"yama-death-judge","strength":"strong-parallel","type":"judge-of-the-dead-cross-cultural","basis":["Both judge the dead in the post-mortem realm","Both keep ledgers of deeds","Both became models for the just deceased","Convergent archetype across Egyptian and Indic traditions"],"source_tradition":"Comparative afterlife religion","canonical":true,"user_drawn":false},{"id":"p450","facet_a_id":"hel-underworld-queen","facet_b_id":"persephone-queen-of-underworld","strength":"partial-parallel","type":"underworld-queen","basis":["Both feminine rulers of the underworld","Hel is half-alive-half-dead; Persephone is split between worlds","Both keep souls until release"],"source_tradition":"Comparative mythology","canonical":true,"user_drawn":false},{"id":"p451","facet_a_id":"anu-sky-father","facet_b_id":"dyeus-sky-father-root","strength":"strong-parallel","type":"sky-father-cross-family","basis":["Both are sky-father high gods","Sumerian Anu and PIE *Dyeus are NOT linguistically cognate (Sumerian is a language isolate; PIE is Indo-European)","Structural parallel, not genetic","Sky-father archetype recurs across language families"],"source_tradition":"Comparative religion","canonical":true,"user_drawn":false,"scholarly_caveat":"Important to distinguish structural parallel from genetic descent. Both occupy the sky-father slot; the names are from unrelated language families."},{"id":"p452","facet_a_id":"svarog-sky-father-smith","facet_b_id":"dyeus-sky-father-root","strength":"strong-parallel","type":"sky-father-slavic","basis":["Slavic Svarog likely preserves the sky-father function","Though medieval translators identified him with Hephaestus, his position points to a Dyeus-Phater equivalent","Comparative IE method supports the identification"],"source_tradition":"Comparative Indo-European religion","canonical":true,"user_drawn":false},{"id":"p453","facet_a_id":"tyr-pie-dyeus-linguistic","facet_b_id":"dyeus-sky-father-root","strength":"derivation","type":"PIE-direct-linguistic-descent","basis":["Old Norse Týr (Proto-Germanic *Tīwaz) is DIRECT phonological reflex of PIE *Dyeus","But function has shifted — sky-father role transferred to Odin/Thor","Týr preserves the NAME with reduced function"],"source_tradition":"Comparative Indo-European linguistics","canonical":true,"user_drawn":false},{"id":"p454","facet_a_id":"tane-separator-of-sky-and-earth","facet_b_id":"pangu-separator-of-sky-and-earth","strength":"strong-parallel","type":"convergent-separator-of-sky-and-earth","basis":["Both force apart primordial sky-father and earth-mother to let light into the world","Polynesian Tāne and Chinese Pangu — no plausible historical connection","Convergent archetype"],"source_tradition":"Comparative cosmogony","canonical":true,"user_drawn":false},{"id":"p455","facet_a_id":"rangi-papa-primordial-couple","facet_b_id":"titans-children-of-sky-and-earth","strength":"strong-parallel","type":"sky-and-earth-have-divine-children","basis":["Both Polynesian Rangi/Papa and Greek Uranus/Gaia have children who eventually overthrow the primordial state","Convergent archetype — sky-father + earth-mother + their suppressed children"],"source_tradition":"Comparative cosmogony","canonical":true,"user_drawn":false},{"id":"p456","facet_a_id":"supay-conflated-with-devil","facet_b_id":"veles-underworld-cattle-poetry","strength":"partial-parallel","type":"ambivalent-power-demonized","basis":["Both were originally ambivalent underworld/ancestor powers","Both were demonized through Christian missionary contact","Andean and Slavic traditions preserve fragments of the original ambivalence beneath Christian re-framings"],"source_tradition":"Comparative religious-encounter studies","canonical":true,"user_drawn":false},{"id":"p457","facet_a_id":"mara-as-archon","facet_b_id":"ahriman-hostile-spirit","strength":"strong-parallel","type":"cosmic-adversary-cross-tradition","basis":["Both are cosmic adversaries who oppose liberation/cosmic order","Buddhist Mara and Zoroastrian Ahriman occupy structurally parallel positions","Both keep beings bound in their respective adversarial realms"],"source_tradition":"Comparative cosmic-adversary typology","canonical":true,"user_drawn":false},{"id":"p458","facet_a_id":"tyr-law-and-assembly","facet_b_id":"mitra-contract","strength":"strong-parallel","type":"contract-deity-IE","basis":["Both Indo-European contract/oath deities","Týr presides over þing (assembly); Mitra is contract personified","Both have sacrificial / binding aspects (Týr loses hand; Mitra is bound to truth)"],"source_tradition":"Comparative Indo-European religion","canonical":true,"user_drawn":false},{"id":"p459","facet_a_id":"isis-stella-maris","facet_b_id":"inanna-queen-of-heaven","strength":"strong-parallel","type":"queen-of-heaven-cross-cultural","basis":["Both 'Queen of Heaven' figures","Both have iconography that influenced later Marian devotion","Inanna → Ishtar → Astarte → continuous Levantine 'Queen of Heaven' tradition","Isis cult spread across Roman empire as universal mother"],"source_tradition":"Comparative mother-goddess studies","canonical":true,"user_drawn":false},{"id":"p460","facet_a_id":"apep-attacks-the-sun","facet_b_id":"jormungandr-kills-thor-at-ragnarok","strength":"partial-parallel","type":"cosmic-serpent-vs-defender","basis":["Both involve cosmic serpent threatening cosmic order","Egyptian Apep attacks Ra nightly; Norse Jörmungandr kills Thor at Ragnarök","Daily-cosmic-combat (Egyptian) vs end-of-time-cosmic-combat (Norse) — different temporal scales, same archetype"],"source_tradition":"Comparative cosmic-serpent typology","canonical":true,"user_drawn":false}],"cosmological_frameworks":[{"id":"yuga-cycle","name":"The Yuga Cycle (Hindu Cosmic Ages)","tradition_id":"hindu","type":"cosmological-framework","summary":"Hindu cosmology divides each great cycle (mahayuga) into four ages: Satya Yuga (golden age, dharma at 100%), Treta Yuga (dharma at 75%), Dvapara Yuga (dharma at 50%), and Kali Yuga (the present age, dharma at 25%). At the end of the Kali Yuga, Kalki appears, the world is destroyed, and a new Satya Yuga begins. The cycles nest: 1000 mahayugas = 1 kalpa (a day of Brahma).","stages":[{"name":"Satya Yuga (Krita Yuga)","duration_years_traditional":1728000,"dharma_percent":100,"character":"Golden age. Truth, virtue, longevity. Beings live thousands of years. No need for laws — dharma is innate.","cross_tradition_parallels":["Hesiod's Golden Age","Eden before the Fall","Zoroastrian Frashegird (final restoration, future-rather-than-past)","Aztec previous suns (golden age of Quetzalcoatl)"]},{"name":"Treta Yuga","duration_years_traditional":1296000,"dharma_percent":75,"character":"Silver age. Sacrificial religion develops. Heroic age. The Ramayana is set here.","cross_tradition_parallels":["Hesiod's Silver / Heroic Ages"]},{"name":"Dvapara Yuga","duration_years_traditional":864000,"dharma_percent":50,"character":"Bronze age. Decline of virtue. The Mahabharata is set at its end. Krishna's life closes this yuga.","cross_tradition_parallels":["Hesiod's Bronze Age"]},{"name":"Kali Yuga","duration_years_traditional":432000,"dharma_percent":25,"character":"The current age, traditionally begun in 3102 BCE (Krishna's departure). Spiritual darkness, materialism, short lives, moral decline. Ends with Kalki's appearance and cosmic reset.","cross_tradition_parallels":["Hesiod's Iron Age","Christian 'end times'","Aztec fifth sun (current age, ending in earthquakes)","Norse age leading to Ragnarök"]}],"scholarly_note":"Traditional yuga lengths come from the Manusmriti and Puranas; Sri Yukteswar in 'The Holy Science' (1894) proposed a much shorter alternative cycle of 24,000 years. The traditional lengths are symbolic-cosmological; the shorter cycle attempts a historical correlation. Both are present in modern Hindu thought.","structural_role":"The yuga cycle is the Hindu cosmological framework for what other traditions express through linear apocalyptic time (Christian, Zoroastrian) or through repeating cosmic resets (Aztec suns, Stoic ekpyrosis). All three address the same question: how does the current degraded condition relate to a remembered or anticipated uncorrupted state?"},{"id":"origins-of-evil","name":"Origins of Evil — Gen 6:1-4 Reception History","summary":"A reception-history framework for the Second Temple Jewish, early Christian, Gnostic, and Manichaean tradition that grounds the existence of evil in the rebellion of the Watchers / sons of God and the resulting hybrid race of giants. Tracks how the cryptic Genesis 6:1-4 passage was developed across two millennia into a full cosmological account of why the world is broken.","primary_sources":["Genesis 6:1-4 (the seed text)","1 Enoch 1–36 (Book of the Watchers; chapters 6–11 the core)","Jubilees 5","Dead Sea Scrolls — esp. Book of Giants (4Q203, 4Q530–533)","Wisdom of Solomon 14:6","2 Peter 2:4, Jude 6 (NT reception)","Manichaean Kephalaia 92","Nag Hammadi: On the Origin of the World; Apocryphon of John","Talmud Niddah 61a (Og as grandson of Shemhazai)","Archie T. Wright, The Origin of Evil Spirits (Fortress Press, rev. ed.)","Annette Yoshiko Reed, Fallen Angels and the History of Judaism and Christianity (Cambridge, 2005)","Joseph Lumpkin, Fallen Angels, the Watchers, and the Origins of Evil (popular synthesis)","G.A.G. Stroumsa, Another Seed: Studies in Gnostic Mythology (Leiden, 1984)"],"core_narrative_strands":[{"strand":"Shemhazai cycle","summary":"200 angels under Shemhazai descend on Mt Hermon, take human wives, beget giants (Nephilim) who consume creation."},{"strand":"Asael / Azazel cycle","summary":"Asael (later Azazel) descends and teaches forbidden arts — metallurgy/weapons to men, cosmetics/sorcery to women — corrupting humanity through technology rather than (or in addition to) interbreeding."},{"strand":"Giants devour creation","summary":"The Nephilim consume crops, then animals, then men, then each other. Their spirits, after their bodies die in the flood, become the demons of the present age (1 Enoch 15) — the standard Second Temple explanation of demon-possession."},{"strand":"Flood and binding","summary":"God commands the loyal angels to warn Noah, destroy the giants, and bind the Watchers in the earth until the final judgment."},{"strand":"Survival through the post-flood giants","summary":"The Nephilim line survives (Numbers 13:33) into the post-flood giant complex — Rephaim, Anakim, Emim, Zamzummim, Og of Bashan, Goliath. The cosmic rebellion has a continuous historical body."},{"strand":"Gnostic re-reading","summary":"In Gnostic literature (Apocryphon of John, On the Origin of the World) the Watchers become Yaldabaoth's archonic enforcers — the Demiurge's seven planetary rulers — and their forbidden teachings are the chains of material captivity."},{"strand":"Manichaean adaptation","summary":"Manichaeism keeps the Watcher-teaching motif: the Watchers reveal heavenly mysteries to humanity, but in a form that entangles rather than liberates (Kephalaia 92)."}],"cross_tradition_parallels":[{"tradition":"Greek","parallel":"Prometheus's gift of fire / forbidden arts to humanity, leading to the chained punishment of the gift-giver. The structural inversion of the Asael cycle — Prometheus is honored, Asael condemned, for similar acts."},{"tradition":"Vedic / Puranic","parallel":"The Dānavas and Daityas (Asuras) descended from Kashyapa-rishi through Dānu and Diti — a giant-warrior-race of divine-mortal mixed parentage repeatedly defeated by the devas. Maya Dānava the master-architect parallels Asael the teacher-of-forbidden-arts."},{"tradition":"Celtic Irish","parallel":"The Fomorians — chthonic giants defeated at Mag Tuired so the cultivated order can be established."},{"tradition":"Mesopotamian","parallel":"The apkallu — antediluvian wise beings — and the older gods slain by Marduk. The Watchers-as-teachers-of-arts inherit the apkallu pattern."},{"tradition":"Canaanite-Ugaritic","parallel":"The rpum cult of Bashan / Mt Hermon: same territory as the Watcher-descent in 1 Enoch 6, with ancestral warrior-shades summoned for blessing. The 'origins of evil' framework reads the rpum cult itself as part of the giant-line legacy."}],"interpretive_significance":"This framework is the alternative answer — within Judeo-Christian tradition — to the Adam-and-Eve account of evil's origin. Where Genesis 3 locates evil in human disobedience, the Watcher tradition locates it in angelic rebellion and the technological/biological corruption of humanity from above. The two accounts coexisted in Second Temple Judaism; rabbinic Judaism and Pauline Christianity largely suppressed the Watcher account in favor of the Adamic; Gnostic and Manichaean traditions developed the Watcher account into full cosmologies of cosmic captivity. For comparative purposes the Watcher framework is the bridge that connects the biblical Anakim / Rephaim / Nephilim to the IE / Vedic / Canaanite parallel complexes."},{"id":"global-giants-complex","name":"The Global Giants Complex","summary":"A meta-framework that catalogs the worldwide pattern of giant-clan / elder-race traditions. The recurring structure: a prior race, larger and/or older than humans, dominant in an earlier age, ultimately destroyed or overthrown for moral failure or cosmic necessity, leaving traces in the form of megalithic ruins, oversized bones, and the toponymic landscape. The same pattern appears in cultures with no plausible historical contact, raising the comparative-mythology question of whether the pattern reflects (a) a shared psychological/archetypal substrate, (b) common observation of megafaunal fossils and prior megalithic civilizations, (c) diffusion from a common source, or (d) all three.","instances_by_tradition":[{"tradition":"Hebrew Bible","primary_terms":["Nephilim","Rephaim","Anakim","Emim (Moabite)","Zamzummim (Ammonite)","Gibborim"],"named_individuals":["Goliath","Og of Bashan","Sheshai","Ahiman","Talmai","Ishbi-benob","Saph/Sippai","Lahmi","the six-fingered giant of Gath","Nimrod (in tradition)"],"key_sources":["Gen 6:1-4","Num 13:22-33","Deut 2:10-11, 2:20-21, 3:11-13","Josh 11:21-22, 14:15, 15:13-14","1 Sam 17","2 Sam 21:15-22","1 Chr 20"]},{"tradition":"Second Temple Apocryphal (Enochic / Qumran)","primary_terms":["Watchers","Nephilim","Grigori","the giants"],"named_individuals":["The 20 Watcher chiefs (Semyaza, Azazel, Araqiel, Kokabiel, Sariel, etc.)","Ohyah","Hahyah","Mahaway","Gilgamesh (in Book of Giants)","Hobabish (from Humbaba)","Ahiram"],"key_sources":["1 Enoch 6-36 (Book of the Watchers)","Jubilees 5","Book of Giants 4Q203, 4Q530, 4Q531, 4Q532, 4Q533, 1Q23, 1Q24, 2Q26, 6Q8","Genesis Apocryphon 1QapGen II","Manichaean Book of Giants"]},{"tradition":"Egyptian","primary_terms":["Iy-ʿanaq (Execration Texts)"],"named_individuals":["Erum, Abiyamimu (rulers of Iy-ʿanaq)"],"key_sources":["Egyptian Execration Texts (Middle Kingdom, c. 19th–18th c. BCE; Berlin and Brussels collections)","Papyrus Anastasi I (13th c. BCE)"]},{"tradition":"Ugaritic / Canaanite","primary_terms":["rpum / rapiʾūma"],"named_individuals":["Malku ('the King')","Rapiu (lord of healing)"],"key_sources":["Ugaritic Rephaim Texts KTU 1.20-1.22","Legend of Aqhat (allusions)"]},{"tradition":"Mesopotamian","primary_terms":["Apkallu (antediluvian wise beings)","Anzu","the older gods slain by Marduk"],"named_individuals":["Humbaba/Huwawa","Tiamat","the seven Apkallu sages"],"key_sources":["Enuma Elish","Epic of Gilgamesh","Berossus's Babyloniaca","Apkallu reliefs at Nimrud"]},{"tradition":"Greek","primary_terms":["Titans","Gigantes (Giants proper)","Cyclopes","Hekatonkheires"],"named_individuals":["Kronos","Iapetus","Atlas","Hyperion","Prometheus (Titan-descended)","Otus and Ephialtes (Gigantes who piled Pelion on Ossa)","Polyphemus (Cyclops)"],"key_sources":["Hesiod's Theogony","Apollodorus's Bibliotheca","Homer's Odyssey 9","Orphic fragments"]},{"tradition":"Norse","primary_terms":["Jötnar (giants)","Risar","Þursar (thurses)"],"named_individuals":["Ymir","Surtr","Thrym","Bestla","Skaði","Aurgelmir","Bergelmir","Þjazi"],"key_sources":["Poetic Edda","Prose Edda (Gylfaginning, Skáldskaparmál)"]},{"tradition":"Celtic Irish","primary_terms":["Fomoire / Fomorians"],"named_individuals":["Balor","Bres","Cichol Gricenchos","Tethra","Elatha"],"key_sources":["Lebor Gabála Érenn","Cath Maige Tuired"]},{"tradition":"Vedic / Puranic","primary_terms":["Daityas","Danavas","Rakshasas (overlapping)","Asuras (umbrella)"],"named_individuals":["Vṛtra","Hiranyakashipu","Hiranyaksha","Prahlada","Bali","Maya Danava (architect)","Ravana (in Rakshasa tradition)"],"key_sources":["Rigveda 1.32 and others","Mahabharata","Bhagavata Purana","Vishnu Purana"]},{"tradition":"Aztec / Nahua","primary_terms":["Quinametzin / Quinametli"],"named_individuals":["Xelhua (builder of Cholula)","Tenoch (founder of Tenochtitlan)","Mixtécatl","Ulmécatl","Xicalancatl","Otomitl","Tzilacatzin (historical 16th c.)","Cuauhtemoc / Izcoalt / Izcaqlli / Tenexuche (sky-bearers)"],"key_sources":["Vatican Codex A (Ríos Codex)","Sahagún's Florentine Codex","Durán's Historia de las Indias","Alva Ixtlilxochitl's Historia de la Nación Chichimeca","Anales de Cuauhtitlan"]},{"tradition":"Inca / Andean","primary_terms":["the first inhabitants of Earth (in various Inca traditions)"],"named_individuals":[],"key_sources":["Chronicles of the Spanish conquest","Garcilaso de la Vega"]},{"tradition":"Paiute / Great Basin","primary_terms":["Si-Te-Cah / Sai'i","the beautiful giants"],"named_individuals":["the giant Paiute (ancestor)"],"key_sources":["Paiute oral tradition","Winnemucca (1883)","Loud & Harrington (1929)"]},{"tradition":"Other Native American","primary_terms":["Stone Coats (Iroquois)","Stone Giants","Cannibal Giants","Nahullo (Choctaw, originally meaning 'giant')","Oka Nahullo ('white people of the water')","Maushop (Wampanoag — friendly)","Waziya (Lakota — winter giant)"],"named_individuals":["Maushop","Waziya"],"key_sources":["Various tribal oral traditions; collected ethnographies"]},{"tradition":"Chinese","primary_terms":["Pangu (cosmogonic primordial giant)","Kua Fu (the chaser of the sun)","Xing Tian (the headless giant)"],"named_individuals":["Pangu","Kua Fu","Xing Tian"],"key_sources":["Shanhaijing (Classic of Mountains and Seas)","Sanwu Liji (Three-Five Historic Records)"]},{"tradition":"Japanese / Shinto","primary_terms":["Daidarabotchi (cosmic earth-shaping giant)","Oni (large supernatural beings)"],"named_individuals":["Daidarabotchi"],"key_sources":["Various local Japanese traditions and folk-tales"]},{"tradition":"African","primary_terms":["Yoruba creator-giants (Obatala)","Various regional giants in Nigerian and other African folklore"],"named_individuals":["Obatala"],"key_sources":["Yoruba oral tradition; various African folk-traditions"]}],"structural_features_present_across_traditions":["Elder, larger race predating present humanity","Divine or semi-divine parentage (often via interbreeding)","Builders of megaliths / civilization","Teachers of forbidden arts (more specific to Levantine cluster)","Sins or pride leading to destruction","Destruction by flood / fire / cosmic cataclysm / war","Bones / remains attested in landscape (often the megafaunal-fossil-misidentification explanation)","Toponymic preservation (Bashan, Cholula, Lovelock Cave, etc.)","Imprisonment of a key figure to await final judgment"],"scholarly_frameworks":["Adrienne Mayor, Fossil Legends of the First Americans (2005) — argues many giant traditions worldwide originate in encounters with megafaunal fossils","Loren T. Stuckenbruck, The Book of Giants from Qumran (1997)","Annette Yoshiko Reed, Fallen Angels and the History of Judaism and Christianity (2005)","Calvert Watkins, How to Kill a Dragon (1995) — for the dragon-slayer pattern as separate-but-related","Bruce Lincoln, 'The Indo-European Myth of Creation' (1975) — for the Yemo-sacrifice pattern","G.A.G. Stroumsa, Another Seed: Studies in Gnostic Mythology (1984)","Mark S. Smith, The Origins of Biblical Monotheism (2001)"],"interpretive_significance":"The global giants complex is the strongest single piece of evidence for cross-cultural mythological pattern, regardless of which explanation one prefers. Even if all instances are entirely independent, the convergence on a single structural pattern (elder race, divine mixing, sin, cataclysm, ruins-and-bones-as-evidence) across cultures separated by oceans and millennia indicates that the human imagination is constrained to a small set of possible stories about its own deep past. For the 'Parallels of the Gods' project this is the spinal column."},{"id":"dragon-slayer-formula","name":"The Dragon-Slayer Formula","tradition_id":"proto-indo-european","type":"cosmological-framework","summary":"Across Indo-European and adjacent Near Eastern traditions, a single inherited narrative formula appears with striking consistency: the storm-god (or warrior-hero) slays a cosmic serpent who has withheld or stolen a fundamental cosmic resource — usually the waters, the cattle, or the Tablet of Destinies. Calvert Watkins's How to Kill a Dragon (1995) reconstructed the underlying poetic formula, showing that even the phrasing of these accounts preserves PIE structural patterns. The pattern extends beyond Indo-European through Bronze Age Near Eastern transmission and appears convergently in traditions with no plausible historical connection — strong evidence for both inherited and convergent dimensions of the archetype.","narrative_components":["Storm-god or warrior-hero (the slayer)","Cosmic serpent or dragon (the adversary)","Cosmic resource withheld or stolen (waters, cattle, Tablet of Destinies, sovereignty)","The combat (often with thunder-weapon)","Release of the withheld resource","Restoration of cosmic order"],"instances":[{"tradition":"Proto-Indo-European","slayer":"*Perkwunos / *Tritós","serpent":"the water-serpent","weapon":"thunder-axe / club","facet_ids":["perkwunos-dragon-slayer","trito-dragon-slayer-hero"]},{"tradition":"Vedic","slayer":"Indra","serpent":"Vritra","weapon":"vajra (thunderbolt)","facet_ids":["indra-vritra-slayer","vritra-cosmic-serpent","vritra-withholder-of-waters"]},{"tradition":"Iranian","slayer":"Thraētaona","serpent":"Aži Dahāka (three-headed)","weapon":"club"},{"tradition":"Hittite","slayer":"Tarhunna","serpent":"Illuyanka","weapon":"thunder"},{"tradition":"Greek (Zeus)","slayer":"Zeus","serpent":"Typhon","weapon":"thunderbolt","facet_ids":["zeus-storm-god","typhon-cosmic-serpent-rival-of-zeus"]},{"tradition":"Greek (Apollo)","slayer":"Apollo","serpent":"Python","weapon":"bow","facet_ids":["apollo-dragon-slayer-python"]},{"tradition":"Norse","slayer":"Thor","serpent":"Jörmungandr","weapon":"Mjölnir","facet_ids":["thor-jormungandr-slayer","jormungandr-world-serpent"]},{"tradition":"Slavic","slayer":"Perun","serpent":"Veles","weapon":"axe / lightning","facet_ids":["perun-vs-veles","veles-perun-adversary"]},{"tradition":"Celtic-Irish","slayer":"Lugh","serpent":"Balor","weapon":"sling / spear","facet_ids":["lugh-dragon-slayer","balor-evil-eye-tyrant"]},{"tradition":"Mesopotamian (Marduk)","slayer":"Marduk","serpent":"Tiamat","weapon":"winds, net","facet_ids":["marduk-cosmic-orderer","tiamat-chaos-dragon"]},{"tradition":"Mesopotamian (Ninurta)","slayer":"Ninurta","serpent":"Anzu / Asakku","weapon":"thunder-weapon","facet_ids":["ninurta-warrior-dragon-slayer","anzu-storm-bird-thief"]},{"tradition":"Egyptian","slayer":"Set (older role) or Ra","serpent":"Apep / Apophis","weapon":"spear","facet_ids":["set-protector-of-ra","apep-cosmic-chaos-serpent","apep-attacks-the-sun"]},{"tradition":"Canaanite","slayer":"Baal","serpent":"Yam (Sea) / Lotan","weapon":"club","facet_ids":["baal-hadad-storm","yam-sea-chaos"]},{"tradition":"Christian apocalyptic","slayer":"Michael / Christ","serpent":"the Dragon / Satan","weapon":"the heavenly host","facet_ids":["michael-vs-dragon"]},{"tradition":"Greek (Heracles)","slayer":"Heracles","serpent":"Hydra, Geryon, Cacus","weapon":"club, bow","facet_ids":["heracles-monster-slayer","heracles-recoverer-of-cattle"]},{"tradition":"Convergent (Andean)","slayer":"Illapa","serpent":"—","weapon":"sling-stones","facet_ids":["illapa-thunder-warrior"]},{"tradition":"Convergent (Yoruba)","slayer":"Shango","serpent":"—","weapon":"double-axe","facet_ids":["shango-thunder-warrior"]}],"scholarly_anchors":["Calvert Watkins, How to Kill a Dragon: Aspects of Indo-European Poetics (1995)","Bruce Lincoln, Priests, Warriors, and Cattle (1981)","Joshua Katz, 'How the Mole and Mongoose Got Their Names'","M. L. West, Indo-European Poetry and Myth (2007)"],"structural_role":"The dragon-slayer formula encodes the warrior class's foundational claim: that sovereignty is established through victory over chaos. Every storm-god + serpent pairing in this framework restates the same theology — cosmic order requires active combat against an encroaching disorder. The formula's extension beyond Indo-European (to Yoruba Shango, Andean Illapa) suggests it is both inherited where there is genetic relationship AND convergent in human religious imagination at a deeper level."},{"id":"dying-and-rising-god-formula","name":"The Dying-and-Rising God Formula","tradition_id":"comparative","type":"cosmological-framework","summary":"A cluster of deities across ancient Near Eastern and Mediterranean traditions follow a similar pattern: the god dies (often by murder, dismemberment, or descent), is mourned by a feminine consort or relative, and returns — often seasonally, often as the vegetation that feeds humanity. James Frazer (The Golden Bough, 1890) proposed this as a near-universal category; Jonathan Z. Smith argued (1987) that Frazer's category was overextended and obscured significant differences. Mark S. Smith (The Origins of Biblical Monotheism, 2001) and Tryggve Mettinger (The Riddle of Resurrection, 2001) defended a more restricted version, demonstrating that for several specific deities the dying-and-rising pattern is genuine and textually well-attested. The cluster here uses the restricted definition: deities for whom death and return are explicit in the primary sources.","narrative_components":["The death of the god (murder, dismemberment, descent, sacrifice)","Mourning — typically by a feminine consort or relative","Active intervention to recover or restore","The return / restoration / resurrection","Ongoing cyclical or eschatological dimension"],"instances":[{"tradition":"Egyptian","deity":"Osiris","death":"murdered by Set, dismembered into 14 pieces","mourner":"Isis (with Nephthys)","return":"reassembled by Isis; rules as king of the dead; returns annually as the Nile's flood and green vegetation","facet_ids":["osiris-dismembered","osiris-rising-vegetation","isis-magician","isis-great-mother"]},{"tradition":"Canaanite","deity":"Baal","death":"killed by Mot (Death)","mourner":"Anat (sister-consort)","return":"Anat hunts Mot, grinds him like grain; Baal returns; vegetation revives","facet_ids":["baal-dies-and-rises","anat-warrior-mourner","mot-death"]},{"tradition":"Mesopotamian","deity":"Inanna / Ishtar","death":"descends through seven gates of the underworld, hung as corpse","mourner":"Ninshubur (handmaiden)","return":"rescued by Enki; returns but must send substitute (her husband Dumuzi)","facet_ids":["inanna-descended-goddess"]},{"tradition":"Greek","deity":"Persephone","death":"abducted by Hades; effectively dead to upper world","mourner":"Demeter","return":"returns for part of each year — origin of seasons","facet_ids":["persephone-descent","persephone-queen-of-underworld","demeter-grieving-mother","demeter-eleusinian"]},{"tradition":"Greek (Orphic)","deity":"Dionysus-Zagreus","death":"dismembered by Titans, devoured","mourner":"the Titans are blasted; humanity made from their ash","return":"Dionysus reconstituted; becomes mystery-cult center","facet_ids":["dionysus-zagreus-dismembered","dionysus-twice-born"]},{"tradition":"Norse","deity":"Baldr","death":"killed by mistletoe dart through Loki's trickery","mourner":"all things weep — except Loki (as Þökk)","return":"remains in Hel until Ragnarök; returns to rule renewed world","facet_ids":["baldr-dying-beloved-god","baldr-returns-after-ragnarok"]},{"tradition":"Christian","deity":"Christ","death":"crucifixion","mourner":"Mary; the disciples","return":"resurrection on third day; second coming awaited","facet_ids":["christ-crucifixion","christ-resurrection","christ-second-coming"]}],"non_instances_for_clarity":[{"deity":"Krishna","note":"dies but does not return in the death-rebirth pattern — exits cosmically rather than returns"},{"deity":"Heracles","note":"apotheosized at death but does not return to the world — becomes a god rather than rising"},{"deity":"Buddha","note":"parinirvana is final cessation, not death-and-rebirth"}],"scholarly_anchors":["James Frazer, The Golden Bough (1890; expanded 1906–15) — original formulation, overextended","Jonathan Z. Smith, 'Dying and Rising Gods' (1987 ER article) — critical narrowing","Tryggve Mettinger, The Riddle of Resurrection: 'Dying and Rising Gods' in the Ancient Near East (2001) — defended restricted version","Mark S. Smith, The Origins of Biblical Monotheism (2001) — Canaanite/Israelite dimension"],"structural_role":"The dying-and-rising god formula encodes the human experience of seasonal death and return — agricultural cycles, the death of vegetation in winter and its return in spring — projected into divine drama. The cluster shows historical influence (e.g., the Canaanite Baal-Anat cycle influencing aspects of Israelite religion; Egyptian Osiris cult influencing late-antique mystery religion) alongside convergent independent development. The cluster intersects significantly with the mystery-cult traditions that offered initiates participation in the deity's death-and-rebirth as a path to personal afterlife or spiritual transformation."}]}</script>
<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const $ = (id) => document.getElementById(id);
const facetById = Object.fromEntries(DATA.facets.map(f => [f.id, f]));
const deityById = Object.fromEntries(DATA.deities.map(d => [d.id, d]));
const traditionById = Object.fromEntries(DATA.traditions.map(t => [t.id, t]));
const deityByFacet = {};
DATA.deities.forEach(d => (d.facets||[]).forEach(fid => { deityByFacet[fid] = d; }));

// stats
$('stat-t').textContent = DATA.traditions.length;
$('stat-d').textContent = DATA.deities.length;
$('stat-f').textContent = DATA.facets.length;
$('stat-p').textContent = DATA.canonical_parallels.length;
$('stat-fw').textContent = (DATA.cosmological_frameworks||[]).length;

// tradition filter
const tradSel = $('filter-tradition');
DATA.traditions.map(t => t).sort((a,b)=>a.name.localeCompare(b.name)).forEach(t => {
  const opt = document.createElement('option');
  opt.value = t.id; opt.textContent = t.name; tradSel.appendChild(opt);
});

let currentView = 'deities';
let searchQ = '';
let filterT = '';
let filterTier = '';

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function deityMatches(d) {
  if (filterT && d.tradition_id !== filterT) return false;
  if (filterTier) {
    const facets = (d.facets||[]).map(fid => facetById[fid]).filter(Boolean);
    const hasTier = facets.some(f => String(f.tier_assignment) === filterTier);
    if (!hasTier) return false;
  }
  if (searchQ) {
    const hay = [
      d.primary_name, ...(d.alternate_names||[]),
      d.summary||'', traditionById[d.tradition_id]?.name||'',
      ...((d.facets||[]).map(fid => facetById[fid]).filter(Boolean).flatMap(f => [f.facet_name, ...(f.function_tags||[])]))
    ].join(' ').toLowerCase();
    if (!hay.includes(searchQ)) return false;
  }
  return true;
}

function renderDeities() {
  const list = DATA.deities.filter(deityMatches);
  list.sort((a,b) => a.primary_name.localeCompare(b.primary_name));
  if (!list.length) return '<div class="empty">No deities match your filters.</div>';
  return '<div class="deity-list">' + list.map(d => {
    const trad = traditionById[d.tradition_id];
    const facets = (d.facets||[]).map(fid => facetById[fid]).filter(Boolean);
    const summary = (d.summary||'').length > 200 ? d.summary.slice(0,200)+'…' : (d.summary||'');
    return `
      <div class="deity-card" data-deity="${d.id}">
        <div class="deity-name">${escapeHTML(d.primary_name)}</div>
        <div class="deity-meta">
          <span class="tradition-tag">${escapeHTML(trad?.name || d.tradition_id)}</span>
          ${d.alternate_names && d.alternate_names.length ? `<span>${escapeHTML(d.alternate_names.slice(0,3).join(' · '))}</span>` : ''}
        </div>
        ${summary ? `<div class="deity-summary">${escapeHTML(summary)}</div>` : ''}
        <div class="facet-chips">${facets.map(f => `<span class="facet-chip tier-${f.tier_assignment}">${escapeHTML(f.facet_name)}</span>`).join('')}</div>
      </div>`;
  }).join('') + '</div>';
}

function renderTraditions() {
  return DATA.traditions.map(t => {
    const dCount = DATA.deities.filter(d => d.tradition_id === t.id).length;
    return `
      <div class="tradition-summary">
        <h2>${escapeHTML(t.name)}</h2>
        <div class="meta">${escapeHTML(t.geographic_origin||'')} · ${dCount} deities · ${escapeHTML(t.earliest_attestation||'')}</div>
        <div>${escapeHTML(t.cosmological_structure||'')}</div>
        ${t.scholarly_note ? `<div class="scholarly-caveat">${escapeHTML(t.scholarly_note)}</div>` : ''}
      </div>`;
  }).join('');
}

function renderParallels() {
  // Group by type
  const list = DATA.canonical_parallels;
  return '<div>' + list.map(p => {
    const fa = facetById[p.facet_a_id], fb = facetById[p.facet_b_id];
    if (!fa || !fb) return '';
    const da = deityByFacet[p.facet_a_id], db = deityByFacet[p.facet_b_id];
    const ta = da ? traditionById[da.tradition_id]?.name : '?';
    const tb = db ? traditionById[db.tradition_id]?.name : '?';
    return `
      <div class="parallel-card">
        <span class="parallel-strength ${p.strength}">${escapeHTML(p.strength)}</span>
        <span class="parallel-link" data-deity="${da?.id||''}">${escapeHTML(da?.primary_name||fa.facet_name)}</span>
        <span style="color:var(--text-muted)"> (${escapeHTML(ta)}) </span>
        ↔
        <span class="parallel-link" data-deity="${db?.id||''}">${escapeHTML(db?.primary_name||fb.facet_name)}</span>
        <span style="color:var(--text-muted)"> (${escapeHTML(tb)})</span>
        <div style="font-size:12px;color:var(--text-muted);margin-top:4px">${escapeHTML(fa.facet_name)} ↔ ${escapeHTML(fb.facet_name)}</div>
        ${p.basis && p.basis.length ? `<details><summary>Basis (${p.basis.length})</summary><ul style="margin:4px 0 0;padding-left:18px;font-size:12px;color:var(--text-muted)">${p.basis.map(b => `<li>${escapeHTML(b)}</li>`).join('')}</ul></details>` : ''}
        ${p.scholarly_caveat ? `<div class="scholarly-caveat">${escapeHTML(p.scholarly_caveat)}</div>` : ''}
      </div>`;
  }).join('') + '</div>';
}

function renderFrameworks() {
  return (DATA.cosmological_frameworks||[]).map(f => `
    <div class="framework-card">
      <h2>${escapeHTML(f.name)}</h2>
      <div class="framework-summary">${escapeHTML(f.summary||'')}</div>
      ${f.narrative_components ? `<details style="margin-top:10px"><summary>Narrative components (${f.narrative_components.length})</summary><ul style="font-size:13px;color:var(--text-muted);margin:6px 0 0;padding-left:18px">${f.narrative_components.map(n=>`<li>${escapeHTML(n)}</li>`).join('')}</ul></details>` : ''}
      ${f.instances ? `<details style="margin-top:10px"><summary>Instances (${f.instances.length})</summary><div class="framework-instances">${f.instances.map(i => `<div class="framework-instance"><strong>${escapeHTML(i.tradition)}</strong>: ${escapeHTML(i.slayer||i.deity||'')} ${i.serpent?'vs '+escapeHTML(i.serpent):''} ${i.death?'— '+escapeHTML(i.death):''}</div>`).join('')}</div></details>` : ''}
      ${f.scholarly_anchors ? `<details style="margin-top:10px"><summary>Scholarly anchors (${f.scholarly_anchors.length})</summary><ul style="font-size:12px;color:var(--text-muted);margin:6px 0 0;padding-left:18px">${f.scholarly_anchors.map(s=>`<li>${escapeHTML(s)}</li>`).join('')}</ul></details>` : ''}
    </div>`).join('');
}

function render() {
  const v = $('view');
  if (currentView === 'deities') v.innerHTML = renderDeities();
  else if (currentView === 'traditions') v.innerHTML = renderTraditions();
  else if (currentView === 'parallels') v.innerHTML = renderParallels();
  else if (currentView === 'frameworks') v.innerHTML = renderFrameworks();
}

function showDeity(id) {
  const d = deityById[id]; if (!d) return;
  const trad = traditionById[d.tradition_id];
  const facets = (d.facets||[]).map(fid => facetById[fid]).filter(Boolean);
  // Find parallels touching this deity
  const facetIds = new Set(d.facets||[]);
  const relatedParallels = DATA.canonical_parallels.filter(p => facetIds.has(p.facet_a_id) || facetIds.has(p.facet_b_id));
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <button class="modal-close">Close</button>
      <h2>${escapeHTML(d.primary_name)}</h2>
      <div class="modal-meta">
        ${escapeHTML(trad?.name||d.tradition_id)} ·
        ${escapeHTML(d.earliest_attestation||'')}
      </div>
      ${d.alternate_names && d.alternate_names.length ? `<div class="modal-meta">Also known as: ${escapeHTML(d.alternate_names.join(' · '))}</div>` : ''}
      <div class="modal-summary">${escapeHTML(d.summary||'')}</div>
      ${d.etymology ? `<div class="scholarly-caveat"><strong>Etymology:</strong> ${escapeHTML(d.etymology)}</div>` : ''}
      ${d.iconography && d.iconography.length ? `<div class="modal-section"><h3>Iconography</h3><div style="font-size:13px;color:var(--text-muted)">${escapeHTML(d.iconography.join(' · '))}</div></div>` : ''}
      ${d.primary_sources && d.primary_sources.length ? `<div class="modal-section"><h3>Primary sources</h3><ul style="font-size:13px;color:var(--text-muted);margin:0;padding-left:18px">${d.primary_sources.map(s=>`<li>${escapeHTML(s)}</li>`).join('')}</ul></div>` : ''}
      <div class="modal-section">
        <h3>Facets (${facets.length})</h3>
        ${facets.map(f => `
          <div class="facet-block t-${f.tier_assignment}">
            <div class="facet-name">${escapeHTML(f.facet_name)}</div>
            <div style="font-size:11px;color:var(--text-muted)">Tier ${escapeHTML(String(f.tier_assignment))} · ${escapeHTML(f.valence||'')} · ${(f.function_tags||[]).slice(0,5).map(escapeHTML).join(' · ')}</div>
            <div class="facet-claim">${escapeHTML(f.core_claim||'')}</div>
            ${f.parallel_facets && f.parallel_facets.length ? `<div class="facet-parallels"><strong>Parallels:</strong> ${f.parallel_facets.map(pid => {
              const pdeity = deityByFacet[pid];
              return pdeity ? `<a data-deity="${pdeity.id}">${escapeHTML(pdeity.primary_name)}</a>` : `<span style="color:var(--text-muted)">${escapeHTML(pid)}</span>`;
            }).join(' · ')}</div>` : ''}
          </div>`).join('')}
      </div>
      ${relatedParallels.length ? `<div class="modal-section">
        <h3>Canonical parallels (${relatedParallels.length})</h3>
        ${relatedParallels.slice(0,20).map(p => {
          const otherFid = facetIds.has(p.facet_a_id) ? p.facet_b_id : p.facet_a_id;
          const otherDeity = deityByFacet[otherFid];
          const otherFacet = facetById[otherFid];
          if (!otherDeity || !otherFacet) return '';
          return `<div class="parallel-card">
            <span class="parallel-strength ${p.strength}">${escapeHTML(p.strength)}</span>
            <span class="parallel-link" data-deity="${otherDeity.id}">${escapeHTML(otherDeity.primary_name)}</span>
            <span style="color:var(--text-muted)"> · ${escapeHTML(otherFacet.facet_name)}</span>
            ${p.basis && p.basis.length ? `<details><summary>Basis</summary><ul style="margin:4px 0 0;padding-left:18px;font-size:12px;color:var(--text-muted)">${p.basis.map(b=>`<li>${escapeHTML(b)}</li>`).join('')}</ul></details>` : ''}
            ${p.scholarly_caveat ? `<div class="scholarly-caveat">${escapeHTML(p.scholarly_caveat)}</div>` : ''}
          </div>`;
        }).join('')}
      </div>` : ''}
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => {
    if (e.target === overlay || e.target.classList.contains('modal-close')) overlay.remove();
    const dlink = e.target.closest('[data-deity]');
    if (dlink && dlink.dataset.deity) { overlay.remove(); showDeity(dlink.dataset.deity); }
  });
}

// Wire up controls
$('search').addEventListener('input', e => { searchQ = e.target.value.trim().toLowerCase(); render(); });
$('filter-tradition').addEventListener('change', e => { filterT = e.target.value; render(); });
$('filter-tier').addEventListener('change', e => { filterTier = e.target.value; render(); });
document.querySelectorAll('.view-tabs button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.view-tabs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentView = b.dataset.view; render();
  });
});
document.addEventListener('click', e => {
  const card = e.target.closest('.deity-card[data-deity]');
  if (card) showDeity(card.dataset.deity);
  const plink = e.target.closest('.parallel-link[data-deity]');
  if (plink && plink.dataset.deity) showDeity(plink.dataset.deity);
});

render();
</script>
</body>
</html>
