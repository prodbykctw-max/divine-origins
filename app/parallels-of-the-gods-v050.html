<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Parallels of the Gods — v0.5.0</title>
<style>
  :root {
    --bg: #0b0b14;
    --bg-panel: #131322;
    --bg-elevated: #1c1c30;
    --border: #2a2a42;
    --text: #e8e8ee;
    --text-muted: #9090a8;
    --tier-1: #c9a96e;
    --tier-2: #6fa8dc;
    --tier-3: #d36b6b;
    --tier-4: #b894d6;
    --tier-cross: #7fb074;
    --link: #f0c96b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
  }
  header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-panel);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  h1 { font-size: 18px; margin: 0 0 4px; font-weight: 600; letter-spacing: 0.3px; }
  .subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
  .stats {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .stats span strong { color: var(--text); font-weight: 600; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; }
  input, select {
    background: var(--bg-elevated);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 13px;
    font-family: inherit;
  }
  input:focus, select:focus { outline: none; border-color: var(--link); }
  input { flex: 1; min-width: 160px; }
  main { padding: 16px 20px 80px; }
  .view-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .view-tabs button {
    background: var(--bg-elevated); color: var(--text-muted);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 12px; font-size: 13px; font-family: inherit;
    cursor: pointer; transition: all 0.15s;
  }
  .view-tabs button.active { color: var(--text); border-color: var(--link); background: var(--bg-panel); }
  .view-tabs button:hover { color: var(--text); }
  .deity-list { display: grid; gap: 8px; }
  .deity-card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
  }
  .deity-card:hover { border-color: var(--link); }
  .deity-card:active { transform: scale(0.99); }
  .deity-name { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
  .deity-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 10px; flex-wrap: wrap; }
  .tradition-tag {
    display: inline-block;
    padding: 1px 7px;
    font-size: 10px;
    background: var(--bg-elevated);
    border-radius: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .deity-summary { font-size: 13px; color: var(--text-muted); margin-top: 8px; line-height: 1.45; }
  .facet-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .facet-chip {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    color: #fff;
    opacity: 0.85;
  }
  .tier-1 { background: var(--tier-1); color: #2a1f0a; }
  .tier-2 { background: var(--tier-2); color: #0a1a2a; }
  .tier-3 { background: var(--tier-3); color: #2a0a0a; }
  .tier-4 { background: var(--tier-4); color: #1f0a2a; }
  .tier-cross-tier { background: var(--tier-cross); color: #0a2a0a; }
  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 20px 12px; z-index: 100;
    overflow-y: auto;
  }
  .modal {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    max-width: 680px; width: 100%;
    padding: 20px;
    margin-top: 20px;
  }
  .modal-close {
    float: right;
    background: var(--bg-elevated);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px; font-size: 13px;
    cursor: pointer; font-family: inherit;
  }
  .modal h2 { margin: 0 0 6px; font-size: 20px; }
  .modal-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
  .modal-summary { margin: 12px 0; line-height: 1.55; }
  .modal-section { margin-top: 18px; }
  .modal-section h3 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-muted); margin: 0 0 8px; font-weight: 600;
  }
  .facet-block {
    background: var(--bg-elevated);
    border-left: 3px solid var(--border);
    padding: 10px 12px; margin-bottom: 10px;
    border-radius: 4px;
  }
  .facet-block.t-1 { border-left-color: var(--tier-1); }
  .facet-block.t-2 { border-left-color: var(--tier-2); }
  .facet-block.t-3 { border-left-color: var(--tier-3); }
  .facet-block.t-4 { border-left-color: var(--tier-4); }
  .facet-block.t-cross-tier { border-left-color: var(--tier-cross); }
  .facet-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  .facet-claim { font-size: 13px; color: var(--text); margin: 6px 0; }
  .facet-parallels { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
  .facet-parallels a {
    color: var(--link); cursor: pointer; text-decoration: none;
    border-bottom: 1px dotted var(--link);
  }
  .facet-parallels a:hover { color: #fff; }
  .parallel-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .parallel-link {
    color: var(--link); cursor: pointer;
    border-bottom: 1px dotted var(--link);
  }
  .parallel-strength {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    background: var(--bg-panel);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-right: 6px;
  }
  .parallel-strength.identity, .parallel-strength.derivation { background: var(--tier-1); color: #2a1f0a; }
  .parallel-strength.strong-parallel { background: var(--tier-cross); color: #0a2a0a; }
  .parallel-strength.partial-parallel { background: var(--tier-2); color: #0a1a2a; }
  .parallel-strength.contrast { background: var(--tier-3); color: #2a0a0a; }
  .parallel-basis { color: var(--text-muted); margin-top: 6px; font-size: 12px; }
  .parallel-basis ul { margin: 4px 0 0; padding-left: 18px; }
  .scholarly-caveat {
    font-size: 12px;
    background: rgba(240,201,107,0.08);
    border-left: 2px solid var(--link);
    padding: 8px 10px;
    margin-top: 6px;
    color: var(--text-muted);
    border-radius: 3px;
  }
  .tradition-summary {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .tradition-summary h2 { margin: 0 0 4px; font-size: 17px; }
  .tradition-summary .meta { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
  .framework-card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .framework-card h2 { margin: 0 0 8px; font-size: 17px; }
  .framework-summary { font-size: 13px; line-height: 1.55; color: var(--text-muted); }
  .framework-instances { margin-top: 10px; }
  .framework-instance {
    font-size: 12px;
    padding: 6px 0;
    border-top: 1px solid var(--border);
  }
  .framework-instance strong { color: var(--text); }
  details { margin: 8px 0; }
  details summary { cursor: pointer; color: var(--text-muted); font-size: 13px; padding: 4px 0; }
  details summary:hover { color: var(--text); }
  .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }
  @media (max-width: 600px) {
    .modal { margin-top: 10px; padding: 16px; }
    h1 { font-size: 16px; }
  }
</style>
</head>

greek","name":"Greek","earliest_attestation":"c. 1200 BCE (Mycenaean)","regions":["Greece","Aegean"]},{"id":"norse","name":"Norse / Germanic","earliest_attestation":"Roman era; Eddic material 13th c. CE","regions":["Scandinavia","Germania"]},{"id":"hindu","name":"Hindu (Vedic / Puranic / Tantric)","earliest_attestation":"c. 1500 BCE","regions":["Indian subcontinent"]},{"id":"aztec","name":"Aztec / Mesoamerican","earliest_attestation":"c. 13th c. CE (earlier in Toltec, Teotihuacan)","regions":["Central Mexico"]},{"id":"christian","name":"Christian (Orthodox + Esoteric)","earliest_attestation":"1st c. CE","regions":["Mediterranean basin","Near East","global"]},{"id":"hermetic","name":"Hermetic / Greco-Egyptian","earliest_attestation":"c. 1st–3rd c. CE (Corpus Hermeticum)","regions":["Hellenistic Egypt","Alexandria"]},{"id":"proto-indo-european","name":"Proto-Indo-European (Reconstructed)","earliest_attestation":"c. 4500–2500 BCE (reconstructed, not directly attested)","regions":["Pontic-Caspian steppe","ancestral source of Indo-European language family"],"language_layers":["Proto-Indo-European (reconstructed)"],"key_texts":["No surviving texts — reconstructed via comparative method from Vedic, Avestan, Greek, Latin, Hittite, Old Norse, Old Irish, Baltic, Slavic, Tocharian cognates."],"cosmological_structure":"Sky-father (*Dyḗus Ph₂tḗr) presides over a divine council. Storm-father (*Perkʷunos) slays a serpent-of-the-waters (*H₂epom Nepōts / the cosmic dragon). Dawn (*H₂éwsōs) emerges daily. Hero-twin (*Trito) recovers the cattle stolen by the three-headed serpent. Fire (*H₁n̥gʷnis) is the messenger between gods and humans.","tier_mapping":{"tier_2":["dyeus-phater"],"tier_4":["perkwunos","trito"],"cross_tier":["hausos","agni-fire-pie"]},"scholarly_note":"PIE deities are linguistic reconstructions, not historically attested beings. They are the back-projected common ancestors of attested gods across daughter traditions. Inclusion here is for genealogical comparison — the structural trunk from which Greek, Roman, Vedic, Iranian, Norse, Celtic, Slavic, Baltic, Hittite, and Anatolian pantheons branched."},{"id":"second-temple-apocryphal","name":"Second Temple Apocryphal / Enochic","earliest_attestation":"c. 3rd c. BCE – 1st c. CE","regions":["Judea","Egyptian diaspora","Qumran"],"language_layers":["Aramaic","Hebrew","Koine Greek","Ge'ez (Ethiopic)"],"key_texts":["1 Enoch (Book of the Watchers, Astronomical Book, Book of Parables, Animal Apocalypse)","2 Enoch (Slavonic Enoch)","3 Enoch (Sefer Hekhalot)","Book of Jubilees","Book of Giants (Qumran 4Q203, 4Q530–532)","Genesis 6:1–4 (canonical Hebrew Bible passage)"],"cosmological_structure":"Two hundred Watchers (*'irin*, 'wakeful ones') under Shemyaza and Azazel descend to Mount Hermon, take human wives, beget the Nephilim — giant hybrid offspring. The Watchers teach forbidden knowledge (metallurgy, weaponry, cosmetics, sorcery, astrology). Their offspring devour humanity, leading to the Flood. The Watchers are bound in the abyss; the spirits of the dead Nephilim become the unclean spirits / demons of the present age.","tier_mapping":{"tier_4":["watchers","azazel"],"cross_tier":["nephilim","enoch-ascended"]}},{"id":"canaanite-ugaritic","name":"Canaanite / Ugaritic","geographic_origin":"Levantine coast; primary corpus from Ugarit (Ras Shamra), c. 14th–12th c. BCE","earliest_attestation":"Ugaritic tablets c. 1400–1200 BCE; older oral strata","language_layers":["Ugaritic","Phoenician","Aramaic","biblical Hebrew (substrate)"],"key_texts":["Baal Cycle (KTU 1.1–1.6)","Legend of Aqhat (KTU 1.17–1.19)","Legend of Kirta (KTU 1.14–1.16)","Rephaim Texts (KTU 1.20–1.22)","Execration Texts (Egyptian, ref. Canaanite enemies)"],"cosmological_structure":"El (high god, father of the gods) heads a divine council on Mount Lel; Baal-Hadad as storm-god / cosmic-orderer; Mot (death) and Yam (sea) as chaos powers; the rpum (Rephaim) as the deified royal dead / ancestral warrior-shades inhabiting Bashan and the underworld.","tier_mapping":{"tier_1":[],"tier_2":["el-canaanite","asherah-mother"],"tier_3":["baal-hadad-cosmic-orderer","mot-death"],"tier_4":["rpum-rephaim","yam-sea-chaos"],"cross_tier":["anat-warrior-mourner"]},"scholarly_note":"This tradition is the immediate substrate for Hebrew religion. The El of Ugarit and the El Elyon of the older Hebrew layer are the same high god; the Hebrew Bible's divine council language (Psalm 82, Deut 32:8-9) is intelligible only against this background."},{"id":"celtic-irish","name":"Celtic — Old Irish (Lebor Gabála + mythological cycle)","geographic_origin":"Ireland (with broader Insular Celtic and continental Gaulish parallels)","earliest_attestation":"Christian-era manuscripts (11th–12th c. CE) preserving older oral material; deities attested earlier in Romano-Celtic inscriptions","language_layers":["Old Irish","Middle Irish","Welsh (cf. Mabinogi parallels)"],"key_texts":["Lebor Gabála Érenn (Book of the Taking of Ireland)","Cath Maige Tuired (Battle of Mag Tuired)","Mythological Cycle texts","Coir Anmann"],"cosmological_structure":"The Tuatha Dé Danann — 'Peoples of the Goddess Danu' — descend into Ireland and fight the Fomorians (chaos-powers / sea-giants). After defeat by the Milesians they retreat into the sídhe (otherworld mounds). The structure is recognizably the IE divine-vs-chthonic-powers conflict, with Danu / Danann as the divine mother.","tier_mapping":{"tier_1":[],"tier_2":["danu-irish","dagda-good-god"],"tier_3":[],"tier_4":["fomorians","balor-evil-eye"],"cross_tier":["lugh-many-skilled","morrigan-war-fate"]},"scholarly_note":"Old Irish Danu is reconstructed largely from the ethnonym Tuath Dé Danann; her independent attestation is thin. The Vedic-Celtic Danu parallel is linguistic (both descend from PIE *deh₂nu, 'river / flowing water') and was first proposed in the 19th c.; it remains widely cited in IE comparative mythology (e.g., David Frawley, Calvert Watkins's *How to Kill a Dragon*, Mallory & Adams's *Encyclopedia of IE Culture*)."},{"id":"aboriginal-kimberley","name":"Aboriginal Australian — Wandjina-Wunggurr (Kimberley)","geographic_origin":"Kimberley region, Western Australia (Worrorra, Ngarinyin, Wunambal peoples)","earliest_attestation":"Wandjina rock-art tradition dates to c. 4,000 years before present (Gwion Gwion / Bradshaw figures in the same region are much older, possibly 17,000+ years); the broader cultural continuity is at least 60,000 years","language_layers":["Worrorra","Ngarinyin","Wunambal","shared Wanjina-Wunggurr bloc"],"key_texts":["The rock-art galleries themselves are the primary text (an active, living, repainted tradition)","Oral Law transmitted by senior custodians","Mowanjum Art and Culture Centre archives (contemporary continuation)"],"cosmological_structure":"Idjair, the first Wandjina, lives in the Milky Way and is the father of all Wandjinas. His son Wallungunder created the Earth and all life on it. Wallungunder created the first humans, the Gyorn Gyorn (Gwion Gwion) people. He returned to Idjair to bring more Wandjinas down to give the Gyorn Gyorn the Law. Each of the three Mowanjum peoples has its own primary Wandjina: Namarali (Worrorra), Wodjin/Wanalirri (Ngarinyin), Rimijmarra (Wunambal). The Rainbow-Serpent-analogue creator-being Wunggurr is a related but distinct figure. Wandjina control rain, lightning, cyclones, fertility, and the Law itself.","tier_mapping":{"tier_1":["idjair-milky-way"],"tier_2":["wallungunder-first-wandjina","wunggurr-rainbow-serpent"],"tier_3":[],"tier_4":[],"cross_tier":["namarali","wodjin-ngarinyin","rimijmarra"]},"scholarly_note":"This tradition is alive, sacred, and held by specific custodial communities. The Wandjina figures may be painted only by authorized individuals; repainting on rock walls is a ceremonial act of cosmic renewal, not artistic restoration. The representations in this database are descriptive and respectful and should be read as pointing TO the tradition rather than as containing it. The mouthless face is theologically loaded: a speech-organ is absent because the Wandjina's power is so great that it acts directly by will, without verbal mediation. Cross-tradition parallels here are noted with caution; the Worrorra/Ngarinyin/Wunambal frameworks have their own integrity and should not be reduced to instances of imported categories."},{"id":"paiute-great-basin","name":"Northern Paiute (Great Basin)","geographic_origin":"Great Basin — Nevada, eastern California, southern Oregon, southwestern Idaho","earliest_attestation":"Oral tradition; first written attestation in Sarah Winnemucca's *Life Among the Piutes* (1883)","language_layers":["Northern Paiute (Numic)"],"key_texts":["Sarah Winnemucca Hopkins, Life Among the Piutes: Their Wrongs and Claims (1883)","L.L. Loud & M.R. Harrington, Lovelock Cave (1929)","Ongoing oral tradition of the Pyramid Lake Paiute Tribe and other Paiute communities"],"cosmological_structure":"Paiute creation narratives speak of an earlier age inhabited by 'beautiful giants' who lived between the Sierra Nevada and the Rockies. After they mistreated a disfigured child, the Great Spirit made the land hot and allowed enemies to conquer them. The Si-Te-Cah ('tule-eaters') tradition specifically describes a hostile red-haired people the Paiute warred against and ultimately destroyed at Lovelock Cave.","tier_mapping":{"tier_1":[],"tier_2":["paiute-great-spirit"],"tier_3":[],"tier_4":["si-te-cah"],"cross_tier":[]},"scholarly_note":"The Si-Te-Cah tradition is doubly contested: (1) some Paiute accounts describe them as ordinary humans hostile to the Northern Paiute, while later versions describe them as red-haired giants and cannibals; (2) the 1911 Lovelock Cave discovery was partly sensationalized by tourist-display entrepreneurs, and academic re-examination (Loud & Harrington, and a 1970s University of Nevada study) found skeletons of normal stature. The 'reddish hair' is now generally attributed to post-mortem pigment degradation. Adrienne Mayor's *Fossil Legends of the First Americans* offers the most balanced treatment. The tradition deserves to be in a comparative-giants database with these caveats clearly attached."},{"id":"celtic-irish-shared","name":"Wider Insular Celtic + Continental Celtic (cross-cultural references)","geographic_origin":"Ireland, Britain, Brittany, Gaul","earliest_attestation":"Romano-Celtic inscriptions; medieval Insular Celtic manuscripts","language_layers":["Old Irish","Welsh","Gaulish","Brittonic"],"key_texts":["Mabinogi (Welsh)","various Romano-Celtic dedications","Caesar's De Bello Gallico VI"],"cosmological_structure":"Pan-Celtic divine figures with reflexes across Insular and Continental traditions: Lugus / Lugh / Lleu; Brigantia / Brigid; Cernunnos; Epona. Many Continental Celtic deities were syncretized with Roman ones (interpretatio romana).","tier_mapping":{},"scholarly_note":"Used as a reference tradition for pan-Celtic parallels beyond the Old Irish core."},{"id":"buddhist","name":"Buddhist (Theravada, Mahayana, Vajrayana)","geographic_origin":"Indian subcontinent; spread across South, Southeast, East, and Central Asia","earliest_attestation":"c. 5th c. BCE (historical Buddha); first written texts c. 1st c. BCE","language_layers":["Pali","Sanskrit","Classical Chinese","Tibetan","Japanese"],"key_texts":["Pali Canon (Tipitaka)","Mahayana sutras (Lotus, Heart, Diamond, Avatamsaka)","Vajrayana tantras","Tibetan Book of the Dead"],"cosmological_structure":"Anatta and shunyata make creator-deity inapplicable in the strict sense. Mahayana develops the Trikaya: Dharmakaya (unmanifest), Sambhogakaya (archetypal Buddhas), Nirmanakaya (historical Buddhas). Vajrayana centers Adi-Buddha (Samantabhadra or Vajradhara). Mara is the archonic adversary.","tier_mapping":{"tier_1":["adi-buddha","dharmakaya"],"tier_2":["sambhogakaya-buddhas","avalokiteshvara"],"tier_3":["mara"],"tier_4":[],"cross_tier":["maitreya-future-buddha","padmasambhava"]},"scholarly_note":"Buddhism maps poorly onto creator-god tier schemes. Theravada is often called non-theistic; Mahayana and Vajrayana have rich celestial hierarchies. The tier mapping is a cross-tradition translation."},{"id":"zoroastrian","name":"Zoroastrian (Mazdayasna)","geographic_origin":"Iranian plateau","earliest_attestation":"c. 1500–1000 BCE (Gathas of Zarathustra)","language_layers":["Avestan","Middle Persian (Pahlavi)"],"key_texts":["Avesta (Gathas, Yashts, Vendidad, Yasna)","Bundahishn","Denkard"],"cosmological_structure":"Cosmic dualism: Ahura Mazda (Wise Lord, asha/truth) vs Angra Mainyu/Ahriman (Hostile Spirit, druj/lie). Six Amesha Spentas vs six counter-demons. 12,000-year cosmic war ending in Frashegird (final renovation) when Saoshyant appears. Yima/Jamshid is first king of golden age. Zurvanite heresy: Zurvan (Time) as parent of twins.","tier_mapping":{"tier_1":["zurvan-time"],"tier_2":["ahura-mazda","amesha-spentas"],"tier_3":["ahriman"],"tier_4":["daevas-zoroastrian"],"cross_tier":["saoshyant","yima-first-king","mithra-iranian"]},"scholarly_note":"Zoroastrian dualism profoundly influenced Second Temple Judaism, Gnosticism, and Manichaeism. Apocalyptic eschatology and Satan-as-cosmic-adversary likely owe much to Zoroastrian influence (Boyce, Cohn)."},{"id":"taoist","name":"Chinese — Taoist / Folk Religion","geographic_origin":"China","earliest_attestation":"c. 6th c. BCE (Daodejing); Three Pure Ones c. 4th–6th c. CE","language_layers":["Classical Chinese"],"key_texts":["Daodejing","Zhuangzi","Liezi","Daozang","Shanhaijing"],"cosmological_structure":"Tao is the unnamable Source. Tao → One → Two (yin/yang) → Three → Ten Thousand Things. Three Pure Ones (Sanqing): Yuanshi Tianzun, Lingbao Tianzun, Daode Tianzun (divinized Laozi). Jade Emperor administers celestial bureaucracy. Pangu is primordial giant whose body becomes the cosmos.","tier_mapping":{"tier_1":["tao-unnamable"],"tier_2":["three-pure-ones","jade-emperor"],"tier_3":[],"tier_4":["celestial-bureaucracy"],"cross_tier":["laozi-descended-sage","pangu-primordial-giant","xiwangmu"]},"scholarly_note":"Taoism and Chinese folk religion overlap with Confucianism and Buddhism in 'the three teachings.' Jade Emperor is largely folk-religion rather than philosophical Taoism."},{"id":"yoruba","name":"Yoruba / Ifá","geographic_origin":"West Africa (modern Nigeria, Benin); diaspora forms in Cuba (Santería), Brazil (Candomblé), Haiti (Vodou)","earliest_attestation":"Oral tradition; first written ethnographies 19th c. CE","language_layers":["Yoruba","Lucumí"],"key_texts":["Odu Ifá (256 divination verses)","Ese Ifá","Bascom and Abimbola ethnographies"],"cosmological_structure":"Olodumare is unknowable Supreme Being, withdrawn. Below: Orishas — emanations through whom Olodumare's ase reaches the world. Major: Obatala (creator-of-humans), Yemoja (mother), Oshun (love), Shango (thunder), Ogun (iron), Eshu/Elegua (messenger), Orunmila (wisdom/Ifá).","tier_mapping":{"tier_1":["olodumare"],"tier_2":["obatala","yemoja","orunmila"],"tier_3":[],"tier_4":["orishas-collective"],"cross_tier":["eshu-elegua","shango","ogun"]},"scholarly_note":"One of the largest still-practiced African traditional religions; in diaspora forms tens of millions of adherents. Olodumare/Orisha structure parallels withdrawn-high-god + active-emanations patterns in Canaanite (El+sons), Gnostic (Monad+Aeons), Wandjina (Idjair+Wallungunder)."},{"id":"andean","name":"Andean (Inca and Pre-Inca)","geographic_origin":"Andes (Peru, Bolivia, Ecuador, northern Chile)","earliest_attestation":"Pre-Inca from c. 3000 BCE; Inca c. 13th–16th c. CE","language_layers":["Quechua","Aymara"],"key_texts":["Spanish chroniclers (Cieza de León, Garcilaso, Cobo)","Huarochirí Manuscript (c. 1608)","oral tradition"],"cosmological_structure":"Viracocha emerged from Lake Titicaca, made sun, moon, stars, humans, withdrew. Inti (sun) is most venerated Inca deity, ancestor of royal line. Pachamama (Earth Mother). Mama Killa (moon), Illapa (thunder), Supay (underworld). Three realms: Hanan Pacha, Kay Pacha, Uku Pacha.","tier_mapping":{"tier_1":["viracocha"],"tier_2":["inti","pachamama"],"tier_3":[],"tier_4":["mama-killa","illapa"],"cross_tier":["supay"]},"scholarly_note":"Andean cosmology is tied to landscape — apus (mountain spirits), wak'as (sacred places), ceque system. The formal pantheon here doesn't capture place-based lived religion."},{"id":"polynesian","name":"Polynesian (Hawaiian, Māori, Tahitian, Samoan, Tongan)","geographic_origin":"Polynesian triangle and broader Pacific","earliest_attestation":"Oral tradition; common Polynesian religion before great voyages (c. 1500 BCE Lapita); written records from 18th c.","language_layers":["Hawaiian","Māori","Tahitian","Samoan"],"key_texts":["Kumulipo (Hawaiian creation chant)","Māori whakapapa","ethnographic compilations"],"cosmological_structure":"Io (Māori) / Kāne (Hawaiian) is supreme source. Major gods: Tangaroa (ocean), Rongo (peace/agriculture), Tāne (forests/light, separator of sky/earth), Tū (war), Tāwhiri (storm). Rangi (Sky-Father) and Papa (Earth-Mother) embrace until separated by children. Māui is trickster-culture-hero.","tier_mapping":{"tier_1":["io-supreme"],"tier_2":["kane-rangi-papa","tangaroa","tane"],"tier_3":[],"tier_4":[],"cross_tier":["maui-trickster","hina"]},"scholarly_note":"Io as supreme god is contested — some scholars argue Christian-influenced consolidation. Older traditions emphasize Rangi/Papa."},{"id":"slavic","name":"Slavic (Pre-Christian)","geographic_origin":"Eastern, Western, Southern Slavic lands","earliest_attestation":"c. 6th c. CE (Procopius); detailed Russian Primary Chronicle (12th c.)","language_layers":["Proto-Slavic","Old Church Slavonic"],"key_texts":["Russian Primary Chronicle","Helmold's Chronica Slavorum","Slovo o polku Igoreve","folk tradition (recorded 19th c.)"],"cosmological_structure":"Perun (storm-god, oak, thunder) heads Vladimir's pantheon (980 CE). Veles/Volos is underworld/cattle/poetry, Perun's adversary (IE storm-god vs serpent). Svarog (sky-father), Dazhbog (sun, ancestor of Russians), Stribog (wind), Mokosh (earth-mother). Rod is ancestral fate-power.","tier_mapping":{"tier_1":[],"tier_2":["svarog","perun"],"tier_3":[],"tier_4":["dazhbog","stribog","mokosh"],"cross_tier":["veles","rod"]},"scholarly_note":"Suppressed quickly after Christianization (9th–10th c.). Reconstruction depends on folk survivals and comparative IE method. Perun-Veles cosmic drama is clear PIE storm-god vs serpent reflex."}],"deities":[{"id":"monad","primary_name":"The Monad","alternate_names":["Bythos","The Invisible Spirit","The One","The Father of All","The Pleroma (as totality)"],"tradition_id":"gnostic","earliest_attestation":"1st–2nd c. CE Gnostic texts","primary_sources":["Apocryphon of John","Allogenes","Trimorphic Protennoia","Eugnostos the Blessed"],"etymology":"Greek 'monas' — unity, oneness","summary":"The unknowable, ineffable Source beyond all categories. Not a creator-being but the ground of being itself, from which all emanation proceeds.","facets":["monad-unmanifest"]},{"id":"yaldabaoth","primary_name":"Yaldabaoth","alternate_names":["Ialdabaoth","Saklas","Samael","The Demiurge","The Chief Archon"],"tradition_id":"gnostic","earliest_attestation":"2nd c. CE","primary_sources":["Apocryphon of John (NHC II,1)","Hypostasis of the Archons (NHC II,4)","On the Origin of the World (NHC II,5)"],"etymology":"Possibly 'child of chaos' or 'begetter of Sabaoth'","iconography":["lion-faced serpent","throne","seven Archons surrounding"],"summary":"Abortive offspring of Sophia, the Demiurge who fashioned the material cosmos in ignorance of the Pleroma above him. Declares himself the only God; rebuked by the voice from above as 'Samael, blind god.'","facets":["yaldabaoth-demiurge","yaldabaoth-usurper"]},{"id":"yahweh","primary_name":"Yahweh","alternate_names":["YHWH","Adonai","Elohim (in some contexts)","the Lord of Hosts"],"tradition_id":"hebrew-ot","earliest_attestation":"c. 13th–10th c. BCE","primary_sources":["Torah","Prophets","Psalms"],"etymology":"From Hebrew root H-W-H, 'to be'; 'He causes to be' or 'I AM'","summary":"The covenantal God of Israel. In orthodox reading: the one true God, creator and lawgiver. In Gnostic reading: the Demiurge mistaken for the Most High.","facets":["yahweh-creator","yahweh-jealous-god","yahweh-covenantal"]},{"id":"el-elyon","primary_name":"El Elyon","alternate_names":["El","El Shaddai","God Most High"],"tradition_id":"hebrew-ot","earliest_attestation":"Older Canaanite layer; pre-1200 BCE","primary_sources":["Genesis 14:18-20","Deuteronomy 32:8-9 (older textual tradition)","Psalm 82","Ugaritic Baal Cycle"],"etymology":"Hebrew/Canaanite: 'God Most High'","summary":"In the older Canaanite-Hebrew layer, El Elyon is the head of the divine council who divides the nations among his sons. Yahweh is one of those sons, assigned to Israel. Later orthodoxy collapses El Elyon and Yahweh into one being; Gnostics keep them distinct, mapping El Elyon to the true Father and Yahweh to the Demiurge.","facets":["el-elyon-council-head"]},{"id":"set","primary_name":"Set","alternate_names":["Seth","Sutekh","Suty"],"tradition_id":"egyptian","earliest_attestation":"c. 3200 BCE","primary_sources":["Pyramid Texts","Coffin Texts","Book of the Dead","Contendings of Horus and Seth","Plutarch's On Isis and Osiris"],"etymology":"Possibly 'pillar' or 'instigator'","iconography":["Set-animal (composite creature)","red color","was-scepter"],"summary":"Morally ambivalent Egyptian god. Early periods: protector of Ra against Apophis. Later periods: murderer of Osiris, emblem of chaos.","facets":["set-protector-of-ra","set-usurper-murderer","set-storm-desert"]},{"id":"marduk","primary_name":"Marduk","alternate_names":["Bel","Merodach"],"tradition_id":"mesopotamian","earliest_attestation":"c. 2000 BCE (Babylonian)","primary_sources":["Enuma Elish","Code of Hammurabi prologue"],"etymology":"Sumerian AMAR.UTU — 'calf of the sun'","iconography":["spade","dragon Mušḫuššu","fifty names"],"summary":"Chief god of Babylon. Slays Tiamat, the primordial chaos-mother, and fashions the world from her dismembered body. Establishes cosmic order and is exalted above all other gods.","facets":["marduk-cosmic-orderer","marduk-warrior"]},{"id":"inanna","primary_name":"Inanna","alternate_names":["Ishtar (Akkadian)","Astarte (Phoenician)","Queen of Heaven"],"tradition_id":"mesopotamian","earliest_attestation":"c. 4th millennium BCE","primary_sources":["Inanna's Descent to the Netherworld","Inanna and Enki","Epic of Gilgamesh","Hymns of Enheduanna"],"etymology":"Sumerian Nin-an-ak, 'Lady of Heaven'","iconography":["eight-pointed star","lions","reed-bundle"],"summary":"Goddess of love and war, of fertility and destruction. Crosses every boundary including life/death; descends to the underworld and returns transformed.","facets":["inanna-love-fertility","inanna-war","inanna-descended-goddess","inanna-queen-of-heaven"]},{"id":"zeus","primary_name":"Zeus","alternate_names":["Jupiter (Roman)","Dyaus Pita (Vedic cognate)","Zeus Pater"],"tradition_id":"greek","earliest_attestation":"Mycenaean Linear B, c. 1400 BCE","primary_sources":["Iliad","Odyssey","Hesiod's Theogony","Orphic Hymns"],"etymology":"From PIE *dyḗws — 'sky', 'shining heaven'","iconography":["thunderbolt","eagle","oak","throne"],"summary":"King of the Olympian gods. Sky-father, storm-god, lawgiver, oath-keeper, philanderer. Carries the contradictions of cosmic kingship.","facets":["zeus-sky-father","zeus-tyrant","zeus-oath-keeper","zeus-storm-god"]},{"id":"prometheus","primary_name":"Prometheus","alternate_names":["The Forethinker"],"tradition_id":"greek","earliest_attestation":"Hesiod, c. 700 BCE","primary_sources":["Hesiod's Theogony","Hesiod's Works and Days","Aeschylus's Prometheus Bound"],"etymology":"Greek 'forethought'","iconography":["fennel-stalk torch","chains","eagle at liver"],"summary":"Titan who steals fire from the gods to give to humanity, against Zeus's will. Punished by being chained to a rock where an eagle eats his liver daily.","facets":["prometheus-fire-bringer"]},{"id":"odin","primary_name":"Odin","alternate_names":["Óðinn","Woden","Wodan","Wotan","Gangleri","Hárr"],"tradition_id":"norse","earliest_attestation":"Roman-era Germanic; Eddic material 13th c. CE","primary_sources":["Poetic Edda (Völuspá, Hávamál, Grímnismál)","Prose Edda","Gesta Danorum"],"etymology":"Proto-Germanic *Wōðanaz, 'fury / inspiration / poetic frenzy'","iconography":["one eye","wide-brimmed hat","spear Gungnir","ravens Huginn and Muninn","Sleipnir"],"summary":"All-Father of the Norse pantheon. Restless wisdom-seeker who sacrifices himself to himself on Yggdrasil. Wanderer in disguise. Carries knowledge of his own doom at Ragnarök.","facets":["odin-all-father","odin-wanderer","odin-wisdom-seeker","odin-sacrificed-on-yggdrasil","odin-psychopomp"]},{"id":"loki","primary_name":"Loki","alternate_names":["Loptr","Hveðrungr"],"tradition_id":"norse","earliest_attestation":"Eddic material; possibly older","primary_sources":["Poetic Edda (Lokasenna, Þrymskviða)","Prose Edda","Loka Táttur"],"iconography":["bound serpent above him","shape-shifter"],"summary":"Trickster of the Norse pantheon. Helper and adversary of the gods. Father of Hel, Fenrir, and Jörmungandr. Eventually bound for the killing of Baldr; will break free at Ragnarök.","facets":["loki-trickster-liberator","loki-betrayer","loki-bound"]},{"id":"shiva","primary_name":"Shiva","alternate_names":["Śiva","Mahadeva","Rudra (Vedic precursor)","Hara","Shankara"],"tradition_id":"hindu","earliest_attestation":"Rudra in Rigveda, c. 1500–1200 BCE","primary_sources":["Rigveda (as Rudra)","Shvetashvatara Upanishad","Shiva Purana","Linga Purana"],"etymology":"Sanskrit 'auspicious'","iconography":["third eye","crescent moon","trident","serpent around neck","tiger skin","blue throat","ashes"],"summary":"Destroyer-transformer of the Hindu trimurti. Encompasses contradictions: ascetic and erotic, creator and destroyer, terrible and benevolent.","facets":["shiva-destroyer","shiva-ascetic","shiva-teacher","shiva-erotic","shiva-bhairava"]},{"id":"krishna","primary_name":"Krishna","alternate_names":["Kṛṣṇa","Govinda","Vasudeva"],"tradition_id":"hindu","earliest_attestation":"Mahabharata; full theological development by c. 1st millennium CE","primary_sources":["Mahabharata (esp. Bhagavad Gita)","Bhagavata Purana","Harivamsa"],"etymology":"Sanskrit 'dark', 'black'","iconography":["blue skin","flute","peacock feather","cows"],"summary":"Eighth avatar of Vishnu. Cosmic teacher (Bhagavad Gita), divine lover (Vrindavan), warrior-counselor (Mahabharata). Reveals himself as the supreme Source.","facets":["krishna-teacher","krishna-cosmic-form","krishna-divine-lover","krishna-trickster-child"]},{"id":"quetzalcoatl","primary_name":"Quetzalcoatl","alternate_names":["Kukulkan (Maya)","Gukumatz (K'iche')","Ehecatl"],"tradition_id":"aztec","earliest_attestation":"c. 1st c. CE (Teotihuacan)","primary_sources":["Florentine Codex","Codex Chimalpopoca","Popol Vuh"],"etymology":"'Feathered serpent' — quetzal feathers + coatl","iconography":["feathered serpent","conch shell","wind-jewel"],"summary":"Feathered serpent. Union of sky and earth. Civilizing teacher who gave humans corn, calendar, writing. Opposes blood sacrifice. Exiled by Tezcatlipoca; prophesies his return.","facets":["quetzalcoatl-culture-hero","quetzalcoatl-wind","quetzalcoatl-creator","quetzalcoatl-prophet-returning"]},{"id":"tezcatlipoca","primary_name":"Tezcatlipoca","alternate_names":["Black Tezcatlipoca","Smoking Mirror"],"tradition_id":"aztec","earliest_attestation":"c. 13th–14th c. CE","primary_sources":["Florentine Codex","Codex Borgia","Codex Telleriano-Remensis"],"etymology":"'Smoking Mirror'","iconography":["obsidian mirror foot","black face-paint","jaguar"],"summary":"Most complex god of the Aztec pantheon. Night sky, sorcery, memory, fate, war, rulership. Quetzalcoatl's shadow-twin and adversary.","facets":["tezcatlipoca-night-sky","tezcatlipoca-fate-sorcery","tezcatlipoca-adversary","tezcatlipoca-king-maker"]},{"id":"sophia","primary_name":"Sophia","alternate_names":["Hokhmah","Wisdom"],"tradition_id":"gnostic","earliest_attestation":"1st–2nd c. CE","primary_sources":["Apocryphon of John","Pistis Sophia","Hypostasis of the Archons","Valentinian Exposition"],"etymology":"Greek 'wisdom'","summary":"Wisdom — the last and youngest of the Aeons. Acts without her consort and produces Yaldabaoth. Descends into matter to recover the divine sparks. Both the cause of the fall and the means of return.","facets":["sophia-fallen-aeon","sophia-redemptive"]},{"id":"persephone","primary_name":"Persephone","alternate_names":["Kore","Proserpina (Roman)","Despoina"],"tradition_id":"greek","earliest_attestation":"c. 8th c. BCE (Hesiod, Homeric Hymn to Demeter)","primary_sources":["Homeric Hymn to Demeter","Hesiod, Theogony","Orphic Hymns","Eleusinian Mysteries (ritual context, c. 1500 BCE – 4th c. CE)"],"etymology":"Greek, possibly 'bringer of destruction' or pre-Greek origin","iconography":["pomegranate","torch","sheaf of grain","throne beside Hades"],"summary":"Daughter of Demeter and Zeus. Abducted by Hades to the underworld; her mother's grief brings winter to the earth. Eats pomegranate seeds and is therefore bound to return to the underworld for part of each year. The descended-and-returning goddess at the center of the Eleusinian Mysteries — the most important mystery cult of the ancient Mediterranean.","facets":["persephone-descent","persephone-queen-of-underworld"]},{"id":"christ","primary_name":"Christ","alternate_names":["Jesus of Nazareth","Christ-Logos","Yeshua","the Word made flesh","the Lamb","the Second Adam"],"tradition_id":"christian","earliest_attestation":"c. 50 CE (earliest Pauline letters); historical figure c. 4 BCE – c. 30 CE","primary_sources":["Pauline epistles (esp. Philippians 2, Colossians 1, 1 Corinthians 15)","Gospel of John (esp. prologue, Logos theology)","Synoptic Gospels (Matthew, Mark, Luke)","Book of Revelation","Gospel of Thomas, Gospel of Philip (esoteric)","Nicene Creed (325/381 CE)"],"etymology":"Greek Christos 'anointed' = Hebrew Mashiach (Messiah)","iconography":["cross / crucifix","lamb","fish (ichthys)","Pantocrator (cosmic ruler)","Sacred Heart","shepherd"],"summary":"Central figure of Christianity. Read on multiple levels: historical Jewish teacher executed under Pontius Pilate; theological Logos incarnate; Gnostic Christ-Aeon descending to wake the sparks of light; esoteric Solar-Logos. Combines the dying-rising god, the descended teacher, the sacrificed king, and the returning judge in a single figure.","facets":["christ-logos-descended","christ-crucifixion","christ-resurrection","christ-cosmic","christ-second-coming"]},{"id":"hermes-trismegistus","primary_name":"Hermes Trismegistus","alternate_names":["Thrice-Greatest Hermes","Hermes-Thoth","(syncretism of:) Greek Hermes + Egyptian Thoth"],"tradition_id":"hermetic","earliest_attestation":"c. 1st–3rd c. CE (Corpus Hermeticum); rooted in earlier Egyptian Thoth tradition","primary_sources":["Corpus Hermeticum (esp. Poimandres, Asclepius)","Emerald Tablet (Tabula Smaragdina)","Stobaean Hermetica","Discourse on the Eighth and Ninth (Nag Hammadi)"],"etymology":"Greek Hermês Trismegistos 'Thrice-Greatest Hermes'","iconography":["scribe with tablet","caduceus","ibis-headed (via Thoth)","with the Emerald Tablet"],"summary":"Syncretic figure combining Greek Hermes (messenger, psychopomp, guide of souls) with Egyptian Thoth (scribe of the gods, master of wisdom and writing). The legendary author of the Hermetica — texts presenting a path of gnosis through cosmic understanding. The tutelary figure of Renaissance Hermeticism, alchemy, and the entire Western esoteric tradition. 'As above, so below.'","facets":["hermes-trismegistus-wisdom-teacher","hermes-psychopomp"]},{"id":"dyeus-phater","primary_name":"*Dyḗus Ph₂tḗr","alternate_names":["Dyēus Pətḗr (alternative reconstruction)","The Shining Sky-Father","PIE Sky-Father"],"tradition_id":"proto-indo-european","earliest_attestation":"Reconstructed; root attested in daughter languages by c. 2000 BCE","primary_sources":["Reconstructed via cognate set: Vedic Dyaus Pita, Greek Zeus Pater, Latin Iūpiter (Dieu-piter), Illyrian Deipaturos, Hittite Šiu, Luwian Tiwaz, Norse Týr (Proto-Germanic *Tīwaz), Albanian Zojz."],"etymology":"*dyḗws ('shining sky, daylight heaven') + *ph₂tḗr ('father'). Root *dyew- 'to shine, day-sky' — same root that gives Latin diēs, Sanskrit div, and the English word 'day'.","iconography":["the bright daytime sky itself","(daughter traditions add: thunderbolt, oak, eagle, throne)"],"summary":"The reconstructed sky-father at the root of the Indo-European pantheon. The shining daytime heaven personified, addressed as father. Every daughter tradition's high god — Zeus, Jupiter, Tyr/Týr, Dyaus, Tiwaz — descends from this single linguistic and religious root. The clearest single piece of evidence that the scattered Indo-European peoples once shared a common cult.","facets":["dyeus-sky-father-root"]},{"id":"perkwunos","primary_name":"*Perkʷunos","alternate_names":["The Striker","PIE Storm-Father","Lord of the Oak"],"tradition_id":"proto-indo-european","earliest_attestation":"Reconstructed; cognates attested from c. 1500 BCE","primary_sources":["Reconstructed via: Vedic Parjanya, Lithuanian Perkūnas, Latvian Pērkons, Slavic Perun, Norse Fjörgynn (Thor's mother's name; Thor inherits the function), Celtic Hercynia (oak-forest), Hittite Pirwa, Albanian Perëndi."],"etymology":"From PIE *per- 'to strike' (or *perkʷu- 'oak'). The Striker — he who strikes with the thunderbolt — and/or the god of the oak (the tree most often struck by lightning).","iconography":["thunder-axe / thunder-hammer","oak tree","bull or stag"],"summary":"The reconstructed storm-warrior of the Indo-European pantheon. Wields a stone axe or hammer (later: thunderbolt). Slays the serpent-of-the-waters who has dammed the cosmic rivers — the Chaoskampf myth that recurs in every IE daughter tradition. Inherited by Thor (hammer slays Jörmungandr), Indra (vajra slays Vritra), Zeus (thunderbolt slays Typhon), Perun (axe slays Veles).","facets":["perkwunos-storm-warrior","perkwunos-dragon-slayer"]},{"id":"hausos","primary_name":"*H₂éwsōs","alternate_names":["Hausōs","The Dawn-Maiden","PIE Dawn-Goddess"],"tradition_id":"proto-indo-european","earliest_attestation":"Reconstructed; cognates from c. 1500 BCE","primary_sources":["Reconstructed via: Vedic Uṣas, Greek Ēōs, Latin Aurōra, Lithuanian Aušrinė, Latvian Auseklis, Anglo-Saxon Ēostre (origin of 'Easter'), Germanic *Austrōn, Hittite (likely related) Šiwat."],"etymology":"From PIE *h₂ews- 'to shine, dawn'. Same root that gives Latin aurum (gold — the dawn-colored metal) and the cardinal direction 'east' (the place of dawning).","iconography":["rosy-fingered, golden-robed maiden","drawn by horses across the sky","veil that lifts as she rises"],"summary":"The reconstructed dawn-goddess. Daughter of the sky-father. Eternally young, eternally rising, the bringer of daylight. Her name survives in 'Easter' — the springtime resurrection feast absorbed by Christianity retains the PIE dawn-goddess's name. One of the most securely reconstructed PIE deities.","facets":["hausos-dawn-maiden"]},{"id":"trito","primary_name":"*Tritós","alternate_names":["Trito","The Third","PIE Warrior-Hero"],"tradition_id":"proto-indo-european","earliest_attestation":"Reconstructed myth; cognate narratives from c. 1500 BCE","primary_sources":["Reconstructed via comparative mythology: Vedic Trita Āptya, Avestan Thraētaona (slays the three-headed Aži Dahāka), Norse Thor (vs. Jörmungandr), Roman Hercules (vs. Cacus, who stole his cattle), Greek Heracles (vs. Geryon), Hittite Tarhunna (vs. Illuyanka). Reconstructed by Bruce Lincoln, Calvert Watkins, and others."],"etymology":"PIE *tri- 'three' — 'the Third' or 'the Third Man'.","iconography":["warrior with a club, hammer, or thunderweapon","cattle he has recovered","the slain three-headed serpent"],"summary":"The reconstructed PIE warrior-hero. A three-headed serpent (or the monster Trikephalos / Triśiras / Aži Dahāka) steals the primordial cattle. Trito, often with the help of the storm-god, slays the serpent and recovers the herd — establishing the warrior's right to take back what has been wrongly taken. The ur-myth of the Indo-European warrior class; ancestor of every dragon-slaying hero from Heracles to Thor to St. George.","facets":["trito-dragon-slayer-hero"]},{"id":"agni-fire-pie","primary_name":"*H₁n̥gʷnis","alternate_names":["PIE Fire-God","The Sacrificial Fire personified"],"tradition_id":"proto-indo-european","earliest_attestation":"Reconstructed; cognates from c. 1500 BCE","primary_sources":["Reconstructed via: Vedic Agni, Latin ignis, Lithuanian ugnis, Slavic ogn'/ogon', Hittite Agniš. The deity-status is clearest in Vedic; the cognate set establishes the PIE root."],"etymology":"PIE *h₁n̥gʷnis 'fire'. Latin ignis; English 'ignite'.","iconography":["the altar-flame","messenger between gods and humans"],"summary":"The reconstructed PIE personification of sacrificial fire. The fire on the altar that carries the offering up to the gods is itself divine — the visible messenger between human and heavenly realms. The cognate set is linguistically secure; whether the PIE speakers worshipped fire as a personal deity (as the Vedic Indians clearly did) or only as a sacred element is debated.","facets":["agni-fire-pie-mediator"]},{"id":"vishnu","primary_name":"Vishnu","alternate_names":["Viṣṇu","Hari","Narayana","Vasudeva","Janardana"],"tradition_id":"hindu","earliest_attestation":"Rigveda, c. 1500–1200 BCE (minor god); full development by c. 1st millennium CE","primary_sources":["Rigveda (hymns 1.154, 1.155 — the three strides)","Vishnu Purana","Bhagavata Purana","Mahabharata","Vaishnava Agamas"],"etymology":"Sanskrit, possibly from *viś- 'to pervade' — 'the All-Pervader'","iconography":["blue skin","four arms","conch (Panchajanya)","discus (Sudarshana Chakra)","mace (Kaumodaki)","lotus","reclining on Shesha the cosmic serpent on the ocean of milk","Garuda as vahana"],"summary":"Preserver of the trimurti. The cosmic principle that maintains dharma across the yuga cycles. Descends as a series of avatars (traditionally ten: Matsya, Kurma, Varaha, Narasimha, Vamana, Parashurama, Rama, Krishna, Buddha, and the future Kalki) whenever dharma declines. In Vaishnava theology, the supreme Source itself, with Brahma and Shiva as his expressions.","facets":["vishnu-cosmic-preserver","vishnu-avatar-principle","vishnu-narayana-cosmic-source"]},{"id":"indra","primary_name":"Indra","alternate_names":["Śakra","Devendra","Vajra-pāṇi (the Thunderbolt-Handed)"],"tradition_id":"hindu","earliest_attestation":"Rigveda, c. 1500–1200 BCE (the most-invoked god of the Rigveda)","primary_sources":["Rigveda (roughly 250 hymns to Indra — more than any other deity)","Mahabharata","Puranas (where his status is diminished)"],"etymology":"Sanskrit; possibly related to *indu- 'drop' (of soma) or to PIE *h₂nḗr 'man, virile'","iconography":["thunderbolt (vajra)","elephant Airavata","bow (the rainbow)","thousand eyes (after Ahalya curse)"],"summary":"Storm-king of the Vedic pantheon. Slayer of Vritra the serpent who dammed the cosmic waters. Drinker of soma. King of Svarga (the heavenly realm). In the Vedic period, the supreme warrior-god; in the Puranic period, demoted to chief of the lesser devas. Direct cognate of the broader Indo-European storm-warrior.","facets":["indra-storm-king","indra-vritra-slayer","indra-soma-drinker","indra-demoted-archon"]},{"id":"varuna","primary_name":"Varuna","alternate_names":["Varuṇa","Lord of Rta"],"tradition_id":"hindu","earliest_attestation":"Rigveda, c. 1500–1200 BCE","primary_sources":["Rigveda (esp. hymns 7.86, 7.88, 7.89 — penitential)","Atharvaveda","Mahabharata (as ocean-lord)"],"etymology":"Sanskrit; possibly from *wer- 'to cover, encompass' (the all-encompassing sky). Often paired with PIE *Werunos; cognate proposals link to Greek Ouranos.","iconography":["noose (pāśa) — to bind the false-swearer","makara (sea-creature) as vahana","white robes"],"summary":"Vedic sovereign of cosmic order (rta) and of the oath. Originally the all-encompassing sky, paired with Mitra as the Mitra-Varuna dyad — Mitra the friendly contract, Varuna the dread oath. Sees all wrongdoing; binds the false-swearer with his noose. Later demoted to god of waters and oceans. The clearest Vedic parallel to El, Yahweh-as-covenantal, and Zeus Horkios.","facets":["varuna-oath-keeper","varuna-cosmic-order","varuna-all-seeing"]},{"id":"mitra","primary_name":"Mitra","alternate_names":["Mithra (Iranian)","Mihr","Mithras (Roman mystery)"],"tradition_id":"hindu","earliest_attestation":"Rigveda, c. 1500–1200 BCE; also in the Mitanni treaty c. 1380 BCE","primary_sources":["Rigveda (esp. 3.59)","Avestan Mihr Yasht (for Iranian Mithra)","Mitanni-Hittite treaty (1380 BCE — Mitra invoked as oath-witness)","Roman Mithraic liturgies and reliefs (for Mithras)"],"etymology":"From Indo-Iranian *mitra- 'contract, alliance, friend' — possibly from PIE *mei- 'to bind, exchange'","iconography":["the sun's daily course","the contract personified","(Iranian/Roman:) bull-slayer, cap, torch-bearers"],"summary":"The contract-deity. Mitra is the sworn agreement made visible. Paired with Varuna in Vedic religion; independent in Iranian as Mithra (mediator between Ahura Mazda and humanity). The Roman mystery-cult of Mithras absorbed his iconography in the late antique period. One of the oldest continuously-attested Indo-Iranian deities — present in the 1380 BCE Mitanni treaty.","facets":["mitra-contract","mitra-solar-mediator"]},{"id":"yama","primary_name":"Yama","alternate_names":["Dharmaraja","Pretaraja","Yima (Avestan cognate)"],"tradition_id":"hindu","earliest_attestation":"Rigveda, c. 1500–1200 BCE","primary_sources":["Rigveda 10.10, 10.14, 10.135","Katha Upanishad (Yama teaches Nachiketa)","Garuda Purana","Mahabharata"],"etymology":"Sanskrit 'twin' (paired with his sister Yami); cognate with Avestan Yima","iconography":["buffalo as vahana","noose and mace","ledger of deeds","green or dark skin"],"summary":"First mortal — the first being to die — who became king of the dead and judge of the deceased. Lord of the southern direction. His Avestan cognate Yima (Jamshid in Persian) is the first king of the golden age, not a death-god — a clue to the figure's shifting role across Indo-Iranian tradition. Closest Vedic parallel to Osiris, Hades, Hel, and Anubis.","facets":["yama-death-judge","yama-first-mortal"]},{"id":"agni","primary_name":"Agni","alternate_names":["Vahni","Pavaka","Hutāśa (Devourer-of-Offerings)"],"tradition_id":"hindu","earliest_attestation":"Rigveda, c. 1500–1200 BCE (the very first hymn of the Rigveda is to Agni)","primary_sources":["Rigveda (more than 200 hymns)","Atharvaveda","Yajurveda (ritual context)"],"etymology":"Sanskrit; cognate with Latin ignis, Slavic ogon', Hittite Agniš — all from PIE *h₁n̥gʷnis 'fire'","iconography":["two heads (the household fire and the sacrificial fire)","seven tongues","ram as vahana","flames"],"summary":"Personified fire — both the household hearth and the sacrificial altar-flame. Messenger between humans and gods: the offering burned on Agni's altar is carried by him to the recipient deity. Mediates every Vedic sacrifice. Direct cognate of the broader Indo-European fire-god root.","facets":["agni-priest-of-gods","agni-fire-mediator"]},{"id":"kali","primary_name":"Kali","alternate_names":["Kālī","Mahakali","Chamunda","Dakshina-Kali"],"tradition_id":"hindu","earliest_attestation":"Devi Mahatmya, c. 5th–6th c. CE; antecedents in earlier Tantric and tribal traditions","primary_sources":["Devi Mahatmya (Markandeya Purana)","Kalika Purana","Mahabhagavata Purana","Tantric texts (Mahanirvana Tantra, Kularnava Tantra)"],"etymology":"Sanskrit, feminine of kāla 'time, black' — 'She who is Time' or 'The Black One'","iconography":["black or dark blue skin","lolling red tongue","garland of severed heads (mundamala)","skirt of severed arms","four arms with sword, severed head, and gestures of fearlessness and boon-giving","standing on Shiva's prone body"],"summary":"Goddess of time, destruction, and ultimate liberation. Born from Durga's brow in the fight against the demon Raktabija. Drinks the blood of her enemies before it touches the ground. Stands on Shiva — when she steps on him she pauses her destruction. Most fearsome and most liberating of the Hindu goddesses: in Tantric theology, the supreme reality itself in its destructive aspect, and the most direct path to moksha for those who can bear her face.","facets":["kali-destroyer","kali-redemptive","kali-time-itself"]},{"id":"kalki","primary_name":"Kalki","alternate_names":["Kalkin","The Tenth Avatar","The Future One"],"tradition_id":"hindu","earliest_attestation":"Mahabharata (mentioned); Kalki Purana, c. 17th–18th c. CE","primary_sources":["Mahabharata 3.188–189 (prophecy)","Vishnu Purana 4.24","Bhagavata Purana 12.2","Kalki Purana"],"etymology":"Sanskrit, possibly 'destroyer of foulness' or 'eternity-bearer'","iconography":["white horse (Devadatta)","flaming sword","white robes","(sometimes:) Kalki with the head of a horse"],"summary":"The tenth and future avatar of Vishnu. Will appear at the end of the Kali Yuga, riding a white horse and wielding a flaming sword, to destroy adharma and inaugurate the next Satya Yuga (golden age). Parallel of every returning-savior figure: the second-coming Christ, the Mahdi, the Maitreya Buddha, the hidden Imam, the returning Quetzalcoatl, the once-and-future Arthur, Saoshyant.","facets":["kalki-returning-savior"]},{"id":"watchers","primary_name":"The Watchers","alternate_names":["ʿIrin (Aramaic 'wakeful ones')","Egregoroi (Greek)","The Sons of God (bene ha-elohim, Genesis 6)","The Fallen Angels (later Christian framing)"],"tradition_id":"second-temple-apocryphal","earliest_attestation":"Genesis 6:1–4 (canonical, dated to the Yahwist/Priestly source layers, c. 6th c. BCE redaction); 1 Enoch Book of the Watchers, 3rd c. BCE","primary_sources":["Genesis 6:1–4","1 Enoch 6–11 (The Book of the Watchers)","1 Enoch 12–16 (Enoch's intercession)","Book of Jubilees 4–5","Book of Giants (Qumran 4Q203, 4Q530–532)","2 Peter 2:4 and Jude 6 (NT references)"],"etymology":"Aramaic ʿīr 'wakeful, watchful one'. The name reflects their function: angels who never sleep, who keep watch over the cosmos. Hence 'Watchers' in English.","iconography":["winged angelic beings","(in later art:) bound in chains in the abyss","(leaders:) Shemyaza as serpent-faced or many-headed"],"summary":"Two hundred angelic beings under Shemyaza and Azazel who descended to Mount Hermon, swore a mutual oath, took human wives, and begat the Nephilim. They taught humanity forbidden arts: Azazel taught metallurgy and weaponry and cosmetics; Shemyaza taught enchantments; others taught astrology, divination, pharmacology. For these transgressions they were bound in the earth until the day of judgment. In Enochic tradition they are the source of the wickedness that brought on the Flood.","facets":["watchers-fallen","watchers-teachers-of-forbidden-arts"]},{"id":"azazel","primary_name":"Azazel","alternate_names":["ʿAzāzʾēl","Asael (variant in 1 Enoch)","(later:) the goat-scapegoat figure of Leviticus 16"],"tradition_id":"second-temple-apocryphal","earliest_attestation":"Leviticus 16 (ritual); 1 Enoch 6–10 (mythological)","primary_sources":["Leviticus 16:8–10 (the scapegoat 'for Azazel' in Day of Atonement)","1 Enoch 8 (Azazel teaches metallurgy, weapons, cosmetics)","1 Enoch 10 (Azazel bound in the desert until judgment)","Apocalypse of Abraham 13–14"],"etymology":"Disputed. Possibly 'strength of God' (ʿazaz + ʾēl), or 'goat-god' (ʿez + ʾēl), or a place-name. In Leviticus the name refers either to a destination or to a recipient — the high priest releases the sin-bearing goat 'to Azazel' in the wilderness.","iconography":["bound in the wilderness with rocks heaped upon him","(later:) goat-headed","(in some grimoires:) standard-bearer of hell"],"summary":"Chief Watcher (alongside Shemyaza). In 1 Enoch he is the one who taught humans to make swords, daggers, shields, and breastplates, and taught women to paint their faces and wear ornaments. For this God commands Raphael to bind him hand and foot and cast him into a hole in the desert called Dudael, where he must remain until the final judgment. The Levitical scapegoat ritual is — on one reading — the annual symbolic transfer of Israel's sins back to the angelic source of human corruption.","facets":["azazel-teacher-of-weapons","azazel-bound-in-desert","azazel-scapegoat-recipient"]},{"id":"nephilim","primary_name":"The Nephilim","alternate_names":["Gibborim ('mighty ones')","Rephaim (overlapping category)","Anakim (descendants of Anak)","Emim, Zamzummim (regional names)","The Giants (English)"],"tradition_id":"second-temple-apocryphal","earliest_attestation":"Genesis 6:4; Numbers 13:33","primary_sources":["Genesis 6:1–4","Numbers 13:32–33 (the Anakim seen by Israelite spies in Canaan)","Deuteronomy 2:10–11, 2:20–21, 3:11 (Rephaim, Emim, Zamzummim)","1 Enoch 7, 9, 15 (origin and fate of the Nephilim)","Book of Giants (Qumran 4Q203, 4Q530–532)","Book of Jubilees 5, 7"],"etymology":"From Hebrew *naphal* 'to fall' — 'the fallen ones'. Alternative reading: from Aramaic *nephila* 'giant'. Most translations render 'giants', following the Septuagint *gigantes*.","iconography":["giants of enormous height (Numbers 13:33: 'we were like grasshoppers in our own sight')","(in Book of Giants:) named individuals like Ohyah and Hahyah","(in art:) towering over normal humans"],"summary":"The hybrid offspring of the Watchers and human women. They are described as giants — physical, enormous, and corrupted. They consume the produce of humanity, then humanity itself, before turning on each other. In 1 Enoch's account, when their physical bodies are killed in the Flood, their spirits do not die — they become the unclean spirits (demons) that afflict humanity in the present age. This is the Enochic theory of the origin of demons.","facets":["nephilim-giants","nephilim-flood-cause","nephilim-spirits-becoming-demons"]},{"id":"enoch-ascended","primary_name":"Enoch","alternate_names":["Ḥanok","(later transformation:) Metatron","Idris (in Islamic tradition)"],"tradition_id":"second-temple-apocryphal","earliest_attestation":"Genesis 5:21–24 (canonical); 1 Enoch from c. 3rd c. BCE","primary_sources":["Genesis 5:21–24 ('Enoch walked with God; and he was not, for God took him.')","1 Enoch (Book of the Watchers, Astronomical Book, Book of Parables, Animal Apocalypse, Epistle of Enoch)","2 Enoch (Slavonic)","3 Enoch / Sefer Hekhalot (Enoch's transformation into Metatron)","Jubilees 4","Quran 19:56–57; 21:85 (as Idris)"],"etymology":"Hebrew Ḥanok, possibly 'dedicated' or 'initiated'","iconography":["scribe with writing implements","(as Metatron:) 'the lesser YHWH' on a throne, with seventy names","(Idris:) prophet and writer of scripts"],"summary":"Seventh from Adam. Did not die — was taken bodily to heaven. Intercedes for the bound Watchers (they ask him to plead for them; his plea is refused). Receives extensive cosmological revelations during his heavenly tour. In 3 Enoch (later, Merkavah mysticism) he is transformed into Metatron, the 'lesser YHWH,' second only to God himself — the highest-ranked angelic figure in some Jewish esoteric traditions. The pattern of the ascended human seer who becomes a divine intermediary.","facets":["enoch-ascended-seer","enoch-becoming-metatron"]},{"id":"el-canaanite","primary_name":"El","alternate_names":["ʾIlu","El the Bull","El Father of Years","Father of the Gods"],"tradition_id":"canaanite-ugaritic","earliest_attestation":"Ugaritic Baal Cycle, c. 1400–1200 BCE; older West Semitic roots","primary_sources":["Baal Cycle (KTU 1.1–1.6)","Legend of Kirta","Phoenician inscriptions"],"etymology":"Common Semitic *ʾil-, 'god' / 'the strong one'; cognate with Hebrew El, Akkadian ilu, Arabic Allāh","iconography":["bearded patriarch enthroned","bull horns","wisdom-giver"],"summary":"The high god of the Canaanite pantheon. Father of the gods, head of the divine council, dweller at the source of the two rivers. Bestows kingship and offspring. Withdrawn from active rule — Baal does the fighting — but the ultimate authority. He is the direct prototype of the older-layer Hebrew El / El Elyon.","facets":["el-divine-council-head","el-creator-of-creatures","el-grantor-of-kingship"]},{"id":"asherah-mother","primary_name":"Asherah","alternate_names":["Athirat","Lady of the Sea","Qaniyatu Ilima ('Creatress of the Gods')"],"tradition_id":"canaanite-ugaritic","earliest_attestation":"Ugaritic Baal Cycle; Hebrew Bible polemic against her cult","primary_sources":["Baal Cycle","Hebrew Bible (1 Kings 18, 2 Kings 23)","Kuntillet Ajrud inscriptions"],"etymology":"Ugaritic Athirat, possibly 'she who treads upon the sea'","iconography":["sacred tree / pole","lions","spindle"],"summary":"Consort of El, mother of seventy sons (the divine council). The Kuntillet Ajrud inscriptions ('YHWH and his Asherah') indicate she was worshipped alongside YHWH in popular Israelite religion before the Deuteronomistic reform suppressed her cult.","facets":["asherah-mother-of-gods","asherah-tree-of-life"]},{"id":"baal-hadad","primary_name":"Baal Hadad","alternate_names":["Hadad","Baal","Baal-Zaphon","Rider of the Clouds"],"tradition_id":"canaanite-ugaritic","earliest_attestation":"Bronze Age West Semitic; Baal Cycle c. 1400–1200 BCE","primary_sources":["Baal Cycle","Hebrew Bible (polemical references)"],"etymology":"Baal = 'lord, master'; Hadad = the storm-god proper name","iconography":["thunderbolt mace","horned helmet","bull"],"summary":"Storm-god, lord of fertility, slayer of Yam (sea-chaos) and dier-and-riser before Mot (death). The seasonal pattern of his cycle — death, descent, return — is the structural prototype for the Tammuz / Adonis / Osiris / Dionysus / Christ dying-and-rising-god type.","facets":["baal-hadad-storm","baal-cosmic-orderer","baal-dies-and-rises"]},{"id":"mot","primary_name":"Mot","alternate_names":["Môtu","Death"],"tradition_id":"canaanite-ugaritic","earliest_attestation":"Baal Cycle","primary_sources":["Baal Cycle (KTU 1.5–1.6)"],"etymology":"Ugaritic mt, 'death', cognate with Hebrew mavet","iconography":["gaping throat","underworld"],"summary":"Death personified. Devours Baal in the dry season; Anat in turn destroys Mot to bring back the rains. The cycle establishes the death-of-the-fertility-god pattern.","facets":["mot-death"]},{"id":"yam","primary_name":"Yam","alternate_names":["Yamm","Prince Sea","Judge Nahar"],"tradition_id":"canaanite-ugaritic","earliest_attestation":"Baal Cycle","primary_sources":["Baal Cycle (KTU 1.2)"],"etymology":"Ugaritic ym, 'sea'","iconography":["serpent / dragon of the sea"],"summary":"Sea-chaos, the primordial waters threatening to overwhelm cosmic order. Baal slays Yam to establish kingship. The combat structurally parallels Marduk vs Tiamat, Indra vs Vritra, Thor vs Jörmungandr, YHWH vs Leviathan.","facets":["yam-sea-chaos"]},{"id":"anat","primary_name":"Anat","alternate_names":["ʿAnatu","Maiden Anat","Anat of the Battle"],"tradition_id":"canaanite-ugaritic","earliest_attestation":"Ugaritic + Egyptian (Anat venerated in New Kingdom Egypt)","primary_sources":["Baal Cycle","Legend of Aqhat","Egyptian stelae of Ramesside period"],"etymology":"Possibly 'providence' or 'sign'","iconography":["warrior maiden","wading in blood up to the thighs"],"summary":"Warrior virgin, sister-consort of Baal. Searches for Baal in the underworld and tears Mot apart to release him. Combines violent war and erotic-fertile aspects in one figure. Parallel to Inanna's descent.","facets":["anat-warrior-mourner"]},{"id":"rpum","primary_name":"The Rpum / Rephaim (Ugaritic)","alternate_names":["rpum","rapiʾūma","the Healers","Council of the Rephaim"],"tradition_id":"canaanite-ugaritic","earliest_attestation":"Ugaritic Rephaim Texts (KTU 1.20–1.22), c. 13th c. BCE","primary_sources":["Ugaritic Rephaim Texts (KTU 1.20–1.22)","Hebrew Bible: Gen 14:5, Deut 2:11, Deut 3:11, Josh 12:4, Isa 14:9, Job 26:5","Phoenician inscriptions"],"etymology":"Ugaritic rpʾ, 'to heal' — but in funerary context the rpum are the 'healed/restored ones,' i.e. the deified royal dead. Hebrew Rephaim carries both senses: living giant-warriors AND shades of the dead.","iconography":["warrior-shades","kings on chariots in the netherworld","associated with Bashan, Mt Hermon, the Golan"],"summary":"Ancestral warrior-shades, the deified royal dead of Ugarit, summoned in ritual feasts (marziḥu) to bless the living king. In the Hebrew Bible the term Rephaim sits across two registers: (1) the living giant-clans of Canaan — Og of Bashan is 'the last of the Rephaim' (Deut 3:11) — and (2) the shades in Sheol (Isa 14:9, Ps 88:10). Scholarly consensus is that the Ugaritic rpum and the biblical Rephaim share the same religious complex: ancestral warrior-dead centered on Bashan and Mt Hermon, the same territory the Bible assigns to King Og.","facets":["rpum-as-deified-dead","rephaim-as-giants","rephaim-of-bashan"]},{"id":"danu-irish","primary_name":"Danu (Old Irish)","alternate_names":["Danann","Ana","Anu","Mother of the Tuath Dé"],"tradition_id":"celtic-irish","earliest_attestation":"Reconstructed from ethnonym Tuath Dé Danann attested in medieval Irish manuscripts (Lebor Gabála Érenn, 11th–12th c. CE); the name likely preserves much older PIE material","primary_sources":["Lebor Gabála Érenn","Cath Maige Tuired","Sanas Cormaic"],"etymology":"From PIE *deh₂nu- 'river / flowing water' — same root as Vedic Dānu, Avestan dānu, and the river-names Danube, Don, Dnieper, Dniester, Donets, all of which preserve the original goddess-name as hydronyms","iconography":["mother","river-source","earth"],"summary":"Ancestral mother of the Tuatha Dé Danann ('Peoples of the Goddess Danu'), the pre-Christian Irish divine race. Her independent attestation is thin — she survives mainly in the ethnonym and in place-names — but the linguistic descent from PIE *deh₂nu makes her the Celtic reflex of the same primordial water/mother goddess whose Vedic reflex is Dānu, mother of the Danavas.","facets":["danu-mother-of-divine-race","danu-river-goddess"]},{"id":"dagda","primary_name":"The Dagda","alternate_names":["An Dagda","Eochaid Ollathair ('All-Father')","Ruad Rofhessa ('Lord of Great Knowledge')"],"tradition_id":"celtic-irish","earliest_attestation":"Medieval Irish manuscripts","primary_sources":["Cath Maige Tuired","Lebor Gabála Érenn"],"etymology":"Old Irish 'good god' — good in the sense of 'skillful, mighty'","iconography":["club that kills with one end and revives with the other","cauldron of plenty","harp that controls seasons"],"summary":"Father-figure of the Tuatha Dé. Wields the lorg mór (great club) and possesses the cauldron of abundance. The Irish parallel to the PIE sky-father / all-father archetype.","facets":["dagda-all-father","dagda-club-of-life-and-death"]},{"id":"lugh","primary_name":"Lugh","alternate_names":["Lug","Lugh Lámfada ('of the Long Arm')","Samildánach ('Skilled in All Arts')"],"tradition_id":"celtic-irish","earliest_attestation":"Medieval Irish material; Gaulish god Lugus attested earlier","primary_sources":["Cath Maige Tuired","Welsh Mabinogi (as Lleu)","Gaulish dedications"],"etymology":"Disputed; possibly from PIE *leuk- 'light' or *leug- 'oath / binding'","iconography":["spear","sling","many crafts"],"summary":"Polymath-hero of the Tuatha Dé. Slays his maternal grandfather Balor of the Evil Eye at the Second Battle of Mag Tuired. As many-skilled god he parallels Hermes / Odin / Krishna as a cross-tier polymath.","facets":["lugh-many-skilled","lugh-dragon-slayer"]},{"id":"morrigan","primary_name":"The Morrígan","alternate_names":["Morrígu","Mór-ríoghain ('Great Queen')","Badb","Macha","Nemain"],"tradition_id":"celtic-irish","earliest_attestation":"Medieval Irish material; older Celtic war-goddess substrate","primary_sources":["Táin Bó Cúailnge","Cath Maige Tuired"],"etymology":"Either 'Great Queen' (Old Irish mór + ríoghain) or 'Phantom Queen' (mor- 'terror')","iconography":["crow / raven","war","shape-shifter","triple-form"],"summary":"Triple war-goddess and fate-weaver. Appears as raven over the battlefield. Parallels the Norse Valkyries, the Vedic Nirṛti, and the cross-cultural sovereignty-goddess who tests heroes.","facets":["morrigan-war-fate","morrigan-sovereignty"]},{"id":"fomorians","primary_name":"The Fomorians","alternate_names":["Fomoire","Fomhóraigh"],"tradition_id":"celtic-irish","earliest_attestation":"Lebor Gabála Érenn","primary_sources":["Lebor Gabála Érenn","Cath Maige Tuired"],"etymology":"Disputed; possibly fo-mor 'under-sea / under-spectres' — chthonic / submarine origin","iconography":["one-eyed / one-armed / one-legged","monstrous","sea-dwellers"],"summary":"Chaos-powers and chthonic giants of Irish myth, defeated by the Tuatha Dé at the Second Battle of Mag Tuired. They occupy the structural slot of the Greek Titans, the Vedic Danavas / Asuras, and the Norse Jötnar — the older, defeated, monstrous race against which the gods of the cultivated cosmos define themselves.","facets":["fomorians-as-pre-divine-chaos","fomorians-as-giants"]},{"id":"balor","primary_name":"Balor","alternate_names":["Balor of the Evil Eye","Balor Birugderc"],"tradition_id":"celtic-irish","earliest_attestation":"Cath Maige Tuired","primary_sources":["Cath Maige Tuired","later folkloric retellings"],"etymology":"Possibly from a root meaning 'flashing' or 'deadly'","iconography":["single great eye that destroys what it looks upon","eyelid raised by warriors"],"summary":"King of the Fomorians, slain by his own grandson Lugh, who hurls a sling-stone through Balor's evil eye. The grandfather-slain-by-grandson motif parallels Kronos / Zeus and the dragon-slayer pattern.","facets":["balor-evil-eye-tyrant"]},{"id":"kashyapa","primary_name":"Kashyapa","alternate_names":["Kaśyapa","Prajāpati Kashyapa"],"tradition_id":"hindu","earliest_attestation":"Rigveda (as one of the seven seers, Saptarṣi); fully developed in Brahmanas, epics, Puranas","primary_sources":["Rigveda","Atharvaveda","Mahabharata","Vishnu Purana","Bhagavata Purana"],"etymology":"Sanskrit 'tortoise'; also linked to kaśya 'liquor' / 'wisdom'","iconography":["bearded sage","ascetic","begetter of races"],"summary":"Saptarṣi — one of the seven primordial seers — and prajāpati (progenitor) of nearly every class of being in the cosmos. Through his thirteen wives, the daughters of Daksha, he fathers the devas (through Aditi), the daityas (through Diti), the danavas (through Danu), the nāgas (through Kadru), Garuda and Aruna (through Vinata), and many other races. Structurally he sits in the slot occupied elsewhere by Adam or by El: the single male progenitor whose multiple consorts produce the contending divine lineages.","facets":["kashyapa-progenitor","kashyapa-saptarshi-seer"]},{"id":"aditi","primary_name":"Aditi","alternate_names":["Devamātṛ ('Mother of the Gods')"],"tradition_id":"hindu","earliest_attestation":"Rigveda (multiple hymns; one of the oldest goddesses)","primary_sources":["Rigveda","Yajurveda","Brahmanas","Puranas"],"etymology":"Sanskrit a-diti, 'unbounded' / 'free from limits' — privative of diti, 'bound'","iconography":["sky","infinity","mother of all light"],"summary":"The unbounded, the infinite. Mother of the Ādityas — the solar/sky deities including Varuna, Mitra, Bhaga, Indra (in some lists), and in later layers Vishnu. Her name is the negative of Diti's: the unbound vs the bound. The structural pairing of Aditi and Diti is the Vedic version of the wider IE pattern in which the cosmos is born of two contending mothers.","facets":["aditi-mother-of-devas","aditi-the-unbounded"]},{"id":"diti","primary_name":"Diti","alternate_names":["Mother of the Daityas"],"tradition_id":"hindu","earliest_attestation":"Late Rigveda / Brahmanas; fully developed in Puranas","primary_sources":["Rigveda 10.36 (mentioned alongside Aditi)","Puranas","Mahabharata"],"etymology":"Sanskrit diti, 'bound / limited' — privative pair with aditi","iconography":["mother of bound beings","earth"],"summary":"Wife of Kashyapa, mother of the Daityas — the asura-clan opposed to the devas. After Indra kills her sons she does penance for a son who will defeat Indra; Indra preempts by entering her womb and splitting the fetus into the Maruts (storm-gods). She structurally occupies the slot of the 'mother of the defeated divine race' — the divine mother on the wrong side of cosmic order.","facets":["diti-mother-of-daityas"]},{"id":"danu-vedic","primary_name":"Dānu (Vedic)","alternate_names":["Mother of Vṛtra","Mother of the Dānavas"],"tradition_id":"hindu","earliest_attestation":"Rigveda (RV 1.32, 2.11, etc. — esp. in Indra-Vṛtra hymns)","primary_sources":["Rigveda","Mahabharata","Puranas"],"etymology":"From PIE *deh₂nu- 'flowing water / river' — directly cognate with Old Irish Danu, Avestan dānu, and the river-names Danube, Don, Dnieper, Dniester, Donets (all of which preserve the goddess-name as hydronyms). One of the most secure IE goddess-etymologies.","iconography":["primordial waters","cow","mother-of-the-coiled-one"],"summary":"Vedic goddess of the primordial waters. Mother of Vṛtra (the cosmic serpent who withholds the waters until Indra slays him) and of the Dānavas (the broader asura-clan descended from her through Kashyapa). Rigveda 1.32 explicitly names her: 'The mother of Vṛtra, Dānu, lay like a cow with her calf.' She is the Vedic reflex of the same PIE water-mother whose Celtic reflex appears in Tuath Dé Danann.","facets":["danu-vedic-primordial-waters","danu-vedic-mother-of-vritra","danu-vedic-mother-of-danavas"]},{"id":"daksha","primary_name":"Daksha","alternate_names":["Dakṣa Prajāpati"],"tradition_id":"hindu","earliest_attestation":"Rigveda (as an Aditya); developed in Brahmanas and Puranas","primary_sources":["Rigveda","Brahmanas","Mahabharata","Bhagavata Purana","Shiva Purana"],"etymology":"Sanskrit dakṣa, 'capable / skillful'","iconography":["sometimes goat-headed (after Shiva's curse)","father of consorts of the gods"],"summary":"Prajāpati (progenitor) whose thirteen daughters — Aditi, Diti, Danu, Kadru, Vinata, and others — are given as wives to Kashyapa. Through this single fatherhood, every class of cosmic being — devas, asuras, daityas, danavas, nāgas, garuḍas — shares Daksha as common grandfather. Famously beheaded by Shiva's wrath at the Daksha Yajña; revived with a goat's head.","facets":["daksha-father-of-cosmic-mothers"]},{"id":"daityas","primary_name":"The Daityas","alternate_names":["Sons of Diti","the asura-clan-of-Diti"],"tradition_id":"hindu","earliest_attestation":"Vedic asura references; clan-specific naming in Brahmanas and Puranas","primary_sources":["Vedas","Mahabharata","Bhagavata Purana","Vishnu Purana"],"etymology":"Sanskrit daitya, 'descendant of Diti'","iconography":["powerful kings / warriors","rivals of the devas","ascetics of great tapas"],"summary":"The asura-clan descended from Diti through Kashyapa. Their dynastic members include Hiranyakashipu, Hiranyaksha, Prahlada, Virochana, and Bali. Repeatedly defeated by the devas (often via Vishnu's avatars), they nevertheless contain moral exemplars — Prahlada and Bali are great devotees. They occupy the structural slot of the 'older, mighty, defeated divine race' — the same slot as the Greek Titans, the Norse Jötnar, the Irish Fomorians, the Mesopotamian older gods slain by Marduk, and arguably the biblical Anakim / Rephaim / Nephilim.","facets":["daityas-as-defeated-older-race","daityas-as-mighty-asuras"]},{"id":"danavas","primary_name":"The Dānavas","alternate_names":["Sons of Dānu","the asura-clan-of-Dānu"],"tradition_id":"hindu","earliest_attestation":"Rigveda (collectively, as enemies of Indra); clan-specific naming later","primary_sources":["Rigveda","Mahabharata","Puranas"],"etymology":"Sanskrit dānava, 'descendant of Dānu'","iconography":["ocean-dwellers","subterranean","powerful mystic-magicians"],"summary":"The asura-clan descended from Dānu through Kashyapa. Vṛtra is their archetypal member; in later literature the architect Maya Dānava is the master-craftsman of the asuras, surpassing even Vishvakarma. Rigveda calls them amānuṣa ('unhuman'). They occupy the same structural slot as the Greek Titans and the Irish Fomorians, with the additional feature — unique to the Vedic version — that the linguistic descent of the matriarch's name is shared with the Celtic Danu, giving a rare case of named IE goddess-continuity.","facets":["danavas-as-defeated-older-race","danavas-as-subterranean-mystics"]},{"id":"vritra","primary_name":"Vṛtra","alternate_names":["Ahi ('Serpent')","Son of Dānu"],"tradition_id":"hindu","earliest_attestation":"Rigveda (RV 1.32 is the central Indra-Vṛtra hymn)","primary_sources":["Rigveda","Brahmanas","Mahabharata"],"etymology":"Sanskrit vṛtra, 'the encloser / obstructor' — root vṛ- 'to cover, withhold'","iconography":["coiled serpent / dragon","withholder of the waters"],"summary":"The cosmic serpent who coils around the mountains and withholds the waters of the world, lying 'like a cow with her calf' beside his mother Dānu. Indra slays him with the vajra, releasing the waters. This is the IE dragon-slaying myth in its oldest preserved form — structurally identical to Thor vs Jörmungandr, Baal vs Yam, Marduk vs Tiamat, YHWH vs Leviathan, Apollo vs Python, St George vs the Dragon, Trito vs the three-headed serpent in PIE reconstruction.","facets":["vritra-cosmic-serpent","vritra-withholder-of-waters"]},{"id":"anakim","primary_name":"The Anakim","alternate_names":["Sons of Anak","Bene Anak","Anakites","Iy-ʿAnaq (Egyptian Execration Texts)"],"tradition_id":"second-temple-apocryphal","ea
