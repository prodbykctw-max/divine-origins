rliest_attestation":"Egyptian Execration Texts, Middle Kingdom c. 19th–18th c. BCE (reference to 'Iy-ʿanaq' enemies of pharaoh in Canaan); Hebrew Bible: Numbers 13, Deut 1–3, 9, Joshua 11, 15","primary_sources":["Egyptian Execration Texts (Berlin, Brussels collections)","Papyrus Anastasi I (13th c. BCE, mentions Canaanite giants on travel routes)","Numbers 13:22, 13:33","Deuteronomy 1:28, 2:10–11, 2:21, 9:2","Joshua 11:21–22, 14:12–15, 15:13–14","1 Chronicles 20 (Goliath and his brothers as descendants)"],"etymology":"Hebrew ʿănāq / ʿănāqîm, possibly from a root meaning 'long-necked' or 'wearing a necklace/torque'. The Egyptian Iy-ʿanaq (with the ʿayin preserved) supports a real ethnonym, not just a Hebrew literary invention.","iconography":["towering warriors","torques / neck-ornaments","associated with Hebron"],"summary":"A giant warrior-clan of southern Canaan, attested independently in the Egyptian Execration Texts (where the three rulers of Iy-ʿanaq bear Semitic names) and in the biblical narrative. Numbers 13:33 explicitly identifies them as descendants of the Nephilim: 'And there we saw the Nephilim, the sons of Anak, who come from the Nephilim, and we were in our own sight as grasshoppers.' Deuteronomy 2:11 explicitly identifies them as a sub-group of the Rephaim. So in the biblical taxonomy: Nephilim (pre-flood) → Rephaim (post-flood giant complex) → Anakim (specific clan in southern Canaan) — with Og of Bashan as the last of the northern Rephaim and the Anakim/Goliath-line as the southern remnant. Caleb destroys the three sons of Anak — Sheshai, Ahiman, Talmai — at Hebron (Joshua 15:14). The Egyptian attestation as Iy-ʿanaq is the strongest piece of extra-biblical historical evidence for the giant-clan tradition.","facets":["anakim-giant-warriors","anakim-sons-of-anak","anakim-iy-anaq-egyptian"]},{"id":"og-of-bashan","primary_name":"Og of Bashan","alternate_names":["Og King of Bashan","Og the Amorite","Last of the Rephaim"],"tradition_id":"second-temple-apocryphal","earliest_attestation":"Hebrew Bible: Num 21:33, Deut 3:11, Josh 12:4","primary_sources":["Numbers 21:33–35","Deuteronomy 3:11 ('his bedstead of iron, nine cubits long')","Joshua 12:4, 13:12","Psalm 135:11, 136:20","Talmud Niddah 61a (Og as son of Ahijah son of Shemhazai the fallen angel)"],"etymology":"Disputed; possibly related to Ugaritic ʿg, 'giant'","iconography":["enormous bed/sarcophagus of iron","king of Bashan","associated with Mount Hermon"],"summary":"King of Bashan, slain by Israel under Moses. Described as the last of the Rephaim, with a bedstead nine cubits long (Deut 3:11 — approximately 14 feet by the standard cubit, the basis for tradition's claim of his giant stature). His kingdom in Bashan — the Golan, Mt Hermon region — overlaps exactly with the geography of the Ugaritic rpum cult. Rabbinic tradition (Talmud Niddah 61a) makes Og the grandson of Shemhazai the fallen Watcher, explicitly threading him into the Genesis 6 / Enochic lineage.","facets":["og-last-of-rephaim","og-king-of-bashan"]},{"id":"rephaim-biblical","primary_name":"The Rephaim (Hebrew Bible)","alternate_names":["Rephaim","Emim (Moabite name)","Zamzummim (Ammonite name)","Shades of Sheol"],"tradition_id":"second-temple-apocryphal","earliest_attestation":"Hebrew Bible (Gen 14:5 + ~24 other references)","primary_sources":["Genesis 14:5 (Chedorlaomer defeats them)","Genesis 15:20 (land promised to Abraham includes their territory)","Deut 2:10–11, 2:20–21, 3:11–13","Joshua 12:4, 13:12, 15:8, 17:15, 18:16","2 Samuel 5:18, 21:16–22","Isaiah 14:9, 26:14, 26:19","Job 26:5, Ps 88:10, Prov 2:18, 9:18, 21:16"],"etymology":"Hebrew rephāʾîm — dual sense: (1) 'giants / mighty ones,' deriving from a root rʾp suggesting strength/healing; (2) 'shades, the dead' in Sheol. The dual sense is inherited from Ugaritic rpum, which carries the same ambiguity.","iconography":["giant warriors","shades in the underworld","kings of Bashan"],"summary":"Umbrella category for the giant-clans of Canaan, of whom Og is the last northern remnant and the Anakim the southern remnant. Each regional people had its own name: Moabites called them Emim, Ammonites called them Zamzummim, Israelites called them Rephaim. In poetic/wisdom literature the same word denotes the shades of the dead in Sheol — preserving the Ugaritic double sense in which the Rephaim are simultaneously giant warrior-ancestors AND the deified royal dead. Goliath and his brothers (1 Chr 20) are the last Philistine remnant of this complex.","facets":["rephaim-biblical-giants","rephaim-as-shades-of-sheol"]},{"id":"manu-yemo","primary_name":"*Manu and *Yemo","alternate_names":["*Manus and *Yemos","the First Man and the Twin"],"tradition_id":"proto-indo-european","earliest_attestation":"Reconstructed PIE cosmogony, c. 4000–3000 BCE","primary_sources":["Vedic: Manu and Yama (Yama as the first to die)","Norse: Mannus (in Tacitus's Germania) and Ymir (the giant whose body becomes the cosmos)","Roman: Romulus and Remus (degraded reflex)","Iranian: Manu and Yima (Yima as first king and first mortal)","Reconstruction: Lincoln (1975), Mallory & Adams (2006)"],"etymology":"*Manu = 'man' (cf. Skt Manu, Germanic Mannus, English 'man'); *Yemo = 'twin' (cf. Skt Yama, Avestan Yima, Norse Ymir, Latin geminus)","iconography":["first sacrifice","body becomes the world"],"summary":"Reconstructed PIE cosmogonic twins. *Manu, the first priest, sacrifices *Yemo, the first king (his twin), and from Yemo's dismembered body the cosmos and its social orders are made. This is the source of the universal IE pattern of cosmos-from-sacrificed-primordial-being — surviving in Vedic Puruṣa-sūkta (RV 10.90), Norse Ymir, Chinese Pangu (via possible Tocharian transmission), and the Orphic Dionysus-Zagreus. The twin who is sacrificed becomes the first king of the dead (Yama / Yima).","facets":["manu-first-priest","yemo-sacrificed-twin","yemo-first-king-of-the-dead"]},{"id":"purusha","primary_name":"Puruṣa","alternate_names":["Cosmic Person","Hiraṇyagarbha (in related hymn)"],"tradition_id":"hindu","earliest_attestation":"Rigveda 10.90 (Puruṣa Sūkta) — one of the latest Rigvedic hymns","primary_sources":["Rigveda 10.90 (Puruṣa Sūkta)","Atharvaveda 19.6","Yajurveda (Vājasaneyi Samhitā 31)","Shvetashvatara Upanishad"],"etymology":"Sanskrit puruṣa, 'man / cosmic person / soul'","iconography":["thousand-headed, thousand-eyed thousand-footed","sacrificed by the gods"],"summary":"The cosmic Person whom the gods sacrifice at the beginning of creation; from his dismembered body the worlds, the four varnas, and all the elements arise. RV 10.90 is the Rigvedic version of the PIE Yemo-sacrifice cosmogony — the most explicit, datable instance of it. In later Sāṃkhya philosophy Puruṣa becomes the pure consciousness opposed to Prakṛti (nature/matter), shifting from cosmogonic figure to metaphysical principle.","facets":["purusha-sacrificed-cosmic-person","purusha-as-consciousness"]},{"id":"rta","primary_name":"Ṛta (Cosmic Order)","alternate_names":["Ṛta","the Cosmic Order","Truth-Order"],"tradition_id":"hindu","earliest_attestation":"Rigveda (one of the most central concepts of Vedic religion)","primary_sources":["Rigveda (pervasively)","later replaced/refigured as dharma"],"etymology":"From PIE *h₂er- 'to fit / join properly' — cognate with Avestan aša, Greek arariskō, Latin ars/artus, and conceptually with the Egyptian ma'at","iconography":["the lawful course of the cosmos","the path of the waters","the way of the gods"],"summary":"Not a deity in the strict sense but the cosmic order itself — the truth-fittingness that holds the universe together. Varuna is its primary guardian. This concept is shared with Zoroastrian aša and Egyptian ma'at — three independent attestations of the same PIE / Afro-Asiatic concept of impersonal cosmic order against which the gods themselves are measured.","facets":["rta-cosmic-order"]},{"id":"idjair-milky-way","primary_name":"Idjair","alternate_names":["the first Wandjina","the Father in the Milky Way"],"tradition_id":"aboriginal-kimberley","earliest_attestation":"Oral tradition; rock-art continuity dating to at least 4,000 years before present","primary_sources":["Mowanjum oral tradition","Worrorra, Ngarinyin, and Wunambal custodian teachings"],"etymology":"Worrorra / Ngarinyin / Wunambal (specific morphological analysis not given in publicly available sources)","iconography":["the Milky Way","stellar father"],"summary":"The first Wandjina, who dwells in the Milky Way and is father of all Wandjinas. Withdrawn from direct world-making; sent his son Wallungunder to create the earth. Structurally occupies a tier-1 / sky-father position.","facets":["idjair-milky-way-father"]},{"id":"wallungunder-first-wandjina","primary_name":"Wallungunder","alternate_names":["the first creating Wandjina","Son of Idjair"],"tradition_id":"aboriginal-kimberley","earliest_attestation":"Oral tradition; rock-art continuity","primary_sources":["Mowanjum oral tradition"],"etymology":"Worrorra / Ngarinyin / Wunambal","iconography":["large mouthless face","halo-headdress radiating outward (cloud / lightning)","elongated body"],"summary":"Son of Idjair. Created the earth and all life on it. Created the first human beings — the Gyorn Gyorn (Gwion Gwion) people. Returned to Idjair to bring back more Wandjinas to give the Gyorn Gyorn people the Law. The active world-creator.","facets":["wallungunder-creator","wallungunder-law-bringer"]},{"id":"namarali","primary_name":"Namarali","alternate_names":["Wandjina of the Worrorra"],"tradition_id":"aboriginal-kimberley","earliest_attestation":"Oral tradition; rock-art","primary_sources":["Worrorra custodian teachings; Mowanjum Art and Culture Centre"],"iconography":["the classic mouthless Wandjina face","halo-headdress","large staring eyes"],"summary":"Primary Wandjina of the Worrorra people. Rain-maker, fertility-bringer, lawgiver. Repainted ceremonially to ensure the continuation of life and the rains.","facets":["namarali-rain-fertility","namarali-law-and-power"]},{"id":"wodjin-ngarinyin","primary_name":"Wodjin / Wanalirri","alternate_names":["Wandjina of the Ngarinyin"],"tradition_id":"aboriginal-kimberley","earliest_attestation":"Oral tradition; rock-art","primary_sources":["Ngarinyin custodian teachings"],"iconography":["mouthless face","halo-headdress"],"summary":"Primary Wandjina of the Ngarinyin people.","facets":["wodjin-ngarinyin-primary"]},{"id":"rimijmarra","primary_name":"Rimijmarra","alternate_names":["Gulingi (Wunambal name for Wandjina generally)","Wandjina of the Wunambal"],"tradition_id":"aboriginal-kimberley","earliest_attestation":"Oral tradition; rock-art","primary_sources":["Wunambal custodian teachings"],"iconography":["mouthless face","halo-headdress"],"summary":"Primary Wandjina of the Wunambal people, who refer to Wandjina generally as Gulingi.","facets":["rimijmarra-wunambal-primary"]},{"id":"wunggurr-rainbow-serpent","primary_name":"Wunggurr","alternate_names":["Ungud (variant)","the Kimberley Rainbow Serpent"],"tradition_id":"aboriginal-kimberley","earliest_attestation":"Oral tradition; widely-attested Rainbow-Serpent complex across Aboriginal Australia","primary_sources":["Mowanjum oral tradition","wider Aboriginal Rainbow Serpent traditions"],"iconography":["serpent of rainbow colors","waters","creation"],"summary":"The Kimberley reflex of the broader pan-Aboriginal Rainbow Serpent creator-being, working in the same cosmological space as the Wandjina but with different ritual and territorial associations. Linked to deep water-holes (which are Wunggurr-places).","facets":["wunggurr-creator-serpent","wunggurr-waters"]},{"id":"paiute-great-spirit","primary_name":"The Great Spirit (Paiute)","alternate_names":[],"tradition_id":"paiute-great-basin","earliest_attestation":"Oral tradition","primary_sources":["Paiute oral tradition; Winnemucca, Life Among the Piutes (1883)"],"summary":"The Great Spirit of Paiute cosmology. In one creation narrative, Their Great Spirit creates an earlier race of 'beautiful giants' between the Sierra Nevada and the Rockies; when the giants mistreat a disfigured child, the Great Spirit makes the land hot and desolate and allows enemies to conquer them. Two giants survive — Paiute and his wife — from whom the people descend.","facets":["paiute-great-spirit-creator"]},{"id":"si-te-cah","primary_name":"The Si-Te-Cah","alternate_names":["Sai'i","Saiduka","the tule-eaters","the red-haired giants of Lovelock Cave"],"tradition_id":"paiute-great-basin","earliest_attestation":"Paiute oral tradition; first written attestation Winnemucca (1883)","primary_sources":["Sarah Winnemucca Hopkins, Life Among the Piutes (1883)","Loud & Harrington, Lovelock Cave (1929)","Adrienne Mayor, Fossil Legends of the First Americans (2005)"],"etymology":"Northern Paiute Si-Te-Cah, 'tule-eaters' (after the fibrous water plant they ate while living on rafts)","iconography":["red hair","tall stature in later versions","cannibals","tule rafts"],"summary":"A hostile people the Paiute warred against and ultimately destroyed at Lovelock Cave (modern Pershing County, Nevada). Earlier accounts (Winnemucca; her brother Natchez) describe them as 'ordinary human beings' who happened to be enemies; later versions describe them as red-haired giants and cannibals. The 1911 Lovelock Cave excavations recovered 10,000+ artifacts and mummified remains under bat guano; tourist-display entrepreneurs amplified the giant claim, but subsequent academic study (Loud & Harrington 1929; UN-Las Vegas anthropology 1970s) found skeletons within the normal human size range. The red hair is now generally attributed to post-mortem pigment degradation. The tradition is included in this database because it is part of the global giants complex; the giant-versus-ordinary-humans dispute is part of its history and is preserved in the scholarly_caveat field.","facets":["si-te-cah-giants","si-te-cah-conflict-and-destruction"]},{"id":"semyaza","primary_name":"Semyaza","alternate_names":["Semjaza","Shemhazai","Shemihazah (Aramaic 4Q201)","Šahmīzād (Manichaean)"],"tradition_id":"second-temple-apocryphal","earliest_attestation":"1 Enoch 6:3 (4th–3rd c. BCE); 4Q201; later Manichaean Book of Giants","primary_sources":["1 Enoch 6–10","4Q201 (Aramaic Enoch from Qumran)","Talmud Niddah 61a","Manichaean Book of Giants fragments"],"etymology":"Hebrew/Aramaic 'my name has seen' or 'he sees my name'","iconography":["leader of the Watchers","father of giants"],"summary":"Leader of the 200 Watchers who descended on Mount Hermon. Father (with a human wife) of the giants Ohyah and Hahyah per Book of Giants 4Q530. Taught humans enchantments and root-cuttings (1 Enoch 8:3). In rabbinic tradition (Talmud Niddah 61a) his grandson is Og of Bashan, explicitly tying him to the post-flood giant complex.","facets":["semyaza-watcher-chief","semyaza-taught-enchantments","semyaza-father-of-giants"]},{"id":"azazel-watcher","primary_name":"Azazel (Watcher)","alternate_names":["Asael","Asâal","Asa'el","Azâzêl","the scapegoat-deity (Lev 16)"],"tradition_id":"second-temple-apocryphal","earliest_attestation":"1 Enoch 8:1; Leviticus 16:8-10 (older Yom Kippur scapegoat tradition)","primary_sources":["1 Enoch 6–10, 54","Leviticus 16","Apocalypse of Abraham","Islamic tradition (Iblis-Azazil)"],"etymology":"Hebrew, possibly 'goat that departs' or 'fierce god'; in 1 Enoch 'God-made'","iconography":["bound in the desert (Dudael)","teacher of metallurgy and cosmetics"],"summary":"In 1 Enoch 8:1: 'And Azazel taught men to make swords, and knives, and shields, and breastplates, and made known to them the metals of the earth and the art of working them, and bracelets, and ornaments, and the use of antimony, and the beautifying of the eyelids.' He is the corrupter-by-technology, complement to Semyaza the corrupter-by-intercourse. In 1 Enoch 10:4-8 the angel Raphael binds him hand and foot in the desert place Dudael until the final judgment — the prototype of the cosmic-rebel-bound-in-pit pattern. Later Islamic tradition identifies him with Iblis.","facets":["azazel-watcher-teacher-of-arts","azazel-watcher-bound-in-desert","azazel-watcher-prometheus-parallel"]},{"id":"araqiel","primary_name":"Araqiel","alternate_names":["Arâkîba","Arataqoph (4Q201)","Artaqifa (2 Enoch)"],"tradition_id":"second-temple-apocryphal","earliest_attestation":"1 Enoch 6:7, 8:3","primary_sources":["1 Enoch 6, 8","4Q201"],"etymology":"Hebrew/Aramaic, possibly 'earth of God'","summary":"Watcher chief; taught the signs of the earth (1 Enoch 8:3).","facets":["araqiel-taught-signs-of-earth"]},{"id":"kokabiel","primary_name":"Kokabiel","alternate_names":["Kôkabîal","Kokabel","Kokabe[l] (4Q201)"],"tradition_id":"second-temple-apocryphal","earliest_attestation":"1 Enoch 6:7, 8:3","primary_sources":["1 Enoch","4Q201"],"etymology":"Hebrew kokab + el, 'star of God'","summary":"Watcher chief; taught the signs of the stars (1 Enoch 8:3) — the prototype of forbidden astrology.","facets":["kokabiel-taught-astrology"]},{"id":"baraqiel","primary_name":"Baraqiel","alternate_names":["Barâqîjâl","Baraqel (4Q201)","Wirōgdād (Manichaean)"],"tradition_id":"second-temple-apocryphal","earliest_attestation":"1 Enoch 6:7, 8:3","primary_sources":["1 Enoch","4Q201","Book of Giants 4Q203 / 4Q530","Manichaean Book of Giants"],"etymology":"Hebrew/Aramaic baraq + el, 'lightning of God'","summary":"Watcher chief; taught astrology / the signs of the lightnings. In the Book of Giants he is the father of the giant Mahaway (4Q530 frag 7); 'Baraqel, my father, was with me' (4Q203 frag 8).","facets":["baraqiel-taught-astrology","baraqiel-father-of-mahaway"]},{"id":"armaros","primary_name":"Armaros","alternate_names":["Armâros","Armen (2 Enoch)","Hermoni (Aramaic 4Q201)"],"tradition_id":"second-temple-apocryphal","earliest_attestation":"1 Enoch 6:7, 8:3","primary_sources":["1 Enoch","4Q201"],"etymology":"Hebrew/Aramaic, possibly 'cursed one' or 'arms of God'","summary":"Watcher chief; taught the resolving of enchantments / undoing of spells (1 Enoch 8:3).","facets":["armaros-taught-counter-enchantments"]},{"id":"sariel","primary_name":"Sariel","alternate_names":["Sarîêal","Suriel","Saraqael","Shahriel (4Q201)"],"tradition_id":"second-temple-apocryphal","earliest_attestation":"1 Enoch 6:7, 8:3","primary_sources":["1 Enoch","4Q201"],"etymology":"Hebrew sar + el, 'prince of God'","summary":"Watcher chief; taught the courses of the moon (1 Enoch 8:3).","facets":["sariel-taught-courses-of-moon"]},{"id":"samsiel","primary_name":"Samsiel","alternate_names":["Samsâpêal","Shamshiel","Shamshi[el] (4Q201)"],"tradition_id":"second-temple-apocryphal","earliest_attestation":"1 Enoch 6:7, 8:3","primary_sources":["1 Enoch","4Q201"],"etymology":"Hebrew shemesh + el, 'sun of God'","summary":"Watcher chief; taught the signs of the sun (1 Enoch 8:3).","facets":["samsiel-taught-signs-of-sun"]},{"id":"watcher-chiefs-other","primary_name":"The Other Watcher Chiefs (Râmêal, Dânal, Êzêqêal, Tâmîal, Râmîal, Batârêal, Anânêal, Zaqîêal, Satarêal, Tûrêal, Jômjâal)","alternate_names":["Ramael","Daniel-the-Watcher","Ezekeel","Tamiel","Ramiel","Batariel","Ananel","Zaqiel","Satarel","Turiel","Yomiel"],"tradition_id":"second-temple-apocryphal","earliest_attestation":"1 Enoch 6:7","primary_sources":["1 Enoch","4Q201"],"summary":"The remaining named chiefs of tens from Semyaza's twenty. Each led ten subordinate Watchers (200 total in the descent). Specific named teachings are recorded for some (e.g. Ezekeel taught the knowledge of the clouds; Sariel taught the courses of the moon — see 1 Enoch 8:3); for others, the 1 Enoch text lists only their names and rank.","facets":["watcher-chiefs-other-collective"]},{"id":"ohyah","primary_name":"Ohyah","alternate_names":["'Ohyah","Sām (Manichaean)","twin of Hahyah"],"tradition_id":"second-temple-apocryphal","earliest_attestation":"Dead Sea Scrolls Book of Giants (4Q530, 4Q531, 4Q203), c. 2nd–1st c. BCE","primary_sources":["Book of Giants 4Q530 frag 2 col ii (Ohyah's throne-room dream)","Book of Giants 4Q531 (Ohyah speaks to Gilgamesh)","Manichaean Book of Giants (as Sām)"],"etymology":"Aramaic; widely interpreted as ad hoc wordplay (possibly 'living one')","summary":"One of the two prominent giant brothers in the Book of Giants. Son of Shemhazai (Semyaza), the chief Watcher. Receives a throne-room dream (4Q530 col ii lines 15-20) that parallels Daniel 7 closely: 'The Ruler of the heavens came down to earth, and thrones were erected and the Great Holy One sat down.' Speaks with Gilgamesh in 4Q531. In the Manichaean version he is renamed Sām and fights the sea-monster Leviathan.","facets":["ohyah-dreams-of-judgment","ohyah-son-of-semyaza"]},{"id":"hahyah","primary_name":"Hahyah","alternate_names":["Nariman (Manichaean)","twin of Ohyah"],"tradition_id":"second-temple-apocryphal","earliest_attestation":"Book of Giants 4Q530, c. 2nd–1st c. BCE","primary_sources":["Book of Giants 4Q530","Manichaean Book of Giants (as Nariman)"],"etymology":"Aramaic; like Ohyah, widely interpreted as ad hoc wordplay","summary":"Twin brother of Ohyah, son of Shemhazai. Receives the complementary dream in 4Q530 col ii lines 6-12: a large garden tended by gardeners, destroyed by fire and water, with one tree of three branches preserved — interpreted as the destruction of the giants and the preservation of Noah and his three sons.","facets":["hahyah-dreams-of-garden","hahyah-son-of-semyaza"]},{"id":"mahaway","primary_name":"Mahaway","alternate_names":["Mahawai","Mahaway son of Baraq'el","Māhawai (Manichaean)"],"tradition_id":"second-temple-apocryphal","earliest_attestation":"Book of Giants 4Q203, 4Q530, c. 2nd–1st c. BCE","primary_sources":["Book of Giants 4Q203, 4Q530, 4Q531","Manichaean Book of Giants"],"etymology":"Disputed; possibly cognate with biblical Mehujael (Gen 4:18) or the Book of Moses Mahijah/Mahujah","summary":"Son of the Watcher Baraq'el (Baraqiel). The giants' messenger: after they cannot interpret the dreams of Ohyah and Hahyah, they send Mahaway to Enoch (who has been translated to heaven) for the interpretation. Mahaway flies on wings — the Manichaean version explicitly describes him as the winged envoy. Enoch gives him two tablets in response: one denouncing the giants, the second pronouncing judgment. Mahaway is structurally the only giant who can travel between earth and heaven — the messenger-figure who is also the only one with any chance of being heard.","facets":["mahaway-messenger-to-enoch","mahaway-son-of-baraqiel"]},{"id":"gilgamesh-as-giant","primary_name":"Gilgamesh (in the Book of Giants)","alternate_names":["Gilgameš","GLGMYŠ"],"tradition_id":"second-temple-apocryphal","earliest_attestation":"Book of Giants 4Q530, 4Q531, c. 2nd–1st c. BCE","primary_sources":["Book of Giants 4Q530 col ii line 2; 4Q531 frag 22"],"summary":"The same Gilgamesh as the hero of the Babylonian epic — but appearing in the Book of Giants as one of the antediluvian giants opposed to Enoch and the loyal angels. This is 'the only mention of Gilgamesh outside the cuneiform literature' (J.T. Milik). The Book of Giants thus directly references and absorbs the Gilgamesh epic — including Humbaba, who appears as the giant Hobabish (Ḥobabish, from Humbaba). Concrete evidence of the cross-pollination between Mesopotamian heroic tradition and Second Temple Watcher tradition.","facets":["gilgamesh-as-giant-of-book-of-giants"]},{"id":"hobabish","primary_name":"Hobabish","alternate_names":["Ḥobabish","from Humbaba (Mesopotamian)"],"tradition_id":"second-temple-apocryphal","earliest_attestation":"Book of Giants 4Q203 frag 3 line 3","primary_sources":["Book of Giants 4Q203"],"etymology":"Direct adaptation of Akkadian Humbaba, the cedar-forest monster slain by Gilgamesh and Enkidu","summary":"A named giant in the Book of Giants, whose name is the Aramaic adaptation of Humbaba — the cedar-forest guardian of the Gilgamesh epic. Milik first noted this identification. Confirms direct Mesopotamian influence on the Watcher-and-giants tradition.","facets":["hobabish-from-humbaba"]},{"id":"ahiram","primary_name":"Ahiram (giant)","alternate_names":["Aḥiram"],"tradition_id":"second-temple-apocryphal","earliest_attestation":"Book of Giants 4Q203/4Q530","primary_sources":["Book of Giants fragments"],"summary":"A named giant in the Book of Giants; less narratively prominent than Ohyah, Hahyah, or Mahaway.","facets":["ahiram-giant"]},{"id":"goliath","primary_name":"Goliath of Gath","alternate_names":["Goliath","Goliath the Philistine"],"tradition_id":"hebrew-ot","earliest_attestation":"1 Samuel 17 (c. 10th c. BCE narrative, finalized later); 1 Chronicles 20","primary_sources":["1 Samuel 17","2 Samuel 21:19","1 Chronicles 20:5, 20:8"],"etymology":"Possibly Lydian or Anatolian; not Semitic","iconography":["bronze helmet","scale armor","iron spearhead","six cubits and a span tall (~9'9\" by standard cubit)"],"summary":"The Philistine champion from Gath, slain by David's sling. 1 Chronicles 20:8 places him 'in the lineage of the giants' of Gath. The Septuagint and the Dead Sea Scrolls (4QSamᵃ) give his height as four cubits and a span (~6'9\"), while the Masoretic Text gives six cubits and a span (~9'9\"); this is one of the most-discussed manuscript variations in the Hebrew Bible. Goliath's brother Lahmi is named in 1 Chronicles 20:5 (also slain, by Elhanan).","facets":["goliath-philistine-giant","goliath-of-the-rephaim-line"]},{"id":"sheshai-ahiman-talmai","primary_name":"Sheshai, Ahiman, and Talmai","alternate_names":["the three sons of Anak at Hebron"],"tradition_id":"hebrew-ot","earliest_attestation":"Numbers 13:22; Joshua 15:14; Judges 1:10","primary_sources":["Numbers 13:22","Joshua 15:14","Judges 1:10"],"etymology":"All three names show Hurrian rather than Semitic affinities (de Vaux 1948; Encyclopedia.com), complicating the question of whether the Anakim were ethnically distinct from the surrounding Semitic populations of Canaan.","summary":"The three named sons of Anak who inhabited Hebron. Driven out and killed by Caleb in Joshua 15:14. The fact that they are named (rather than counted as anonymous giants) gives them a specific historical-narrative weight; the Hurrian name-affinities are one of the most-discussed pieces of ethnographic detail in the Hebrew Bible.","facets":["sheshai-ahiman-talmai-hebron-giants"]},{"id":"philistine-giants-of-gath","primary_name":"Sippai, Saph, Lahmi, and the Six-Fingered Giant","alternate_names":["the four giants of Gath slain by David's men","Ishbi-benob"],"tradition_id":"hebrew-ot","earliest_attestation":"2 Samuel 21:15-22; 1 Chronicles 20:4-8","primary_sources":["2 Samuel 21:15-22","1 Chronicles 20:4-8"],"summary":"Four named Rephaim-descended Philistine warriors slain by David's men: Ishbi-benob (whose spear weighed 300 shekels of bronze; slain by Abishai), Saph/Sippai (slain by Sibbecai), Lahmi the brother of Goliath (slain by Elhanan), and the unnamed six-fingered, six-toed giant of Gath (slain by Jonathan). 1 Chronicles 20:8: 'These were descended from the Rephaim in Gath, and they fell by the hand of David and by the hand of his servants.' The last surviving Rephaim-line of the southern Levant after Joshua's earlier conquest.","facets":["philistine-giants-of-gath-descendants-of-rephaim"]},{"id":"nimrod","primary_name":"Nimrod","alternate_names":["Nimrôd","the Mighty Hunter Before the Lord"],"tradition_id":"hebrew-ot","earliest_attestation":"Genesis 10:8-12; 1 Chronicles 1:10; Micah 5:6","primary_sources":["Genesis 10:8-12 (the Table of Nations; founder of Babel, Erech, Akkad)","1 Chronicles 1:10","Micah 5:6 ('the land of Nimrod')","Rabbinic literature (extensive — as builder of the Tower of Babel, opponent of Abraham)","Pseudo-Philo, Liber Antiquitatum Biblicarum","Quranic references (as opponent of Ibrahim)"],"etymology":"Disputed; possibly from a root meaning 'rebel' (Hebrew mrd)","iconography":["hunter","tower-builder","king of Babel"],"summary":"Great-grandson of Noah through Cush. Founder of Babel, Erech (Uruk), and Akkad — the Mesopotamian power-center. Identified in rabbinic tradition as the builder of the Tower of Babel and the king who threw Abraham into a fiery furnace. Some traditions identify him as a giant or as the first post-flood tyrant — the 'first mighty man on earth' (Gen 10:8). The structural parallel of the Tower-of-Babel narrative to the Quinametzin Aztec 'aspired to reach the gods' giants and to the Greek Titanomachy (Otus and Ephialtes piling Pelion on Ossa) makes him a key cross-tradition node.","facets":["nimrod-first-mighty-king","nimrod-tower-of-babel","nimrod-rebel-against-yhwh"]},{"id":"quinametzin","primary_name":"The Quinametzin","alternate_names":["Quinametli","the giants of the previous Sun"],"tradition_id":"aztec","earliest_attestation":"Aztec / Nahua oral tradition; Vatican Codex A (Ríos Codex); Spanish chronicler accounts (16th c. CE)","primary_sources":["Vatican Codex A (Ríos Codex)","Bernardino de Sahagún, Florentine Codex (esp. Book 12)","Diego Durán, Historia de las Indias","Fernando de Alva Ixtlilxochitl, Historia de la Nación Chichimeca","Anales de Cuauhtitlan"],"etymology":"Nahuatl quinametli + plural -tzin, 'giant people' (honorific plural)","iconography":["over 10 feet tall","weighing ~600 lbs","city-builders"],"summary":"Giants of the previous Sun-era (the sources disagree on which: Sun of Earth / Sun of Rain / Sun of Water). According to Aztec accounts they built the Great Pyramid of Cholula (by Xelhua, a 20-foot giant) and the city of Teotihuacan. They were destroyed by the gods through flood, earthquake, jaguars, hurricane, or collapse of the sky — sources vary — because of their sins, which include aspiring to reach the gods (the Tower-of-Babel motif), sins of the flesh, and drunkenness. Their bones, kept in Mictlan, are the material from which Ehecatl makes present-day humanity. Four giants — Cuauhtemoc, Izcoalt, Izcaqlli, Tenexuche — support the sky at the beginning of the Fifth (current) Sun. The Quinametzin parallel to the Nephilim is so close that Spanish chroniclers immediately identified them with the biblical giants and assimilated the two traditions.","facets":["quinametzin-giants-of-previous-sun","quinametzin-builders-of-pyramids","quinametzin-destroyed-for-sins","quinametzin-bones-become-humanity"]},{"id":"xelhua","primary_name":"Xelhua","alternate_names":["the giant of Cholula"],"tradition_id":"aztec","earliest_attestation":"Aztec / Nahua oral tradition; Spanish chronicler accounts","primary_sources":["Sahagún, Florentine Codex","Durán","Alva Ixtlilxochitl"],"summary":"Quinametzin giant credited with building the Great Pyramid of Cholula (the largest pyramid in the world by volume). Founder of seven pre-Columbian cities including Cuauhquechollan, Itzocan, Epatlán, Teopantlán, Tehuacán, Cuzcatlán, and Teotitlán. Survived the destruction of the previous Sun.","facets":["xelhua-builder-of-cholula"]},{"id":"tzilacatzin","primary_name":"Tzilacatzin","alternate_names":["the Otomi giant of Tlatelolco"],"tradition_id":"aztec","earliest_attestation":"16th c. CE Spanish chronicler accounts","primary_sources":["Sahagún, Florentine Codex Book 12"],"summary":"Historical Otomi warrior from Mexico-Tlatelolco who repelled Pedro de Alvarado's Spanish forces during the siege of Tenochtitlan by throwing rocks 'the size of watermelons.' Eyewitness accounts described him as over 10 feet tall. The rare case of a giant tradition with a near-contemporary, named, datable individual.","facets":["tzilacatzin-historical-giant"]},{"id":"titans-collective","primary_name":"The Titans","alternate_names":["the Twelve Titans","the elder gods"],"tradition_id":"greek","earliest_attestation":"Hesiod, Theogony c. 700 BCE","primary_sources":["Hesiod, Theogony","Apollodorus, Bibliotheca","Orphic fragments"],"etymology":"Greek Titanes; etymology disputed (possibly 'lords' or 'strainers' from Hesiod's pun)","summary":"The twelve elder gods, children of Uranus (Sky) and Gaia (Earth): Oceanus, Coeus, Crius, Hyperion, Iapetus, Theia, Rhea, Themis, Mnemosyne, Phoebe, Tethys, and Kronos. They rule the world before being overthrown by the Olympians in the Titanomachy. The defeated Titans are imprisoned in Tartarus. Structural parallel to the Vedic asuras, the Irish Fomorians, the biblical Nephilim/Rephaim, the Aztec Quinametzin, and the Norse Jötnar.","facets":["titans-elder-defeated-race","titans-imprisoned-in-tartarus","titans-children-of-sky-and-earth"]},{"id":"kronos","primary_name":"Kronos","alternate_names":["Cronus","Saturn (Roman)"],"tradition_id":"greek","earliest_attestation":"Hesiod, Theogony","primary_sources":["Hesiod, Theogony","Apollodorus","Orphic fragments"],"etymology":"Greek; folk-etymology with Chronos ('time') developed later","iconography":["sickle / scythe","devourer of his children"],"summary":"Youngest Titan, son of Uranus and Gaia. Castrates his father with a sickle, becomes king of the Titans. Devours his own children to prevent the prophecy of his overthrow; tricked by Rhea who substitutes a stone for the infant Zeus. Eventually overthrown by Zeus. The grandfather-castrated-by-son-castrated-by-grandson motif is the Greek version of the IE succession-by-violence cosmogonic pattern.","facets":["kronos-castrator-of-uranus","kronos-devourer-of-children","kronos-overthrown-by-zeus"]},{"id":"iapetus","primary_name":"Iapetus","alternate_names":["Japetus","Iapetos"],"tradition_id":"greek","earliest_attestation":"Hesiod, Theogony","primary_sources":["Hesiod","Apollodorus"],"etymology":"Possibly cognate with biblical Japheth (a longstanding speculation; the linguistic connection is debated but the parallelism of position is striking)","summary":"Titan, son of Uranus and Gaia. Father of Prometheus, Epimetheus, Atlas, and Menoetius. The Iapetus-Japheth parallel is one of the oldest comparative-mythology observations (going back to early Christian apologists); the linguistic relationship remains contested but the structural role of 'progenitor of a key human-related lineage' aligns.","facets":["iapetus-father-of-prometheus"]},{"id":"atlas","primary_name":"Atlas","alternate_names":["Atlas the Titan"],"tradition_id":"greek","earliest_attestation":"Hesiod, Theogony; Homer, Odyssey 1.52","primary_sources":["Hesiod","Homer","Apollodorus"],"etymology":"Greek a-tla, 'one who endures / bears'","iconography":["holding the heavens on his shoulders"],"summary":"Titan, son of Iapetus, condemned by Zeus to hold up the sky for eternity after the Titanomachy. Structurally parallel to the four Quinametzin sky-bearers (Cuauhtemoc, Izcoalt, Izcaqlli, Tenexuche) of Aztec cosmology, and to the four directional Lokapalas of Hindu cosmology.","facets":["atlas-sky-bearer"]},{"id":"rhea","primary_name":"Rhea","alternate_names":["Cybele (later assimilation)"],"tradition_id":"greek","earliest_attestation":"Hesiod, Theogony","primary_sources":["Hesiod","Apollodorus"],"etymology":"Greek; possibly 'flowing one'","summary":"Titan, sister-consort of Kronos. Mother of the elder Olympians (Hestia, Demeter, Hera, Hades, Poseidon, Zeus). Saves the infant Zeus by substituting a stone for him. The mother of the divine-succession line.","facets":["rhea-mother-of-olympians"]},{"id":"jotnar-collective","primary_name":"The Jötnar","alternate_names":["Jötunn (sg)","the Frost Giants","the Mountain Giants","the Etins"],"tradition_id":"norse","earliest_attestation":"Old Norse poetic and prose Edda, 13th c. CE manuscripts preserving older oral material","primary_sources":["Poetic Edda (Völuspá, Vafþrúðnismál, Þrymskviða, Hávamál)","Prose Edda (Gylfaginning, Skáldskaparmál)"],"etymology":"Old Norse jötunn, 'devourer / great eater'","iconography":["enormous size","frost / mountain dwellers","Jötunheim"],"summary":"The elder, larger race against which the Æsir define themselves. They predate the gods (Ymir, the primordial jötunn, is the first being). They live in Jötunheim. The Æsir are themselves descended from jötnar through Bestla (mother of Odin). At Ragnarök the jötnar, led by Surtr, destroy the world. Structural parallel to the Titans, Fomorians, Quinametzin, Nephilim/Rephaim, Daityas, Danavas.","facets":["jotnar-elder-defeated-race","jotnar-frost-giants","jotnar-destroy-world-at-ragnarok"]},{"id":"ymir","primary_name":"Ymir","alternate_names":["Aurgelmir","the primordial giant"],"tradition_id":"norse","earliest_attestation":"Eddic material; closely cognate with PIE *Yemo","primary_sources":["Völuspá","Vafþrúðnismál","Gylfaginning ch. 5-8"],"etymology":"Old Norse Ymir, cognate with PIE *Yemo 'twin' (Vedic Yama, Avestan Yima)","iconography":["primordial giant","body becomes the cosmos"],"summary":"First being, born from the meeting of fire and ice in Ginnungagap. Killed by Odin, Vili, and Vé; from his body the world is made (flesh = earth, blood = sea, skull = sky, brains = clouds, eyebrows = Midgard). The Norse direct reflex of PIE *Yemo, the sacrificed twin from whose body the cosmos is constructed. The Vedic Puruṣa Sūkta (RV 10.90) is the closest mythological parallel.","facets":["ymir-primordial-cosmic-body","ymir-pie-yemo-reflex"]},{"id":"surtr","primary_name":"Surtr","alternate_names":["Surt","the fire-giant of Muspelheim"],"tradition_id":"norse","earliest_attestation":"Völuspá, Gylfaginning","primary_sources":["Völuspá st. 51-52","Gylfaginning ch. 4, 51"],"etymology":"Old Norse 'the black one' or 'the swarthy one'","iconography":["flaming sword","fire-giant"],"summary":"Lord of Muspelheim (the fire-realm). At Ragnarök he leads the jötnar across Bifrost (which breaks under their weight) and burns the world with his flaming sword. The cosmic-fire-ender. Structural parallel to Kalki (Vedic eschatological horseman who ends the Kali Yuga) and Christ-at-second-coming.","facets":["surtr-fire-giant-end-bringer"]},{"id":"bestla","primary_name":"Bestla","alternate_names":["mother of Odin"],"tradition_id":"norse","earliest_attestation":"Eddic material","primary_sources":["Hávamál 140","Gylfaginning ch. 6"],"summary":"Jötunn-mother of Odin, Vili, and Vé. Her presence means the Æsir themselves are half-jötunn by maternal line — the Norse equivalent of the Bnei-Elohim / Daughters-of-Men mixing of divine and primordial bloodlines.","facets":["bestla-mother-of-odin","bestla-jotunn-blood-in-aesir"]},{"id":"thrym","primary_name":"Thrym","alternate_names":["Þrymr","king of the giants"],"tradition_id":"norse","earliest_attestation":"Þrymskviða (Poetic Edda)","primary_sources":["Þrymskviða"],"summary":"Jötunn-king who steals Thor's hammer Mjölnir and demands Freyja as bride; tricked by Thor (disguised as Freyja) and killed.","facets":["thrym-stealer-of-mjolnir"]},{"id":"skadi","primary_name":"Skaði","alternate_names":["Skadi","the ski-goddess"],"tradition_id":"norse","earliest_attestation":"Eddic material","primary_sources":["Skáldskaparmál","Lokasenna"],"summary":"Jötunn-woman who married into the Æsir (briefly, to Njörðr). Demonstrates the porous boundary between jötnar and gods.","facets":["skadi-jotunn-becomes-aesir"]},{"id":"adi-buddha","primary_name":"Adi-Buddha","alternate_names":["Samantabhadra","Kuntuzangpo (Tibetan)","Vajradhara","Primordial Buddha"],"tradition_id":"buddhist","earliest_attestation":"Mahayana/Vajrayana development, c. 6th–8th c. CE","primary_sources":["Avatamsaka Sutra","Guhyasamaja Tantra","Tibetan Nyingma literature"],"summary":"The Primordial Buddha — eternal awakened nature before any specific Buddha. In Nyingma, Samantabhadra (Kuntuzangpo, 'All-Good'); in newer schools, Vajradhara. Identical with Dharmakaya. Closest Buddhist Tier-1 equivalent.","facets":["adi-buddha-primordial","adi-buddha-dharmakaya-identity"]},{"id":"dharmakaya","primary_name":"Dharmakaya","alternate_names":["Truth-Body","Dharma-Body"],"tradition_id":"buddhist","earliest_attestation":"Mahayana c. 1st–4th c. CE","primary_sources":["Lotus Sutra","Yogacara works of Asanga/Vasubandhu","Tathagatagarbha sutras"],"summary":"The Truth-Body — Buddhahood as ultimate reality itself, shunyata realized. First of the three bodies. Unmanifest, formless, the suchness of all phenomena.","facets":["dharmakaya-truth-body"]},{"id":"sambhogakaya-buddhas","primary_name":"Sambhogakaya Buddhas (Five Dhyani Buddhas)","alternate_names":["Five Tathagatas","Five Wisdom Buddhas"],"tradition_id":"buddhist","earliest_attestation":"Mahayana c. 1st c. CE; Vajrayana systematization c. 8th c.","primary_sources":["Sarvatathagatatattvasamgraha","Guhyasamaja Tantra"],"summary":"Archetypal Buddhas of four directions plus center: Vairocana (center), Akshobhya (east), Ratnasambhava (south), Amitabha (west), Amoghasiddhi (north). Each presides over a Buddha-field and wisdom-aspect.","facets":["sambhogakaya-five-tathagatas"]},{"id":"avalokiteshvara","primary_name":"Avalokiteshvara","alternate_names":["Chenrezig (Tibetan)","Guanyin (Chinese)","Kannon (Japanese)"],"tradition_id":"buddhist","earliest_attestation":"Lotus Sutra c. 1st–2nd c. CE","primary_sources":["Lotus Sutra ch. 25","Karandavyuha Sutra","Heart Sutra"],"summary":"Bodhisattva of Infinite Compassion. Hears the cries of all suffering beings. Feminized in China as Guanyin. Every Dalai Lama held to be his emanation.","facets":["avalokiteshvara-compassion","avalokiteshvara-guanyin-feminine"]},{"id":"maitreya-future-buddha","primary_name":"Maitreya","alternate_names":["Mile (Chinese)","Miroku (Japanese)","Jampa (Tibetan)","The Future Buddha"],"tradition_id":"buddhist","earliest_attestation":"Pali Canon (Cakkavatti-sutta); ubiquitous in Mahayana","primary_sources":["Cakkavatti Sihanada Sutta","Maitreyavyakarana"],"summary":"The future Buddha. Currently bodhisattva in Tushita heaven; will descend at a future age when the Dharma is forgotten. Buddhist returning-savior — parallel of Kalki, second-coming Christ, Mahdi, Saoshyant, returning Quetzalcoatl.","facets":["maitreya-future-buddha-coming"]},{"id":"mara","primary_name":"Mara","alternate_names":["The Tempter","Lord of Death","Pāpīyas"],"tradition_id":"buddhist","earliest_attestation":"Pali Canon (Padhana Sutta)","primary_sources":["Padhana Sutta","Mara Samyutta","Buddhacarita"],"summary":"Cosmic tempter who tried to prevent the Buddha's awakening and keeps beings bound to samsara. Four Maras. Buddhist Tier-3/archonic figure: ruler of the desire-realm who would keep beings within it.","facets":["mara-tempter","mara-lord-of-desire-realm","mara-as-archon"]},{"id":"padmasambhava","primary_name":"Padmasambhava","alternate_names":["Guru Rinpoche","Lotus-Born"],"tradition_id":"buddhist","earliest_attestation":"Historical 8th c. CE","primary_sources":["Pema Kathang","terma texts"],"summary":"Tantric master who established Vajrayana in Tibet (8th c.). Born from a lotus. Concealed hidden teachings (terma) for later discovery. 'Second Buddha' to Nyingma school.","facets":["padmasambhava-tantric-master"]},{"id":"ahura-mazda","primary_name":"Ahura Mazda","alternate_names":["Ohrmazd","Hormazd","The Wise Lord"],"tradition_id":"zoroastrian","earliest_attestation":"Gathas c. 1500–1000 BCE","primary_sources":["Gathas","Younger Avesta","Bundahishn"],"etymology":"Avestan ahura ('lord') + mazda ('wise')","iconography":["winged sun-disk (Faravahar)"],"summary":"The Wise Lord. Source of asha (truth, cosmic order). Uncreated, all-good. Creator through his Holy Spirit (Spenta Mainyu). Locked in 12,000-year war with Ahriman, ultimately winning at Frashegird.","facets":["ahura-mazda-wise-lord","ahura-mazda-source-of-asha","ahura-mazda-cosmic-warrior"]},{"id":"ahriman","primary_name":"Angra Mainyu","alternate_names":["Ahriman","Hostile Spirit","The Lie"],"tradition_id":"zoroastrian","earliest_attestation":"Gathas","primary_sources":["Gathas","Vendidad","Bundahishn"],"etymology":"Avestan angra ('hostile') + mainyu ('spirit')","summary":"The Hostile Spirit. Source of druj (lie, disorder). Uncreated in classical Zoroastrianism. Creates daevas to counter Amesha Spentas. Ultimate ancestor of Satan as cosmic adversary in Christian theology.","facets":["ahriman-hostile-spirit","ahriman-source-of-lie","ahriman-eschatological-loser"]},{"id":"amesha-spentas","primary_name":"The Amesha Spentas","alternate_names":["Bountiful Immortals","Amshaspands"],"tradition_id":"zoroastrian","earliest_attestation":"Gathas","primary_sources":["Gathas","Yashts","Bundahishn"],"summary":"Six (or seven including Spenta Mainyu) divine emanations of Ahura Mazda, each presiding over a good creation: Vohu Manah (Good Mind/cattle), Asha Vahishta (Truth/fire), Khshathra Vairya (Dominion/sky), Spenta Armaiti (Devotion/earth), Haurvatat (Wholeness/waters), Ameretat (Immortality/plants). Probable origin of the seven-fold pattern in late antique angelology.","facets":["amesha-spentas-divine-council"]},{"id":"saoshyant","primary_name":"Saoshyant","alternate_names":["Astvat-Ereta","World-Savior"],"tradition_id":"zoroastrian","earliest_attestation":"Younger Avesta","primary_sources":["Yasht 19","Bundahishn"],"summary":"Future savior at the end of cosmic time. Performs the Frashegird, raises the dead, defeats Ahriman. Earliest fully-developed eschatological savior — probable source of Jewish messianism and Christian eschatology via Second Temple Judaism.","facets":["saoshyant-final-savior"]},{"id":"yima-first-king","primary_name":"Yima","alternate_names":["Jamshid (Persian)","Yima Khshaeta"],"tradition_id":"zoroastrian","earliest_attestation":"Gathas; major narrative Vendidad 2","primary_sources":["Vendidad 2","Shahnameh"],"etymology":"Avestan Yima — PIE *Yemo 'twin', cognate with Vedic Yama, Old Norse Ymir","summary":"First king of humanity, ruler of golden age. Given the vara (enclosed paradise) by Ahura Mazda to preserve seeds of all life through a coming winter. The Iranian fork of the PIE *Yemo myth.","facets":["yima-golden-age-king","yima-vara-builder","yima-pie-yemo-iranian"]},{"id":"zurvan-time","primary_name":"Zurvan","alternate_names":["Zurvan Akarana ('Boundless Time')"],"tradition_id":"zoroastrian","earliest_attestation":"Zurvanite tradition, prominent Sasanian period","primary_sources":["Plutarch","Eznik of Kolb","Manichaean references"],"summary":"In the Zurvanite heresy, Time itself — parent of both Ahura Mazda and Ahriman, born as twins from Zurvan's millennium of doubt. Suppressed by orthodox Zoroastrianism but influential on Manichaeism.","facets":["zurvan-boundless-time","zurvan-parent-of-twins"]},{"id":"daevas-zoroastrian","primary_name":"The Daevas","alternate_names":["Devs (Middle Persian)"],"tradition_id":"zoroastrian","earliest_attestation":"Gathas","primary_sources":["Gathas (Yasna 32, 34)","Vendidad","Bundahishn"],"etymology":"Avestan daēva, cognate with Vedic deva — but inverted: daevas are demons in Iranian, gods in Vedic. The linguistic fingerprint of the Indo-Iranian religious schism.","summary":"Hostile spirits aligned with Ahriman. Six chief daevas oppose six Amesha Spentas. Indra is named as a daeva in Vendidad — direct evidence of the schism.","facets":["daevas-zoroastrian-demons","daevas-vedic-deva-inversion"]},{"id":"mithra-iranian","primary_name":"Mithra (Iranian)","alternate_names":["Mihr","Mehr"],"tradition_id":"zoroastrian","earliest_attestation":"Younger Avesta; Mitanni treaty 1380 BCE","primary_sources":["Mihr Yasht","Mitanni treaty"],"summary":"Iranian development of contract-deity. 10,000 eyes, 10,000 ears, sees every contract. Mediator between Ahura Mazda and humanity. Source of Roman Mithraic mystery cult.","facets":["mithra-iranian-mediator","mithra-all-seeing-of-contracts"]},{"id":"tao-unnamable","primary_name":"The Tao","alternate_names":["Dao","The Way","The Nameless"],"tradition_id":"taoist","earliest_attestation":"Daodejing","primary_sources":["Daodejing","Zhuangzi","Huainanzi"],"summary":"Unnamable Source from which all manifestation flows. Daodejing 42: 'Tao gives birth to One; One gives birth to Two; Two gives birth to Three; Three gives birth to the Ten Thousand Things.' Chinese Tier-1 unmanifest source.","facets":["tao-unnamable-source","tao-source-of-yin-yang"]},{"id":"three-pure-ones","primary_name":"The Three Pure Ones (Sanqing)","alternate_names":["Sanqing","Three Heavenly Worthies"],"tradition_id":"taoist","earliest_attestation":"c. 4th–6th c. CE Shangqing/Lingbao Taoism","primary_sources":["Daozang texts"],"summary":"Highest deities of organized Taoism. Yuanshi Tianzun (Primordial Beginning), Lingbao Tianzun (Numinous Treasure), Daode Tianzun (Way-and-Virtue — divinized Laozi). Triad parallel to Trimurti and Trinity.","facets":["three-pure-ones-triad","yuanshi-tianzun-primordial"]},{"id":"jade-emperor","primary_name":"The Jade Emperor (Yu Huang)","alternate_names":["Yuhuang Shangdi"],"tradition_id":"taoist","earliest_attestation":"Folk development; codified Song dynasty","primary_sources":["Folk religion","Song-Qing imperial rituals"],"summary":"Supreme administrator of the celestial bureaucracy. Cosmos organized as imperial court — subordinate gods govern domains, file reports, follow procedures.","facets":["jade-emperor-celestial-bureaucrat"]},{"id":"celestial-bureaucracy","primary_name":"The Celestial Bureaucracy","alternate_names":["gods of folk religion"],"tradition_id":"taoist","earliest_attestation":"Tang-Song dynasty onward","primary_sources":["Folk religion compendia"],"summary":"Below the Jade Emperor: City Gods, Kitchen God, Earth God, River/Mountain Gods, Eight Immortals, King of Hell. Each has specific jurisdiction. Chinese 'archon/lesser ruler' tier as imperial officials rather than tyrants.","facets":["celestial-bureaucracy-officials"]},{"id":"laozi-descended-sage","primary_name":"Laozi","alternate_names":["Lao Tzu","Daode Tianzun (divinized)","Taishang Laojun"],"tradition_id":"taoist","earliest_attestation":"Traditional 6th c. BCE; divinized by 2nd c. CE","primary_sources":["Sima Qian's Shiji","Daodejing","Tianshi scriptures"],"summary":"Historical sage credited with the Daodejing. Later divinized as Daode Tianzun. By Han dynasty, said to appear as emanation of Tao in successive ages — Chinese descended-teacher pattern.","facets":["laozi-historical-sage","laozi-divinized-emanation"]},{"id":"pangu-primordial-giant","primary_name":"Pangu","alternate_names":["P'an-Ku"],"tradition_id":"taoist","earliest_attestation":"Sanwu Liji (3rd c. CE)","primary_sources":["Sanwu Liji","Wuyun Linian Ji"],"summary":"Primordial giant from whose body the cosmos is constructed. Born inside the cosmic egg. Holds heaven and earth apart for 18,000 years. When he dies: breath = wind/clouds, voice = thunder, left eye = sun, right eye = moon, blood = rivers, hair = stars, fleas = humans. Chinese parallel of Ymir, Puruṣa, PIE *Yemo — with no plausible historical connection. Convergent independent development.","facets":["pangu-cosmic-body","pangu-separator-of-sky-and-earth"]},{"id":"xiwangmu","primary_name":"Xiwangmu","alternate_names":["Queen Mother of the West"],"tradition_id":"taoist","earliest_attestation":"Shanhaijing c. 4th c. BCE","primary_sources":["Shanhaijing","Mu Tianzi Zhuan","Han murals"],"summary":"Goddess of Kunlun Mountains in the western paradise. Keeper of peaches of immortality (ripen every 3,000 years). Evolved from fierce plague-goddess to serene celestial queen.","facets":["xiwangmu-queen-of-immortality"]},{"id":"olodumare","primary_name":"Olodumare","alternate_names":["Olorun","Olofi","Eledumare"],"tradition_id":"yoruba","earliest_attestation":"Yoruba oral tradition; first ethnographies 19th c.","primary_sources":["Odu Ifá","Idowu (1962)","Abimbola (1976)"],"summary":"Supreme Being. Unknowable, withdrawn. Source of ase (sacred power). No direct shrines — veneration reaches Olodumare through the Orishas. Yoruba Tier-1 withdrawn-high-god.","facets":["olodumare-supreme-being","olodumare-source-of-ase","olodumare-withdrawn"]},{"id":"obatala","primary_name":"Obatala","alternate_names":["Orisha-nla","Oxalá","Obbatalá"],"tradition_id":"yoruba","earliest_attestation":"Yoruba oral tradition","primary_sources":["Odu Ifá"],"iconography":["white cloth","calabash","snail's shell"],"summary":"Creator of human bodies. Olodumare assigned him the task of creation. Sometimes drinks palm wine and shapes humans imperfectly — those born with disabilities are sacred to him. Associated with purity and elder-wisdom.","facets":["obatala-creator-of-humans","obatala-purity-and-wisdom"]},{"id":"yemoja","primary_name":"Yemoja","alternate_names":["Yemaya (Cuban)","Iemanjá (Brazilian)","Mother of Waters"],"tradition_id":"yoruba","earliest_attestation":"Yoruba oral tradition","primary_sources":["Odu Ifá"],"summary":"Mother of all Orishas. Goddess of the Ogun river (Yorubaland) or the ocean (diaspora). Patron of women, motherhood, childbirth.","facets":["yemoja-mother-of-orishas","yemoja-of-the-waters"]},{"id":"orunmila","primary_name":"Orunmila","alternate_names":["Ifá","Orula","Orunla"],"tradition_id":"yoruba","earliest_attestation":"Yoruba oral tradition","primary_sources":["Odu Ifá","Abimbola"],"summary":"Orisha of wisdom and divination. Witness of all destinies (Olodumare appointed him present at every birth). Custodian of Ifá divination — 256 Odu accessed through palm nuts or opele chain. Yoruba Hermes/Thoth equivalent.","facets":["orunmila-wisdom-and-divination","orunmila-witness-of-destinies"]},{"id":"eshu-elegua","primary_name":"Eshu / Elegua","alternate_names":["Esu","Elegguá","Exu","Legba"],"tradition_id":"yoruba","earliest_attestation":"Yoruba oral tradition","primary_sources":["Odu Ifá"],"summary":"Trickster-messenger of the Orishas. Guardian of the crossroads. Every sacrifice first passes through Eshu. Both child and elder. The principle of disturbance without which no transformation occurs. Misidentified by missionaries with Satan — a category error.","facets":["eshu-elegua-crossroads-trickster","eshu-elegua-messenger-mediator"]},{"id":"shango","primary_name":"Shango","alternate_names":["Sango","Chango","Xangô"],"tradition_id":"yoruba","earliest_attestation":"Historical figure (4th Alaafin of Oyo, c. 14th c.); divinized after death","primary_sources":["Odu Ifá","Oyo tradition"],"iconography":["double-headed axe (oshe)","red and white","thunder-stones"],"summary":"Orisha of thunder, lightning, fire, and royal power. Hurls thunderstones. Direct functional parallel of Thor, Indra, Perun, *Perkwunos.","facets":["shango-thunder-warrior"]},{"id":"ogun","primary_name":"Ogun","alternate_names":["Ogou","Ogún"],"tradition_id":"yoruba","earliest_attestation":"Yoruba oral tradition","primary_sources":["Odu Ifá"],"summary":"Orisha of iron, war, hunting, technology. Cleared the way for other Orishas to descend. Patron of blacksmiths, soldiers, surgeons. Smith-god with positive valence (compare Azazel-teacher-of-weapons with negative valence).","facets":["ogun-iron-warrior","ogun-clearer-of-paths"]},{"id":"orishas-collective","primary_name":"The Orishas","alternate_names":["Orixás","Orichas"],"tradition_id":"yoruba","earliest_attestation":"Yoruba oral tradition","primary_sources":["Odu Ifá"],"summary":"Collective term for the 401 (or 400+1) Orishas — divine emanations through whom Olodumare's ase reaches the world. Structural parallel of sons of El, devas, lokapalas, saints, Aeons.","facets":["orishas-collective-emanations"]},{"id":"viracocha","primary_name":"Viracocha","alternate_names":["Wiraqucha","Pachayachachic"],"tradition_id":"andean","earliest_attestation":"Pre-Inca (Wari, Tiwanaku); Inca codification","primary_sources":["Cieza de León","Sarmiento de Gamboa","Huarochirí Manuscript"],"summary":"Creator god. Emerged from Lake Titicaca, created sun, moon, stars, and first humans (from stones). Walked across the Andes teaching humans, then walked west across the Pacific promising to return.","facets":["viracocha-creator","viracocha-teaching-wanderer","viracocha-prophesied-return"]},{"id":"inti","primary_name":"Inti","alternate_names":["Apu-Punchau","Punchao"],"tradition_id":"andean","earliest_attestation":"Pre-Inca solar cults; central to Inca state religion","primary_sources":["Spanish chroniclers","Garcilaso"],"summary":"The sun. Ancestor of the Inca royal line — Sapa Inca is Inti's earthly son. Most venerated Inca deity. His golden disk in the Coricancha was heart of state religion.","facets":["inti-sun-father-of-inca"]},{"id":"pachamama","primary_name":"Pachamama","alternate_names":["Mama Pacha","Earth Mother"],"tradition_id":"andean","earliest_attestation":"Pre-Inca and Inca; continuously venerated to present","primary_sources":["Spanish chroniclers","living Quechua/Aymara practice"],"summary":"Earth Mother. Fertile ground, source of all that grows. Still actively venerated — offerings of coca leaves, chicha, foods buried for her in despachos.","facets":["pachamama-earth-mother","pachamama-still-venerated"]},{"id":"mama-killa","primary_name":"Mama Killa","alternate_names":["Mama Quilla","Moon Mother"],"tradition_id":"andean","earliest_attestation":"Inca tradition","primary_sources":["Spanish chroniclers"],"summary":"Moon-mother, sister-wife of Inti. Mother of Inca royal line through Inti. Regulator of lunar calendar.","facets":["mama-killa-moon"]},{"id":"illapa","primary_name":"Illapa","alternate_names":["Apu Illapu","Thunder-Lord"],"tradition_id":"andean","earliest_attestation":"Pre-Inca and Inca tradition","primary_sources":["Spanish chroniclers"],"summary":"God of thunder, lightning, rain. Wields a sling whose stones are thunderbolts. Brother of Inti and Mama Killa. Andean storm-god.","facets":["illapa-thunder-warrior"]},{"id":"supay","primary_name":"Supay","alternate_names":["Lord of the Inner Earth"],"tradition_id":"andean","earliest_attestation":"Pre-Inca and Inca tradition; transformed after Spanish conquest","primary_sources":["Spanish chroniclers"],"summary":"Lord of the Uku Pacha (inner/lower world). Originally an ambivalent ancestral power; missionaries equated him with the Devil — a category error embedded in Andean folk Catholicism. In Oruro Carnival's Diablada and the mining communities' El Tío, the original power survives behind the Devil-mask.","facets":["supay-lord-of-underworld","supay-conflated-with-devil"]},{"id":"io-supreme","primary_name":"Io","alternate_names":["Io Matua Kore ('Io the Parentless')","Io-nui"],"tradition_id":"polynesian","earliest_attestation":"Māori esoteric tradition; recorded 19th c.","primary_sources":["Elsdon Best","Te Kohuora chant"],"summary":"Supreme uncreated being in Māori esoteric tradition. Parentless, eternal. Pre-contact origin vs post-contact-Christian-influence is contested.","facets":["io-parentless-source"]},{"id":"kane-rangi-papa","primary_name":"Rangi and Papa / Kāne","alternate_names":["Ranginui","Papatūānuku","Kāne"],"tradition_id":"polynesian","earliest_attestation":"Pan-Polynesian","primary_sources":["Te Kohuora","Kumulipo"],"summary":"Rangi (Sky-Father) and Papa (Earth-Mother) embrace in primordial darkness; children crushed between them. Tāne separates them by force. Classic Sky-Father/Earth-Mother coupling in the Pacific — evidence the mytheme is near-universal not IE-specific.","facets":["rangi-papa-primordial-couple","tane-separator-of-sky-and-earth"]},{"id":"tangaroa","primary_name":"Tangaroa","alternate_names":["Kanaloa","Ta'aroa","Tagaloa"],"tradition_id":"polynesian","earliest_attestation":"Pan-Polynesian","primary_sources":["Polynesian oral tradition"],"summary":"God of the ocean and all sea-creatures. In Tahitian tradition the supreme creator. In Hawaiian Kanaloa paired with Kāne. Central to a sea-faring people.","facets":["tangaroa-ocean-god"]},{"id":"tane","primary_name":"Tāne","alternate_names":["Kāne (Hawaiian)","Tāne-mahuta"],"tradition_id":"polynesian","earliest_attestation":"Pan-Polynesian (Māori particular)","primary_sources":["Māori oral tradition"],"summary":"God of forests, birds, and light. Separates Rangi and Papa by pushing them apart. Source of trees from which voyaging canoes are made.","facets":["tane-forest-and-light"]},{"id":"maui-trickster","primary_name":"Māui","alternate_names":["Māui-tikitiki","Māui-pōtiki"],"tradition_id":"polynesian","earliest_attestation":"Pan-Polynesian","primary_sources":["Polynesian oral tradition"],"summary":"Trickster culture-hero. Fishes up islands. Snares the sun to slow its passage. Brings fire from Mahuika. Dies trying to win immortality from Hine-nui-te-pō. Direct structural parallel of Prometheus.","facets":["maui-fire-bringer","maui-fisher-of-islands","maui-snarer-of-sun","maui-fails-immortality"]},{"id":"hina","primary_name":"Hina","alternate_names":["Hine-nui-te-pō","Hina-i-ka-malama"],"tradition_id":"polynesian","earliest_attestation":"Pan-Polynesian","primary_sources":["Polynesian oral tradition"],"summary":"Goddess of moon, night, underworld, women. In Māori tradition Hine-nui-te-pō (Great-Woman-of-Night) is Māui's deathbringer. In Hawaiian and Tahitian, Hina is moon-goddess.","facets":["hina-moon-night-death"]},{"id":"svarog","primary_name":"Svarog","alternate_names":[],"tradition_id":"slavic","earliest_attestation":"Russian Primary Chronicle; c. 12th c.","primary_sources":["Russian Primary Chronicle","John Malalas Chronicle (Slavic translation)"],"summary":"Slavic sky-father and patron of blacksmiths and sacred fire. Father of Svarozhich (fire) and Dazhbog (sun). Medieval translation equates him with Hephaestus, but sky-father position suggests Dyeus-Phater equivalent.","facets":["svarog-sky-father-smith"]},{"id":"perun","primary_name":"Perun","alternate_names":["Piorun (Polish)"],"tradition_id":"slavic","earliest_attestation":"Russian Primary Chronicle (treaties 907, 945); Vladimir's pantheon (980)","primary_sources":["Russian Primary Chronicle","Procopius","Helmold"],"etymology":"Slavic; direct cognate with PIE *Perkwunos","iconography":["axe","thunder-stones","oak"],"summary":"Slavic storm-god, head of Vladimir's pre-Christian pantheon. Direct PIE *Perkwunos cognate. Preserves storm-god-slays-serpent myth as Perun vs Veles. After Christianization, attributes absorbed by St. Elias.","facets":["perun-storm-god","perun-vs-veles"]},{"id":"veles","primary_name":"Veles","alternate_names":["Volos"],"tradition_id":"slavic","earliest_attestation":"Russian Primary Chronicle (treaties 907, 971)","primary_sources":["Russian Primary Chronicle","Slovo o polku Igoreve"],"summary":"God of cattle, wealth, underworld, poetry, magic, oaths-sworn-on-cattle. Perun's adversary. After Christianization, attributes absorbed by St. Nicholas and St. Blaise.","facets":["veles-underworld-cattle-poetry","veles-perun-adversary"]},{"id":"dazhbog","primary_name":"Dazhbog","alternate_names":["Dazh'bog ('the Giving God')"],"tradition_id":"slavic","earliest_attestation":"Russian Primary Chronicle (Vladimir's pantheon, 980)","primary_sources":["Russian Primary Chronicle","Slovo o polku Igoreve"],"etymology":"Slavic dažd' ('give') + bog ('god')","summary":"Slavic sun-god, son of Svarog. In Slovo o polku Igoreve, Russians are called grandchildren of Dazhbog — sun-ancestor pattern parallel of Inca royal line as sons of Inti.","facets":["dazhbog-sun-ancestor"]},{"id":"stribog","primary_name":"Stribog","alternate_names":[],"tradition_id":"slavic","earliest_attestation":"Russian Primary Chronicle (Vladimir's pantheon, 980)","primary_sources":["Russian Primary Chronicle","Slovo o polku Igoreve"],"summary":"Slavic god of winds. Slovo o polku Igoreve calls the winds his grandchildren.","facets":["stribog-winds"]},{"id":"mokosh","primary_name":"Mokosh","alternate_names":["Mokoš"],"tradition_id":"slavic","earliest_attestation":"Russian Primary Chronicle (Vladimir's pantheon — the only goddess)","primary_sources":["Russian Primary Chronicle","folk-religion survivals"],"summary":"Slavic earth-mother and fates-goddess. Associated with spinning, weaving, women's work, moist earth. Post-Christianization, attributes absorbed by St. Paraskeva-Piatnitsa.","facets":["mokosh-earth-mother-spinner"]},{"id":"rod","primary_name":"Rod","alternate_names":["Rozhanitsy (fate-spinners)"],"tradition_id":"slavic","earliest_attestation":"Old Russian sermons (12th c.)","primary_sources":["Old Russian sermons"],"summary":"Slavic ancestral fate-power. The Rozhanitsy attend each birth and weave the destiny of the newborn. Parallel of Norse Norns and Greek Moirai. Some scholars argue Rod is the older/higher Slavic deity behind the named pantheon.","facets":["rod-ancestral-fate"]},{"id":"atum","primary_name":"Atum","alternate_names":["Atem","Tem"],"tradition_id":"egyptian","earliest_attestation":"Pyramid Texts c. 24th c. BCE","primary_sources":["Pyramid Texts","Coffin Texts","Heliopolitan accounts"],"etymology":"Egyptian, possibly 'totality' — 'the All'","iconography":["double crown","setting sun"],"summary":"Primordial creator of Heliopolitan Ennead. Self-generated from primordial waters (Nun). Created first divine pair Shu and Tefnut through self-generation. Atum is 'the All' — totality in source-form.","facets":["atum-self-generated-source","atum-completing-the-cycle"]},{"id":"thoth","primary_name":"Thoth","alternate_names":["Djehuty","Tehuti"],"tradition_id":"egyptian","earliest_attestation":"Predynastic; major from Old Kingdom","primary_sources":["Pyramid Texts","Book of the Dead","Hermetic corpus"],"iconography":["ibis-headed","baboon","scribe's palette","moon disk"],"summary":"God of wisdom, writing, mathematics, magic, moon. Scribe of the gods. Recorder at the weighing of the heart. Mediator. Identified with Greek Hermes; the Greco-Roman Hermes Trismegistus is Thoth-Hermes syncretized.","facets":["thoth-wisdom-scribe","thoth-recorder-of-judgment","thoth-moon-mediator"]},{"id":"ogdoad","primary_name":"The Hermopolitan Ogdoad","alternate_names":["The Eight Primordial Deities"],"tradition_id":"egyptian","earliest_attestation":"Old Kingdom","primary_sources":["Coffin Texts","Hermopolitan accounts"],"summary":"Four pairs of primordial deities representing aspects of pre-creation chaos: Nun/Naunet (waters), Heh/Hauhet (infinity), Kek/Kauket (darkness), Amun/Amaunet (hiddenness). From their interaction the first mound and cosmic egg emerge.","facets":["ogdoad-eight-primordials"]},{"id":"sekhmet","primary_name":"Sekhmet","alternate_names":["Sakhmet","Lady of Pestilence"],"tradition_id":"egyptian","earliest_attestation":"Old Kingdom","primary_sources":["Pyramid Texts","Book of the Heavenly Cow","medical papyri"],"iconography":["lioness-headed","solar disk","red"],"summary":"Lioness-goddess of destruction, war, plague. Sent by Ra to destroy humanity; nearly succeeds before being tricked with red-tinted beer. Destroyer-aspect — Egyptian Kali-parallel. Patron of physicians.","facets":["sekhmet-destroyer","sekhmet-physician-and-plague"]},{"id":"hathor","primary_name":"Hathor","alternate_names":["Het-Heru"],"tradition_id":"egyptian","earliest_attestation":"Predynastic","primary_sources":["Pyramid Texts","Book of the Dead","Dendera temple"],"iconography":["cow","woman with cow horns and solar disk","sistrum"],"summary":"Goddess of love, music, dance, fertility, joy. Mother/consort/daughter of Horus. In Book of the Heavenly Cow, she is the pacified form of Sekhmet — destruction transmuted into love.","facets":["hathor-love-and-music","hathor-mother-of-pharaoh","hathor-sekhmet-pacified"]},{"id":"maat","primary_name":"Ma'at","alternate_names":["Mayet"],"tradition_id":"egyptian","earliest_attestation":"Old Kingdom","primary_sources":["Pyramid Texts","Book of the Dead ch. 125"],"etymology":"Egyptian ma'at — 'truth, justice, cosmic order'","iconography":["feather","throne base of Osiris"],"summary":"Goddess and personification of truth, justice, cosmic order. The principle holding the cosmos together. Pharaoh's duty is to maintain ma'at. Deceased's heart weighed against her feather. Cognate of rta, asha, tao, logos.","facets":["maat-cosmic-order","maat-weighing-of-heart"]},{"id":"osiris","primary_name":"Osiris","alternate_names":["Asar","Wesir","Khentiamentiu"],"tradition_id":"egyptian","earliest_attestation":"Pyramid Texts c. 24th c. BCE","primary_sources":["Pyramid Texts","Coffin Texts","Book of the Dead","Plutarch's On Isis and Osiris"],"iconography":["green or black skin","mummiform","crook and flail","atef crown"],"summary":"Dying-and-rising god, lord of the underworld, judge of the dead. Murdered by his brother Set, dismembered, re-membered by Isis and Nephthys. Begets Horus posthumously. Model and king of the blessed dead.","facets":["osiris-dismembered","osiris-rising-vegetation","osiris-lord-of-dead","osiris-judge-of-souls"]},{"id":"isis","primary_name":"Isis","alternate_names":["Aset","Eset","Stella Maris"],"tradition_id":"egyptian","earliest_attestation":"Pyramid Texts","primary_sources":["Pyramid Texts","Plutarch","Hellenistic Isis aretalogies"],"iconography":["throne-headdress","cow horns with solar disk","wings"],"summary":"Great mother goddess. Wife of Osiris, mother of Horus. Re-members the dismembered Osiris. Supreme magician. In Hellenistic period her cult spreads across Roman empire; Marian devotion absorbs significant Isis iconography.","facets":["isis-great-mother","isis-magician","isis-throne-of-pharaoh","isis-stella-maris"]},{"id":"horus","primary_name":"Horus","alternate_names":["Heru","Hor","Harpocrates"],"tradition_id":"egyptian","earliest_attestation":"Predynastic — one of oldest Egyptian deities","primary_sources":["Pyramid Texts","Book of the Dead","Contendings of Horus and Seth"],"iconography":["falcon-headed","double crown","Eye of Horus (wedjat)"],"summary":"Sky-falcon, divine kingship personified. Son of Isis and Osiris. Avenges his father by defeating Set. Every pharaoh is Horus on earth and Osiris after death — formula of divine kingship.","facets":["horus-divine-kingship","horus-avenger-of-osiris","horus-eye-of-horus"]},{"id":"ra","primary_name":"Ra","alternate_names":["Re","Atum-Ra","Amun-Ra"],"tradition_id":"egyptian","earliest_attestation":"Old Kingdom","primary_sources":["Pyramid Texts","Litany of Ra","Amduat"],"iconography":["solar disk","falcon-headed","scarab (Khepri, morning)","ram (Atum-Ra, evening)"],"summary":"The sun, supreme during the day. Travels through the underworld in his solar barque each night, fighting Apep. Ancestor of pharaohs. Merges with Amun in New Kingdom as Amun-Ra.","facets":["ra-sun-king","ra-nightly-journey","ra-grandfather-of-pharaoh"]},{"id":"apep","primary_name":"Apep","alternate_names":["Apophis","Lord of Chaos"],"tradition_id":"egyptian","earliest_attestation":"Middle Kingdom; major in New Kingdom","primary_sources":["Coffin Texts","Book of the Dead","Bremner-Rhind Papyrus"],"iconography":["giant serpent","speared by Set or Ra"],"summary":"Cosmic serpent of chaos. Attacks the solar barque every night. Set (in older positive role) and others defend Ra. Egyptian chaos-serpent — parallel of Vritra, Jörmungandr, Typhon, Veles, Tiamat.","facets":["apep-cosmic-chaos-serpent","apep-attacks-the-sun"]},{"id":"anu","primary_name":"Anu","alternate_names":["An (Sumerian)","Anum"],"tradition_id":"mesopotamian","earliest_attestation":"Early Dynastic Sumerian c. 27th c. BCE","primary_sources":["Sumerian Temple Hymns","Atra-Hasis","Enuma Elish"],"etymology":"Sumerian an, 'sky, heaven'","summary":"Sky-god and original head of Mesopotamian pantheon. Father of the gods. Largely displaced from active role by Enlil and Marduk by Old Babylonian period, but his title remained the formal designation of supreme cosmic kingship.","facets":["anu-sky-father","anu-supreme-and-withdrawn"]},{"id":"enlil","primary_name":"Enlil","alternate_names":["Ellil"],"tradition_id":"mesopotamian","earliest_attestation":"Early Dynastic Sumerian","primary_sources":["Sumerian Temple Hymns","Atra-Hasis","Enuma Elish"],"summary":"King of the gods in Sumerian and early Babylonian period. Lord of air/wind/breath/command. Sends the Flood in Atra-Hasis because humans were too noisy. Divine kingship-as-active-rule (Anu being withdrawn).","facets":["enlil-king-of-gods","enlil-flood-sender","enlil-divine-decree"]},{"id":"enki","primary_name":"Enki","alternate_names":["Ea","Nudimmud"],"tradition_id":"mesopotamian","earliest_attestation":"Early Dynastic Sumerian","primary_sources":["Enki and the World Order","Atra-Hasis","Adapa"],"etymology":"Sumerian, 'Lord of the Earth' — actually lord of the apsû (subterranean fresh waters)","iconography":["streams from shoulders","goat-fish","abzu temple at Eridu"],"summary":"God of wisdom, crafts, fresh waters, and humanity's survival. Saves humanity from the Flood by warning Atrahasis. Creator of humans from clay. Trickster-savior who outwits Enlil to protect humanity.","facets":["enki-wisdom","enki-warns-of-flood","enki-creator-of-humans","enki-trickster-savior"]},{"id":"tiamat","primary_name":"Tiamat","alternate_names":["Tâmtu","Salt Sea Mother"],"tradition_id":"mesopotamian","earliest_attestation":"Enuma Elish (late 2nd millennium BCE composition)","primary_sources":["Enuma Elish"],"etymology":"Akkadian 'sea'; cognate with Hebrew tehom (Genesis 1)","iconography":["dragon/sea-monster","primordial waters","mother of monsters"],"summary":"Primordial salt-sea mother. With Apsu generates first generation of gods. After Apsu's death, declares war on younger gods. Defeated by Marduk; her body becomes the cosmos. Mesopotamian dismembered-cosmic-body cosmogony.","facets":["tiamat-primordial-mother","tiamat-chaos-dragon","tiamat-body-becomes-cosmos"]},{"id":"apsu","primary_name":"Apsu","alternate_names":["Abzu"],"tradition_id":"mesopotamian","earliest_attestation":"Sumerian; major in Enuma Elish","primary_sources":["Enuma Elish"],"summary":"Primordial fresh waters, consort of Tiamat. Father of first generation of gods. Plots to destroy his noisy descendants; Enki kills him preemptively. The freshwater abyss continues as Enki's domain.","facets":["apsu-primordial-fresh-waters","apsu-killed-by-enki"]},{"id":"ishtar","primary_name":"Ishtar","alternate_names":["the Akkadian Inanna","Astarte (West Semitic)"],"tradition_id":"mesopotamian","earliest_attestation":"Akkadian period c. 24th c. BCE","primary_sources":["Enheduanna hymns","Descent of Ishtar","Epic of Gilgamesh"],"summary":"Akkadian and later Mesopotamian form of Inanna. Spreads across the Levant as Astarte. Same functions: love, war, fertility, morning/evening star, descent to underworld.","facets":["ishtar-akkadian-continuity"]},{"id":"humbaba-mesopotamian","primary_name":"Humbaba","alternate_names":["Huwawa","Khumbaba"],"tradition_id":"mesopotamian","earliest_attestation":"Sumerian Gilgamesh c. 21st c. BCE; Standard Babylonian Gilgamesh c. 13th c. BCE","primary_sources":["Epic of Gilgamesh tablets III–V"],"iconography":["enormous","face like coiled intestines","voice like flood"],"summary":"Monstrous guardian of the cedar forest. Killed by Gilgamesh and Enkidu. The original of the Hobabish in the Book of Giants — direct evidence of Mesopotamian → Second Temple Jewish transmission.","facets":["humbaba-cedar-forest-guardian"]},{"id":"apkallu","primary_name":"The Apkallu (Seven Antediluvian Sages)","alternate_names":["Abgallu","Seven Sages"],"tradition_id":"mesopotamian","earliest_attestation":"Sumerian; major in Berossus","primary_sources":["Berossus, Babyloniaca","Apkallu reliefs at Nimrud"],"iconography":["fish-cloaked sages (Oannes)","winged genii","bucket and cone"],"summary":"Seven antediluvian sages sent by Ea to teach humanity arts of civilization before the Flood. Uanna/Oannes emerges from the sea daily to teach writing, science, agriculture. Mesopotamian Watchers — but with positive valence (sanctioned culture-bringers vs transgressive teachers of forbidden arts).","facets":["apkallu-seven-sages","apkallu-pre-flood-teachers"]},{"id":"anzu","primary_name":"Anzu","alternate_names":["Imdugud (Sumerian)"],"tradition_id":"mesopotamian","earliest_attestation":"Early Sumerian iconography","primary_sources":["Anzu Epic","Sumerian Lugalbanda"],"iconography":["lion-headed eagle","stormcloud"],"summary":"Storm-bird/monster who steals the Tablet of Destinies from Enlil. Defeated by Ninurta (Marduk in later versions). Cosmic-rebel-bird that overreaches.","facets":["anzu-storm-bird-thief"]},{"id":"ninurta","primary_name":"Ninurta","alternate_names":["Ningirsu"],"tradition_id":"mesopotamian","earliest_attestation":"Sumerian Early Dynastic","primary_sources":["Sumerian Lugal-e","Anzu Epic","Angim"],"summary":"Warrior-god, slayer of cosmic enemies — Anzu and the asakku. Mesopotamian dragon-slayer / storm-warrior. Defeats Anzu, recovers Tablet of Destinies. Functions later absorbed by Marduk.","facets":["ninurta-warrior-dragon-slayer"]},{"id":"hermes","primary_name":"Hermes","alternate_names":["Mercurius (Roman)"],"tradition_id":"greek","earliest_attestation":"Mycenaean Linear B","primary_sources":["Homeric Hymn to Hermes","Iliad","Odyssey","Hesiod"],"iconography":["winged sandals","winged hat (petasos)","caduceus"],"summary":"Messenger of the gods; psychopomp; trickster (steals Apollo's cattle as a newborn); inventor (lyre, alphabet); patron of travelers, thieves, merchants, the boundary between worlds.","facets":["hermes-messenger","hermes-psychopomp-greek","hermes-trickster-inventor","hermes-cattle-stealer"]},{"id":"athena","primary_name":"Athena","alternate_names":["Athene","Pallas Athena","Minerva"],"tradition_id":"greek","earliest_attestation":"Mycenaean Linear B","primary_sources":["Iliad","Odyssey","Homeric Hymn","Hesiod"],"iconography":["helmet","spear","aegis with gorgon","owl","olive"],"summary":"Goddess of wisdom, strategic warfare, weaving, crafts, the city. Born from Zeus's head fully armed. Patroness of heroes. Strategic/contemplative side of war (vs Ares's bloodlust).","facets":["athena-wisdom","athena-strategic-warfare","athena-virgin-warrior","athena-born-from-zeus-head"]},{"id":"apollo","primary_name":"Apollo","alternate_names":["Phoebus Apollo"],"tradition_id":"greek","earliest_attestation":"Late Bronze Age; major from Homer","primary_sources":["Homeric Hymn","Iliad","Pindar","Plato"],"iconography":["lyre","bow","laurel"],"summary":"God of light, prophecy, healing, music, archery, order. Slays the Python at Delphi; establishes the oracle. Healer and plague-sender (same arrows). Patron of measure and form.","facets":["apollo-prophecy","apollo-music-and-light","apollo-dragon-slayer-python","apollo-archer-healer-plague-bringer"]},{"id":"dionysus","primary_name":"Dionysus","alternate_names":["Bacchus","Zagreus (Orphic)","Liber"],"tradition_id":"greek","earliest_attestation":"Mycenaean Linear B","primary_sources":["Homeric Hymn","Euripides Bacchae","Orphic Hymns","Nonnus Dionysiaca"],"iconography":["thyrsus","ivy and grape vine","leopard","twice-born"],"summary":"God of wine, ecstasy, theater, dissolution of boundaries. Son of Zeus and Semele. Born twice. In Orphic tradition as Zagreus, dismembered by the Titans and reborn — the dying-and-rising god in Greek tradition.","facets":["dionysus-twice-born","dionysus-ecstasy-and-dissolution","dionysus-zagreus-dismembered"]},{"id":"demeter","primary_name":"Demeter","alternate_names":["Ceres"],"tradition_id":"greek","earliest_attestation":"Mycenaean Linear B (uncertain)","primary_sources":["Homeric Hymn to Demeter","Eleusinian liturgy (mostly secret)"],"iconography":["sheaf of grain","torch","veil"],"summary":"Earth-mother / grain-mother. Sister of Zeus. When Persephone is taken to the underworld, causes the earth to wither — origin of winter. Eleusinian mysteries reenact her search and reunion.","facets":["demeter-grain-mother","demeter-grieving-mother","demeter-eleusinian"]},{"id":"hades","primary_name":"Hades","alternate_names":["Plouton","Aidoneus","Unseen One"],"tradition_id":"greek","earliest_attestation":"Hesiod and Homer","primary_sources":["Iliad","Hesiod","Homeric Hymn to Demeter"],"summary":"Lord of the underworld. Brother of Zeus and Poseidon. Abducts Persephone. Greeks avoided his name (Plouton — 'wealth' — for the riches of the earth).","facets":["hades-underworld-king"]},{"id":"typhon","primary_name":"Typhon","alternate_names":["Typhoeus"],"tradition_id":"greek","earliest_attestation":"Hesiod, Theogony","primary_sources":["Hesiod","Apollodorus","Nonnus"],"iconography":["h
