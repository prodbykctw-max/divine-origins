undred dragon-heads","fire from eyes"],"summary":"Monstrous serpent/dragon son of Gaia and Tartarus. Challenges Zeus for cosmic sovereignty. Zeus crushes him under Mount Etna. Greek preservation of the IE storm-god-vs-serpent.","facets":["typhon-cosmic-serpent-rival-of-zeus"]},{"id":"gigantes","primary_name":"The Gigantes","alternate_names":["the Giants proper"],"tradition_id":"greek","earliest_attestation":"Hesiod","primary_sources":["Hesiod","Apollodorus","Pergamon Altar"],"summary":"Born from blood of castrated Uranus on Gaia. Rise against Olympians in the Gigantomachy. Defeated when Heracles (mortal — by prophecy only a mortal could finish them) joins. Distinct from but often conflated with Titans.","facets":["gigantes-revolt-against-olympus"]},{"id":"hekatonkheires","primary_name":"The Hekatonkheires","alternate_names":["Hundred-Handed Ones","Briareus, Cottus, Gyges"],"tradition_id":"greek","earliest_attestation":"Hesiod","primary_sources":["Hesiod"],"summary":"Three primordial giants with hundred hands and fifty heads each. Children of Uranus and Gaia. Freed by Zeus to help in Titanomachy. Guard the Titans in Tartarus after.","facets":["hekatonkheires-guards-of-tartarus"]},{"id":"heracles","primary_name":"Heracles","alternate_names":["Hercules"],"tradition_id":"greek","earliest_attestation":"Homer","primary_sources":["Iliad","Hesiod","Apollodorus","Diodorus"],"iconography":["lion-skin","club","bow"],"summary":"Son of Zeus and Alcmene. Greatest of Greek heroes. Twelve Labors. Slays Nemean Lion, Hydra, Geryon, the giant Cacus. Reaches divinity through suffering. Greek reflex of PIE warrior-hero/Trito — slays monsters and recovers cattle.","facets":["heracles-monster-slayer","heracles-recoverer-of-cattle","heracles-mortal-apotheosized"]},{"id":"thor","primary_name":"Thor","alternate_names":["Þórr","Donar","Thunor"],"tradition_id":"norse","earliest_attestation":"Romano-Germanic (Donar = Hercules/Jupiter in interpretatio)","primary_sources":["Poetic Edda (Hymiskviða, Þrymskviða)","Prose Edda"],"iconography":["hammer (Mjölnir)","red beard","iron gloves","goat-drawn chariot"],"summary":"Storm-god of the Æsir. Wields Mjölnir. Primary defender of Asgard against jötnar. Slays Jörmungandr at Ragnarök (dies of its venom). Norse preservation of IE storm-warrior — direct cognate of *Perkwunos via mother Fjörgyn.","facets":["thor-storm","thor-mjolnir","thor-jormungandr-slayer","thor-defender-of-midgard"]},{"id":"frigg","primary_name":"Frigg","alternate_names":["Friia"],"tradition_id":"norse","earliest_attestation":"Eddic material","primary_sources":["Poetic Edda","Prose Edda"],"summary":"Wife of Odin, queen of the Æsir. Mother of Baldr. Knows the fates of all but does not speak. Tries to protect Baldr by extracting oaths from all things — except the mistletoe. Friday named for her.","facets":["frigg-queen-of-aesir","frigg-knows-all-fates"]},{"id":"baldr","primary_name":"Baldr","alternate_names":["Balder"],"tradition_id":"norse","earliest_attestation":"Eddic material; Saxo","primary_sources":["Poetic Edda (Völuspá, Baldrs draumar)","Prose Edda"],"summary":"Beloved son of Odin and Frigg. Dies when Loki tricks blind Höðr into shooting him with a mistletoe dart. All things weep — except Loki (as the giantess Þökk). Will return after Ragnarök. Norse dying-god-who-will-return.","facets":["baldr-dying-beloved-god","baldr-returns-after-ragnarok"]},{"id":"tyr","primary_name":"Týr","alternate_names":["Tiw","Ziu"],"tradition_id":"norse","earliest_attestation":"Romano-Germanic (interpretatio — Tiw = Mars)","primary_sources":["Poetic Edda","Prose Edda"],"etymology":"Old Norse Týr, from Proto-Germanic *Tīwaz — direct cognate with PIE *Dyḗus Ph₂tḗr","summary":"God of law, war, the assembly. Sacrifices his right hand to bind Fenrir. Norse direct linguistic descendant of PIE *Dyeus — but demoted from sky-father to one-armed war-god.","facets":["tyr-pie-dyeus-linguistic","tyr-sacrificed-his-hand","tyr-law-and-assembly"]},{"id":"hel","primary_name":"Hel","alternate_names":[],"tradition_id":"norse","earliest_attestation":"Eddic material","primary_sources":["Poetic Edda (Völuspá)","Prose Edda"],"summary":"Daughter of Loki and Angrboða. Half alive and beautiful, half dead and decaying. Rules over Helheim — those who do not die in battle. Keeps Baldr until Ragnarök.","facets":["hel-underworld-queen"]},{"id":"fenrir","primary_name":"Fenrir","alternate_names":["Fenrisúlfr"],"tradition_id":"norse","earliest_attestation":"Eddic material","primary_sources":["Poetic Edda","Prose Edda"],"summary":"Monstrous wolf-son of Loki and Angrboða. Bound by the Æsir with magical chain Gleipnir. Týr loses hand in binding. At Ragnarök breaks free and kills Odin.","facets":["fenrir-bound-wolf","fenrir-kills-odin-at-ragnarok"]},{"id":"jormungandr","primary_name":"Jörmungandr","alternate_names":["Midgard Serpent","World-Serpent"],"tradition_id":"norse","earliest_attestation":"Eddic material","primary_sources":["Poetic Edda","Prose Edda"],"summary":"Cosmic serpent-son of Loki and Angrboða. Cast into the ocean; grows so large he encircles Midgard, biting his own tail. Thor's eternal opponent. Thor and Jörmungandr kill each other at Ragnarök. Norse preservation of IE storm-god-vs-cosmic-serpent.","facets":["jormungandr-world-serpent","jormungandr-kills-thor-at-ragnarok"]},{"id":"lucifer-morning-star","primary_name":"Lucifer / Heylel ben Shahar","alternate_names":["Heilel","Phosphoros","Morning Star"],"tradition_id":"hebrew-ot","earliest_attestation":"Isaiah 14:12","primary_sources":["Isaiah 14:12-15","Ezekiel 28","later Christian Latin Lucifer ('Light-bearer')"],"summary":"Originally in Isaiah 14, a name applied to the king of Babylon as a taunt — Heylel ben Shahar ('Day-Star, son of Dawn'), who in pride sought to ascend above the assembly of El and was cast down. Same figure treated in Ezekiel 28. Through Latin translation as Lucifer, this became the basis of Christian Satanology. Originally polemic against earthly tyrants; later read cosmologically.","facets":["lucifer-pride-fall","lucifer-cast-down-from-heaven"]},{"id":"michael-archangel","primary_name":"Michael","alternate_names":["Mikha'el ('Who is like God?')"],"tradition_id":"hebrew-ot","earliest_attestation":"Daniel 10:13, 10:21, 12:1","primary_sources":["Daniel 10-12","1 Enoch 9-10","Revelation 12","Jude 9"],"summary":"Chief angel of Israel. Princely guardian. In 1 Enoch 10, one of the four archangels commissioned to bind the Watchers. In Revelation 12, leads the heavenly host against the Dragon and casts him down. The militant angel.","facets":["michael-archangel-of-israel","michael-binds-watchers","michael-vs-dragon"]}],"facets":[{"id":"monad-unmanifest","parent_deity_id":"monad","facet_name":"The Unmanifest Source","tier_assignment":1,"function_tags":["unmanifest-source","ineffable","ground-of-being","pre-creation","beyond-being","self-generated"],"valence":"transcendent","core_claim":"The Monad is beyond name, form, gender, and category. It does not create directly; it self-contemplates, and from that contemplation the Aeons emerge. It is the silence before the first word.","parallel_facets":["ein-sof","brahman-nirguna","tao-unnamed","the-one-plotinus","nun-primordial","ginnungagap","sunyata","al-haqq"]},{"id":"yaldabaoth-demiurge","parent_deity_id":"yaldabaoth","facet_name":"The Demiurge (craftsman of matter)","tier_assignment":3,"function_tags":["demiurge","craftsman-creator","ignorant-of-source","born-of-emanation","created-by-error","false-most-high"],"valence":"negative","core_claim":"Yaldabaoth, hidden away in a cloud by Sophia, fashions the material cosmos in imitation of the Pleroma he has never seen. He populates it with seven Archons and rules as if he were alone.","parallel_facets":["yahweh-creator","marduk-cosmic-orderer","brahma-egoic","tezcatlipoca-adversary"]},{"id":"yaldabaoth-usurper","parent_deity_id":"yaldabaoth","facet_name":"The False Most High (Lucifer-as-usurper)","tier_assignment":3,"function_tags":["usurper","false-most-high","jealous","ignorant-of-source","lawgiver","punitive"],"valence":"negative","core_claim":"Declares 'I am God and there is no other.' Rebuked from above: 'You are wrong, Samael — blind god.' This is the figure mainstream religion has mistaken for the Most High.","parallel_facets":["yahweh-jealous-god","set-usurper-murderer","lucifer-usurper","zeus-tyrant","tezcatlipoca-adversary"]},{"id":"yahweh-creator","parent_deity_id":"yahweh","facet_name":"Creator of the heavens and the earth","tier_assignment":3,"function_tags":["craftsman-creator","lawgiver","covenantal","demiurge","sky"],"valence":"ambivalent-positive-in-orthodox-reading-negative-in-gnostic","core_claim":"In Genesis 1, Yahweh-Elohim fashions the cosmos from formless void. In orthodox reading, this is the ultimate God creating from nothing. In Gnostic reading, it is the Demiurge ordering pre-existing chaos in ignorance of the Pleroma.","parallel_facets":["yaldabaoth-demiurge","marduk-cosmic-orderer","brahma-egoic"]},{"id":"yahweh-jealous-god","parent_deity_id":"yahweh","facet_name":"The Jealous God of Sinai","tier_assignment":3,"function_tags":["jealous","lawgiver","punitive","demanding-exclusive-worship","covenantal","blood-sacrifice"],"valence":"ambivalent","core_claim":"'I am the Lord thy God; thou shalt have no other gods before me. For I the Lord thy God am a jealous God.' (Exodus 20). Demands exclusive worship, blood sacrifice, and unflinching obedience.","parallel_facets":["yaldabaoth-usurper","marduk-cosmic-orderer","zeus-tyrant"]},{"id":"yahweh-covenantal","parent_deity_id":"yahweh","facet_name":"The Covenantal Lord","tier_assignment":3,"function_tags":["covenantal","oath-keeper","father-of-nation","lawgiver"],"valence":"positive","core_claim":"Yahweh enters into covenant with Abraham, Isaac, Jacob; gives Torah to Moses; binds himself to Israel as their God.","parallel_facets":["zeus-oath-keeper","mithra-oath-keeper"]},{"id":"el-elyon-council-head","parent_deity_id":"el-elyon","facet_name":"Head of the Divine Council","tier_assignment":2,"function_tags":["divine-council-head","sky","father","first-emanation","first-among-gods"],"valence":"positive","core_claim":"El Elyon presides over the divine council and apportions the nations among the sons of God (Deut 32:8-9 in the older textual tradition). He is the true Most High in the Gnostic and older-Canaanite reading.","parallel_facets":["anu-sky-council","zeus-sky-father","odin-all-father","brahma-saguna","barbelo-first-aeon"]},{"id":"set-protector-of-ra","parent_deity_id":"set","facet_name":"Protector of Ra's solar barque","tier_assignment":4,"function_tags":["guardian","warrior","storm","chaos-against-greater-chaos","night-defender"],"valence":"positive","core_claim":"Each night Set stands at the prow of Ra's barque and spears Apophis, the chaos-serpent. He is necessary chaos in service of cosmic order.","parallel_facets":["marduk-warrior","thor-mjolnir","indra-vajra","michael-archangel"]},{"id":"set-usurper-murderer","parent_deity_id":"set","facet_name":"Murderer of Osiris, usurper of the throne","tier_assignment":3,"function_tags":["usurper","fratricide","chaos-against-order","desert-sterility","betrayer","false-king"],"valence":"negative","core_claim":"Set murders his brother Osiris out of jealousy, dismembers him, claims the throne. Embodies disorder and the violation of ma'at.","parallel_facets":["yaldabaoth-usurper","loki-betrayer","tezcatlipoca-adversary","lucifer-usurper","cain-genesis"]},{"id":"set-storm-desert","parent_deity_id":"set","facet_name":"Lord of storms and the red desert","tier_assignment":4,"function_tags":["storm","desert","foreign-lands","wild"],"valence":"ambivalent","core_claim":"Set rules the red lands beyond the cultivated Nile valley — the desert, foreign nations, the wild places.","parallel_facets":["baal-hadad-storm","thor-storm","indra-storm-king"]},{"id":"marduk-cosmic-orderer","parent_deity_id":"marduk","facet_name":"Cosmic orderer (slayer of Tiamat)","tier_assignment":3,"function_tags":["craftsman-creator","demiurge","warrior","cosmic-orderer","father-of-gods","born-of-emanation"],"valence":"ambivalent-positive","core_claim":"Marduk slays Tiamat, the primordial chaos-mother, splits her body to form heaven and earth, and is exalted by the gods with fifty names.","parallel_facets":["yaldabaoth-demiurge","yahweh-creator","brahma-egoic"]},{"id":"marduk-warrior","parent_deity_id":"marduk","facet_name":"Champion against chaos","tier_assignment":4,"function_tags":["warrior","guardian","chaos-against-greater-chaos"],"valence":"positive","core_claim":"Marduk takes up arms when no other god will face Tiamat. Armed with thunderbolt and the four winds, he defeats her.","parallel_facets":["set-protector-of-ra","thor-mjolnir","indra-vajra","michael-archangel"]},{"id":"inanna-love-fertility","parent_deity_id":"inanna","facet_name":"Goddess of love and fertility","tier_assignment":"cross-tier","function_tags":["love","fertility","erotic","great-mother"],"valence":"positive","core_claim":"Inanna is the bride of Dumuzi, the principle of erotic and fertile love that drives the renewal of the world.","parallel_facets":["aphrodite-love","venus-love","freya-love","hathor-love","parvati-erotic"]},{"id":"inanna-war","parent_deity_id":"inanna","facet_name":"Goddess of war","tier_assignment":4,"function_tags":["war","warrior-maiden","terrible"],"valence":"ambivalent","core_claim":"Inanna rides into battle on lions; her hymns celebrate her as the destroyer of cities and the breaker of armies.","parallel_facets":["athena-war","morrigan-war","kali-destroyer","anat-war","sekhmet-war"]},{"id":"inanna-descended-goddess","parent_deity_id":"inanna","facet_name":"The Descended One","tier_assignment":"cross-tier","function_tags":["descended-god","dying-rising-god","underworld-journey","sacrificed-and-returned","boundary-crosser","wisdom-through-suffering"],"valence":"ambivalent-positive","core_claim":"Inanna descends through seven gates of the underworld, stripped at each gate of a divine attribute, until she stands naked before Ereshkigal. Killed and hung on a hook; revived by Enki's intervention; returns transformed.","parallel_facets":["persephone-descent","dionysus-zagreus-descent","christ-harrowing-of-hell","osiris-dismembered","sophia-fallen-aeon","quetzalcoatl-creator","odin-sacrificed-on-yggdrasil"]},{"id":"inanna-queen-of-heaven","parent_deity_id":"inanna","facet_name":"Queen of Heaven","tier_assignment":2,"function_tags":["sky","divine-queen","first-among-gods","great-mother"],"valence":"positive","core_claim":"Inanna is the Queen of Heaven, ruler over the morning and evening star, present at the divine council.","parallel_facets":["mary-queen-of-heaven","hera-queen","isis-queen","frigg-queen"]},{"id":"zeus-sky-father","parent_deity_id":"zeus","facet_name":"Sky-Father","tier_assignment":2,"function_tags":["sky","father","divine-council-head","first-among-gods","storm"],"valence":"positive","core_claim":"Zeus is the bright sky personified — the Indo-European Dyaus, the shining father. He presides over the council of the gods on Olympus.","parallel_facets":["el-elyon-council-head","anu-sky-council","odin-all-father","dyaus-pita","jupiter-sky"]},{"id":"zeus-tyrant","parent_deity_id":"zeus","facet_name":"Zeus the Tyrant (Prometheus Bound)","tier_assignment":3,"function_tags":["tyrant","punitive","jealous","lawgiver","false-most-high"],"valence":"negative","core_claim":"In Aeschylus's Prometheus Bound, Zeus is depicted as a recent tyrant who seized the throne from Kronos and punishes Prometheus for giving fire to humans. This is the Demiurge-aspect of Zeus.","parallel_facets":["yaldabaoth-usurper","yahweh-jealous-god","set-usurper-murderer"]},{"id":"zeus-oath-keeper","parent_deity_id":"zeus","facet_name":"Zeus Horkios (Keeper of Oaths)","tier_assignment":4,"function_tags":["oath-keeper","justice","truth"],"valence":"positive","core_claim":"Zeus enforces oaths. Those who swear falsely by Zeus are struck by his thunderbolt or pursued by the Furies.","parallel_facets":["yahweh-covenantal","mithra-oath-keeper","varuna-oath-keeper"]},{"id":"zeus-storm-god","parent_deity_id":"zeus","facet_name":"Storm-bringer","tier_assignment":4,"function_tags":["storm","thunder","rain","warrior"],"valence":"ambivalent","core_claim":"Zeus wields the thunderbolt forged by the Cyclopes. Storm and rain are his domain.","parallel_facets":["thor-storm","indra-storm-king","baal-hadad-storm","perun-storm","set-storm-desert"]},{"id":"prometheus-fire-bringer","parent_deity_id":"prometheus","facet_name":"Fire-bringer / Light-bringer","tier_assignment":"cross-tier","function_tags":["light-bringer","culture-hero","trickster","punished-for-helping-humans","bound-god","sacrificed-god","wisdom-teacher"],"valence":"positive","core_claim":"Prometheus steals fire from the gods in a fennel-stalk and gives it to humanity. For this he is chained to a rock in the Caucasus, where an eagle eats his liver each day — and it regrows each night.","parallel_facets":["loki-trickster-liberator","enki-wisdom","quetzalcoatl-culture-hero","hermes-trismegistus","lucifer-light-bringer","ophite-serpent-of-eden"]},{"id":"odin-all-father","parent_deity_id":"odin","facet_name":"All-Father","tier_assignment":2,"function_tags":["sky","father","divine-council-head","first-among-gods"],"valence":"positive","core_claim":"Odin is All-Father, head of the Aesir, ruler from Hliðskjálf where he sees all the worlds.","parallel_facets":["zeus-sky-father","el-elyon-council-head","anu-sky-council","dyaus-pita"]},{"id":"odin-wanderer","parent_deity_id":"odin","facet_name":"The Wanderer","tier_assignment":"cross-tier","function_tags":["wanderer","disguised-god","wisdom-seeker","tester-of-mortals"],"valence":"ambivalent","core_claim":"Odin walks the worlds in disguise — wide-brimmed hat, blue cloak, single eye — testing kings, learning wisdom, gathering knowledge.","parallel_facets":["hermes-trismegistus","khidr-green-guide","christ-disguised-stranger"]},{"id":"odin-wisdom-seeker","parent_deity_id":"odin","facet_name":"Seeker of Wisdom","tier_assignment":"cross-tier","function_tags":["wisdom-seeker","self-sacrifice-for-knowledge","magician"],"valence":"positive","core_claim":"Odin sacrifices an eye at Mimir's well to drink and gain wisdom. He learns the nine songs and seizes the mead of poetry.","parallel_facets":["enki-wisdom","thoth-wisdom","shiva-teacher","krishna-teacher"]},{"id":"odin-sacrificed-on-yggdrasil","parent_deity_id":"odin","facet_name":"The Self-Sacrificed (Hung on the World Tree)","tier_assignment":"cross-tier","function_tags":["sacrificed-god","dying-rising-god","wisdom-through-suffering","self-offering","knowledge-by-sacrifice"],"valence":"positive","core_claim":"'I know that I hung on a windswept tree nine long nights, wounded by spear, given to Odin, myself to myself.' (Hávamál 138). He seizes the runes.","parallel_facets":["christ-crucifixion","prometheus-fire-bringer","inanna-descended-goddess","dionysus-zagreus-descent","osiris-dismembered","krishna-cosmic-form"]},{"id":"odin-psychopomp","parent_deity_id":"odin","facet_name":"Lord of the Slain / Psychopomp","tier_assignment":4,"function_tags":["psychopomp","war","death","host-of-valhalla"],"valence":"ambivalent","core_claim":"Odin gathers half the slain warriors to Valhalla, where they feast and fight and prepare for Ragnarök.","parallel_facets":["hermes-psychopomp","anubis-judge","yama-death"]},{"id":"loki-trickster-liberator","parent_deity_id":"loki","facet_name":"Trickster / Liberator","tier_assignment":"cross-tier","function_tags":["trickster","boundary-crosser","wisdom-thief","shape-shifter","culture-hero-ambivalent"],"valence":"ambivalent","core_claim":"Loki repeatedly extracts the Aesir from disasters of their own making — and sometimes creates them. He brings them Mjölnir, Sleipnir, Gungnir, and other treasures, often through cunning theft.","parallel_facets":["prometheus-fire-bringer","hermes-trismegistus","enki-wisdom","coyote-trickster","anansi-spider","sun-wukong"]},{"id":"loki-betrayer","parent_deity_id":"loki","facet_name":"The Betrayer (Killer of Baldr)","tier_assignment":3,"function_tags":["betrayer","fratricide-by-proxy","adversary","false-friend"],"valence":"negative","core_claim":"Loki contrives Baldr's death by tricking blind Höðr into throwing the mistletoe-dart. For this he is bound beneath a venom-dripping serpent.","parallel_facets":["set-usurper-murderer","tezcatlipoca-adversary","judas-betrayer","mara-buddha-tempter"]},{"id":"loki-bound","parent_deity_id":"loki","facet_name":"The Bound One","tier_assignment":4,"function_tags":["bound-god","imprisoned-titan","awaiting-release"],"valence":"negative-pending-eschaton","core_claim":"Bound beneath a serpent whose venom drips on his face. At Ragnarök he breaks free and leads the forces of chaos against the gods.","parallel_facets":["prometheus-fire-bringer","fenrir-bound","azazel-bound","satan-chained-revelation"]},{"id":"shiva-destroyer","parent_deity_id":"shiva","facet_name":"The Destroyer (Cosmic Dissolver)","tier_assignment":2,"function_tags":["destroyer","transformer","cosmic-cycle","dissolver","end-of-aeon"],"valence":"ambivalent-positive","core_claim":"Shiva dissolves the manifest universe at the end of each cosmic cycle. Destruction is the precondition for renewal.","parallel_facets":["kali-destroyer","yama-death","thanatos-death","hel-underworld"]},{"id":"shiva-ascetic","parent_deity_id":"shiva","facet_name":"The Great Ascetic (Mahayogi)","tier_assignment":"cross-tier","function_tags":["ascetic","renunciate","meditation-master","wisdom-through-stillness"],"valence":"positive","core_claim":"Shiva sits in eternal meditation on Mount Kailash, ash-smeared, withdrawn from the world, the prototype of all yogis.","parallel_facets":["buddha-meditation","christ-desert-fast"]},{"id":"shiva-teacher","parent_deity_id":"shiva","facet_name":"Dakshinamurti (The Silent Teacher)","tier_assignment":"cross-tier","function_tags":["teacher","silent-transmission","wisdom-bringer","guru","south-facing"],"valence":"positive","core_claim":"Shiva as Dakshinamurti faces south, sits beneath a banyan tree, and transmits the highest knowledge through silence to aged sages.","parallel_facets":["hermes-trismegistus","thoth-wisdom","manjushri-wisdom","khidr-green-guide","odin-wisdom-seeker","enki-wisdom"]},{"id":"shiva-erotic","parent_deity_id":"shiva","facet_name":"The Erotic Principle (Linga / Nataraja)","tier_assignment":2,"function_tags":["erotic","fertility","cosmic-dance","creator-destroyer-united"],"valence":"positive","core_claim":"Shiva as Linga is the generative principle of the cosmos. As Nataraja, he dances the universe into being and out of being simultaneously.","parallel_facets":["dionysus-fertility","krishna-divine-lover","inanna-love-fertility"]},{"id":"shiva-bhairava","parent_deity_id":"shiva","facet_name":"Bhairava (The Terrible)","tier_assignment":4,"function_tags":["terrible","wrathful","protector-fierce","cremation-ground"],"valence":"ambivalent","core_claim":"Shiva in his terrible aspect, haunting cremation grounds, attended by dogs, embodying the fearsome necessity of dissolution.","parallel_facets":["kali-destroyer","yamantaka","hekate-night"]},{"id":"krishna-teacher","parent_deity_id":"krishna","facet_name":"Cosmic Teacher (Bhagavad Gita)","tier_assignment":"cross-tier","function_tags":["teacher","wisdom-bringer","revealer-of-self-as-source","descended-god"],"valence":"positive","core_claim":"On the battlefield of Kurukshetra, Krishna reveals to Arjuna that he is the supreme Self, the source of all gods and worlds. He teaches the paths of action, devotion, and knowledge.","parallel_facets":["christ-logos-descended","shiva-teacher","hermes-trismegistus","quetzalcoatl-culture-hero"]},{"id":"krishna-cosmic-form","parent_deity_id":"krishna","facet_name":"The Cosmic Form (Vishvarupa)","tier_assignment":1,"function_tags":["unmanifest-source","all-encompassing","cosmic-totality","time-as-destroyer"],"valence":"transcendent","core_claim":"Krishna reveals to Arjuna his Vishvarupa — the cosmic form containing all beings, all worlds, all time. 'I am become Time, the destroyer of worlds.'","parallel_facets":["monad-unmanifest","brahman-saguna-as-cosmos","christ-cosmic"]},{"id":"krishna-divine-lover","parent_deity_id":"krishna","facet_name":"The Divine Lover (of Vrindavan)","tier_assignment":"cross-tier","function_tags":["erotic","divine-lover","fertility","playful"],"valence":"positive","core_claim":"Krishna of Vrindavan plays his flute and the gopis come; Radha is his eternal beloved. The lila of divine love is the deepest theology.","parallel_facets":["shiva-erotic","inanna-love-fertility","dionysus-fertility"]},{"id":"krishna-trickster-child","parent_deity_id":"krishna","facet_name":"The Trickster Child (Butter-Thief)","tier_assignment":"cross-tier","function_tags":["trickster","child-god","playful","boundary-crosser"],"valence":"positive","core_claim":"Baby Krishna steals butter, mounts the hood of Kaliya the serpent, plays pranks on his mother. The trickster aspect of the supreme.","parallel_facets":["hermes-trismegistus","loki-trickster-liberator","coyote-trickster"]},{"id":"quetzalcoatl-culture-hero","parent_deity_id":"quetzalcoatl","facet_name":"Bringer of Civilization","tier_assignment":"cross-tier","function_tags":["light-bringer","culture-hero","wisdom-teacher","civilizing-god","corn-giver","calendar-giver","opposes-sacrifice","exiled-god"],"valence":"positive","core_claim":"Quetzalcoatl descended to give humans corn, calendar, writing, the arts. He opposed blood sacrifice and was exiled by Tezcatlipoca.","parallel_facets":["prometheus-fire-bringer","enki-wisdom","hermes-trismegistus","thoth-wisdom","osiris-civilizer","krishna-teacher","christ-logos-descended","viracocha"]},{"id":"quetzalcoatl-wind","parent_deity_id":"quetzalcoatl","facet_name":"Ehecatl (The Wind)","tier_assignment":4,"function_tags":["wind","breath","spirit","sky"],"valence":"positive","core_claim":"Quetzalcoatl as Ehecatl is the wind that precedes the rains, the breath of the divine in the world.","parallel_facets":["ruach-elohim","pneuma-spirit","vayu-wind"]},{"id":"quetzalcoatl-creator","parent_deity_id":"quetzalcoatl","facet_name":"Co-Creator (with Tezcatlipoca)","tier_assignment":2,"function_tags":["creator","co-creator","descended-into-underworld-for-bones"],"valence":"positive","core_claim":"Quetzalcoatl descends to Mictlan to retrieve the bones of past humanity and restores them to life with his own blood.","parallel_facets":["christ-harrowing-of-hell","inanna-descended-goddess","orpheus-underworld"]},{"id":"quetzalcoatl-prophet-returning","parent_deity_id":"quetzalcoatl","facet_name":"The Returning Prophet","tier_assignment":"cross-tier","function_tags":["returning-god","eschatological","exiled-and-promised-return"],"valence":"positive","core_claim":"Sailing east on his raft of serpents, Quetzalcoatl prophesied his return in a One Reed year.","parallel_facets":["maitreya-returning","saoshyant","christ-second-coming","mahdi","kalki-avatar"]},{"id":"tezcatlipoca-night-sky","parent_deity_id":"tezcatlipoca","facet_name":"Lord of the Night Sky","tier_assignment":2,"function_tags":["night","sky","stars","fate"],"valence":"ambivalent","core_claim":"Tezcatlipoca rules the night sky and the stars. From this vantage he sees all and judges kings.","parallel_facets":["nyx-night","ratri-night","nut-sky"]},{"id":"tezcatlipoca-fate-sorcery","parent_deity_id":"tezcatlipoca","facet_name":"Sorcerer and Fate-Knower","tier_assignment":4,"function_tags":["magic","fate","memory","obsidian-mirror"],"valence":"ambivalent","core_claim":"Through his smoking obsidian mirror, Tezcatlipoca sees the inner thoughts of all beings and the unfolding of fate.","parallel_facets":["odin-magician","hecate-magic","loki-trickster-liberator"]},{"id":"tezcatlipoca-adversary","parent_deity_id":"tezcatlipoca","facet_name":"The Adversary / Shadow-Twin","tier_assignment":3,"function_tags":["adversary","shadow-twin","tempter","testing-power","chaos-against-order","usurper-of-civilizing-god"],"valence":"ambivalent-negative","core_claim":"Tezcatlipoca exiled Quetzalcoatl from Tula through trickery — sending him away with a mirror in which Quetzalcoatl saw his own face and was shamed.","parallel_facets":["set-usurper-murderer","loki-betrayer","yaldabaoth-usurper","mara-buddha-tempter","satan-job"]},{"id":"tezcatlipoca-king-maker","parent_deity_id":"tezcatlipoca","facet_name":"King-Maker","tier_assignment":4,"function_tags":["king-maker","lord-of-rulership","tester-of-rulers"],"valence":"ambivalent","core_claim":"Tezcatlipoca grants and revokes the right to rule. Tezcatlipoca-priests examined and tested new kings.","parallel_facets":["odin-king-maker","el-elyon-council-head"]},{"id":"sophia-fallen-aeon","parent_deity_id":"sophia","facet_name":"The Fallen Aeon (Mother of the Demiurge)","tier_assignment":"cross-tier","function_tags":["wisdom","fallen-emanation","mother-of-demiurge","descended-goddess"],"valence":"ambivalent","core_claim":"Sophia, last of the Aeons, attempts to create without her consort. Her error produces Yaldabaoth. She falls into the lower regions and must be recovered.","parallel_facets":["inanna-descended-goddess","persephone-descent","shekhinah-exile","izanami-yomi"]},{"id":"sophia-redemptive","parent_deity_id":"sophia","facet_name":"The Redeemer (Wisdom Returning)","tier_assignment":"cross-tier","function_tags":["redeemer","wisdom-teacher","intercessor","great-mother-returning"],"valence":"positive","core_claim":"Sophia descends to recover the divine sparks trapped in humanity. With the Christ-Aeon, she effects the return of the lost light to the Pleroma.","parallel_facets":["shekhinah-redemptive","shakti-redemptive","isis-recovering-osiris","demeter-recovering-persephone","mary-mediatrix"]},{"id":"persephone-descent","parent_deity_id":"persephone","facet_name":"The Descended Maiden","tier_assignment":"cross-tier","function_tags":["descended-god","dying-rising-god","underworld-journey","fertility-cycle","maiden-to-queen","boundary-crosser"],"valence":"ambivalent-positive","core_claim":"Persephone is abducted by Hades and taken into the underworld. She eats the pomegranate seeds and is bound thereafter to return for part of each year. Her descent and return is the seasonal cycle made theological — and the central mystery of Eleusis.","parallel_facets":["inanna-descended-goddess","sophia-fallen-aeon","christ-crucifixion"]},{"id":"persephone-queen-of-underworld","parent_deity_id":"persephone","facet_name":"Queen of the Underworld","tier_assignment":4,"function_tags":["underworld-queen","judge-of-the-dead","consort-of-death-god"],"valence":"ambivalent","core_claim":"Persephone reigns as queen beside Hades. The maiden becomes queen; the abducted becomes sovereign. The pattern of integration of the feared by way of becoming it.","parallel_facets":["inanna-descended-goddess","kali-destroyer"]},{"id":"christ-logos-descended","parent_deity_id":"christ","facet_name":"Christ as Descended Logos","tier_assignment":"cross-tier","function_tags":["descended-god","logos","teacher","savior","wisdom-incarnate","mediator"],"valence":"positive","core_claim":"The eternal Logos — the divine Word through whom all things were made — takes on human form to teach, heal, and reveal the Father. John 1:1–14. The descended-teacher archetype in its central Western form.","parallel_facets":["krishna-teacher","hermes-trismegistus-wisdom-teacher","quetzalcoatl-culture-hero"]},{"id":"christ-crucifixion","parent_deity_id":"christ","facet_name":"The Crucifixion (Sacrificed-on-Tree)","tier_assignment":"cross-tier","function_tags":["sacrificed-god","sacrificed-on-tree","pierced-by-spear","dying-god","atoning-sacrifice","bound-god"],"valence":"positive","core_claim":"Christ is crucified — sacrificed on the wood of the cross, pierced by the spear of Longinus, descending into death. In Trinitarian theology this is 'God offering God'; in Pauline reading, the atonement; in mystical reading, the ego dying so the true Self can rise. The supreme Western instance of the sacrificed-on-tree archetype.","parallel_facets":["odin-sacrificed-on-yggdrasil","inanna-descended-goddess","persephone-descent"]},{"id":"christ-resurrection","parent_deity_id":"christ","facet_name":"The Resurrection","tier_assignment":"cross-tier","function_tags":["rising-god","dying-rising-god","victory-over-death","harrowing-of-hell"],"valence":"positive","core_claim":"On the third day Christ rises. In esoteric tradition, the Harrowing of Hell: Christ descends into the underworld to free the just souls before returning. The rising-from-death motif that links Christ to every dying-rising god in the comparative cluster.","parallel_facets":["inanna-descended-goddess","persephone-descent"]},{"id":"christ-cosmic","parent_deity_id":"christ","facet_name":"Christ Pantocrator (Cosmic Christ)","tier_assignment":1,"function_tags":["cosmic-totality","logos","unmanifest-source-manifest","all-encompassing"],"valence":"transcendent","core_claim":"Colossians 1:15–17: 'He is the image of the invisible God, the firstborn of all creation; in him all things hold together.' The Cosmic Christ encompasses all that is — structurally identical to the role Krishna assigns himself in Bhagavad Gita 11.","parallel_facets":["krishna-cosmic-form","monad-unmanifest","vishnu-narayana-cosmic-source"]},{"id":"christ-second-coming","parent_deity_id":"christ","facet_name":"The Returning Christ (Parousia)","tier_assignment":"cross-tier","function_tags":["returning-savior","end-of-aeon","judge-at-end-of-age","messiah-type"],"valence":"positive","core_claim":"Christ will return at the end of the age — Parousia — to judge the living and the dead. The Western form of the returning-savior archetype shared with Kalki, Maitreya, the Mahdi, Saoshyant, the returning Quetzalcoatl, and the once-and-future Arthur.","parallel_facets":["kalki-returning-savior","quetzalcoatl-prophet-returning"]},{"id":"hermes-trismegistus-wisdom-teacher","parent_deity_id":"hermes-trismegistus","facet_name":"The Thrice-Greatest Wisdom-Teacher","tier_assignment":"cross-tier","function_tags":["wisdom-teacher","revealer-of-gnosis","as-above-so-below","syncretic-figure","alchemy-tradition"],"valence":"positive","core_claim":"Hermes Trismegistus reveals the path of gnosis through cosmic understanding. The Emerald Tablet's 'as above, so below' is the core operating principle of the Western esoteric tradition. The synthesis of Greek Hermes and Egyptian Thoth produced the single most influential figure of Renaissance and post-Renaissance occultism.","parallel_facets":["krishna-teacher","shiva-teacher","christ-logos-descended"]},{"id":"hermes-psychopomp","parent_deity_id":"hermes-trismegistus","facet_name":"Psychopomp — Guide of Souls","tier_assignment":"cross-tier","function_tags":["psychopomp","boundary-crosser","messenger","guide-between-worlds"],"valence":"positive","core_claim":"Hermes (via the Greek inheritance) is the guide of souls between worlds, the messenger who crosses every threshold. In Hermetic literature, the same function elevated: guide of the soul on its ascent through the spheres back to its source.","parallel_facets":["odin-psychopomp","agni-priest-of-gods"]},{"id":"dyeus-sky-father-root","parent_deity_id":"dyeus-phater","facet_name":"Shining Sky-Father (PIE root)","tier_assignment":2,"function_tags":["sky","father","divine-council-head","first-among-gods","indo-european-root"],"valence":"positive","core_claim":"*Dyḗus Ph₂tḗr is the bright daytime sky personified, addressed as father. He presides over the divine council. Every Indo-European sky-father — Zeus, Jupiter, Tyr/Týr, Dyaus, Tiwaz — is a linguistically continuous descendant of this single root deity.","parallel_facets":["zeus-sky-father","el-elyon-council-head","vishnu-cosmic-preserver"]},{"id":"perkwunos-storm-warrior","parent_deity_id":"perkwunos","facet_name":"The Striker (Storm-Warrior root)","tier_assignment":4,"function_tags":["storm","thunder","warrior","indo-european-root","axe-wielder"],"valence":"ambivalent-positive","core_claim":"*Perkʷunos wields the thunder-weapon (stone axe in earlier reconstruction, hammer/thunderbolt in daughter traditions). The root from which Thor, Indra, Zeus-as-storm, Jupiter Tonans, Perun, Perkūnas, and Pērkons all derive.","parallel_facets":["zeus-storm-god","indra-storm-king","thor-storm"]},{"id":"perkwunos-dragon-slayer","parent_deity_id":"perkwunos","facet_name":"Slayer of the Serpent-of-the-Waters","tier_assignment":"cross-tier","function_tags":["dragon-slayer","chaoskampf","cosmic-order-restorer","releaser-of-the-waters","indo-european-root"],"valence":"positive","core_claim":"The PIE storm-god strikes down the serpent who has dammed up the cosmic waters, releasing the rivers and restoring cosmic order. This narrative is preserved nearly verbatim across daughter traditions: Indra vs. Vritra, Thor vs. Jörmungandr, Zeus vs. Typhon, Apollo vs. Python, Perun vs. Veles, Tarhunna vs. Illuyanka, Thraētaona vs. Aži Dahāka.","parallel_facets":["marduk-cosmic-orderer","indra-vritra-slayer","trito-dragon-slayer-hero"]},{"id":"hausos-dawn-maiden","parent_deity_id":"hausos","facet_name":"The Dawn-Maiden (PIE root)","tier_assignment":"cross-tier","function_tags":["dawn","light-bringer","maiden","daily-rebirth","indo-european-root"],"valence":"positive","core_claim":"*H₂éwsōs is the dawn personified — daughter of the sky-father, eternally young, drawn across the sky by horses. The root from which Uṣas, Ēōs, Aurōra, Aušrinė, and Ēostre all descend. The Christian feast of Easter preserves her name.","parallel_facets":["inanna-queen-of-heaven"]},{"id":"trito-dragon-slayer-hero","parent_deity_id":"trito","facet_name":"The Third Man / Cattle-Recoverer","tier_assignment":"cross-tier","function_tags":["warrior-hero","dragon-slayer","cattle-recoverer","establisher-of-warrior-right","indo-european-root"],"valence":"positive","core_claim":"Trito, the Third, slays the three-headed serpent who has stolen the primordial cattle and recovers the herd. This narrative — warrior recovers stolen wealth from the monster — is the founding myth of the Indo-European warrior class. Heracles vs. Geryon, Heracles vs. Cacus, Thor vs. Hrungnir, Trita vs. Viśvarūpa, Thraētaona vs. Aži Dahāka all preserve it.","parallel_facets":["perkwunos-dragon-slayer","indra-vritra-slayer","marduk-cosmic-orderer"]},{"id":"agni-fire-pie-mediator","parent_deity_id":"agni-fire-pie","facet_name":"Fire as Messenger Between Worlds (PIE root)","tier_assignment":"cross-tier","function_tags":["fire","messenger","sacrifice","mediator","indo-european-root"],"valence":"positive","core_claim":"The sacrificial fire is itself divine — the visible messenger that carries the offering from human altar to heavenly recipients. Preserved most fully in Vedic Agni; the linguistic cognates (Latin ignis, Slavic ogon', Hittite Agniš) testify to the PIE root.","parallel_facets":["prometheus-fire-bringer","agni-priest-of-gods"]},{"id":"vishnu-cosmic-preserver","parent_deity_id":"vishnu","facet_name":"Cosmic Preserver","tier_assignment":2,"function_tags":["preserver","cosmic-order-maintainer","trimurti-member","sustainer"],"valence":"positive","core_claim":"Vishnu sustains the cosmos across each yuga cycle. While Brahma creates and Shiva dissolves, Vishnu maintains. The principle of preservation in the Hindu trimurti.","parallel_facets":["el-elyon-council-head","zeus-sky-father"]},{"id":"vishnu-avatar-principle","parent_deity_id":"vishnu","facet_name":"Avatar Principle (Descending Savior)","tier_assignment":"cross-tier","function_tags":["descended-god","savior","dharma-restorer","incarnation"],"valence":"positive","core_claim":"Whenever dharma declines, Vishnu descends as an avatar. The Bhagavad Gita 4.7–8: 'Whenever there is a decline of dharma and a rise of adharma, then I send forth myself.' Ten classical avatars: Matsya, Kurma, Varaha, Narasimha, Vamana, Parashurama, Rama, Krishna, Buddha, Kalki.","parallel_facets":["krishna-teacher","kalki-returning-savior"]},{"id":"vishnu-narayana-cosmic-source","parent_deity_id":"vishnu","facet_name":"Narayana — Sleeping on the Cosmic Ocean","tier_assignment":1,"function_tags":["unmanifest-source","cosmic-totality","dreamer-of-worlds"],"valence":"transcendent","core_claim":"Vishnu reclines on Shesha the cosmic serpent atop the ocean of milk, between cosmic cycles. From his navel grows the lotus from which Brahma emerges to create the next universe. In this aspect, Vishnu is the unmanifest Source from which manifestation springs.","parallel_facets":["monad-unmanifest","krishna-cosmic-form"]},{"id":"indra-storm-king","parent_deity_id":"indra","facet_name":"Storm-King","tier_assignment":4,"function_tags":["storm","thunder","warrior-king","rain-bringer"],"valence":"ambivalent-positive","core_claim":"Indra wields the vajra (thunderbolt) and rides the elephant Airavata. King of Svarga, the heavenly realm. The most-praised deity of the Rigveda; storm-warrior of the Indo-European root.","parallel_facets":["zeus-storm-god","perkwunos-storm-warrior"]},{"id":"indra-vritra-slayer","parent_deity_id":"indra","facet_name":"Slayer of Vritra","tier_assignment":"cross-tier","function_tags":["dragon-slayer","chaoskampf","releaser-of-the-waters","cosmic-order-restorer"],"valence":"positive","core_claim":"Vritra the serpent has dammed the cosmic waters and withheld them from the world. Indra, fortified by soma, strikes Vritra with the vajra and releases the waters. The Vedic preservation of the PIE storm-god-slays-water-serpent myth.","parallel_facets":["marduk-cosmic-orderer","perkwunos-dragon-slayer","trito-dragon-slayer-hero"]},{"id":"indra-soma-drinker","parent_deity_id":"indra","facet_name":"Drinker of Soma","tier_assignment":4,"function_tags":["intoxicant-drinker","ecstatic","warrior-strengthened-by-ritual-substance"],"valence":"ambivalent","core_claim":"Indra is empowered to kill Vritra only after drinking enormous quantities of soma — the sacred plant-juice of the Vedic cult, cognate with Iranian haoma. The deity who needs the ritual substance to perform his cosmic function.","parallel_facets":[]},{"id":"indra-demoted-archon","parent_deity_id":"indra","facet_name":"Demoted Indra (Puranic / Archonic)","tier_assignment":4,"function_tags":["demoted-high-god","jealous-king","fallen-from-position","humbled-by-greater-deity"],"valence":"ambivalent-negative","core_claim":"In the Puranic period, Indra is repeatedly humbled — by Krishna (Govardhana incident), by sages who curse him for adultery (Ahalya), by demons who occasionally seize his throne. He retains his title but loses his pre-eminence. The Vedic high-god demoted to a jealous, fallible chief-of-the-lesser-rulers — a structural parallel to the Gnostic reading of Yahweh/Yaldabaoth.","parallel_facets":["zeus-tyrant","yaldabaoth-usurper"]},{"id":"varuna-oath-keeper","parent_deity_id":"varuna","facet_name":"Keeper of the Oath","tier_assignment":4,"function_tags":["oath-keeper","binder-of-the-false","covenantal","punitive-just"],"valence":"ambivalent-positive","core_claim":"Varuna sees every oath sworn and binds with his noose anyone who swears falsely. The dread enforcer of sworn agreements — the Vedic parallel to Zeus Horkios, Yahweh-as-covenantal, and Mitra.","parallel_facets":["zeus-oath-keeper","yahweh-covenantal","mitra-contract"]},{"id":"varuna-cosmic-order","parent_deity_id":"varuna","facet_name":"Guardian of Rta (Cosmic Order)","tier_assignment":2,"function_tags":["cosmic-order","rta","truth","justice"],"valence":"positive","core_claim":"Varuna is the sovereign of rta — the cosmic order, truth, the way things rightly are. Cognate concept with Egyptian ma'at, Iranian asha, Chinese tao, and Greek logos/dike.","parallel_facets":["el-elyon-council-head"]},{"id":"varuna-all-seeing","parent_deity_id":"varuna","facet_name":"All-Seeing Sovereign","tier_assignment":2,"function_tags":["all-seeing","omniscient","sky-encompassing"],"valence":"ambivalent","core_claim":"Varuna sees the flight of every bird, every wink of every eye. Originally the all-encompassing sky itself. The Vedic precursor to the omniscient sovereign of later monotheisms.","parallel_facets":["yahweh-covenantal"]},{"id":"mitra-contract","parent_deity_id":"mitra","facet_name":"The Contract Personified","tier_assignment":4,"function_tags":["oath-keeper","contract","alliance","friend-of-the-just"],"valence":"positive","core_claim":"Mitra is the sworn agreement made divine. He guards alliances and punishes their breach. Paired with Varuna: Mitra is the friendly side of contract; Varuna the dread side. Invoked in the 1380 BCE Mitanni-Hittite treaty as oath-witness — one of the oldest Indo-European deity-names in any document.","parallel_facets":["varuna-oath-keeper","zeus-oath-keeper"]},{"id":"mitra-solar-mediator","parent_deity_id":"mitra","facet_name":"Solar Mediator (Mithra/Mithras)","tier_assignment":"cross-tier","function_tags":["solar","mediator","savior","mystery-cult-center"],"valence":"positive","core_claim":"In the Iranian development, Mithra becomes mediator between Ahura Mazda and humanity, associated with the sun. In the late Roman Mithraic mysteries, Mithras the bull-slayer is the savior of initiates. The Indo-Iranian contract-deity transformed into a salvific figure.","parallel_facets":["krishna-teacher"]},{"id":"yama-death-judge","parent_deity_id":"yama","facet_name":"Lord of the Dead, Judge of Souls","tier_assignment":4,"function_tags":["death","judge-of-the-dead","underworld-king","dharmaraja"],"valence":"ambivalent","core_claim":"Yama receives every soul at death, weighs its deeds against the ledger kept by his scribe Chitragupta, and assigns rebirth or hell-realm accordingly. King of the southern direction.","parallel_facets":["set-storm-desert","shiva-destroyer"]},{"id":"yama-first-mortal","parent_deity_id":"yama","facet_name":"First Mortal / First to Die","tier_assignment":"cross-tier","function_tags":["first-being","first-to-die","primordial-twin","path-finder"],"valence":"ambivalent-positive","core_claim":"Yama is the first being who chose to die, and by dying opened the path that every subsequent being would walk. His Avestan cognate Yima (Jamshid) is preserved instead as the first king of the golden age — a fork in the Indo-Iranian myth.","parallel_facets":[]},{"id":"agni-priest-of-gods","parent_deity_id":"agni","facet_name":"Priest of the Gods (Hotr)","tier_assignment":"cross-tier","function_tags":["fire","messenger","sacrifice","mediator","priest-archetype"],"valence":"positive","core_claim":"Agni is the divine priest who carries every offering from the human altar to the recipient god. The Rigveda opens with 'Agni I praise, the priest set forward, the divine ministrant of the sacrifice.' Fire is the mediator that makes all other Vedic rituals possible.","parallel_facets":["prometheus-fire-bringer","agni-fire-pie-mediator"]},{"id":"agni-fire-mediator","parent_deity_id":"agni","facet_name":"The Two-Headed Fire (Household & Altar)","tier_assignment":4,"function_tags":["fire","hearth","altar","domestic-cult"],"valence":"positive","core_claim":"Agni is two-headed: the household hearth that warms and cooks, and the sacrificial altar-fire that carries the offering up. Both faces are one deity. The same root divinity that becomes Vesta/Hestia in the Greco-Roman world.","parallel_facets":[]},{"id":"kali-destroyer","parent_deity_id":"kali","facet_name":"The Destroyer (Mahakali)","tier_assignment":"cross-tier","function_tags":["destroyer","terrible-mother","wrathful","time-as-destroyer","blood-drinker"],"valence":"ambivalent","core_claim":"Kali destroys what must end. She drinks the blood of Raktabija before it touches the ground (where each drop would spawn a new demon). Her destruction is not malice — it is the dissolution without which renewal cannot come.","parallel_facets":["shiva-destroyer","shiva-bhairava","inanna-war"]},{"id":"kali-redemptive","parent_deity_id":"kali","facet_name":"Kali Ma — The Liberating Mother","tier_assignment":"cross-tier","function_tags":["great-mother","liberator","moksha-bringer","tantric-supreme"],"valence":"positive","core_claim":"In Tantric Shakta theology, Kali is the supreme reality itself — the formless brought into fearsome form. To devotees who can face her terror, she is the most direct path to liberation: she destroys the ego, not the soul.","parallel_facets":["sophia-redemptive","inanna-descended-goddess"]},{"id":"kali-time-itself","parent_deity_id":"kali","facet_name":"Kāla — Time Personified","tier_assignment":1,"function_tags":["time","cosmic-totality","unmanifest-source","primordial-feminine"],"valence":"transcendent","core_claim":"Kāla is time; Kālī is the feminine of time — time-as-mother. All cycles of arising and dissolving are her movement. In her fullest theology she is identical with Brahman-Nirguna in feminine voice.","parallel_facets":["monad-unmanifest","krishna-cosmic-form"]},{"id":"kalki-returning-savior","parent_deity_id":"kalki","facet_name":"The Returning Savior (End of the Kali Yuga)","tier_assignment":"cross-tier","function_tags":["returning-savior","messiah-type","end-of-aeon","warrior-on-white-horse","dharma-restorer"],"valence":"positive","core_claim":"At the end of the Kali Yuga, when dharma is at its lowest, Kalki will appear on a white horse, sword in hand, to destroy the kingdom of adharma and inaugurate the next Satya Yuga. The Hindu expression of the universal returning-savior archetype.","parallel_facets":["quetzalcoatl-prophet-returning"]},{"id":"watchers-fallen","parent_deity_id":"watchers","facet_name":"The Fallen Angels (Descenders to Hermon)","tier_assignment":4,"function_tags":["fallen-angel","transgressor","boundary-violator","archon","bound-spirit"],"valence":"negative","core_claim":"Two hundred Watchers under Shemyaza descended to Mount Hermon, swore a mutual oath to do the deed together so no single one would bear the guilt, and took human wives. For this transgression of the divine order they were bound in the abyss until the day of judgment.","parallel_facets":["yaldabaoth-usurper","azazel-bound-in-desert"]},{"id":"watchers-teachers-of-forbidden-arts","parent_deity_id":"watchers","facet_name":"Teachers of Forbidden Arts","tier_assignment":"cross-tier","function_tags":["culture-bringer","teacher-of-forbidden-knowledge","prometheus-type","ambivalent-civilizer","fall-via-knowledge"],"valence":"ambivalent-negative","core_claim":"The Watchers taught humanity arts the divine order had withheld: metallurgy (Azazel), enchantments (Shemyaza), astrology (Baraqʾel), pharmacology (Kasdeya), the cutting of roots. From the Enochic perspective, these are not gifts but corruptions. From a Promethean perspective, the parallel is exact: gods bring knowledge to humans against the high god's will, and are punished for it. The Enochic tradition frames it as transgression; Gnostic and Promethean traditions frame the same act as liberation.","parallel_facets":["prometheus-fire-bringer","loki-trickster-liberator","sophia-fallen-aeon"]},{"id":"azazel-teacher-of-weapons","parent_deity_id":"azazel","facet_name":"Teacher of Metallurgy and Weapons","tier_assignment":"cross-tier","function_tags":["smith-god","weapon-teacher","metallurgist","civilizer-via-craft","ambivalent-teacher"],"valence":"ambivalent-negative","core_claim":"Azazel taught humans to make swords, daggers, shields, and breastplates, and taught women to adorn themselves with cosmetics and bracelets. The smith-god / weapon-teacher archetype, in its negatively-valenced Enochic form.","parallel_facets":["prometheus-fire-bringer","loki-trickster-liberator"]},{"id":"azazel-bound-in-desert","parent_deity_id":"azazel","facet_name":"Bound in the Desert (Dudael)","tier_assignment":4,"function_tags":["bound-god","imprisoned-in-pit","fallen-rebel","awaiting-judgment"],"valence":"negative","core_claim":"Raphael binds Azazel hand and foot and casts him into the pit Dudael in the desert, with rough and jagged rocks piled on him. He is to remain there until the final judgment, when he will be cast into the fire. The bound-rebel-god motif.","parallel_facets":["loki-bound","yaldabaoth-usurper"]},{"id":"azazel-scapegoat-recipient","parent_deity_id":"azazel","facet_name":"Recipient of the Scapegoat","tier_assignment":4,"function_tags":["ritual-recipient","sin-eater","wilderness-power"],"valence":"ambivalent-negative","core_claim":"On Yom Kippur the high priest lays Israel's sins on the head of a goat and releases it 'to Azazel' in the wilderness. On one reading, the sins return annually to the angelic figure whose fall introduced corruption — symbolic restoration of cosmic balance via the wilderness power.","parallel_facets":[]},{"id":"nephilim-giants","parent_deity_id":"nephilim","facet_name":"The Giants","tier_assignment":"cross-tier","function_tags":["giant","hybrid-being","primordial-monster","pre-flood-race"],"valence":"negative","core_claim":"The Nephilim are physical giants — described as so much larger than ordinary humans that Israelite spies in Canaan say 'we were like grasshoppers in our own sight, and so we were in theirs.' The category includes Rephaim, Anakim, Emim, Zamzummim, and Gibborim ('mighty ones,' Genesis 6:4).","parallel_facets":["tezcatlipoca-adversary"]},{"id":"nephilim-flood-cause","parent_deity_id":"nephilim","facet_name":"Cause of the Flood","tier_assignment":"cross-tier","function_tags":["pre-flood-corruption","trigger-of-cosmic-reset","consumed-creation"],"valence":"negative","core_claim":"The Nephilim, growing beyond all measure, consumed the produce of all human labor, then consumed humans, then consumed each other. The corruption of the earth by their violence is the explicit Enochic cause of the Flood. The Flood is God's reset of a creation overrun by the offspring of the Watchers.","parallel_facets":["marduk-cosmic-orderer"]},{"id":"nephilim-spirits-becoming-demons","parent_deity_id":"nephilim","facet_name":"Spirits of the Dead Nephilim — Origin of Demons","tier_assignment":4,"function_tags":["demon-origin","unclean-spirit","disembodied-evil","afflicter-of-humanity"],"valence":"negative","core_claim":"1 Enoch 15:8–11: when the Nephilim are killed in the Flood, their hybrid spirits cannot enter the rest of the dead, because they are neither fully spirit nor fully flesh. They roam the earth as 'evil spirits' — and this, in the Enochic theory, is the origin of every demon, every unclean spirit, and every possession recorded in later tradition. The Gospels' demons are, on this reading, the disembodied Nephilim still wandering.","parallel_facets":[]},{"id":"enoch-ascended-seer","parent_deity_id":"enoch-ascended","facet_name":"The Ascended Seer","tier_assignment":"cross-tier","function_tags":["ascended-human","heavenly-tour","intercessor","scribe-of-heaven","non-death-translation"],"valence":"positive","core_claim":"Enoch is taken bodily to heaven without tasting death. He tours the cosmos under angelic guidance, is shown the Watchers in their prison, intercedes (unsuccessfully) on their behalf, and is given vast astronomical and eschatological knowledge to bring back to humanity. The ascended-seer archetype.","parallel_facets":["odin-wisdom-seeker","krishna-teacher"]},{"id":"enoch-becoming-metatron","parent_deity_id":"enoch-ascended","facet_name":"Metatron — The Lesser YHWH","tier_assignment":2,"function_tags":["transformed-human","highest-angel","lesser-yhwh","throne-bearer","intermediary"],"valence":"positive","core_claim":"In 3 Enoch and Merkavah mysticism, Enoch is transformed into Metatron, the highest of the angels — given seventy names, enthroned at God's right hand, called 'the lesser YHWH' (yhwh ha-katan). A controversial figure in rabbinic tradition: the elevation of a human to near-divine status sits uneasily with strict monotheism. The pattern of human → divine intermediary central to Christology in Christian tradition.","parallel_facets":["el-elyon-council-head"]},{"id":"el-divine-council-head","parent_deity_id":"el-canaanite","facet_name":"Head of the Divine Council on Mount Lel","tier_assignment":2,"function_tags":["divine-council-head","father-of-gods","withdrawn-high-god","wisdom-grantor"],"valence":"positive","core_claim":"El sits on his throne at the source of the two rivers, head of the puḥru (assembly) of the gods, allotting kingship and offspring.","parallel_facets":["el-elyon-council-head","anu-sky-council","zeus-sky-father","odin-all-father","dyeus-phater-sky-father","brahma-saguna","dagda-all-father"]},{"id":"el-creator-of-creatures","parent_deity_id":"el-canaanite","facet_name":"Creator of Creatures","tier_assignment":2,"function_tags":["creator","withdrawn-creator","patriarchal-father"],"valence":"positive","core_claim":"El is bāniyu binwāti, 'creator of created things' — the originating father, though no longer the active world-shaper.","parallel_facets":["yahweh-creator","brahma-saguna"]},{"id":"el-grantor-of-kingship","parent_deity_id":"el-canaanite","facet_name":"Grantor of Kingship","tier_assignment":2,"function_tags":["kingship-granting","fatherhood-grantor","patriarch"],"valence":"positive","core_claim":"In the Legend of Kirta, El grants a son to the desperate king. He is the source of dynastic legitimacy.","parallel_facets":["yahweh-covenantal"]},{"id":"asherah-mother-of-gods","parent_deity_id":"asherah-mother","facet_name":"Mother of the Seventy Sons of El","tier_assignment":2,"function_tags":["mother-of-gods","consort-of-high-god","great-mother"],"valence":"positive","core_claim":"Asherah is consort of El, mother of the seventy sons of god — the divine council itself.","parallel_facets":["aditi-mother-of-devas","inanna-love-fertility","hausos-dawn-goddess"]},{"id":"asherah-tree-of-life","parent_deity_id":"asherah-mother","facet_name":"The Sacred Tree / Pole","tier_assignment":"cross-tier","function_tags":["tree-of-life","fertility-pillar","axis-mundi"],"valence":"positive","core_claim":"Asherah is venerated as a sacred tree or wooden pole (the asherah-pole). Kuntillet Ajrud and Khirbet el-Qom inscriptions invoke 'YHWH and his Asherah.'","parallel_facets":["danu-river-goddess"]},{"id":"baal-hadad-storm","parent_deity_id":"baal-hadad","facet_name":"The Storm-God / Rider of Clouds","tier_assignment":3,"function_tags":["storm","thunderbolt","rain-giver","cloud-rider"],"valence":"ambivalent-positive","core_claim":"Baal rides the clouds, wields the thunder-mace, brings the rains that make the land fertile.","parallel_facets":["perkwunos-thunderer","indra-vajra","thor-storm","zeus-sky-father","set-storm-desert","marduk-warrior"]},{"id":"baal-cosmic-orderer","parent_deity_id":"baal-hadad","facet_name":"Slayer of Yam (Cosmic Orderer)","tier_assignment":3,"function_tags":["cosmic-orderer","dragon-slayer","kingship-by-combat","chaos-defeater"],"valence":"ambivalent-positive","core_claim":"Baal defeats Yam (Sea / Chaos) with the mace Ayamur and is acclaimed king. The IE dragon-slaying myth in West Semitic form.","parallel_facets":["marduk-cosmic-orderer","indra-vajra","trito-dragon-slayer","perkwunos-dragon-slayer","lugh-dragon-slayer","set-protector-of-ra"]},{"id":"baal-dies-and-rises","parent_deity_id":"baal-hadad","facet_name":"The Dying and Rising God","tier_assignment":"cross-tier","function_tags":["dying-rising-god","fertility-cycle","descent","resurrection"],"valence":"positive","core_claim":"Baal is killed by Mot (Death), descends to the underworld, and is restored — the seasonal pattern of vegetation.","parallel_facets":["christ-resurrection","persephone-descent","krishna-cosmic-form","osiris-resurrection"]},{"id":"mot-death","parent_deity_id":"mot","facet_name":"Death Personified","tier_assignment":4,"function_tags":["death","devourer","underworld-power"],"valence":"negative","core_claim":"Mot is the gaping mouth that swallows even gods. His destruction by Anat allows the rains to return.","parallel_facets":["yama-death-judge","thanatos-death","hel-underworld","yam-sea-chaos"]},{"id":"yam-sea-chaos","parent_deity_id":"yam","facet_name":"Prince Sea / Judge River (Primordial Chaos)","tier_assignment":4,"function_tags":["chaos-waters","primordial-serpent","to-be-defeated"],"valence":"negative","core_claim":"Yam claims kingship over the gods and is defeated by Baal. The cosmic-serpent/water-chaos archetype.","parallel_facets":["vritra-cosmic-serpent","tiamat","leviathan","apophis","jormungandr","mot-death"]},{"id":"anat-warrior-mourner","parent_deity_id":"anat","facet_name":"Warrior-Maiden and Mourner of Baal","tier_assignment":"cross-tier","function_tags":["warrior-goddess","mourner","underworld-descender","violent-fertility"],"valence":"ambivalent-positive","core_claim":"Anat slaughters her enemies wading in blood; descends in grief and rage to find Baal; tears Mot apart with her own hands. Eros and Thanatos in one figure.","parallel_facets":["inanna-love-fertility","kali-destroyer","morrigan-war-fate"]},{"id":"rpum-as-deified-dead","parent_deity_id":"rpum","facet_name":"The Deified Royal Dead (rpum)","tier_assignment":4,"function_tags":["ancestral-dead","warrior-shades","blessing-ancestors","marziḥu-cult"],"valence":"ambivalent","core_claim":"The rpum are the deified royal dead of Ugarit, summoned to ritual feasts (marziḥu) to bless the living king and the land. Their cult is centered on Mt Hermon / Bashan.","parallel_facets":["rephaim-as-shades-of-sheol","rephaim-biblical-giants","watchers-fallen"]},{"id":"rephaim-as-giants","parent_deity_id":"rpum","facet_name":"The Rephaim as Giant Warrior-Kings","tier_assignment":4,"function_tags":["giant","warrior-king","pre-Israelite-inhabitant"],"valence":"ambivalent","core_claim":"In one of the two main registers, the rpum / Rephaim are the giant warrior-kings of the pre-Israelite Levant.","parallel_facets":["nephilim-giants","anakim-giant-warriors","og-king-of-bashan","daityas-as-defeated-older-race","danavas-as-defeated-older-race","fomorians-as-giants"]},{"id":"rephaim-of-bashan","parent_deity_id":"rpum","facet_name":"The Rephaim of Bashan","tier_assignment":4,"function_tags":["geographic-cult","Bashan","Mt-Hermon","Watcher-territory"],"valence":"ambivalent","core_claim":"The Ugaritic rpum cult is geographically centered on Bashan and Mt Hermon — exactly the territory the Bible assigns to King Og (Deut 3) and exactly where 1 Enoch 6 places the descent of the Watchers. This is a single religious-geographic complex viewed from three angles.","parallel_facets":["watchers-fallen","og-king-of-bashan"]},{"id":"danu-mother-of-divine-race","parent_deity_id":"danu-irish","facet_name":"Mother of the Tuatha Dé Danann","tier_assignment":2,"function_tags":["mother-of-divine-race","river-mother","pre-historic-mother"],"valence":"positive","core_claim":"Danu is the ancestress of the Tuatha Dé Danann — the divine race of pre-Christian Ireland.","parallel_facets":["danu-vedic-mother-of-danavas","aditi-mother-of-devas","asherah-mother-of-gods"]},{"id":"danu-river-goddess","parent_deity_id":"danu-irish","facet_name":"Goddess of the Flowing Waters","tier_assignment":2,"function_tags":["river-goddess","primordial-waters","PIE-cognate"],"valence":"positive","core_claim":"Danu is the Celtic reflex of PIE *deh₂nu, 'the flowing one' — the same goddess-name that survives as the hydronyms Danube, Don, Dnieper, Dniester, Donets, and that names the Vedic Dānu, mother of the Dānavas.","parallel_facets":["danu-vedic-primordial-waters","asherah-tree-of-life"]},{"id":"dagda-all-father","parent_deity_id":"dagda","facet_name":"All-Father / Eochaid Ollathair","tier_assignment":2,"function_tags":["all-father","divine-king","abundance-grantor"],"valence":"positive","core_claim":"The Dagda is 'Eochaid the All-Father,' chieftain of the Tuatha Dé, possessor of the cauldron of plenty.","parallel_facets":["odin-all-father","el-divine-council-head","dyeus-phater-sky-father","zeus-sky-father"]},{"id":"dagda-club-of-life-and-death","parent_deity_id":"dagda","facet_name":"The Club That Kills and Revives","tier_assignment":2,"function_tags":["death-and-life","ambivalent-power","cosmic-balance"],"valence":"ambivalent","core_claim":"The Dagda's lorg mór kills with one end and revives with the other — destruction and restoration in a single instrument.","parallel_facets":["shiva-destroyer","kali-destroyer"]},{"id":"lugh-many-skilled","parent_deity_id":"lugh","facet_name":"Master of All Skills (Samildánach)","tier_assignment":"cross-tier","function_tags":["polymath","many-skilled","wisdom-bringer","youth-hero"],"valence":"positive","core_claim":"Lugh declares to the Tuatha Dé that he masters every craft — when each is named he claims it, until they admit him as Samildánach.","parallel_facets":["hermes-trismegistus-wisdom-teacher","krishna-teacher","odin-wisdom-seeker"]},{"id":"lugh-dragon-slayer","parent_deity_id":"lugh","facet_name":"Slayer of Balor (Dragon-Slayer Pattern)","tier_assignment":"cross-tier","function_tags":["dragon-slayer","grandson-slays-tyrant","chaos-defeater"],"valence":"positive","core_claim":"At Mag Tuired, Lugh slings a stone through Balor's evil eye, slaying his own monstrous grandfather. The IE chaos-slayer pattern in Celtic form.","parallel_facets":["trito-dragon-slayer","indra-vajra","perkwunos-dragon-slayer","baal-cosmic-orderer","marduk-cosmic-orderer"]},{"id":"morrigan-war-fate","parent_deity_id":"morrigan","facet_name":"Triple Goddess of War and Fate","tier_assignment":"cross-tier","function_tags":["war-goddess","fate-weaver","triple-form","raven"],"valence":"ambivalent","core_claim":"The Morrígan appears as raven over the battlefield, choosing who falls. Her triple form (Badb, Macha, Nemain) personifies war's many faces.","parallel_facets":["anat-warrior-mourner","kali-destroyer","inanna-love-fertility"]},{"id":"morrigan-sovereignty","parent_deity_id":"morrigan","facet_name":"Sovereignty-Tester","tier_assignment":"cross-tier","function_tags":["sovereignty","tester-of-kings","ambivalent-lover"],"valence":"ambivalent","core_claim":"The Morrígan offers herself as lover to Cú Chulainn; refused, she becomes his adversary. The sovereignty-goddess who tests the hero.","parallel_facets":["inanna-love-fertility"]},{"id":"fomorians-as-pre-divine-chaos","parent_deity_id":"fomorians","facet_name":"The Pre-Divine Chaos Race","tier_assignment":4,"function_tags":["pre-divine-race","chaos-power","defeated-titans","monstrous"],"valence":"negative","core_claim":"The Fomorians are the older, monstrous race that the Tuatha Dé defeat at Mag Tuired to establish the cultivated order of Ireland.","parallel_facets":["danavas-as-defeated-older-race","daityas-as-defeated-older-race","watchers-fallen","nephilim-giants"]},{"id":"fomorians-as-giants","parent_deity_id":"fomorians","facet_name":"Giant Chaos-Warriors","tier_assignment":4,"function_tags":["giants","monstrous-form","sea-dwellers"],"valence":"negative","core_claim":"The Fomorians appear as one-eyed, one-armed, one-legged monstrous giants from beneath the sea — the chaos-form of the older order.","parallel_facets":["rephaim-as-giants","anakim-giant-warriors","nephilim-giants","danavas-as-subterranean-mystics"]},{"id":"balor-evil-eye-tyrant","parent_deity_id":"balor","facet_name":"The Evil Eye King","tier_assignment":4,"function_tags":["tyrant","monstrous-king","grandfather-slain-by-grandson"],"valence":"negative","core_claim":"Balor's single eye destroys what it looks upon — kept closed by lieutenants. His grandson Lugh slays him. The Kronos-Zeus pattern in Celtic form.","parallel_facets":["vritra-cosmic-serpent","tiamat-marduk-victim","yam-sea-chaos"]},{"id":"kashyapa-progenitor","parent_deity_id":"kashyapa","facet_name":"Prajāpati / Progenitor of All Races","tier_assignment":"cross-tier","function_tags":["progenitor","patriarch","father-of-contending-races"],"valence":"positive","core_claim":"Through his thirteen wives Kashyapa fathers the devas (via Aditi), daityas (via Diti), danavas (via Danu), nāgas (via Kadru), and many other classes of being. Every contending race shares him as common father.","parallel_facets":["el-creator-of-creatures","daksha-father-of-cosmic-mothers"]},{"id":"kashyapa-saptarshi-seer","parent_deity_id":"kashyapa","facet_name":"Saptarṣi — Primordial Seer","tier_assignment":2,"function_tags":["primordial-seer","wisdom-source","rishi-tradition-founder"],"valence":"positive","core_claim":"Kashyapa is one of the seven primordial seers (Saptarṣi) whose vision originates the Vedas.","parallel_facets":["enoch-ascended","hermes-trismegistus-wisdom-teacher"]},{"id":"aditi-mother-of-devas","parent_deity_id":"aditi","facet_name":"Mother of the Ādityas (Solar Gods)","tier_assignment":2,"function_tags":["mother-of-gods","sky-mother","unbounded"],"valence":"positive","core_claim":"Aditi is the mother of Varuna, Mitra, Bhaga, Indra (in some lists), Vishnu (in later layers) — the unbounded source of the bright gods.","parallel_facets":["asherah-mother-of-gods","danu-mother-of-divine-race","hausos-dawn-goddess"]},{"id":"aditi-the-unbounded","parent_deity_id":"aditi","facet_name":"The Unbounded (a-diti)","tier_assignment":1,"function_tags":["unbounded-source","infinite","tier-1-aspect"],"valence":"transcendent","core_claim":"Aditi's name literally means 'unbounded' — the privative of 'bound.' She is the formless background against which the bounded devas appear.","parallel_facets":["monad-unmanifest","brahman-saguna"]},{"id":"diti-mother-of-daityas","parent_deity_id":"diti","facet_name":"Mother of the Daityas","tier_assignment":2,"function_tags":["mother-of-rebel-race","bound-mother","wronged-mother"],"valence":"ambivalent","core_claim":"Diti, the 'bound' counterpart to Aditi, bears the daityas. After Indra kills her sons she vows revenge; her revenge is thwarted but produces the Maruts.","parallel_facets":["danu-vedic-mother-of-danavas","danu-mother-of-divine-race"]},{"id":"danu-vedic-primordial-waters","parent_deity_id":"danu-vedic","facet_name":"Goddess of Primordial Waters","tier_assignment":2,"function_tags":["primordial-waters","river-goddess","PIE-cognate"],"valence":"ambivalent","core_claim":"Dānu in Rigveda is the personification of the primordial waters, PIE *deh₂nu, directly cognate with Old Irish Danu, Avestan dānu, and the river-names Danube / Don / Dnieper / Dniester / Donets.","parallel_facets":["danu-river-goddess"]},{"id":"danu-vedic-mother-of-vritra","parent_deity_id":"danu-vedic","facet_name":"Mother of Vṛtra","tier_assignment":2,"function_tags":["mother-of-dragon","mother-of-the-coiled-one"],"valence":"ambivalent","core_claim":"RV 1.32: 'The mother of Vṛtra, Dānu, lay like a cow with her calf.' The first attested IE dragon-mother.","parallel_facets":["tiamat-as-dragon-mother"]},{"id":"danu-vedic-mother-of-danavas","parent_deity_id":"danu-vedic","facet_name":"Mother of the Dānavas","tier_assignment":2,"function_tags":["mother-of-rebel-race","mother-of-asura-clan"],"valence":"ambivalent","core_claim":"Dānu, by Kashyapa, is the mother of the Dānavas — the asura-clan that opposes the devas.","parallel_facets":["danu-mother-of-divine-race","asherah-mother-of-gods","diti-mother-of-daityas"]},{"id":"daksha-father-of-cosmic-mothers","parent_deity_id":"daksha","facet_name":"Father of the Cosmic Mothers","tier_assignment":2,"function_tags":["father-of-mothers","prajapati","shared-grandfather-of-races"],"valence":"positive","core_claim":"Daksha gives his thirteen daughters to Kashyapa. Every class of cosmic being is therefore his grandchild — devas, asuras, daityas, danavas, nāgas, garuḍas alike.","parallel_facets":["kashyapa-progenitor"]},{"id":"daityas-as-defeated-older-race","parent_deity_id":"daityas","facet_name":"The Defeated Older Race","tier_assignment":4,"function_tags":["defeated-titans","elder-divine-race","rival-of-devas"],"valence":"ambivalent","core_claim":"The Daityas are the older, mighty divine race repeatedly defeated by the devas — the Vedic Titans.","parallel_facets":["danavas-as-defeated-older-race","fomorians-as-pre-divine-chaos","rephaim-as-giants","nephilim-giants","anakim-giant-warriors","watchers-fallen"]},{"id":"daityas-as-mighty-asuras","parent_deity_id":"daityas","facet_name":"Mighty Ascetic Asuras","tier_assignment":4,"function_tags":["mighty-warriors","great-ascetics","moral-ambivalence","Prahlada-Bali-tradition"],"valence":"ambivalent","core_claim":"Unlike Christian devils, the Daityas include moral exemplars — Prahlada the supreme devotee, Bali the just king. The asura tradition cannot be collapsed into pure evil.","parallel_facets":["azazel-bound"]},{"id":"danavas-as-defeated-older-race","parent_deity_id":"danavas","facet_name":"The Children of Dānu (Defeated Race)","tier_assignment":4,"function_tags":["defeated-titans","elder-divine-race","subterranean-power"],"valence":"ambivalent","core_claim":"The Dānavas are descended from Dānu through Kashyapa. They are called amānuṣa ('unhuman'). Their structural parallel — and linguistic cognate — with the Celtic Tuath Dé Danann is one of the strongest goddess-cognate cases in IE comparative mythology.","parallel_facets":["daityas-as-defeated-older-race","fomorians-as-pre-divine-chaos","rephaim-as-giants","nephilim-giants"]},{"id":"danavas-as-subterranean-mystics","parent_deity_id":"danavas","facet_name":"Subterranean Mystic-Architects","tier_assignment":4,"function_tags":["subterranean","master-architects","mystic-power"],"valence":"ambivalent","core_claim":"Maya Dānava, the chief architect of the asuras, surpasses even Vishvakarma in skill. The Dānavas dwell in Bila Svarga (subterranean paradises).","parallel_facets":["watchers-teachers-of-forbidden-arts"]},{"id":"vritra-cosmic-serpent","parent_deity_id":"vritra","facet_name":"The Cosmic Serpent","tier_assignment":4,"function_tags":["cosmic-serpent","dragon","withholder-of-waters","to-be-slain"],"valence":"negative","core_claim":"Vṛtra is the coiled serpent who encloses the mountains and withholds the waters. Indra's slaying of him with the vajra is the foundational IE combat-myth.","parallel_facets":["yam-sea-chaos","tiamat","leviathan","jormungandr","apophis"]},{"id":"vritra-withholder-of-waters","parent_deity_id":"vritra","facet_name":"Withholder of the Cosmic Waters","tier_assignment":4,"function_tags":["withholder","chaos-stagnation","obstacle-to-life"],"valence":"negative","core_claim":"Vṛtra's defining function is enclosure — he 'wraps' the waters. Slaying him releases life-giving flow. The IE dragon as obstacle-to-fertility.","parallel_facets":["mot-death"]},{"id":"anakim-giant-warriors","parent_deity_id":"anakim","facet_name":"Giant Warrior-Clan of Canaan","tier_assignment":4,"function_tags":["giants","warriors","pre-Israelite-inhabitants","Hebron-territory"],"valence":"ambivalent","core_claim":"Numbers 13:33 makes the spies say of the Anakim: 'we were in our own sight as grasshoppers, and so we were in their sight.' Deuteronomy 2:11 explicitly identifies them as a sub-group of the Rephaim.","parallel_facets":["rephaim-biblical-giants","rephaim-as-giants","nephilim-giants","og-king-of-bashan","fomorians-as-giants","daityas-as-defeated-older-race"]},{"id":"anakim-sons-of-anak","parent_deity_id":"anakim","facet_name":"The Three Sons of Anak","tier_assignment":4,"function_tags":["specific-individuals","Hebron-rulers"],"valence":"negative","core_claim":"Numbers 13:22 names them: Sheshai, Ahiman, Talmai — the three giant rulers of Hebron. Caleb destroys them (Joshua 15:14).","parallel_facets":[]},{"id":"anakim-iy-anaq-egyptian","parent_deity_id":"anakim","facet_name":"Iy-ʿAnaq in the Egyptian Execration Texts","tier_assignment":4,"function_tags":["extra-biblical-attestation","Egyptian-evidence","Iy-anaq","Middle-Kingdom"],"valence":"ambivalent","core_claim":"The Egyptian Middle Kingdom Execration Texts (c. 19th–18th c. BCE) curse 'Iy-ʿanaq' — a Canaanite people whose three rulers (Erum, Abiyamimu, and another) bear Semitic names. Most scholars (Albright, Wright, Mazar) identify these as the same Anakim later confronted by Israel. Papyrus Anastasi I (13th c. BCE) describes Canaanite warriors of exceptional stature on Egyptian travel routes. This is the strongest extra-biblical historical evidence for the giant-clan tradition.","parallel_facets":[]},{"id":"og-last-of-rephaim","parent_deity_id":"og-of-bashan","facet_name":"Last of the Rephaim","tier_assignment":4,"function_tags":["last-survivor","giant-king","Bashan-territory"],"valence":"negative","core_claim":"Deuteronomy 3:11: 'For only Og king of Bashan remained of the remnant of the Rephaim. Behold, his bedstead was a bedstead of iron... nine cubits its length, and four cubits its breadth.' Talmud Niddah 61a makes him the grandson of Shemhazai the fallen Watcher — explicitly threading him into the Genesis 6 / Enochic lineage.","parallel_facets":["rephaim-biblical-giants","rephaim-of-bashan","watchers-fallen","nephilim-giants"]},{"id":"og-king-of-bashan","parent_deity_id":"og-of-bashan","facet_name":"Giant King at Mt Hermon / Bashan","tier_assignment":4,"function_tags":["king-of-Bashan","Mt-Hermon-territory","Watcher-geography"],"valence":"negative","core_claim":"Og's kingdom in Bashan — overlapping the Golan, Mt Hermon, and the territory of the Ugaritic rpum cult — is precisely the place where 1 Enoch 6 locates the descent of the Watchers. The three traditions converge on a single geography.","parallel_facets":["watchers-fallen","rephaim-of-bashan"]},{"id":"rephaim-biblical-giants","parent_deity_id":"rephaim-biblical","facet_name":"The Rephaim as Pre-Israelite Giants","tier_assignment":4,"function_tags":["giants","pre-Israelite","named-by-each-people"],"valence":"negative","core_claim":"Moabites called them Emim, Ammonites called them Zamzummim, Israelites called them Rephaim. They include the Anakim (Deut 2:11). Goliath and his brothers are their Philistine remnant (1 Chr 20).","parallel_facets":["anakim-giant-warriors","og-king-of-bashan","nephilim-giants","rephaim-as-giants"]},{"id":"rephaim-as-shades-of-sheol","parent_deity_id":"rephaim-biblical","facet_name":"Shades in Sheol","tier_assignment":4,"function_tags":["shades-of-dead","Sheol-inhabitants","ancestral-dead"],"valence":"ambivalent","core_claim":"In Isaiah 14:9, Psalm 88:10, Job 26:5, the word rephaim denotes the shades of the dead. The dual sense — giants AND deified dead — is inherited directly from the Ugaritic rpum.","parallel_facets":["rpum-as-deified-dead"]},{"id":"manu-first-priest","parent_deity_id":"manu-yemo","facet_name":"*Manu — The First Priest / First Man","tier_assignment":2,"function_tags":["first-man","first-priest","founder-of-sacrifice"],"valence":"positive","core_claim":"*Manu is the first man and first priest, who establishes the cosmic order by sacrificing his twin *Yemo.","parallel_facets":["purusha-sacrificed-cosmic-person","enoch-ascended"]},{"id":"yemo-sacrificed-twin","parent_deity_id":"manu-yemo","facet_name":"*Yemo — The Sacrificed Twin (Cosmos from Body)","tier_assignment":2,"function_tags":["sacrificed-primordial-being","cosmos-from-body","first-king"],"valence":"positive","core_claim":"*Yemo is sacrificed by *Manu; from his dismembered body the cosmos is constructed. This is the PIE prototype of cosmos-from-sacrificed-being — surviving in Norse Ymir, Vedic Puruṣa, and (via Tocharian transmission?) Chinese Pangu.","parallel_facets":["purusha-sacrificed-cosmic-person","tiamat-cosmos-from-body","baal-dies-and-rises","christ-resurrection"]},{"id":"yemo-first-king-of-the-dead","parent_deity_id":"manu-yemo","facet_name":"*Yemo — First King of the Dead","tier_assignment":4,"function_tags":["first-mortal","king-of-dead","underworld-ruler"],"valence":"ambivalent","core_claim":"Because *Yemo is the first to die, he becomes the king of the dead. Reflexes: Vedic Yama, Avestan Yima (in his post-fall aspect), Norse Ymir (whose body is the world of the dead).","parallel_facets":["yama-death-judge","hel-underworld","mot-death"]},{"id":"purusha-sacrificed-cosmic-person","parent_deity_id":"purusha","facet_name":"Cosmic Person Sacr
